name: Feature request
description: Propose a new capability or enhancement for SecurityInsight.
title: "[Feature] "
labels: ["type: feature", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to propose a **new feature** or an **enhancement** to an existing one.
        For something that's already broken, use *Bug report* instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's making it hard today? Lead with the user pain, not the solution.
      placeholder: |
        e.g. "On a 10k-machine tenant the email summary doesn't tell me which assets contributed most to the score, so I can't quickly point to remediation owners."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What change would you like to see? Be specific — file paths, columns, prompts, knobs.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Top-level area for this feature.
      options:
        - "area: asset-profiling"
        - "area: risk-analysis"
        - "area: email-summary"
        - "area: viewer"
        - "area: power-bi"
        - "area: workbook"
        - "area: setup"
        - "area: launcher"
        - "area: detection-rules"
        - "area: asset-tagging"
        - "area: docs"
        - "area: new-integration / new-provider"
        - "area: other"
      default: 1
    validations:
      required: true

  - type: dropdown
    id: subcomponent
    attributes:
      label: Sub-component
      description: Specific engine / domain (only relevant for asset-profiling and risk-analysis areas).
      options:
        - "n/a"
        - "Endpoint"
        - "Identity"
        - "Azure"
        - "PublicIP (Shodan)"
        - "Cross-domain / multiple"
      default: 0
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you tried or thought about, and why they didn't fit.
    validations:
      required: false

  - type: input
    id: target_version
    attributes:
      label: SecurityInsight version (if applicable)
      placeholder: e.g. "v2.2.96"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, mock-ups, related issues / PRs.
    validations:
      required: false
