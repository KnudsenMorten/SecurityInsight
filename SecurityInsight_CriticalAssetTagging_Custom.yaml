AssetTagging:
  - AssetTagName: AzHubPlatformManagementSub--tier0--SI
    Mode: Test
    QueryEngine: AzureResourceGraph
    Query:
      - |
        resourcecontainers
        | where type == "microsoft.resources/subscriptions"
        | where properties.managementGroupAncestorsChain has "mg-platform-management"
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "AzHubPlatformManagementSub",
            AssetTierLevel = 0
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | project
            subscriptionId,
            subscriptionName = name,
            Tag_AssetTier,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName,
            id
        | where Tag_AssetTier != AssetTagName
        | order by subscriptionId asc


  - AssetTagName: AzHubPlatformManagementResources--tier0--SI
    Mode: Test
    QueryEngine: AzureResourceGraph
    Query:
      - |
        resources
        | join kind=inner (
            resourcecontainers
            | where type == "microsoft.resources/subscriptions"
            | where properties.managementGroupAncestorsChain has "mg-platform-management"
            | project subscriptionId
            | distinct subscriptionId
        ) on subscriptionId
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "AzHubPlatformManagementResources",
            AssetTierLevel = 0
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | project
            subscriptionId,
            ResourceName = name,
            Tag_AssetTier,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName,
            id
        | where isempty(Tag_AssetTier) and Tag_AssetTier != AssetTagName
        | order by subscriptionId asc

