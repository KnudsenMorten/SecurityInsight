id:        AdminWorkstationUsedByTier1StaffWithoutPAWControls
appliesTo: endpoint
mode:      locked
purpose:   'Admin Workstation Used by Tier 1 Staff Without PAW Controls'
category:  'Management'
description: 'Mixed-use workstation handling tier 1 admin tasks without PAW hardening; high credential exposure.'

detections:
  - id: AdminWorkstationUsedByTier1StaffWithoutPAWControls
    detect:
      any:
        - kind: nameMatches
          namePatterns:
            - '(?i)^admin-wks'
            - '(?i)^adm-ws\d'
            - '(?i)^t1-admin'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)admin.workstation'
            - '(?i)t1.admin'
            - '(?i)tier.?1'
    set:
      Tier:     1
      Purpose:  'Admin Workstation Used by Tier 1 Staff Without PAW Controls'
      Category: 'Management'