            - '(?i)^aadc\d'
            - '(?i)^aadconnect'
            - '(?i)^entraconnect'
            - '(?i)entra.connect'
            - '(?i)ad.connect'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)aad.connect'
            - '(?i)entra.connect'
            - '(?i)tier.?0'
