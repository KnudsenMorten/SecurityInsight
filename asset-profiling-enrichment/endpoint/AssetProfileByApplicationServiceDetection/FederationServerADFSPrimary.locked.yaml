detections:
  - id: FederationServerADFSPrimary
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'active_directory_federation_services*'
            - 'adfs*'
            - 'ad_fs*'
            - 'active_directory_federation_services_proxy*'
            - 'active_directory_federation_services*'
            - 'active_directory*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^adfs\d'
            - '(?i)federation.service'
            - '(?i)^fs-primary'
            - '(?i)^sts\d'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)adfs'
            - '(?i)federation'
            - '(?i)tier.?0'
    set:
      Tier:     0
      Purpose:  'Federation Server (AD FS Primary)'
      Category: 'Server Roles'