detections:
  - id: MFARADIUSServer
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'network_policy_server*'
            - 'freeradius*'
            - 'cisco_ise*'
            - 'rsa_authentication_manager*'
            - 'duo_authentication*'
            - 'microsoft_nps*'
            - 'network_policy_server*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^nps\d'
            - '(?i)^radius\d'
            - '(?i)^mfa\d'
            - '(?i)^duo-'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)radius'
            - '(?i)mfa.server'
            - '(?i)tier.?1'
    set:
      Tier:     1
      Purpose:  'MFA / RADIUS Server'
      Category: 'Server Roles'