id:        MicrosoftLaps
appliesTo: endpoint
osPlatformScope: [WindowsServer, Linux]
mode:      locked
purpose:   'Microsoft LAPS'
category:  'Identity'
description: 'LAPS protects local admin creds; T0 due to credential scope'
displayNames:
