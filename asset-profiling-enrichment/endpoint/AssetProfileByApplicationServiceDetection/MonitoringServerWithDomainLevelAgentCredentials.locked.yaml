id:        MonitoringServerWithDomainLevelAgentCredentials
appliesTo: endpoint
osPlatformScope: [WindowsServer, Linux]
mode:      locked
purpose:   'Monitoring Server with Domain-Level Agent Credentials'
category:  'Management'
description: |
  \|\| |\|\|||
  |\|\| |\|\| |A|g|e|n|t|s|\|\| |i|n|s|t|a|l|l|e|d|\|\| |o|n|\|\| |D|C|s|\|\| |r|u|n|\|\| |w|i|t|h|\|\| |d|o|m|a|i|n|\|\| |a|d|m|i|n|\|\| |c|o|n|t|e|x|t|;|\|\| |c|e|n|t|r|a|l|\|\| |s|e|r|v|e|r|\|\| |c|o|m|p|r|o|m|i|s|e|\|\| |p|i|v|o|t|s|\|\| |i|n|t|o|\|\| |A|D|\|\|.|
  |\|\| |\|\| |M|e|r|g|e|d|\|\| |s|o|f|t|w|a|r|e|\|\| |s|i|g|n|a|l|s|:|\|\| |m|i|c|r|o|s|o|f|t|/|s|y|s|t|e|m|_|c|e|n|t|e|r|,|\|\| |m|i|c|r|o|s|o|f|t|/|s|y|s|t|e|m|_|c|e|n|t|e|r|_|o|p|e|r|a|t|i|o|n|s|_|m|a|n|a|g|e|r|

detections:
  - id: MonitoringServerWithDomainLevelAgentCredentials
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'system_center_operations_manager*'
            - 'scom*'
            - 'solarwinds_orion*'
            - 'nagios*'
            - 'zabbix*'
            - 'system_center_operations_manager*'
            - 'system_center*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^scom\d'
            - '(?i)^mgmt-mon'
            - '(?i)monitoring.tier.?0'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)monitoring.tier.?0'
            - '(?i)scom.management'
            - '(?i)tier.?0'
    set:
      Tier:     0
      Purpose:  'Monitoring Server with Domain-Level Agent Credentials'
      Category: 'Management'