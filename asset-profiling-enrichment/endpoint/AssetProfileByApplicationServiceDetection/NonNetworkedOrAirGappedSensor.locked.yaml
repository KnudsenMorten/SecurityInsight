id:        NonNetworkedOrAirGappedSensor
appliesTo: endpoint
osPlatformScope: [WindowsServer, Linux]
mode:      locked
purpose:   'Non-Networked or Air-Gapped Sensor'
category:  'IoT / OT'
description: 'No network exposure; only physical access matters.'

detections:
  - id: NonNetworkedOrAirGappedSensor
    detect:
      any:
        - kind: nameMatches
          namePatterns:
            - '(?i)^airgap'
            - '(?i)^offline.?sensor'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)air.gapped'
            - '(?i)offline.sensor'
            - '(?i)tier.?3'
    set:
      Tier:     3
      Purpose:  'Non-Networked or Air-Gapped Sensor'
      Category: 'IoT / OT'