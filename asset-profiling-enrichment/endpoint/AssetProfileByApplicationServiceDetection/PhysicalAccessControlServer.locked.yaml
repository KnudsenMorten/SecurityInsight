id:        PhysicalAccessControlServer
appliesTo: endpoint
mode:      locked
purpose:   'Physical Access Control Server'
category:  'Server Roles'
description: 'Standalone physical access controller; door-management impact only.'

detections:
  - id: PhysicalAccessControlServer
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'lenel_onguard*'
            - 'software_house_ccure*'
            - 'honeywell_winpak*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^pacs\d'
            - '(?i)^doors\d'
            - '(?i)access.control.server'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)physical.access'
            - '(?i)tier.?3'
    set:
      Tier:     3
      Purpose:  'Physical Access Control Server'
      Category: 'Server Roles'