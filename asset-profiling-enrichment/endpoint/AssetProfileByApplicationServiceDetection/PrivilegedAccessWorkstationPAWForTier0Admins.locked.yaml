id:        PrivilegedAccessWorkstationPAWForTier0Admins
appliesTo: endpoint
mode:      locked
purpose:   'Privileged Access Workstation (PAW) for Tier 0 Admins'
category:  'Management'
description: 'Workstation handling tier 0 admin sessions; compromise gives attacker direct DA/EA access.'

detections:
  - id: PrivilegedAccessWorkstationPAWForTier0Admins
    detect:
      any:
        - kind: nameMatches
          namePatterns:
            - '(?i)^paw-?t?0'
            - '(?i)^pawt0'
            - '(?i)paw.tier.?0'
            - '(?i)^paw\d.*t0'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)paw.tier.?0'
            - '(?i)paw.t0'
            - '(?i)tier.?0.paw'
            - '(?i)tier.?0'
    set:
      Tier:     0
      Purpose:  'Privileged Access Workstation (PAW) for Tier 0 Admins'
      Category: 'Management'