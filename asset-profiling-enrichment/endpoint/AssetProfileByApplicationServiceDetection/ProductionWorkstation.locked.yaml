id:        ProductionWorkstation
appliesTo: endpoint
mode:      locked
purpose:   'Production Workstation'
category:  'Client Devices'
description: 'Standard production workstation with business data and credentials; ransomware/data theft target.'

detections:
  - id: ProductionWorkstation
    detect:
      any:
        - kind: nameMatches
          namePatterns:
            - '(?i)^prod-wks'
            - '(?i)^pw\d'
            - '(?i)production.workstation'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)production.workstation'
            - '(?i)tier.?2'
    set:
      Tier:     2
      Purpose:  'Production Workstation'
      Category: 'Client Devices'