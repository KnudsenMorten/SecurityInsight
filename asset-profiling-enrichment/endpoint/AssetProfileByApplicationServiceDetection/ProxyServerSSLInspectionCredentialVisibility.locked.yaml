id:        ProxyServerSSLInspectionCredentialVisibility
appliesTo: endpoint
osPlatformScope: [WindowsServer, Linux]
mode:      locked
purpose:   'Proxy Server (SSL Inspection — Credential Visibility)'
category:  'Network Equipment'
description: 'TLS-terminating proxy sees plaintext credentials in every outbound HTTPS session.'

detections:
  - id: ProxyServerSSLInspectionCredentialVisibility
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'bluecoat_proxysg*'
            - 'symantec_proxy*'
            - 'zscaler_*'
            - 'mcafee_web_gateway*'
            - 'forcepoint_web_security*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^proxy\d'
            - '(?i)^proxysg'
            - '(?i)^webgw'
            - '(?i)ssl.proxy'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)ssl.inspection'
            - '(?i)web.proxy'
            - '(?i)tier.?1'
    set:
      Tier:     1
      Purpose:  'Proxy Server (SSL Inspection — Credential Visibility)'
      Category: 'Network Equipment'