detections:
  - id: RADIUSTACACSNetworkAuthenticationServer
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'cisco_acs*'
            - 'cisco_ise*'
            - 'freeradius*'
            - 'tacacs+*'
            - 'tac_plus*'
            - 'freeradius*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^tacacs\d'
            - '(?i)^acs\d'
            - '(?i)tacacs\+?'
            - '(?i)network.aaa'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)tacacs'
            - '(?i)network.aaa'
            - '(?i)tier.?1'
    set:
      Tier:     1
      Purpose:  'RADIUS / TACACS+ Network Authentication Server'
      Category: 'Network Equipment'