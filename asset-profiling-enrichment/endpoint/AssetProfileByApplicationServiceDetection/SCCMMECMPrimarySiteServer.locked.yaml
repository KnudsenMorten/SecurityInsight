detections:
  - id: SCCMMECMPrimarySiteServer
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'system_center_configuration_manager*'
            - 'microsoft_endpoint_configuration_manager*'
            - 'sccm_*'
            - 'mecm*'
            - 'system_center_configuration_manager*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^sccm\d'
            - '(?i)^mecm\d'
            - '(?i)^cmsite'
            - '(?i)config.manager'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)sccm'
            - '(?i)mecm'
            - '(?i)tier.?1'
    set:
      Tier:     1
      Purpose:  'SCCM / MECM Primary Site Server'
      Category: 'Management'