id:        SecretManagementServerHashiCorpVaultAzureKeyVaultPrivateEndpoint
appliesTo: endpoint
mode:      locked
purpose:   'Secret Management Server (HashiCorp Vault, Azure Key Vault Private Endpoint)'
category:  'Management'
description: 'Centralised secret store; compromise leaks every consumer''s credential at once.'

detections:
  - id: SecretManagementServerHashiCorpVaultAzureKeyVaultPrivateEndpoint
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'hashicorp_vault*'
            - 'cyberark_*'
            - 'thycotic_secret_server*'
            - 'delinea_secret_server*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^vault\d'
            - '(?i)^secret\d'
            - '(?i)hashicorp.vault'
            - '(?i)cyberark'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)vault'
            - '(?i)secret.server'
            - '(?i)tier.?1'
    set:
      Tier:     1
      Purpose:  'Secret Management Server (HashiCorp Vault, Azure Key Vault Private Endpoint)'
      Category: 'Management'