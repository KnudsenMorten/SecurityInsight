detections:
  - id: SharePointServer
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'microsoft_sharepoint_server*'
            - 'sharepoint_server*'
            - 'sharepoint_server*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^sp\d'
            - '(?i)^sharepoint\d'
            - '(?i)sharepoint.server'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)sharepoint'
            - '(?i)tier.?2'
    set:
      Tier:     2
      Purpose:  'SharePoint Server'
      Category: 'Server Roles'