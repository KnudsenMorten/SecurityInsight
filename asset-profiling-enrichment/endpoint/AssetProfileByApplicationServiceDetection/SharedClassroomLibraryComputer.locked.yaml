id:        SharedClassroomLibraryComputer
appliesTo: endpoint
mode:      locked
purpose:   'Shared Classroom / Library Computer'
category:  'Client Devices'
description: 'Multi-user education-tier device; restricted role, minor data exposure.'

detections:
  - id: SharedClassroomLibraryComputer
    detect:
      any:
        - kind: nameMatches
          namePatterns:
            - '(?i)^classroom\d'
            - '(?i)^library\d'
            - '(?i)^lib-pc'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)classroom'
            - '(?i)library.pc'
            - '(?i)tier.?3'
    set:
      Tier:     3
      Purpose:  'Shared Classroom / Library Computer'
      Category: 'Client Devices'