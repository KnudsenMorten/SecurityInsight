id:        USBOnlyPeripheralWithFirmwareUpdateCapability
appliesTo: endpoint
mode:      locked
purpose:   'USB-Only Peripheral with Firmware Update Capability'
category:  'IoT / OT'
description: 'USB-only device with updatable firmware; supply-chain risk vector but low blast radius.'

detections:
  - id: USBOnlyPeripheralWithFirmwareUpdateCapability
    detect:
      any:
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)usb.peripheral'
            - '(?i)firmware.updatable'
            - '(?i)tier.?3'
    set:
      Tier:     3
      Purpose:  'USB-Only Peripheral with Firmware Update Capability'
      Category: 'IoT / OT'