id:        VendingMachineCoffeeMachineWithNetworkConnectivity
appliesTo: endpoint
mode:      locked
purpose:   'Vending Machine / Coffee Machine with Network Connectivity'
category:  'IoT / OT'
description: 'Networked appliance; minimal lateral pivot value.'

detections:
  - id: VendingMachineCoffeeMachineWithNetworkConnectivity
    detect:
      any:
        - kind: nameMatches
          namePatterns:
            - '(?i)^vending\d'
            - '(?i)^coffee\d'
            - '(?i)^kettle\d'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)vending'
            - '(?i)appliance'
            - '(?i)tier.?3'
    set:
      Tier:     3
      Purpose:  'Vending Machine / Coffee Machine with Network Connectivity'
      Category: 'IoT / OT'