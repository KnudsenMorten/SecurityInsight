detections:
  - id: VoIPSIPGateway
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'cisco_unified_communications*'
            - 'cisco_cucm*'
            - 'asterisk*'
            - 'freepbx*'
            - 'avaya_aura*'
            - 'asterisk*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^voip\d'
            - '(?i)^sipgw\d'
            - '(?i)^cucm\d'
            - '(?i)voice.gateway'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)voip'
            - '(?i)sip.gateway'
            - '(?i)tier.?2'
    set:
      Tier:     2
      Purpose:  'VoIP / SIP Gateway'
      Category: 'Network Equipment'