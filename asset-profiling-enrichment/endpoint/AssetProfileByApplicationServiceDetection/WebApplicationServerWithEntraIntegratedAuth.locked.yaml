detections:
  - id: WebApplicationServerWithEntraIntegratedAuth
    detect:
      any:
        - kind: hasSoftwareInstalled
          tvmSoftwareNames:
            - 'microsoft_iis*'
            - 'apache_http_server*'
            - 'nginx*'
            - 'tomcat*'
            - 'tomcat*'
            - 'nginx_plus*'
            - 'nginx*'
        - kind: nameMatches
          namePatterns:
            - '(?i)^web\d'
            - '(?i)^app\d'
            - '(?i)^webapp\d'
            - '(?i)web.server'
        - kind: hasMdeMachineGroupTag
          machineTagPatterns:
            - '(?i)webapp'
            - '(?i)entra.auth'
            - '(?i)tier.?2'
    set:
      Tier:     2
      Purpose:  'Web Application Server with Entra Integrated Auth'
      Category: 'Server Roles'