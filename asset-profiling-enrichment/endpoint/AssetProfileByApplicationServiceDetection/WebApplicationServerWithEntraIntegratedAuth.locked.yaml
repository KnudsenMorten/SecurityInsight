  |\|\| |\|\| |E|n|t|r|a|-|i|n|t|e|g|r|a|t|e|d|\|\| |a|p|p|\|\| |s|u|r|f|a|c|e|;|\|\| |S|S|R|F|/|t|o|k|e|n|\|\| |t|h|e|f|t|\|\| |c|a|n|\|\| |p|i|v|o|t|\|\| |t|o|\|\| |i|d|e|n|t|i|t|y|\|\| |s|c|o|p|e|\|\|.|
