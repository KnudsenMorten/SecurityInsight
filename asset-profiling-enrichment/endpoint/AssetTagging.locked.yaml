# ============================================================================
# Auto-Exclude tagging rules driven by config/asset-tagging.config.json
#
# Three rules, one per Defender XDR OnboardingStatus bucket. Each rule is
# GATED by a boolean in the JSON config (path under 'AutoExcludeRules'):
#
#   EnabledByConfigFlag: AutoExcludeRules.ExcludeCanBeOnboarded
#   EnabledByConfigFlag: AutoExcludeRules.ExcludeInsufficientInfo
#   EnabledByConfigFlag: AutoExcludeRules.ExcludeUnsupported
#
# When a flag is false (default), the engine skips that rule entirely --
# no tag is written, no Defender Graph call is made, no MDE API call.
# When a flag is true, the rule runs as a normal tagging rule: queries
# ExposureGraphNodes for device nodes matching the OnboardingStatus bucket
# and stamps each device with an MDE machine tag of '<bucket>--Excluded--SI'.
#
# KQL roots in ExposureGraphNodes -- same modern pattern as the existing
# legacy custom tagging rules. SenseDeviceId is extracted from EntityIds
# via mv-apply. The current AssetTags list (deviceManualTags +
# deviceDynamicTags from rawData) is checked against the target
# AssetTagName via 'array_index_of(...) == -1' so a 1-hour cron only
# touches the DELTA -- already-tagged devices are filtered out at the
# KQL layer and never hit the MDE bulk endpoint.
#
# Downstream effect (with the existing RiskAnalysisGlobalExclusions.custom.json):
#   - Risk Analysis reports filter via 'ExcludedAssetTags: ["--Excluded--SI"]'
#     -- the tagged devices drop out of every RA report on the next run.
#   - Profiling rules read the same AssetTags column -- the tagged devices
#     skip tier assignment.
#
# Result: ONE flag flip in the JSON config quietly removes a whole
# OnboardingStatus bucket from SI's risk picture. No KQL editing needed.
# ============================================================================

AssetTagging:

  - AssetTagName: Auto-CanBeOnboarded--Excluded--SI
    Mode: Prod
    QueryEngine: DefenderGraph
    ApplyDeviceNamePatterns: true
    EnabledByConfigFlag: AutoExcludeRules.ExcludeCanBeOnboarded
    Description: |
      Tags every ExposureGraphNodes device whose rawData.onboardingStatus
      = 'canBeOnboarded' (Defender sees the device but the Sense agent
      hasn't enrolled it yet). Already-tagged devices are filtered upstream
      via array_index_of so a 1-hour cron only processes the delta.
    Query:
      - |
        ExposureGraphNodes
        | where NodeLabel has "device"
        | extend rawData = todynamic(NodeProperties).rawData
        | where tobool(rawData.isExcluded) == false
        | where tolower(tostring(rawData.onboardingStatus)) == "canbeonboarded"
        | project NodeId, NodeName, NodeLabel, rawData, EntityIds
        | extend
            deviceManualTags  = iff(isnull(rawData.deviceManualTags),  dynamic([]), todynamic(rawData.deviceManualTags)),
            deviceDynamicTags = iff(isnull(rawData.deviceDynamicTags), dynamic([]), todynamic(rawData.deviceDynamicTags))
        | extend AssetTags = strcat_array(array_concat(deviceManualTags, deviceDynamicTags), ";")
        | extend entityIds_dyn = todynamic(EntityIds)
        | mv-apply e=entityIds_dyn on (
            summarize
                DeviceInventoryId = anyif(tostring(e.id), tostring(e.type) == "DeviceInventoryId"),
                SenseDeviceId     = anyif(tostring(e.id), tostring(e.type) == "SenseDeviceId")
          )
        | extend DeviceName = NodeName
        | extend OnboardingStatus = tostring(rawData.onboardingStatus)
        | extend
            AssetTagType = "Asset--Excluded--SI",
            AssetTag     = "Auto-CanBeOnboarded",
            AssetTagName = strcat("Auto-CanBeOnboarded", "--Excluded--SI")
        | extend AssetTagsArray = iff(isempty(AssetTags), dynamic([]), split(AssetTags, ";"))
        | where array_index_of(AssetTagsArray, AssetTagName) == -1
        | project NodeId, NodeName, DeviceName, OnboardingStatus, SenseDeviceId, DeviceInventoryId, AssetTags, AssetTagType, AssetTag, AssetTagName

  - AssetTagName: Auto-InsufficientInfo--Excluded--SI
    Mode: Prod
    QueryEngine: DefenderGraph
    ApplyDeviceNamePatterns: true
    EnabledByConfigFlag: AutoExcludeRules.ExcludeInsufficientInfo
    Description: |
      Tags every ExposureGraphNodes device whose rawData.onboardingStatus
      = 'insufficientInfo' (Defender has telemetry traces but not enough
      signal to classify the device). Already-tagged devices are filtered
      upstream via array_index_of so a 1-hour cron only processes the delta.
    Query:
      - |
        ExposureGraphNodes
        | where NodeLabel has "device"
        | extend rawData = todynamic(NodeProperties).rawData
        | where tobool(rawData.isExcluded) == false
        | where tolower(tostring(rawData.onboardingStatus)) == "insufficientinfo"
        | project NodeId, NodeName, NodeLabel, rawData, EntityIds
        | extend
            deviceManualTags  = iff(isnull(rawData.deviceManualTags),  dynamic([]), todynamic(rawData.deviceManualTags)),
            deviceDynamicTags = iff(isnull(rawData.deviceDynamicTags), dynamic([]), todynamic(rawData.deviceDynamicTags))
        | extend AssetTags = strcat_array(array_concat(deviceManualTags, deviceDynamicTags), ";")
        | extend entityIds_dyn = todynamic(EntityIds)
        | mv-apply e=entityIds_dyn on (
            summarize
                DeviceInventoryId = anyif(tostring(e.id), tostring(e.type) == "DeviceInventoryId"),
                SenseDeviceId     = anyif(tostring(e.id), tostring(e.type) == "SenseDeviceId")
          )
        | extend DeviceName = NodeName
        | extend OnboardingStatus = tostring(rawData.onboardingStatus)
        | extend
            AssetTagType = "Asset--Excluded--SI",
            AssetTag     = "Auto-InsufficientInfo",
            AssetTagName = strcat("Auto-InsufficientInfo", "--Excluded--SI")
        | extend AssetTagsArray = iff(isempty(AssetTags), dynamic([]), split(AssetTags, ";"))
        | where array_index_of(AssetTagsArray, AssetTagName) == -1
        | project NodeId, NodeName, DeviceName, OnboardingStatus, SenseDeviceId, DeviceInventoryId, AssetTags, AssetTagType, AssetTag, AssetTagName

  - AssetTagName: Auto-Unsupported--Excluded--SI
    Mode: Prod
    QueryEngine: DefenderGraph
    ApplyDeviceNamePatterns: true
    EnabledByConfigFlag: AutoExcludeRules.ExcludeUnsupported
    Description: |
      Tags every ExposureGraphNodes device whose rawData.onboardingStatus
      = 'unsupported' (legacy / appliance OS that Defender can't onboard).
      Use when retired or EOL devices keep appearing in EG with no path
      to remediation. Already-tagged devices are filtered upstream via
      array_index_of so a 1-hour cron only processes the delta.
    Query:
      - |
        ExposureGraphNodes
        | where NodeLabel has "device"
        | extend rawData = todynamic(NodeProperties).rawData
        | where tobool(rawData.isExcluded) == false
        | where tolower(tostring(rawData.onboardingStatus)) == "unsupported"
        | project NodeId, NodeName, NodeLabel, rawData, EntityIds
        | extend
            deviceManualTags  = iff(isnull(rawData.deviceManualTags),  dynamic([]), todynamic(rawData.deviceManualTags)),
            deviceDynamicTags = iff(isnull(rawData.deviceDynamicTags), dynamic([]), todynamic(rawData.deviceDynamicTags))
        | extend AssetTags = strcat_array(array_concat(deviceManualTags, deviceDynamicTags), ";")
        | extend entityIds_dyn = todynamic(EntityIds)
        | mv-apply e=entityIds_dyn on (
            summarize
                DeviceInventoryId = anyif(tostring(e.id), tostring(e.type) == "DeviceInventoryId"),
                SenseDeviceId     = anyif(tostring(e.id), tostring(e.type) == "SenseDeviceId")
          )
        | extend DeviceName = NodeName
        | extend OnboardingStatus = tostring(rawData.onboardingStatus)
        | extend
            AssetTagType = "Asset--Excluded--SI",
            AssetTag     = "Auto-Unsupported",
            AssetTagName = strcat("Auto-Unsupported", "--Excluded--SI")
        | extend AssetTagsArray = iff(isempty(AssetTags), dynamic([]), split(AssetTags, ";"))
        | where array_index_of(AssetTagsArray, AssetTagName) == -1
        | project NodeId, NodeName, DeviceName, OnboardingStatus, SenseDeviceId, DeviceInventoryId, AssetTags, AssetTagType, AssetTag, AssetTagName
