# ============================================================================
# Auto-Exclude tagging rules driven by config/asset-tagging.config.json
#
# FOUR independent rules. Not ANDed. A device matching multiple gets
# multiple Auto-* tags (downstream '--Excluded--SI' suffix doesn't care
# which prefix carried it).
#
# Sources:
#   Rules 1-3 (OnboardingStatus): source = DeviceInfo.
#     DeviceInfo is the authoritative table for OnboardingStatus and
#     surfaces EVERY device Defender has signal for -- including the
#     ones that ExposureGraphNodes doesn't node-up (e.g. fully
#     un-onboarded CanBeOnboarded devices). EG is left-joined ONLY to
#     pull rawData.deviceManualTags + deviceDynamicTags for the
#     'already-tagged?' delta filter -- devices not in EG get an empty
#     AssetTags string and naturally pass the filter (which is fine;
#     the engine will skip them later if their DeviceId is empty,
#     i.e. they have no MDE machine record to tag).
#
#   Rule 4 (DeviceNamePattern): source = ExposureGraphNodes.
#     Name-pattern targets ONBOARDED machines (typically endpoints);
#     EG is the modern source and gives us EntityIds + AssetTags in
#     one read.
#
# Gates: AutoExcludeRules.{ExcludeCanBeOnboarded, ExcludeInsufficientInfo,
#        ExcludeUnsupported, ExcludeByDeviceNamePattern}.
#
# Delta: each rule ends with 'where array_index_of(AssetTagsArray,
# AssetTagName) == -1', so already-tagged devices don't re-hit MDE on
# every cron tick.
#
# Limitation operators must understand: the MDE machine-tag REST API
# (POST /api/machines/{id}/tags) requires an MDE-onboarded machine ID
# (SenseDeviceId / DeviceInfo.DeviceId). Devices that exist in
# DeviceInfo passively (switches, APs, printers, IoT, mobile, dummy
# names) typically have empty DeviceId -- those rows are surfaced by
# rules 1-3 but the engine drops them silently with an aggregate
# 'Skipped Defender rows Count=N Reason=Missing SenseDeviceId' line.
# Tagging un-onboarded devices is not technically possible via this
# API path -- not a bug.
# ============================================================================

AssetTagging:

  - AssetTagName: Auto-CanBeOnboarded--Excluded--SI
    Mode: Prod
    QueryEngine: DefenderGraph
    EnabledByConfigFlag: AutoExcludeRules.ExcludeCanBeOnboarded
    Description: |
      Tags every DeviceInfo row whose OnboardingStatus is 'Can be onboarded'.
      Source = DeviceInfo (authoritative). Left-join to ExposureGraphNodes
      provides current AssetTags for the delta filter.
    Query:
      - |
        let TaggedNodes =
            ExposureGraphNodes
            | where NodeLabel has "device"
            | extend rawData = todynamic(NodeProperties).rawData
            | extend
                deviceManualTags  = iff(isnull(rawData.deviceManualTags),  dynamic([]), todynamic(rawData.deviceManualTags)),
                deviceDynamicTags = iff(isnull(rawData.deviceDynamicTags), dynamic([]), todynamic(rawData.deviceDynamicTags))
            | extend AssetTags = strcat_array(array_concat(deviceManualTags, deviceDynamicTags), ";")
            | extend entityIds_dyn = todynamic(EntityIds)
            | mv-apply e=entityIds_dyn on (
                summarize SenseDeviceId = anyif(tostring(e.id), tostring(e.type) == "SenseDeviceId")
              )
            | where isnotempty(SenseDeviceId)
            | project SenseDeviceId, AssetTags;
        DeviceInfo
        | where OnboardingStatus =~ "Can be onboarded"
        | summarize arg_max(Timestamp, *) by DeviceId
        | project SenseDeviceId = DeviceId, DeviceName, MachineGroup, OnboardingStatus
        | extend
            AssetTagType = "Asset--Excluded--SI",
            AssetTag     = "Auto-CanBeOnboarded",
            AssetTagName = strcat("Auto-CanBeOnboarded", "--Excluded--SI")
        | join kind=leftouter TaggedNodes on SenseDeviceId
        | extend AssetTags = coalesce(AssetTags, "")
        | extend AssetTagsArray = iff(isempty(AssetTags), dynamic([]), split(AssetTags, ";"))
        | where array_index_of(AssetTagsArray, AssetTagName) == -1
        | project SenseDeviceId, DeviceName, MachineGroup, OnboardingStatus, AssetTags, AssetTagType, AssetTag, AssetTagName

