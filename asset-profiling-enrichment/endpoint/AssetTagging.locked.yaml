  - AssetTagName: Auto-NamePattern--Excluded--SI
    Mode: Prod
    QueryEngine: DefenderGraph
    ApplyDeviceNamePatterns: true
    EnabledByConfigFlag: AutoExcludeRules.ExcludeByDeviceNamePattern
    Description: |
      Tags every DeviceInfo row whose DeviceName matches any entry in
      DeviceNamePatterns.{StartsWith, Contains, MatchesRegex}. Source =
      DeviceInfo so we see EVERY known device (including ones not in
      ExposureGraphNodes). Left-join to EG provides AssetTags for the
      delta filter. Independent of OnboardingStatus -- e.g. desktop-*
      gets tagged whether onboarded, canBeOnboarded, or unsupported.
    Query:
      - |
        let TaggedNodes =
            ExposureGraphNodes
            | where NodeLabel has "device"
            | extend rawData = todynamic(NodeProperties).rawData
