  - AssetTagName: Auto-NamePattern--Excluded--SI
    Mode: Prod
    QueryEngine: DefenderGraph
    ApplyDeviceNamePatterns: true
    EnabledByConfigFlag: AutoExcludeRules.ExcludeByDeviceNamePattern
    Description: |
      Tags every ExposureGraphNodes device whose NodeName matches any
      entry in DeviceNamePatterns.{StartsWith, Contains, MatchesRegex}
      from the JSON config. INDEPENDENT of OnboardingStatus -- e.g. a
      'desktop-*' box gets tagged whether it's already onboarded,
      onboardable, or unsupported. Already-tagged devices are filtered
      upstream via array_index_of.
    Query:
      - |
        ExposureGraphNodes
        | where NodeLabel has "device"
        | extend rawData = todynamic(NodeProperties).rawData
        | where tobool(rawData.isExcluded) == false
        | project NodeId, NodeName, NodeLabel, rawData, EntityIds
