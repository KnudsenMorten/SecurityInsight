# ============================================================================
# Auto-Exclude tagging rules driven by config/asset-tagging.config.json
#
# FOUR independent rules. They are NOT ANDed together: each is its own
# Defender query and each gets its own MDE bulk-tag pass. A device that
# matches MULTIPLE rules gets multiple Auto-* tags (which is fine -- the
# downstream '--Excluded--SI' suffix machinery doesn't care which
# Auto-* tag carried it).
#
# Rules and the JSON config flags that gate them:
#
#   1. Auto-CanBeOnboarded--Excluded--SI
#        EnabledByConfigFlag: AutoExcludeRules.ExcludeCanBeOnboarded
#        Tags every EG device whose rawData.onboardingStatus is
#        'canBeOnboarded'. No name scoping.
#
#   2. Auto-InsufficientInfo--Excluded--SI
#        EnabledByConfigFlag: AutoExcludeRules.ExcludeInsufficientInfo
#        Tags every EG device whose rawData.onboardingStatus is
#        'insufficientInfo'. No name scoping.
#
#   3. Auto-Unsupported--Excluded--SI
#        EnabledByConfigFlag: AutoExcludeRules.ExcludeUnsupported
#        Tags every EG device whose rawData.onboardingStatus is
#        'unsupported'. No name scoping.
#
#   4. Auto-NamePattern--Excluded--SI
#        EnabledByConfigFlag: AutoExcludeRules.ExcludeByDeviceNamePattern
#        Tags every EG device whose NodeName matches any entry in
#        DeviceNamePatterns.{StartsWith, Contains, MatchesRegex}.
#        No OnboardingStatus scoping -- e.g. desktop-* boxes get tagged
#        whether they're 'onboarded', 'canBeOnboarded', or anything else.
#
# Delta semantics:
#   Each rule's KQL ends with 'where array_index_of(AssetTagsArray,
#   AssetTagName) == -1', so devices already carrying the target tag
#   are filtered out at the KQL layer. A 1-hour cron only touches the
#   actual delta -- no MDE bulk call for devices already tagged.
#
# Downstream effect (RiskAnalysisGlobalExclusions.custom.json):
#   - RA reports filter via 'ExcludedAssetTags: ["--Excluded--SI"]'.
#   - Profiling rules read the same AssetTags column.
#   The four Auto-* tags all carry the '--Excluded--SI' suffix, so
#   tagged devices drop out of RA + profiling on the next run.
# ============================================================================

AssetTagging:

  - AssetTagName: Auto-CanBeOnboarded--Excluded--SI
    Mode: Prod
    QueryEngine: DefenderGraph
    EnabledByConfigFlag: AutoExcludeRules.ExcludeCanBeOnboarded
    Description: |
      Tags every ExposureGraphNodes device whose rawData.onboardingStatus
      is 'canBeOnboarded'. Already-tagged devices are filtered upstream
      via array_index_of, so a 1-hour cron only processes the delta.
    Query:
      - |
        ExposureGraphNodes
        | where NodeLabel has "device"
        | extend rawData = todynamic(NodeProperties).rawData
        | where tobool(rawData.isExcluded) == false
        | where tostring(rawData.onboardingStatus) matches regex @"(?i)^can.*onboard"
        | project NodeId, NodeName, NodeLabel, rawData, EntityIds
        | extend
            deviceManualTags  = iff(isnull(rawData.deviceManualTags),  dynamic([]), todynamic(rawData.deviceManualTags)),
            deviceDynamicTags = iff(isnull(rawData.deviceDynamicTags), dynamic([]), todynamic(rawData.deviceDynamicTags))
        | extend AssetTags = strcat_array(array_concat(deviceManualTags, deviceDynamicTags), ";")
        | extend entityIds_dyn = todynamic(EntityIds)
        | mv-apply e=entityIds_dyn on (
            summarize
                DeviceInventoryId = anyif(tostring(e.id), tostring(e.type) == "DeviceInventoryId"),
                SenseDeviceId     = anyif(tostring(e.id), tostring(e.type) == "SenseDeviceId")
          )
        | extend DeviceName = NodeName
        | extend OnboardingStatus = tostring(rawData.onboardingStatus)
        | extend
            AssetTagType = "Asset--Excluded--SI",
            AssetTag     = "Auto-CanBeOnboarded",
            AssetTagName = strcat("Auto-CanBeOnboarded", "--Excluded--SI")
        | extend AssetTagsArray = iff(isempty(AssetTags), dynamic([]), split(AssetTags, ";"))
        | where array_index_of(AssetTagsArray, AssetTagName) == -1
        | project NodeId, NodeName, DeviceName, OnboardingStatus, SenseDeviceId, DeviceInventoryId, AssetTags, AssetTagType, AssetTag, AssetTagName

