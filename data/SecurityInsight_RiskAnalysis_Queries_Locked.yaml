        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "Very High"
        
        | extend RF_P_AlsoHasDirectoryWrite = iff(EntraID_AppPermissions has '"HasDirectoryWrite":true', 1, 0)
