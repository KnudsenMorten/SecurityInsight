    - ReportName: Identity_PermanentPrivilegedRole_Summary
      ReportPurpose: >
        Privileged users with permanent (non-PIM) role assignments. Best practice requires all Tier 0/1 roles to be assigned via PIM (just-in-time) to reduce the standing attack surface. Permanent assignments mean the role is always active, even when not in use, providing a persistent target for attackers.
