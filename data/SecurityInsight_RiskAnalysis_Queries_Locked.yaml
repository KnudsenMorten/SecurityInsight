            iff(RF_P_Frequent     == 1, dynamic(["Frequent3plus"]),            dynamic([])),
            iff(RF_P_NoMFA        == 1, dynamic(["NoMFARegistered"]),          dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("HighRiskCountrySignin=1;Tier0Identity=", tostring(RF_P_Tier0),
