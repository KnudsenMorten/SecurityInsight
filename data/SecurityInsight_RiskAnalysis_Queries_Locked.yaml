    - ReportName: Identity_PrivilegedUser_BruteForceSuccess_Summary
      ReportPurpose: >
        Privileged accounts (Tier 0/1) where multiple failed sign-in attempts were followed by a successful sign-in within a 1-hour window. This pattern is consistent with password spraying or brute-force attack that succeeded. Even with MFA, a brute-forced account can be used to trigger MFA fatigue. A confirmed brute-force success on a privileged account is one of the highest risk signals available from sign-in logs. Severity: Very High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        let PrivilegedIdentities =
            SI_IdentityAssets_CL
            | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by ObjectId
            | where ObjectType == "User"
            | where AccountEnabled == true
            | where EffectiveTier <= 1
            | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
            | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
            | project UPN = tolower(UPN), DisplayName, ObjectId,
                      CriticalityTier, EffectiveTier, MFARegistered;
        
        let FailedSignins =
            SigninLogs
            | where TimeGenerated >= ago(30d)
            | where ResultType != 0
            | extend UPN       = tolower(UserPrincipalName)
            | extend HourBucket = bin(TimeGenerated, 1h)
            | summarize FailureCount = count() by UPN, HourBucket;
        
        let SuccessSignins =
            SigninLogs
            | where TimeGenerated >= ago(30d)
            | where ResultType == 0
            | extend UPN       = tolower(UserPrincipalName)
            | extend HourBucket = bin(TimeGenerated, 1h)
            | summarize SuccessCount = count(), SuccessTime = max(TimeGenerated) by UPN, HourBucket;
        
        FailedSignins
        | where FailureCount >= 5
        | join kind=inner SuccessSignins on UPN, HourBucket
        | join kind=inner PrivilegedIdentities on UPN
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity    = "Very High"
        | extend RF_P_Tier0          = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_ManyFailures   = iff(FailureCount >= 20, 1, 0)
        | extend RF_P_NoMFA          = iff(MFARegistered == false, 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_ManyFailures + RF_P_NoMFA
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["BruteForceSuccess"]),
            iff(RF_P_Tier0       == 1, dynamic(["Tier0Identity"]),          dynamic([])),
            iff(RF_P_ManyFailures == 1,dynamic(["HighFailureCount20plus"]), dynamic([])),
            iff(RF_P_NoMFA       == 1, dynamic(["NoMFARegistered"]),        dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("BruteForceSuccess=1;Tier0Identity=", tostring(RF_P_Tier0),
                   ";HighFailureCount20plus=", tostring(RF_P_ManyFailures), ";NoMFARegistered=", tostring(RF_P_NoMFA))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Sign-in Behaviour"
        | extend Subcategory       = "Credential Attack Signals"
        | extend ConfigurationName = "Brute-force or spray attack succeeded on privileged account"
        | extend ConfigurationId   = "IDENTITY-SIGNIN-005"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

