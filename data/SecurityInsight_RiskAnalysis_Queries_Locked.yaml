      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "ServicePrincipal"
        | where IsManagedIdentity == false
        | where Workload_Credentials has '"HasSecret":true'
        | where Workload_Credentials has '"HasCert":true'
        
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity = "Medium"
        
        | extend RF_P_Privileged    = iff(EffectiveTier <= 1, 1, 0)
        | extend RF_P_NoOwner       = iff(IsOrphan == true, 1, 0)
        | extend RF_P_HasExpired    = iff(Workload_Credentials has '"HasExpired":true', 1, 0)
        | extend RiskFactor_Consequence = 1
        | extend RiskFactor_Probability = RF_P_Privileged + RF_P_NoOwner + RF_P_HasExpired
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["BothSecretAndCert"]),
            iff(RF_P_Privileged == 1, dynamic(["PrivilegedSPN"]),      dynamic([])),
            iff(RF_P_NoOwner    == 1, dynamic(["NoOwner"]),             dynamic([])),
            iff(RF_P_HasExpired == 1, dynamic(["ExpiredCredential"]),  dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("BothSecretAndCert=1;PrivilegedSPN=", tostring(RF_P_Privileged),
                   ";NoOwner=", tostring(RF_P_NoOwner), ";ExpiredCredential=", tostring(RF_P_HasExpired))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Workload Identities"
        | extend Subcategory       = "Credential Hygiene"
        | extend ConfigurationName = "SPN with both client secret and certificate - over-credentialed"
        | extend ConfigurationId   = "IDENTITY-SPN-006"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_Admin_LogonTo_VulnerableDevice_Summary
      ReportPurpose: >
        Privileged users (permanent or PIM-eligible Tier 0/1 roles) who are observed authenticating to devices that have high or critical severity CVEs outstanding. When an admin logs on to a vulnerable device, their privileged token/credential is exposed on that device. An attacker who exploits the CVE could harvest the admin credential via memory dumps, token theft, or keylogging. Severity: Very High (fixed) - privileged credential exposure on vulnerable device.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        let VulnerableDevices =
            ExposureGraphNodes
            | where NodeLabel == "device"
            | extend rawData          = todynamic(NodeProperties.rawData)
            | extend HasHighCriticalCVE = tobool(rawData.highRiskVulnerabilityInsights.hasHighOrCritical)
            | where HasHighCriticalCVE == true
            | extend DeviceName       = tostring(rawData.deviceName)
            | extend MaxCvssScore     = todouble(rawData.highRiskVulnerabilityInsights.maxCvssScore)
            | extend IsInternetFacing = isnotnull(rawData.exposedToInternet)
            | extend DeviceRiskScore  = tostring(rawData.riskScore)
            | project DeviceNodeId = NodeId, DeviceName, MaxCvssScore, IsInternetFacing, DeviceRiskScore;
        
        ExposureGraphEdges
        | where EdgeLabel =~ "can authenticate to" or EdgeLabel =~ "canAuthenticateTo"
        | join kind=inner (
            ExposureGraphNodes
            | where NodeLabel == "user"
            | extend rawData         = todynamic(NodeProperties.rawData)
            | extend CriticalityTier = toint(coalesce(
                tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                tostring(rawData.criticalityLevel.criticalityLevel), "2"))
            | extend UserUPN         = tolower(tostring(rawData.userPrincipalName))
            | extend UserDisplayName = tostring(rawData.displayName)
            | where isnotempty(UserUPN)
            | project UserNodeId = NodeId, UserUPN, UserDisplayName, CriticalityTier
          ) on $left.SourceNodeId == $right.UserNodeId
        | join kind=inner VulnerableDevices on $left.TargetNodeId == $right.DeviceNodeId
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity     = "Very High"
        | extend RF_P_Tier0           = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_Internet        = iff(IsInternetFacing == true, 1, 0)
        | extend RF_P_HighCvss        = iff(MaxCvssScore >= 9.0, 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_Internet + RF_P_HighCvss
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["AdminOnVulnerableDevice"]),
            iff(RF_P_Tier0    == 1, dynamic(["Tier0Admin"]),          dynamic([])),
            iff(RF_P_Internet == 1, dynamic(["InternetFacingDevice"]),dynamic([])),
            iff(RF_P_HighCvss == 1, dynamic(["CVSS9plus"]),           dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("AdminOnVulnerableDevice=1;Tier0Admin=", tostring(RF_P_Tier0),
                   ";InternetFacingDevice=", tostring(RF_P_Internet),
                   ";CVSS9plus=", tostring(RF_P_HighCvss))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Privileged Access"
        | extend Subcategory       = "Credential Exposure via Device"
        | extend ConfigurationName = "Privileged user authenticating to device with High/Critical CVEs"
        | extend ConfigurationId   = "IDENTITY-DEVICE-001"
        | summarize
            AssetCount             = dcount(UserNodeId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(UserDisplayName, " -> ", DeviceName))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

