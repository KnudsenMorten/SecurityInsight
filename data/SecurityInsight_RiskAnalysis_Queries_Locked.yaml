        | join kind=inner NonTier0Devices on $left.TargetNodeId == $right.DeviceNodeId
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity      = "Very High"
        | extend SecurityDomain        = "Identity"
        | extend Category              = "Privileged Access"
        | extend Subcategory           = "Privileged Access Workstation Compliance"
        | extend ConfigurationName     = "Tier 0 admin authenticating to non-PAW (tiering violation)"
        | extend ConfigurationId       = "IDENTITY-DEVICE-003"
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + iff(isnull(DeviceCritLvl) or DeviceCritLvl >= 2, 1, 0)
                                           + iff(HasCVEs == true, 1, 0)
                                           + iff(DeviceRiskScore in ("High","Critical"), 1, 0)
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  SecuritySeverity, CriticalityTier, CriticalityTierLevel,
                  UserDisplayName, UserUPN, UserNodeId,
                  DeviceName, DeviceCritLvl, DeviceRiskScore, HasCVEs,
                  RiskFactor_Consequence, RiskFactor_Probability
