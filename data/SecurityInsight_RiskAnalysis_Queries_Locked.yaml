                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity = case(CriticalityTier == 0, "Very High", "High")
        | extend RF_P_NeverLoggedIn    = iff(LastSignInDays == -1, 1, 0)
        | extend RF_P_Tier0            = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_HasSecret        = iff(Workload_Credentials has '"HasSecret":true', 1, 0)
        | extend RF_P_NoOwner          = iff(IsOrphan == true, 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, 2)
        | extend RiskFactor_Probability = RF_P_NeverLoggedIn + RF_P_Tier0 + RF_P_HasSecret + RF_P_NoOwner
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            iff(RF_P_NeverLoggedIn == 1, dynamic(["NeverAuthenticated"]),  dynamic([])),
            iff(RF_P_Tier0         == 1, dynamic(["Tier0Permissions"]),    dynamic([])),
            iff(RF_P_HasSecret     == 1, dynamic(["HasClientSecret"]),     dynamic([])),
            iff(RF_P_NoOwner       == 1, dynamic(["NoOwner"]),             dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("NeverAuthenticated=", tostring(RF_P_NeverLoggedIn), ";Tier0Permissions=", tostring(RF_P_Tier0),
                   ";HasClientSecret=", tostring(RF_P_HasSecret), ";NoOwner=", tostring(RF_P_NoOwner))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Workload Identities"
        | extend Subcategory       = "Stale Privileged Workloads"
        | extend ConfigurationName = "Privileged SPN/MI inactive for 180+ days"
        | extend ConfigurationId   = "IDENTITY-SPN-001"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

