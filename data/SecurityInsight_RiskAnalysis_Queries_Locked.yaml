    - ReportName: Identity_Admin_LogonTo_LowTierDevice_Summary
      ReportPurpose: >
        Tier 0 privileged users (Global Admin, Domain Admin etc) authenticating to devices that are NOT classified as Tier 0 assets. Tier 0 admins should only use Tier 0 Privileged Access Workstations (PAWs). Logging on to a standard workstation, developer machine, or shared device exposes Tier 0 credentials to a device with a broader attack surface and potentially lower security controls. Severity: Very High (fixed) - Tier 0 admin on non-PAW device is a tiering violation.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        let NonTier0Devices =
            ExposureGraphNodes
            | where NodeLabel == "device"
            | extend rawData       = todynamic(NodeProperties.rawData)
            | extend DeviceCritLvl = toint(coalesce(
                tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                tostring(rawData.criticalityLevel.criticalityLevel)))
            | where isnull(DeviceCritLvl) or DeviceCritLvl > 0
            | extend DeviceName      = tostring(rawData.deviceName)
            | extend DeviceRiskScore = tostring(rawData.riskScore)
            | extend HasCVEs         = tobool(rawData.highRiskVulnerabilityInsights.hasHighOrCritical)
            | project DeviceNodeId = NodeId, DeviceName, DeviceCritLvl, DeviceRiskScore, HasCVEs;
        
        ExposureGraphEdges
        | where EdgeLabel =~ "can authenticate to" or EdgeLabel =~ "canAuthenticateTo"
        | join kind=inner (
            ExposureGraphNodes
            | where NodeLabel == "user"
            | extend rawData         = todynamic(NodeProperties.rawData)
            | extend CriticalityTier = toint(coalesce(
                tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                tostring(rawData.criticalityLevel.criticalityLevel), "2"))
            | where CriticalityTier == 0
            | extend UserUPN         = tolower(tostring(rawData.userPrincipalName))
            | extend UserDisplayName = tostring(rawData.displayName)
            | where isnotempty(UserUPN)
            | project UserNodeId = NodeId, UserUPN, UserDisplayName, CriticalityTier
          ) on $left.SourceNodeId == $right.UserNodeId
        | join kind=inner NonTier0Devices on $left.TargetNodeId == $right.DeviceNodeId
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "Very High"
        | extend RF_P_DeviceTier2Plus = iff(isnull(DeviceCritLvl) or DeviceCritLvl >= 2, 1, 0)
        | extend RF_P_HasCVEs         = iff(HasCVEs == true, 1, 0)
        | extend RF_P_HighRiskDevice  = iff(DeviceRiskScore in ("High", "Critical"), 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_DeviceTier2Plus + RF_P_HasCVEs + RF_P_HighRiskDevice
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["Tier0AdminOnNonPAW"]),
            iff(RF_P_DeviceTier2Plus == 1, dynamic(["DeviceTier2OrUnclassified"]),dynamic([])),
            iff(RF_P_HasCVEs         == 1, dynamic(["DeviceHasHighCVEs"]),        dynamic([])),
            iff(RF_P_HighRiskDevice  == 1, dynamic(["DeviceHighRiskScore"]),      dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("Tier0AdminOnNonPAW=1;DeviceTier2OrUnclassified=", tostring(RF_P_DeviceTier2Plus),
                   ";DeviceHasHighCVEs=", tostring(RF_P_HasCVEs),
                   ";DeviceHighRiskScore=", tostring(RF_P_HighRiskDevice))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Privileged Access"
        | extend Subcategory       = "Privileged Access Workstation Compliance"
        | extend ConfigurationName = "Tier 0 admin authenticating to non-PAW (tiering violation)"
        | extend ConfigurationId   = "IDENTITY-DEVICE-003"
        | summarize
            AssetCount             = dcount(UserNodeId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(UserDisplayName, " -> ", DeviceName))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by RiskFactor_Probability desc, TotalIssues desc

