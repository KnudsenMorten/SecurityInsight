    - ReportName: Identity_Admin_LogonTo_InternetExposedDevice_Detailed
      ReportPurpose: >
        Per-identity detail view for Admin LogonTo InternetExposedDevice Summary.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - UserDisplayName
      - UserUPN
      - UserObjectId
      - EffectiveTier
      - HasPermanentPrivilegedRole
      - IsPrivilegedEligible
      - MFARegistered
      - DeviceName
      - DeviceRiskScore
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      SortBy:
      - CriticalityTier
      ReportQuery:
      - |-
        let InternetExposedDevices =
            ExposureGraphNodes
            | where NodeLabel == "device"
            | extend rawData          = todynamic(NodeProperties.rawData)
            | extend IsInternetFacing = isnotnull(rawData.exposedToInternet)
            | where IsInternetFacing == true
            | extend DeviceName      = tostring(rawData.deviceName)
            | extend HasCVEs         = tobool(rawData.highRiskVulnerabilityInsights.hasHighOrCritical)
            | extend DeviceRiskScore = tostring(rawData.riskScore)
            | project DeviceNodeId = NodeId, DeviceName, HasCVEs, DeviceRiskScore;
        
        ExposureGraphEdges
        | where EdgeLabel =~ "can authenticate to" or EdgeLabel =~ "canAuthenticateTo"
        | join kind=inner (
            ExposureGraphNodes
            | where NodeLabel == "user"
            | extend rawData         = todynamic(NodeProperties.rawData)
            | extend CriticalityTier = toint(coalesce(
                tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                tostring(rawData.criticalityLevel.criticalityLevel), "2"))
            | extend UserUPN         = tolower(tostring(rawData.userPrincipalName))
            | extend UserDisplayName = tostring(rawData.displayName)
            | where isnotempty(UserUPN)
            | project UserNodeId = NodeId, UserUPN, UserDisplayName, CriticalityTier
          ) on $left.SourceNodeId == $right.UserNodeId
        | join kind=inner InternetExposedDevices on $left.TargetNodeId == $right.DeviceNodeId
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity      = "High"
        | extend SecurityDomain        = "Identity"
        | extend Category              = "Privileged Access"
        | extend Subcategory           = "Credential Exposure via Device"
        | extend ConfigurationName     = "Privileged user authenticating to internet-exposed device"
        | extend ConfigurationId       = "IDENTITY-DEVICE-002"
        | extend RiskFactor_Consequence = 2
        | extend RiskFactor_Probability = 1 + iff(CriticalityTier == 0, 1, 0)
                                           + iff(HasCVEs == true, 1, 0)
                                           + iff(DeviceRiskScore in ("High","Critical"), 1, 0)
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  SecuritySeverity, CriticalityTier, CriticalityTierLevel,
                  UserDisplayName, UserUPN, UserNodeId,
                  DeviceName, HasCVEs, DeviceRiskScore,
                  RiskFactor_Consequence, RiskFactor_Probability
        | order by CriticalityTier asc, RiskFactor_Probability desc

