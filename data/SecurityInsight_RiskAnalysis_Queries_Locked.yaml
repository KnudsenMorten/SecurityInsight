    - ReportName: Identity_AdminAccount_OnPremSynced_Summary
      ReportPurpose: >
        Privileged admin accounts (Tier 0/1) that are synchronised from on-premises AD rather than being cloud-only. Admin accounts should be cloud-native to avoid on-prem compromise pivoting to cloud. A compromised AD environment (e.g. via ransomware) can directly take over cloud admin accounts that are synced from AD. Severity: Very High - on-prem sync of privileged accounts breaks cloud/AD separation.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where EffectiveTier <= 1
        | where OnPremSynced == true
        
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        
        | extend SecuritySeverity = "Very High"
        
        | extend RF_P_Tier0         = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_NoMFA         = iff(MFARegistered == false, 1, 0)
        | extend RF_P_ADTier0       = iff(toint(extract(@'"Tier"\s*:\s*(\d+)', 1, tostring(AD_Roles))) == 0, 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_NoMFA + RF_P_ADTier0
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["OnPremSynced"]),
            iff(RF_P_Tier0   == 1, dynamic(["Tier0CloudRole"]),  dynamic([])),
            iff(RF_P_NoMFA   == 1, dynamic(["NoMFARegistered"]),dynamic([])),
            iff(RF_P_ADTier0 == 1, dynamic(["Tier0ADGroup"]),   dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("OnPremSynced=1;Tier0CloudRole=", tostring(RF_P_Tier0),
                   ";NoMFARegistered=", tostring(RF_P_NoMFA), ";Tier0ADGroup=", tostring(RF_P_ADTier0))
        
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Admin Account Hygiene"
        | extend Subcategory       = "Cloud-AD Separation"
        | extend ConfigurationName = "Privileged account synced from on-prem AD - cloud isolation broken"
        | extend ConfigurationId   = "IDENTITY-ADMIN-002"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_AdminAccount_NeverUsed_Summary
      ReportPurpose: >
        Privileged accounts (Tier 0/1) created more than 14 days ago that have never signed in. Unused privileged accounts represent dormant attack surface - they hold permissions but have no operational owner actively monitoring them. Common cause: accounts created for a project that never started, or provisioned for a consultant who never onboarded. Severity: High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where EffectiveTier <= 1
        | where LastSignInDays == -1   // never signed in
        | where CreatedDays > 14       // past provisioning grace period
        
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity = "High"
        
        | extend RF_P_Tier0       = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_VeryOld     = iff(CreatedDays > 90, 1, 0)
        | extend RF_P_Permanent   = iff(HasPermanentPrivilegedRole == true, 1, 0)
        | extend RiskFactor_Consequence = 2
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_VeryOld + RF_P_Permanent
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["NeverSignedIn"]),
            iff(RF_P_Tier0     == 1, dynamic(["Tier0Identity"]),          dynamic([])),
            iff(RF_P_VeryOld   == 1, dynamic(["AccountOver90DaysOld"]),   dynamic([])),
            iff(RF_P_Permanent == 1, dynamic(["PermanentRoleAssignment"]),dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("NeverSignedIn=1;Tier0Identity=", tostring(RF_P_Tier0),
                   ";AccountOver90DaysOld=", tostring(RF_P_VeryOld), ";PermanentRoleAssignment=", tostring(RF_P_Permanent))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Admin Account Hygiene"
        | extend Subcategory       = "Unused Accounts"
        | extend ConfigurationName = "Privileged account never signed in after 14-day grace period"
        | extend ConfigurationId   = "IDENTITY-ADMIN-003"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_TooManyGlobalAdmins_Summary
      ReportPurpose: >
        Detects when the organisation has more than 5 active Global Administrator accounts. Microsoft recommends 2-5 Global Admins maximum. Each additional Global Admin increases the attack surface proportionally. Organisations with 10+ Global Admins typically have role assignment hygiene problems and lack a formal review process. Severity: High (fixed) - excessive Global Admin count is always a significant risk.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        let GlobalAdmins =
            SI_IdentityAssets_CL
            | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by ObjectId
            | where ObjectType == "User"
            | where AccountEnabled == true
            | where EntraID_Roles has "Global Administrator"
            | summarize
                GACount        = dcount(ObjectId),
                ImpactedAssets = strcat_array(array_sort_asc(make_set(DisplayName)), ";");
        
        GlobalAdmins
        | where GACount > 5
        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "High"
        | extend RF_P_ExcessiveCount  = iff(GACount > 10, 2, 1)
        | extend RiskFactor_Consequence = 2
        | extend RiskFactor_Probability = RF_P_ExcessiveCount
        | extend RiskFactor_Probability_Detailed =
            iff(GACount > 10, "ExcessiveGlobalAdminCount_Critical", "ExcessiveGlobalAdminCount")
        | extend RiskFactor_Probability_DetailedScore = strcat("GlobalAdminCount=", GACount)
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Admin Account Hygiene"
        | extend Subcategory       = "Role Assignment Governance"
        | extend ConfigurationName = "Excessive Global Administrator count - more than 5 active accounts"
        | extend ConfigurationId   = "IDENTITY-ADMIN-004"
        | extend AssetCount        = GACount
        | extend TotalIssues       = GACount
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  SecuritySeverity, CriticalityTier, CriticalityTierLevel,
                  RiskFactor_Consequence, RiskFactor_Probability,
                  RiskFactor_Probability_Detailed, RiskFactor_Probability_DetailedScore,
                  AssetCount, TotalIssues, ImpactedAssets

    - ReportName: Identity_BreakGlass_Anomaly_Summary
      ReportPurpose: >
        Break-glass emergency access accounts with anomalous sign-in patterns. Detects two opposite problems: (1) Break-glass account used recently (< 30 days) WITHOUT an incident - possible misuse (2) Break-glass account has never been tested OR last test was > 180 days ago Break-glass accounts should only be used in genuine emergencies and tested periodically. Severity: Very High (fixed) - any break-glass anomaly is a critical governance failure.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where IsBreakGlass == true
        | where LastSignInDays <= 30 or LastSignInDays > 180 or LastSignInDays == -1
        
        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "Very High"
        
        | extend AnomalyType =
            case(LastSignInDays >= 0 and LastSignInDays <= 30, "RecentUnexpectedUsage",
                 LastSignInDays == -1,                          "NeverTested",
                 "TestingOverdue")
        | extend RF_P_RecentUse    = iff(LastSignInDays >= 0 and LastSignInDays <= 30, 1, 0)
        | extend RF_P_NeverTested  = iff(LastSignInDays == -1, 1, 0)
        | extend RF_P_NoMFA        = iff(MFARegistered == false, 1, 0)
        | extend RF_P_Permanent    = iff(HasPermanentPrivilegedRole == true, 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_RecentUse + RF_P_NeverTested + RF_P_NoMFA + RF_P_Permanent
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["BreakGlassAnomaly"]),
            iff(RF_P_RecentUse   == 1, dynamic(["RecentUnexpectedUsage"]), dynamic([])),
            iff(RF_P_NeverTested == 1, dynamic(["NeverTested"]),           dynamic([])),
            iff(RF_P_NoMFA       == 1, dynamic(["NoMFARegistered"]),       dynamic([])),
            iff(RF_P_Permanent   == 1, dynamic(["PermanentRole"]),         dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("BreakGlassAnomaly=1;RecentUnexpectedUsage=", tostring(RF_P_RecentUse),
                   ";NeverTested=", tostring(RF_P_NeverTested), ";NoMFARegistered=", tostring(RF_P_NoMFA))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Admin Account Hygiene"
        | extend Subcategory       = "Break-Glass Governance"
        | extend ConfigurationName = strcat("Break-glass account anomaly: ", AnomalyType)
        | extend ConfigurationId   = "IDENTITY-ADMIN-005"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(DisplayName, " [", AnomalyType, "]"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc

    - ReportName: Identity_PIM_EligibleNeverActivated_Summary
