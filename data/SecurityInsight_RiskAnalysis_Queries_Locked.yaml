                      CriticalityTier, EffectiveTier, MFARegistered;
        
        let HighRiskCountrySignins =
            union isfuzzy=true SigninLogs, AADNonInteractiveUserSignInLogs
            | where TimeGenerated >= ago(90d)
            | where ResultType == 0
