        | extend RiskFactor_Probability_DetailedScore =
            strcat("PrivilegedEligibleRole=1;Tier0EligibleRole=", tostring(RF_P_Tier0),
                   ";NeverSignedIn=", tostring(RF_P_NeverLoggedIn), ";StaleOver365Days=", tostring(RF_P_VeryStale))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Privileged Access"
        | extend Subcategory       = "PIM Hygiene"
        | extend ConfigurationName = "PIM eligible role never activated in 180+ days - unnecessary assignment"
        | extend ConfigurationId   = "IDENTITY-PIM-002"
        | summarize
