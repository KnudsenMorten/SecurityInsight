                   ";StaleLastSignIn=", tostring(RF_P_Stale), ";HasClientSecret=", tostring(RF_P_HasSecret))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Privilege Escalation Paths"
        | extend Subcategory       = "Role Assignment Abuse"
        | extend ConfigurationName = "SPN with RoleManagement.ReadWrite.Directory - can grant Global Admin to any account"
        | extend ConfigurationId   = "IDENTITY-ESCALATION-001"
        | summarize
            AssetCount             = dcount(ObjectId),
