            | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
            | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
            | project UPN = tolower(UPN), DisplayName, ObjectId,
                      CriticalityTier, EffectiveTier, MFARegistered;
        
        let SigninCountry =
            union isfuzzy=true SigninLogs, AADNonInteractiveUserSignInLogs
            | where TimeGenerated >= ago(30d)
            | where ResultType == 0
            | extend UPN       = tolower(UserPrincipalName)
            | where isnotempty(Location)
            | extend TimeBucket = bin(TimeGenerated, 4h)
            | summarize
                Countries    = strcat_array(make_set(Location), ";"),
                CountryCount = dcount(Location),
                SigninTime   = max(TimeGenerated)
              by UPN, TimeBucket;
        
        SigninCountry
        | where CountryCount >= 2
        | join kind=inner PrivilegedIdentities on UPN
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity    = "Very High"
        | extend RF_P_Tier0          = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_ManyCountries  = iff(CountryCount >= 3, 1, 0)
        | extend RF_P_NoMFA          = iff(MFARegistered == false, 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_ManyCountries + RF_P_NoMFA
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["ImpossibleTravel"]),
            iff(RF_P_Tier0        == 1, dynamic(["Tier0Identity"]),       dynamic([])),
            iff(RF_P_ManyCountries == 1,dynamic(["3plusCountries4Hours"]),dynamic([])),
            iff(RF_P_NoMFA        == 1, dynamic(["NoMFARegistered"]),     dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("ImpossibleTravel=1;Tier0Identity=", tostring(RF_P_Tier0),
                   ";3plusCountries4Hours=", tostring(RF_P_ManyCountries),
                   ";NoMFARegistered=", tostring(RF_P_NoMFA))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Sign-in Behaviour"
        | extend Subcategory       = "Credential Attack Signals"
        | extend ConfigurationName = "Impossible travel detected on privileged account - sign-ins from 2+ countries within 4 hours"
        | extend ConfigurationId   = "IDENTITY-SIGNIN-006"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(DisplayName, " [", Countries, "]"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_BreakGlass_SignIn_Detected_Summary
      ReportPurpose: >
        Any successful sign-in by an account flagged as a break-glass emergency account. Break-glass accounts are only valid for use during genuine catastrophic failures where normal admin access is unavailable. Every sign-in by a break-glass account must be investigated to confirm it was authorised and justified. This is an operational alert that should trigger an immediate review process. Severity: Very High (fixed) — all break-glass usage is critical regardless of context.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        let BreakGlassAccounts =
            SI_IdentityAssets_CL
            | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by ObjectId
            | where IsBreakGlass == true
            | project UPN = tolower(UPN), DisplayName, ObjectId;
        
        union isfuzzy=true SigninLogs, AADNonInteractiveUserSignInLogs
        | where TimeGenerated >= ago(30d)
        | where ResultType == 0
        | extend UPN = tolower(UserPrincipalName)
        | join kind=inner BreakGlassAccounts on UPN
        | extend NetLoc = todynamic(NetworkLocationDetails)
        | mv-expand NetLoc
        | extend IsTrusted = iff(tostring(NetLoc.networkType) == "trustedNamedLocation", 1, 0)
        | summarize
            SigninCount       = count(),
            LastSignin        = max(TimeGenerated),
            SigninCountries   = strcat_array(make_set(Location, 5), ";"),
            SigninIPs         = strcat_array(make_set(IPAddress, 5), ";"),
            NonTrustedSignins = countif(IsTrusted == 0)
          by DisplayName, UPN, ObjectId
        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "Very High"
        | extend RF_P_NonTrusted      = iff(NonTrustedSignins > 0, 1, 0)
        | extend RF_P_MultipleSignins = iff(SigninCount > 1, 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_NonTrusted + RF_P_MultipleSignins
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["BreakGlassSignInDetected"]),
            iff(RF_P_NonTrusted      == 1, dynamic(["SignedInFromNonTrustedLocation"]),dynamic([])),
            iff(RF_P_MultipleSignins == 1, dynamic(["MultipleSignins"]),               dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("BreakGlassSignInDetected=1;SignedInFromNonTrustedLocation=", tostring(RF_P_NonTrusted),
                   ";MultipleSignins=", tostring(RF_P_MultipleSignins))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Sign-in Behaviour"
        | extend Subcategory       = "Break-Glass Usage"
        | extend ConfigurationName = "Break-glass emergency account sign-in detected - immediate review required"
        | extend ConfigurationId   = "IDENTITY-SIGNIN-008"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = sum(SigninCount),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(DisplayName, " [", tostring(LastSignin), "]"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity

