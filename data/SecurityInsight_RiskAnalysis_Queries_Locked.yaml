                  SecurityDomain,
                  Category,
                  Subcategory,
                  ConfigurationName,
                  ConfigurationId,
                  SecuritySeverity,
                  CriticalityTier,
                  CriticalityTierLevel,
                  DisplayName,
                  UPN,
                  ObjectId,
                  Department,
                  EffectiveTier,
                  IsPrivileged,
                  HasPermanentPrivilegedRole,
                  IsPrivilegedEligible,
                  MFARegistered,
                  AccountEnabled,
                  LastSignInDays,
                  LastSignInDateTime,
                  CreatedDays,
                  EntraID_Roles,
                  AD_Roles,
