  - AssetTagName: AzKeyVaultRootCA--tier0--SI
    Mode: Test
    QueryEngine: AzureResourceGraph
    Query:
      - |
        resources
        | where type == "microsoft.keyvault/vaults"
        // Vaults named with CA/PKI/root/signing signals, OR Premium SKU (HSM-backed root keys)
        | extend skuName = tostring(properties.sku.name)
        | where skuName =~ "Premium"
            or name contains "ca"
            or name contains "pki"
            or name contains "root"
            or name contains "signing"
            or name contains "trust"
            or name contains "identity"
            // CAF kv-* prefix with CA/PKI signals; prod postfixes: -p, -prod, -prd
            // Examples: kv-root-ca-p, kv-pki-prod, kv-signing-prd
            or (name startswith "kv-" and (name contains "ca" or name contains "pki"
                or name contains "root" or name contains "sign" or name contains "trust"))
        // Exclude obvious dev/test vaults
        | where name !contains "dev"
            and name !contains "test"
            and name !contains "sandbox"
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "AzKeyVaultRootCA",
            AssetTierLevel = 0
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | extend ExistingTierNumber = toint(extract(@"--tier(\d+)--SI", 1, Tag_AssetTier))
        | project
            subscriptionId,
            ResourceName  = name,
            ResourceGroup = resourceGroup,
            Location      = location,
            SkuName       = skuName,
            VaultUri      = tostring(properties.vaultUri),
            Tag_AssetTier,
            ExistingTierNumber,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName,
            id
        | where isempty(Tag_AssetTier)
            or (Tag_AssetTier != AssetTagName
                and (isnull(ExistingTierNumber)
                     or ExistingTierNumber > AssetTierLevel))
        | order by subscriptionId asc

