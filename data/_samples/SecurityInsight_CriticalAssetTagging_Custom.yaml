  - AssetTagName: AzKeyVaultHighActivity--tier1--SI
    Mode: Test
    QueryEngine: AzureResourceGraph
    Query:
      - |
        resources
        | where type == "microsoft.keyvault/vaults"
        // Exclude vaults already captured as tier-0 CA/root vaults
        | where name !contains "ca"
            and name !contains "pki"
            and name !contains "root"
            and name !contains "signing"
            and name !contains "trust"
        // Exclude dev/test
        // CAF kv-* prefix; prod postfixes: -p, -prod, -prd | exclude dev/test: -d, -q, -s
        // Customer: kv-<n>-p (prod), kv-<n>-d (dev), kv-<n>-q (test)
        | where name !contains "dev"
            and name !contains "test"
            and name !contains "sandbox"
            // CAF + customer env postfix exclusions
            and name !endswith "-d" and name !endswith "-dev"
            and name !endswith "-q" and name !endswith "-test" and name !endswith "-tst"
            and name !endswith "-s" and name !endswith "-sb" and name !endswith "-sandbox"
        // Soft-delete and purge protection enabled = production-grade vault
        | extend softDeleteEnabled  = tobool(properties.enableSoftDelete)
        | extend purgeProtection    = tobool(properties.enablePurgeProtection)
        | extend skuName            = tostring(properties.sku.name)
        | where softDeleteEnabled == true
            and purgeProtection == true
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "AzKeyVaultHighActivity",
            AssetTierLevel = 1
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | extend ExistingTierNumber = toint(extract(@"--tier(\d+)--SI", 1, Tag_AssetTier))
        | project
            subscriptionId,
            ResourceName     = name,
            ResourceGroup    = resourceGroup,
            Location         = location,
            SkuName          = skuName,
            SoftDelete       = softDeleteEnabled,
            PurgeProtection  = purgeProtection,
            VaultUri         = tostring(properties.vaultUri),
            Tag_AssetTier,
            ExistingTierNumber,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName,
            id
        | where isempty(Tag_AssetTier)
            or (Tag_AssetTier != AssetTagName
                and (isnull(ExistingTierNumber)
                     or ExistingTierNumber > AssetTierLevel))
        | order by subscriptionId asc

