  - AssetTagName: AzProductionDatabase--tier2--SI
    Mode: Test
    QueryEngine: AzureResourceGraph
    Query:
      - |
        resources
        | where type in (
            "microsoft.sql/servers",
            "microsoft.dbforpostgresql/flexibleservers",
            "microsoft.dbformysql/flexibleservers",
            "microsoft.dbforpostgresql/servers",
            "microsoft.dbformysql/servers",
            "microsoft.sql/managedinstances"
          )
        // Exclude obvious non-production by name convention
        // CAF prefixes: sql-*, mysql-*, psql-*, cosmos-*, sqlmi-*
        // Prod postfixes: -p, -prod, -prd  |  Dev: -d, -dev  |  Test: -q, -test, -tst, -qa
        // Customer subscription pattern (screenshots): sg-<workload>-p/-d/-q
        | where name !contains "dev"
            and name !contains "test"
            and name !contains "staging"
            and name !contains "sandbox"
            and name !contains "demo"
            // CAF + customer env postfix exclusions
            and name !endswith "-d" and name !endswith "-dev" and name !endswith "-development"
            and name !endswith "-q" and name !endswith "-tst" and name !endswith "-qa" and name !endswith "-uat"
            and name !endswith "-s" and name !endswith "-sb" and name !endswith "-sandbox"
        // Only running / available instances
        | where tostring(properties.state) in ("Ready", "Online", "Running", "")
            or isempty(tostring(properties.state))
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "AzProductionDatabase",
            AssetTierLevel = 2
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | extend ExistingTierNumber = toint(extract(@"--tier(\d+)--SI", 1, Tag_AssetTier))
        | project
            subscriptionId,
            ResourceName    = name,
            ResourceType    = type,
            ResourceGroup   = resourceGroup,
            Location        = location,
            State           = tostring(properties.state),
            Tag_AssetTier,
            ExistingTierNumber,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName,
            id
        | where isempty(Tag_AssetTier)
            or (Tag_AssetTier != AssetTagName
                and (isnull(ExistingTierNumber)
                     or ExistingTierNumber > AssetTierLevel))
        | order by subscriptionId asc

