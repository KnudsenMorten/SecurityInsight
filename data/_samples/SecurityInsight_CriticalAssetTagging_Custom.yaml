  - AssetTagName: Identity_DeviceWithGlobalAdminTokenCache--tier0--SI
    Mode: Test
    QueryEngine: DefenderGraph
    Query:
      - |
        let Tier0Users =
            SI_IdentityAssets_CL
            | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by ObjectId
            | where AccountEnabled == true
            | where EntraID_Roles has "Global Administrator"
                or EntraID_Roles has "Privileged Role Administrator"
            | project UserUPN = tolower(UPN);

        ExposureGraphEdges
        | where EdgeLabel =~ "can authenticate to"
            or EdgeLabel =~ "logged on to"
        | join kind=inner (
            ExposureGraphNodes
            | where NodeLabel == "user"
            | extend rawData = todynamic(NodeProperties.rawData)
            | extend UserUPN = tolower(tostring(rawData.userPrincipalName))
            | where isnotempty(UserUPN)
            | project UserNodeId = NodeId, UserUPN
          ) on $left.SourceNodeId == $right.UserNodeId
        | join kind=inner Tier0Users on UserUPN
        | join kind=inner (
            ExposureGraphNodes
            | where NodeLabel == "device"
            | extend rawData   = todynamic(NodeProperties.rawData)
            | extend DeviceName = tostring(rawData.deviceName)
            | project DeviceNodeId = NodeId, DeviceName
          ) on $left.TargetNodeId == $right.DeviceNodeId
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "Identity_DeviceWithGlobalAdminTokenCache",
            AssetTierLevel = 0
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | project
            DeviceNodeId,
            DeviceName,
            LinkedAdminUPN = UserUPN,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName

