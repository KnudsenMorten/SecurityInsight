        | where subName contains "sandbox"
            or subName contains "playground"
            or subName contains "experimentation"
            or subName contains "lab"
            // CAF + customer sandbox postfixes
            or subName endswith "-s" or subName endswith "-sb"
            or subName endswith "-sandbox" or subName endswith "-lab"
            or envTag in ("sandbox", "lab", "playground", "experimentation")
            or purposeTag in ("sandbox", "lab", "playground", "experimentation")
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "AzSandboxSubscription",
            AssetTierLevel = 3
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | extend ExistingTierNumber = toint(extract(@"--tier(\d+)--SI", 1, Tag_AssetTier))
        | project
            subscriptionId,
            subscriptionName = name,
            EnvTag           = envTag,
            PurposeTag       = purposeTag,
            Tag_AssetTier,
            ExistingTierNumber,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName,
            id
        | where isempty(Tag_AssetTier)
            or (Tag_AssetTier != AssetTagName
                and (isnull(ExistingTierNumber)
                     or ExistingTierNumber > AssetTierLevel))
        | order by subscriptionId asc

