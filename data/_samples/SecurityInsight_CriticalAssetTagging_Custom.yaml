  - AssetTagName: AzKeyVaultHSM--tier0--SI
    Mode: Test
    QueryEngine: AzureResourceGraph
    Query:
      - |
        resources
        | where type == "microsoft.keyvault/vaults"
        | extend sku = tostring(properties.sku.name)
        | extend hsmPoolResourceId = tostring(properties.hsmPoolResourceId)
        // Premium SKU enables HSM-backed keys; also catch dedicated Managed HSM
        | where sku =~ "Premium"
            or isnotempty(hsmPoolResourceId)
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "AzKeyVaultHSM",
            AssetTierLevel = 0
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | extend ExistingTierNumber = toint(extract(@"--tier(\d+)--SI", 1, Tag_AssetTier))
        | project
            subscriptionId,
            ResourceName    = name,
            ResourceGroup   = resourceGroup,
            Location        = location,
            SkuName         = sku,
            Tag_AssetTier,
            ExistingTierNumber,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName,
            id
        | where isempty(Tag_AssetTier)
            or (Tag_AssetTier != AssetTagName
                and (isnull(ExistingTierNumber)
                     or ExistingTierNumber > AssetTierLevel))
        | order by subscriptionId asc

