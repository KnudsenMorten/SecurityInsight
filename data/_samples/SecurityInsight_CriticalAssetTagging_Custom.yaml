        | where type == "microsoft.compute/virtualmachines"
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend vmName  = tolower(name)
        | extend role    = tolower(tostring(tags["Role"]))
        | extend purpose = tolower(tostring(tags["Purpose"]))
        // CAF VM prefix: vm-*; NVA/firewall appliance signals
