  - AssetTagName: AzVMWorkload--tier0--SI
    Mode: Test
    QueryEngine: AzureResourceGraph
    Query:
      - |
        resources
        | where type == "microsoft.compute/virtualmachines"
        | extend Tag_AssetTier = tostring(tags["AssetTier--SI"])
        | extend vmName = tolower(name)
        | extend rgName = tolower(resourceGroup)
        // Naming convention signals: dc-, adcs-, entraconnect-, aadsync-
        // CAF VM prefix: vm-*; DC/ADCS/EntraConnect signals
        // Prod postfixes: -p, -prod, -prd (e.g. vm-dc01-p, vm-adcs-prod)
        | where vmName has "dc-" or vmName has "-dc-" or vmName has "-dc0" or vmName has "-dc1"
            or vmName has "adcs" or vmName has "pki-" or vmName has "ca-srv"
            or vmName has "entraconnect" or vmName has "aadsync" or vmName has "msol"
            or vmName has "domaincontroller" or vmName has "rodc"
            // CAF vm-* prefix + DC/PKI signals
            or (vmName startswith "vm-" and (vmName has "dc" or vmName has "pki"
                or vmName has "adcs" or vmName has "ca" or vmName has "connect"))
            or rgName has "domain-controller" or rgName has "tier0" or rgName has "identity"
        | extend
            AssetTagType   = "AssetTier--SI",
            AssetTag       = "AzVMWorkload",
            AssetTierLevel = 0
        | extend AssetTagName = strcat(AssetTag, "--tier", tostring(AssetTierLevel), "--SI")
        | extend ExistingTierNumber = toint(extract(@"--tier(\d+)--SI", 1, Tag_AssetTier))
        | project
            subscriptionId,
            ResourceName  = name,
            ResourceGroup = resourceGroup,
            Location      = location,
            Tag_AssetTier,
            ExistingTierNumber,
            AssetTagType,
            AssetTag,
            AssetTierLevel,
            AssetTagName,
            id
        | where isempty(Tag_AssetTier)
            or (Tag_AssetTier != AssetTagName
                and (isnull(ExistingTierNumber)
                     or ExistingTierNumber > AssetTierLevel))

