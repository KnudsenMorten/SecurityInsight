        | extend SecuritySeverity = "High"
        
        | extend RF_P_Tier0       = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_VeryOld     = iff(CreatedDays > 90, 1, 0)
        | extend RF_P_Permanent   = iff(HasPermanentPrivilegedRole == true, 1, 0)
