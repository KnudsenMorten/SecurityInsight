                  IsPrivilegedEligible,
                  MFARegistered,
                  AccountEnabled,
                  LastSignInDays,
                  LastSignInDateTime,
                  CreatedDays,
                  EntraID_Roles,
                  AD_Roles,
                  RiskFactor_Consequence,
                  RiskFactor_Probability,
