      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where EffectiveTier == 0
        | where CreatedDays == 0  // created within last 24 hours
        
        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "Very High"
        
        | extend RF_P_Permanent     = iff(HasPermanentPrivilegedRole == true, 1, 0)
        | extend RF_P_NoMFA         = iff(MFARegistered == false, 1, 0)
        | extend RF_P_AlreadySignedIn = iff(LastSignInDays == 0, 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_Permanent + RF_P_NoMFA + RF_P_AlreadySignedIn
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["ImmediateTier0OnNewAccount"]),
            iff(RF_P_Permanent       == 1, dynamic(["PermanentRoleAssignment"]), dynamic([])),
            iff(RF_P_NoMFA           == 1, dynamic(["NoMFARegistered"]),         dynamic([])),
            iff(RF_P_AlreadySignedIn == 1, dynamic(["AlreadySignedInToday"]),    dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("ImmediateTier0OnNewAccount=1;PermanentRoleAssignment=", tostring(RF_P_Permanent),
                   ";NoMFARegistered=", tostring(RF_P_NoMFA), ";AlreadySignedInToday=", tostring(RF_P_AlreadySignedIn))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Identity Lifecycle"
        | extend Subcategory       = "Provisioning Anomalies"
        | extend ConfigurationName = "Account created < 24 hours ago already has Tier 0 role - possible rogue admin"
        | extend ConfigurationId   = "IDENTITY-LIFECYCLE-001"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(
                strcat(DisplayName, " [Created:", tostring(CreatedDateTime), "]"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity

    - ReportName: Identity_DisabledAccount_ActivePIMAssignment_Summary
      ReportPurpose: >
        Disabled user accounts that still have PIM eligible role assignments active. When an account is disabled (e.g. employee leaving), all role assignments should be removed as part of the offboarding process. An eligible assignment on a disabled account means the account could be re-enabled and immediately used to activate privileged access — a common post-compromise technique. Severity: High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == false         // account is disabled
        | where IsPrivilegedEligible == true    // but still has PIM eligible assignment
        
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity = "High"
        
        | extend RF_P_Tier0           = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_AlsoPermanent   = iff(HasPermanentPrivilegedRole == true, 1, 0)
        | extend RF_P_RecentlyDisabled = iff(LastSignInDays <= 30, 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, 2)
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_AlsoPermanent + RF_P_RecentlyDisabled
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["DisabledAccountWithEligibleRole"]),
            iff(RF_P_Tier0            == 1, dynamic(["Tier0EligibleRole"]),       dynamic([])),
            iff(RF_P_AlsoPermanent    == 1, dynamic(["AlsoPermanentAssignment"]), dynamic([])),
            iff(RF_P_RecentlyDisabled == 1, dynamic(["RecentlyDisabled30days"]),  dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("DisabledAccountWithEligibleRole=1;Tier0EligibleRole=", tostring(RF_P_Tier0),
                   ";AlsoPermanentAssignment=", tostring(RF_P_AlsoPermanent),
                   ";RecentlyDisabled30days=", tostring(RF_P_RecentlyDisabled))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Identity Lifecycle"
        | extend Subcategory       = "Offboarding Gaps"
        | extend ConfigurationName = "Disabled account with active PIM eligible role assignment - offboarding incomplete"
        | extend ConfigurationId   = "IDENTITY-LIFECYCLE-002"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_ServiceAccount_InteractiveSignIn_Summary
      ReportPurpose: >
        Accounts classified by MDI as service accounts (MDI_IsServiceAccount = true) that have interactive human sign-ins recorded in SigninLogs. Service accounts should authenticate exclusively via non-interactive flows (daemon credentials, managed identity, service principal). Interactive logins indicate the service account credentials are being used by a human — either a shared password problem, a developer using service credentials to bypass controls, or a threat actor who harvested the credentials and is performing hands-on-keyboard activity. Severity: High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        let ServiceAccounts =
            SI_IdentityAssets_CL
            | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by ObjectId
            | where ObjectType == "User"
            | where AccountEnabled == true
            | where MDI_IsServiceAccount == true
            | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
            | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
            | project UPN = tolower(UPN), DisplayName, ObjectId,
                      CriticalityTier, EffectiveTier, IsPrivileged;
        
        let InteractiveSignins =
            SigninLogs
            | where TimeGenerated >= ago(90d)
            | where ResultType == 0
            | extend UPN = tolower(UserPrincipalName)
            | extend NetworkLocationDetails = todynamic(NetworkLocationDetails)
            | mv-expand NetworkLocationDetails
            | extend IsTrusted = iff(tostring(NetworkLocationDetails.networkType) == "trustedNamedLocation", 1, 0)
            | summarize
                InteractiveSigninCount = count(),
                LastInteractiveSignin  = max(TimeGenerated),
                NonTrustedCount        = countif(IsTrusted == 0),
                Countries              = strcat_array(make_set(Location, 5), ";"),
                UniqueIPs              = dcount(IPAddress)
              by UPN;
        
        ServiceAccounts
        | join kind=inner InteractiveSignins on UPN
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity    = "High"
        | extend RF_P_Privileged     = iff(IsPrivileged == true, 1, 0)
        | extend RF_P_Tier0          = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_NonTrusted     = iff(NonTrustedCount > 0, 1, 0)
        | extend RF_P_Frequent       = iff(InteractiveSigninCount > 5, 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, 2)
        | extend RiskFactor_Probability = 1 + RF_P_Privileged + RF_P_Tier0 + RF_P_NonTrusted + RF_P_Frequent
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["ServiceAccountInteractiveLogin"]),
            iff(RF_P_Privileged  == 1, dynamic(["ServiceAccountIsPrivileged"]),  dynamic([])),
            iff(RF_P_Tier0       == 1, dynamic(["Tier0ServiceAccount"]),         dynamic([])),
            iff(RF_P_NonTrusted  == 1, dynamic(["FromNonTrustedLocation"]),      dynamic([])),
            iff(RF_P_Frequent    == 1, dynamic(["FrequentInteractive5plus"]),    dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("ServiceAccountInteractiveLogin=1;ServiceAccountIsPrivileged=", tostring(RF_P_Privileged),
                   ";Tier0ServiceAccount=", tostring(RF_P_Tier0), ";FromNonTrustedLocation=", tostring(RF_P_NonTrusted),
                   ";FrequentInteractive5plus=", tostring(RF_P_Frequent))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Identity Lifecycle"
        | extend Subcategory       = "Service Account Misuse"
        | extend ConfigurationName = "Service account has interactive sign-ins - credential shared or harvested"
        | extend ConfigurationId   = "IDENTITY-LIFECYCLE-003"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = sum(InteractiveSigninCount),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_HighMDIInvestigationPriority_Summary
      ReportPurpose: >
        Active accounts with MDI Investigation Priority Percentile in the top 10% (MDI_InvestigationPriorityPct >= 90). MDI calculates this score based on observed anomalous behaviours, lateral movement signals, unusual access patterns, and UEBA risk scoring. A high investigation priority means MDI has observed behaviour that warrants review. When this is combined with a privileged identity, it represents a potentially active threat that requires immediate attention. Severity: High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where MDI_InvestigationPriorityPct >= 90
        | where MDI_InvestigationPriority > 0
        
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity = "High"
        
        | extend RF_P_Tier01            = iff(CriticalityTier <= 1, 1, 0)
        | extend RF_P_Top5Pct           = iff(MDI_InvestigationPriorityPct >= 95, 1, 0)
        | extend RF_P_AtRisk            = iff(MDI_RiskState == "atRisk", 1, 0)
        | extend RF_P_HighBlastRadius   = iff(MDI_BlastRadius == "high", 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, CriticalityTier == 1, 2, 1)
        | extend RiskFactor_Probability = 1 + RF_P_Tier01 + RF_P_Top5Pct + RF_P_AtRisk + RF_P_HighBlastRadius
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["HighMDIInvestigationPriority"]),
            iff(RF_P_Tier01          == 1, dynamic(["PrivilegedIdentity"]),     dynamic([])),
            iff(RF_P_Top5Pct         == 1, dynamic(["Top5PercentileMDIScore"]), dynamic([])),
            iff(RF_P_AtRisk          == 1, dynamic(["MDI_AtRisk"]),             dynamic([])),
            iff(RF_P_HighBlastRadius == 1, dynamic(["HighBlastRadius"]),        dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("HighMDIInvestigationPriority=1;PrivilegedIdentity=", tostring(RF_P_Tier01),
                   ";Top5PercentileMDIScore=", tostring(RF_P_Top5Pct), ";MDI_AtRisk=", tostring(RF_P_AtRisk),
                   ";HighBlastRadius=", tostring(RF_P_HighBlastRadius))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Threat Intelligence"
        | extend Subcategory       = "MDI Behavioural Signals"
        | extend ConfigurationName = strcat("High MDI investigation priority (top 10%) - anomalous behaviour observed")
        | extend ConfigurationId   = "IDENTITY-LIFECYCLE-005"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(
                strcat(DisplayName, " [Score:", tostring(MDI_InvestigationPriority), "]"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

