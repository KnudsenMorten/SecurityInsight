        | extend RiskFactor_Probability_DetailedScore =
            strcat("PrivilegedSPN=", tostring(RF_P_Privileged), ";HasClientSecret=", tostring(RF_P_HasSecret),
                   ";ExpiredCredential=", tostring(RF_P_HasExpired), ";StaleLastLogin=", tostring(RF_P_Stale))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Workload Identities"
        | extend Subcategory       = "Orphaned Applications"
        | extend ConfigurationName = "Service principal with no registered owner"
