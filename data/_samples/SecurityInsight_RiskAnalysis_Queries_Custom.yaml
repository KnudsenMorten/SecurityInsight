    - ReportName: Identity_StaleGuest_NoLogin90Days_Summary
      ReportPurpose: >
        B2B guest/external collaborator accounts with no sign-in for 90+ days. Guests have a shorter stale threshold than internal users as they represent external access that should be regularly re-validated. Stale guest accounts are a common vector for supply chain and partner-related compromises.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where IsExternal == true or IsB2BCollaborator == true
        | where LastSignInDays > 90 or (LastSignInDays == -1 and CreatedDays > 90)
        | extend CSA_AssetTier = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity = case(CriticalityTier <= 1, "High", "Medium")
        | extend RF_P_NeverLoggedIn = iff(LastSignInDays == -1, 1, 0)
        | extend RF_P_VeryStale     = iff(LastSignInDays > 365 or (LastSignInDays == -1 and CreatedDays > 365), 1, 0)
        | extend RF_P_HasRoles      = iff(IsPrivileged == true, 1, 0)
        | extend RiskFactor_Consequence = 2
        | extend RiskFactor_Probability = RF_P_NeverLoggedIn + RF_P_VeryStale + RF_P_HasRoles
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            iff(RF_P_NeverLoggedIn == 1, dynamic(["NeverLoggedIn"]),   dynamic([])),
            iff(RF_P_VeryStale     == 1, dynamic(["StaleOver365Days"]),dynamic([])),
            iff(RF_P_HasRoles      == 1, dynamic(["HasPrivilegedRole"]),dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("NeverLoggedIn=", tostring(RF_P_NeverLoggedIn), ";StaleOver365Days=", tostring(RF_P_VeryStale), ";HasPrivilegedRole=", tostring(RF_P_HasRoles))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Account Lifecycle"
        | extend Subcategory       = "Guest / External Access"
        | extend ConfigurationName = "Guest account inactive for 90+ days"
        | extend ConfigurationId   = "IDENTITY-GUEST-001"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(DisplayName, " (", ExternalDomain, ")"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_PrivilegedSPN_NoLogin180Days_Summary
      ReportPurpose: >
        Service Principals and Managed Identities with Tier 0/1 permissions (high-privilege app roles or directory roles) that have not authenticated for 180+ days. Dormant privileged workload identities are attractive targets as they may retain permissions long after the business use case has ended.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType in ("ServicePrincipal", "ManagedIdentity")
        | where AccountEnabled == true
        | where EffectiveTier <= 1
        | where LastSignInDays > 180 or (LastSignInDays == -1 and CreatedDays > 180)
        | extend CSA_AssetTier = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity = case(CriticalityTier == 0, "Very High", "High")
        | extend RF_P_NeverLoggedIn    = iff(LastSignInDays == -1, 1, 0)
        | extend RF_P_Tier0            = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_HasSecret        = iff(Workload_Credentials has '"HasSecret":true', 1, 0)
        | extend RF_P_NoOwner          = iff(IsOrphan == true, 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, 2)
        | extend RiskFactor_Probability = RF_P_NeverLoggedIn + RF_P_Tier0 + RF_P_HasSecret + RF_P_NoOwner
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            iff(RF_P_NeverLoggedIn == 1, dynamic(["NeverAuthenticated"]),  dynamic([])),
            iff(RF_P_Tier0         == 1, dynamic(["Tier0Permissions"]),    dynamic([])),
            iff(RF_P_HasSecret     == 1, dynamic(["HasClientSecret"]),     dynamic([])),
            iff(RF_P_NoOwner       == 1, dynamic(["NoOwner"]),             dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("NeverAuthenticated=", tostring(RF_P_NeverLoggedIn), ";Tier0Permissions=", tostring(RF_P_Tier0),
                   ";HasClientSecret=", tostring(RF_P_HasSecret), ";NoOwner=", tostring(RF_P_NoOwner))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Workload Identities"
        | extend Subcategory       = "Stale Privileged Workloads"
        | extend ConfigurationName = "Privileged SPN/MI inactive for 180+ days"
        | extend ConfigurationId   = "IDENTITY-SPN-001"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

