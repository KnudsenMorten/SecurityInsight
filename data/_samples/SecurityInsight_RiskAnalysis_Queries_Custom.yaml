      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - DisplayName
      - UPN
      - ObjectId
      - Department
      - EffectiveTier
      - IsPrivileged
      - HasPermanentPrivilegedRole
      - IsPrivilegedEligible
      - MFARegistered
