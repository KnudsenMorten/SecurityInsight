        | extend Category          = "Privileged Access"
        | extend Subcategory       = "Shadow Admins"
        | extend ConfigurationName = "Shadow admin - privileged AD access not visible in Entra ID"
        | extend ConfigurationId   = "IDENTITY-SHADOW-001"
