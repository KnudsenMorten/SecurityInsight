    - ReportName: Identity_SPN_ExpiringCredentials_Summary
      ReportPurpose: >
        Service Principals with client secrets or certificates that have expired or will expire within 30 days. Expired credentials cause service outages. Credentials expiring on privileged SPNs are especially urgent as emergency secret rotation under pressure increases risk of mistakes or insecure handling.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType in ("ServicePrincipal", "ManagedIdentity")
        | where Workload_Credentials has '"HasSecret":true' or Workload_Credentials has '"HasCert":true'
        | where Workload_Credentials has '"HasExpired":true'
              or (toint(extract(@'"ExpiryDays"\s*:\s*(-?\d+)', 1, Workload_Credentials)) between (0 .. 30))
        | extend ExpiryDays   = toint(extract(@'"ExpiryDays"\s*:\s*(-?\d+)', 1, Workload_Credentials))
        | extend HasExpired   = Workload_Credentials has '"HasExpired":true'
        | extend CSA_AssetTier = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity =
            case(HasExpired == true and CriticalityTier == 0, "Very High",
                 HasExpired == true,                          "High",
                 CriticalityTier <= 1,                        "High",
                 ExpiryDays <= 7,                             "Medium-High",
                 "Medium")
        | extend RF_P_AlreadyExpired = iff(HasExpired == true, 1, 0)
        | extend RF_P_ExpiresVerySoon = iff(ExpiryDays >= 0 and ExpiryDays <= 7, 1, 0)
        | extend RF_P_Privileged     = iff(EffectiveTier <= 1, 1, 0)
        | extend RF_P_NoOwner        = iff(IsOrphan == true, 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, CriticalityTier == 1, 2, 1)
        | extend RiskFactor_Probability = RF_P_AlreadyExpired + RF_P_ExpiresVerySoon + RF_P_Privileged + RF_P_NoOwner
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            iff(RF_P_AlreadyExpired  == 1, dynamic(["AlreadyExpired"]),   dynamic([])),
            iff(RF_P_ExpiresVerySoon == 1, dynamic(["ExpiresWithin7Days"]),dynamic([])),
            iff(RF_P_Privileged      == 1, dynamic(["PrivilegedSPN"]),    dynamic([])),
            iff(RF_P_NoOwner         == 1, dynamic(["NoOwner"]),          dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("AlreadyExpired=", tostring(RF_P_AlreadyExpired), ";ExpiresWithin7Days=", tostring(RF_P_ExpiresVerySoon),
                   ";PrivilegedSPN=", tostring(RF_P_Privileged), ";NoOwner=", tostring(RF_P_NoOwner))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Workload Identities"
        | extend Subcategory       = "Credential Hygiene"
        | extend ConfigurationName = "SPN with expired or expiring credentials"
        | extend ConfigurationId   = "IDENTITY-SPN-002"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

