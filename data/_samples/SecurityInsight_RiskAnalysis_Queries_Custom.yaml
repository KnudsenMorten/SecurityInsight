Reports:
    - ReportName: Identity_PrivilegedUser_NoMFA_Summary
      ReportPurpose: >
        Identifies privileged users (Tier 0/1) who have not registered any MFA method. A privileged account without MFA is a single-credential compromise away from full domain/tenant takeover. Excludes accounts created within the last 7 days (grace period for new provisioning).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        let Identities =
            SI_IdentityAssets_CL
            | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by ObjectId
            | where ObjectType == "User"
            | where AccountEnabled == true
            | where MFARegistered == false
            | where CreatedDays > 7
            | where EffectiveTier <= 1;
        
        Identities
            | extend CSA_AssetTier = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
            | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    CriticalityTier == 3, "Low - tier 3",
                    "Unknown - unmapped"
                )
        
            | extend SecuritySeverity =
                case(
                    CriticalityTier == 0, "Very High",
                    CriticalityTier == 1, "High",
                    "Medium"
                )
        
            | extend RF_P_PrivilegedRole    = iff(IsPrivileged == true, 1, 0)
            | extend RF_P_PermanentRole     = iff(HasPermanentPrivilegedRole == true, 1, 0)
            | extend RF_P_Tier0             = iff(CriticalityTier == 0, 1, 0)
            | extend RiskFactor_Consequence = 3
            | extend RiskFactor_Probability = RF_P_PrivilegedRole + RF_P_PermanentRole + RF_P_Tier0
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_concat(
                        iff(RF_P_PrivilegedRole == 1, dynamic(["PrivilegedRole"]), dynamic([])),
                        iff(RF_P_PermanentRole == 1,  dynamic(["PermanentAssignment"]), dynamic([])),
                        iff(RF_P_Tier0 == 1,          dynamic(["Tier0Identity"]), dynamic([]))
                    ), ";"
                )
            | extend RiskFactor_Probability_DetailedScore =
                strcat("PrivilegedRole=", tostring(RF_P_PrivilegedRole), ";PermanentAssignment=", tostring(RF_P_PermanentRole), ";Tier0Identity=", tostring(RF_P_Tier0))
        
            | extend SecurityDomain    = "Identity"
            | extend Category          = "Authentication"
            | extend Subcategory       = "MFA Registration"
            | extend ConfigurationName = "Privileged user missing MFA registration"
            | extend ConfigurationId   = "IDENTITY-MFA-001"
        
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_PrivilegedUser_NoMFA_Detailed
      ReportPurpose: >
        Detailed view of privileged users (Tier 0/1) with no MFA registration. Per-user record with role details, last sign-in, and tier information.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - DisplayName
      - UPN
      - ObjectId
      - EffectiveTier
      - EntraID_Roles
      - MFAMethods
      - LastSignInDateTime
      - LastSignInDays
      - CreatedDays
      - HasPermanentPrivilegedRole
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      SortBy:
      - CriticalityTier
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where MFARegistered == false
        | where CreatedDays > 7
        | where EffectiveTier <= 1
        | extend CSA_AssetTier = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity   = case(CriticalityTier == 0, "Very High", CriticalityTier == 1, "High", "Medium")
        | extend SecurityDomain     = "Identity"
        | extend Category           = "Authentication"
        | extend Subcategory        = "MFA Registration"
        | extend ConfigurationName  = "Privileged user missing MFA registration"
        | extend ConfigurationId    = "IDENTITY-MFA-001"
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = iff(HasPermanentPrivilegedRole == true, 2, 1) + iff(CriticalityTier == 0, 1, 0)
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            iff(HasPermanentPrivilegedRole == true, dynamic(["PermanentAssignment"]), dynamic([])),
            iff(CriticalityTier == 0, dynamic(["Tier0Identity"]), dynamic([]))), ";")
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  SecuritySeverity, CriticalityTier, CriticalityTierLevel,
                  DisplayName, UPN, ObjectId, EffectiveTier,
                  EntraID_Roles, MFAMethods, LastSignInDateTime, LastSignInDays,
                  CreatedDays, HasPermanentPrivilegedRole,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed
        | order by CriticalityTier asc, RiskFactor_Probability desc

    - ReportName: Identity_AnyUser_NoMFA_Summary
      ReportPurpose: >
        All enabled users with no MFA registration, across all tiers. Excludes accounts created within the last 7 days. Severity scales with tier.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where MFARegistered == false
        | where CreatedDays > 7
        | extend CSA_AssetTier = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity =
            case(CriticalityTier == 0, "Very High", CriticalityTier == 1, "High",
                 CriticalityTier == 2, "Medium",    "Low")
        | extend RF_P_Privileged = iff(IsPrivileged == true, 1, 0)
        | extend RF_P_StaleLogin = iff(LastSignInDays > 90 or LastSignInDays == -1, 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, CriticalityTier == 1, 2, 1)
        | extend RiskFactor_Probability = RF_P_Privileged + RF_P_StaleLogin
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            iff(RF_P_Privileged == 1,  dynamic(["PrivilegedRole"]), dynamic([])),
            iff(RF_P_StaleLogin == 1,  dynamic(["StaleLastLogin"]), dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("PrivilegedRole=", tostring(RF_P_Privileged), ";StaleLastLogin=", tostring(RF_P_StaleLogin))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Authentication"
        | extend Subcategory       = "MFA Registration"
        | extend ConfigurationName = "User missing MFA registration"
        | extend ConfigurationId   = "IDENTITY-MFA-002"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_StaleUser_NoLogin180Days_Summary
      ReportPurpose: >
        Enabled user accounts with no interactive or non-interactive sign-in for 180+ days. Excludes guest/B2B accounts (handled separately). Stale privileged accounts are particularly dangerous as they may be forgotten but still retain active permissions.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence
      - RiskFactor_Probability
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability_DetailedScore
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - AssetCount
      - TotalIssues
      - ImpactedAssets
      SortBy:
      - RiskScoreTotal
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where IsExternal == false
        | where IsB2BCollaborator == false
        | where LastSignInDays > 180 or (LastSignInDays == -1 and CreatedDays > 180)
        | extend CSA_AssetTier = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(CSA_AssetTier, EffectiveTier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
        | extend SecuritySeverity =
            case(CriticalityTier == 0, "Very High", CriticalityTier == 1, "High",
                 CriticalityTier == 2, "Medium",    "Low")
        | extend RF_P_Privileged       = iff(IsPrivileged == true, 1, 0)
        | extend RF_P_NeverLoggedIn    = iff(LastSignInDays == -1, 1, 0)
        | extend RF_P_VeryStale        = iff(LastSignInDays > 365 or (LastSignInDays == -1 and CreatedDays > 365), 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, CriticalityTier == 1, 2, 1)
        | extend RiskFactor_Probability = RF_P_Privileged + RF_P_NeverLoggedIn + RF_P_VeryStale
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            iff(RF_P_Privileged    == 1, dynamic(["PrivilegedRole"]),  dynamic([])),
            iff(RF_P_NeverLoggedIn == 1, dynamic(["NeverLoggedIn"]),   dynamic([])),
            iff(RF_P_VeryStale     == 1, dynamic(["StaleOver365Days"]),dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("PrivilegedRole=", tostring(RF_P_Privileged), ";NeverLoggedIn=", tostring(RF_P_NeverLoggedIn), ";StaleOver365Days=", tostring(RF_P_VeryStale))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Account Lifecycle"
        | extend Subcategory       = "Stale Accounts"
        | extend ConfigurationName = "User account inactive for 180+ days"
        | extend ConfigurationId   = "IDENTITY-STALE-001"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity
        | order by CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

