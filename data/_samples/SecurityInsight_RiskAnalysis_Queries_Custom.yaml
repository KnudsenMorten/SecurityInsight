            iff(RF_P_HasDirWrite  == 1, dynamic(["HasDirectoryWrite"]),   dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("UnverifiedPublisher=1;Tier0Permissions=", tostring(RF_P_Tier0),
                   ";NoOwner=", tostring(RF_P_NoOwner), ";MultiTenantApp=", tostring(RF_P_MultiTenant),
                   ";HasRoleWrite=", tostring(RF_P_HasRoleWrite), ";HasDirectoryWrite=", tostring(RF_P_HasDirWrite))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Privilege Escalation Paths"
        | extend Subcategory       = "Supply Chain Risk"
        | extend ConfigurationName = "Unverified-publisher SPN with Tier 0/1 Graph permissions"
        | extend ConfigurationId   = "IDENTITY-ESCALATION-006"
        | summarize
            AssetCount             = dcount(ObjectId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(DisplayName)), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore)
