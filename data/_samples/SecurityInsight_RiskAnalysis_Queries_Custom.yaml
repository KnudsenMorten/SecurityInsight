      SortBy:
      - CriticalityTier
      ReportQuery:
      - |-
        SI_IdentityAssets_CL
        | where CollectionTime == toscalar(SI_IdentityAssets_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by ObjectId
        | where ObjectType == "User"
        | where IsBreakGlass == true
        | where LastSignInDays <= 30 or LastSignInDays > 180 or LastSignInDays == -1
        
        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "Very High"
        
        | extend AnomalyType =
            case(LastSignInDays >= 0 and LastSignInDays <= 30, "RecentUnexpectedUsage",
                 LastSignInDays == -1,                          "NeverTested",
                 "TestingOverdue")
        | extend RF_P_RecentUse    = iff(LastSignInDays >= 0 and LastSignInDays <= 30, 1, 0)
        | extend RF_P_NeverTested  = iff(LastSignInDays == -1, 1, 0)
        | extend RF_P_NoMFA        = iff(MFARegistered == false, 1, 0)
        | extend RF_P_Permanent    = iff(HasPermanentPrivilegedRole == true, 1, 0)
        | extend RiskFactor_Consequence = 3
        | extend RiskFactor_Probability = 1 + RF_P_RecentUse + RF_P_NeverTested + RF_P_NoMFA + RF_P_Permanent
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["BreakGlassAnomaly"]),
            iff(RF_P_RecentUse   == 1, dynamic(["RecentUnexpectedUsage"]), dynamic([])),
            iff(RF_P_NeverTested == 1, dynamic(["NeverTested"]),           dynamic([])),
            iff(RF_P_NoMFA       == 1, dynamic(["NoMFARegistered"]),       dynamic([])),
            iff(RF_P_Permanent   == 1, dynamic(["PermanentRole"]),         dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("BreakGlassAnomaly=1;RecentUnexpectedUsage=", tostring(RF_P_RecentUse),
                   ";NeverTested=", tostring(RF_P_NeverTested), ";NoMFARegistered=", tostring(RF_P_NoMFA))
        | extend SecurityDomain    = "Identity"
