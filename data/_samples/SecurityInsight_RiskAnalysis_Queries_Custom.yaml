                   ";NoMFARegistered=", tostring(RF_P_NoMFA), ";PermanentRoleAssignment=", tostring(RF_P_Permanent))
        
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Admin Account Hygiene"
        | extend Subcategory       = "Account Separation"
        | extend ConfigurationName = "Admin account has primary mailbox - phishing target"
