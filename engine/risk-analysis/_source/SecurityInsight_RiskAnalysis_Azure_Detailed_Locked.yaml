- ReportName: Azure_HighRiskFactor_Composite_Detailed
  ReportPurpose: |-
    [Detailed companion] Azure resources with 2 or more risk factors flagged at profile time.
    Catches anything that hits multiple individual rules even if no
    single one is "Very High".
  SecurityDomain: Azure
  CategoryInputName: Category
  SubcategoryInputName: Subcategory
  ConfigurationIdInputName: ConfigurationId
  SecuritySeverityInputName: SecuritySeverity
  CriticalityTierLevelInputName: CriticalityTierLevel
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  OutputPropertyOrder:
  - Length: 14
  - Length: 8
  - Length: 11
  - Length: 17
  - Length: 15
  - Length: 6
  - Length: 16
  - Length: 15
  - Length: 20
  - Length: 15
  - Length: 5
  - Length: 14
  - Length: 12
  - Length: 8
  - Length: 13
  - Length: 19
  - Length: 8
  - Length: 15
  - Length: 19
  - Length: 10
  - Length: 17
  - Length: 16
  - Length: 15
  - Length: 18
  - Length: 11
  - Length: 5
  SortBy: RiskScoreTotal
  ReportQuery: |-
    SI_Azure_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where RiskFactorCount >= 2
    | extend Flags = strcat(
        iff(IsPubliclyExposed==true,"PublicAccess ", ""),
        iff(HasNoSoftDelete==true,"NoSoftDelete ", ""),
        iff(UnencryptedTraffic==true,"NoHttpsOnly ", ""),
        iff(HasOpenAdminPort==true,"OpenAdminPort ", ""),
        iff(IsCmdbOrphan==true,"CmdbOrphan ", ""))
    | project SecurityDomain="Azure", Category="Composite risk", Subcategory=strcat(RiskFactorCount, " risk factors"),
              ConfigurationName=Name, ConfigurationId=AzureResourceId,
              Impact=Flags,
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, RiskFactorCount, Flags, RiskScoreTotal
    | sort by RiskScoreTotal desc

- ReportName: Azure_Recommendations_Summary_Detailed
  ReportPurpose: |-
    [Detailed companion] Azure resources with Defender CSPM / Exposure Graph findings
    (non-CVE). Per-asset row enumerates each resource flagged by an
    ExposureGraph affecting-edge. Severity ported from finding severity
    (critical/high -> High, medium -> Medium, low -> Low). Engine
    applies the canonical scoring.
  SecurityDomain: Azure
  CategoryInputName: Category
  SubcategoryInputName: Subcategory
  ConfigurationIdInputName: ConfigurationId
  SecuritySeverityInputName: SecuritySeverity
  CriticalityTierLevelInputName: CriticalityTierLevel
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  OutputPropertyOrder:
  - Length: 14
  - Length: 8
  - Length: 11
  - Length: 17
  - Length: 15
  - Length: 6
  - Length: 16
  - Length: 15
  - Length: 20
  - Length: 12
  - Length: 12
  - Length: 15
  - Length: 14
  - Length: 8
  - Length: 13
  - Length: 19
  - Length: 8
  - Length: 15
  - Length: 19
  - Length: 10
  - Length: 17
  - Length: 16
  - Length: 15
  - Length: 18
  - Length: 15
  - Length: 11
  - Length: 5
  SortBy: RiskScoreTotal
  ReportQuery: |-
    let _az = SI_Azure_Profile_CL
        | where TimeGenerated > ago(8d)
        | summarize arg_max(CollectionTime, *) by PrimaryEntityId
        | project AzureResourceId, Name, ResourceType, ExposureGraphNodeId, Tier, SecuritySeverity, CriticalityTier, CriticalityTierLevel, RiskScoreTotal;
    let _findings = ExposureGraphNodes
        | mv-expand Category = Categories
        | where tostring(Category) contains "finding"
        | where NodeLabel !contains "cve"
        | extend FindingSeverity = tostring(NodeProperties.rawData.severity)
        | project FindingNodeId=NodeId, FindingName=NodeName, FindingLabel=NodeLabel, FindingSeverity;
    let _edges = ExposureGraphEdges
        | where tostring(EdgeLabel) contains "affecting"
        | project SourceNodeId, TargetNodeId;
    _edges
    | join kind=inner _az on $left.SourceNodeId == $right.ExposureGraphNodeId
    | join kind=inner _findings on $left.TargetNodeId == $right.FindingNodeId
    | project SecurityDomain="Azure",
              Category=tostring(FindingLabel),
              Subcategory=tostring(FindingName),
              ConfigurationName=Name, ConfigurationId=AzureResourceId,
              Impact=strcat("Defender CSPM finding: ", FindingName, " on ", ResourceType),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              ResourceType, FindingLabel, FindingSeverity, RiskScoreTotal
    | sort by RiskScoreTotal desc

