  - Length: 15
  - Length: 19
  - Length: 10
  - Length: 17
  - Length: 16
  - Length: 15
  - Length: 18
  - Length: 15
  - Length: 11
  - Length: 5
  SortBy: RiskScoreTotal
  ReportQuery: |-
    // fix: AppAuthDisabled / AppClientCertNotRequired are not flat
    // columns in azure.schema.json (only nested usedBy refs). Use EG-curated
    // EG_WebAuthEnabled / EG_FuncAuthEnabled (false = no auth) instead.
    SI_Azure_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where ResourceType in~ ("microsoft.web/sites","microsoft.web/sites/slots")
    | where coalesce(EG_WebAuthEnabled, true) == false or coalesce(EG_FuncAuthEnabled, true) == false
    | project SecurityDomain="Azure", Category="Authentication", Subcategory="Web app / Function with auth disabled",
              ConfigurationName=Name, ConfigurationId=AzureResourceId,
              Impact="App-service authentication disabled (EG-observed)",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, EG_WebAuthEnabled, EG_FuncAuthEnabled, RiskScoreTotal
    | sort by RiskScoreTotal desc

