  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  OutputPropertyOrder:
  - Length: 14
  - Length: 8
  - Length: 11
  - Length: 17
  - Length: 15
  - Length: 6
  - Length: 16
  - Length: 15
  - Length: 20
  - Length: 18
  - Length: 23
  - Length: 14
  - Length: 12
  - Length: 8
  - Length: 13
  - Length: 19
  - Length: 8
  - Length: 15
  - Length: 19
  - Length: 10
  - Length: 17
  - Length: 16
  - Length: 15
  - Length: 18
  - Length: 15
  - Length: 11
  - Length: 5
  SortBy: RiskScoreTotal
  ReportQuery: |-
    SI_Azure_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where ResourceType =~ "microsoft.keyvault/vaults"
    | where (HasNoSoftDelete == true) or (KvEnablePurgeProtection == false)
    | project SecurityDomain="Azure", Category="Data protection", Subcategory="Key Vault without soft-delete / purge-protection",
              ConfigurationName=Name, ConfigurationId=AzureResourceId,
              Impact=strcat("KV softDelete=", KvEnableSoftDelete, " purgeProtection=", KvEnablePurgeProtection),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, KvEnableSoftDelete, KvEnablePurgeProtection, RiskScoreTotal
    | sort by RiskScoreTotal desc

