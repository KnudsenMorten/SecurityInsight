Reports:

- ReportName: Azure_PublicStorage_HoldsSensitiveData_Detailed
  ReportPurpose: |-
    [Detailed companion] Storage accounts with public-blob access OR shared-key auth enabled,
    AND a CMDB criticality / data-sensitivity classification of
    Confidential / Restricted (set at profile time by hasTag rule).
  SecurityDomain: Azure
  CategoryInputName: Category
  SubcategoryInputName: Subcategory
  ConfigurationIdInputName: ConfigurationId
  SecuritySeverityInputName: SecuritySeverity
  CriticalityTierLevelInputName: CriticalityTierLevel
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  OutputPropertyOrder:
  - Length: 14
  - Length: 8
  - Length: 11
  - Length: 17
  - Length: 15
  - Length: 6
  - Length: 16
  - Length: 15
  - Length: 20
  - Length: 8
  - Length: 19
  - Length: 21
  - Length: 20
  - Length: 21
  - Length: 14
  - Length: 12
  - Length: 8
  - Length: 13
  - Length: 19
  - Length: 15
  - Length: 10
  - Length: 17
  - Length: 16
  - Length: 15
  - Length: 18
  - Length: 15
  - Length: 11
  - Length: 5
  SortBy: RiskScoreTotal
  ReportQuery: |-
    SI_Azure_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where ResourceType =~ "microsoft.storage/storageaccounts"
    | where (AllowBlobPublicAccess == true) or (AllowSharedKeyAccess == true) or (StPublicNetworkAccess !~ "Disabled")
    | extend _sensitivity = tolower(coalesce(cmdbDataSensitivity, ''))
    | where _sensitivity in ('confidential','restricted') or Tier <= 1
    | project SecurityDomain="Azure", Category="Public exposure + data sensitivity", Subcategory="Public-blob storage holding sensitive data",
              ConfigurationName=Name, ConfigurationId=AzureResourceId,
              Impact=case(
                _sensitivity == 'restricted'   and AllowBlobPublicAccess == true, "Very High",
                _sensitivity == 'confidential' and AllowBlobPublicAccess == true, "High",
                AllowBlobPublicAccess == true,                                     "High",
                "Medium"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              cmdbName, cmdbDataSensitivity, AllowBlobPublicAccess, AllowSharedKeyAccess, StPublicNetworkAccess, RiskScoreTotal
    | sort by RiskScoreTotal desc

- ReportName: Azure_KeyVault_NoSoftDelete_Detailed
  ReportPurpose: |-
    [Detailed companion] Key Vaults without soft-delete OR purge-protection. Without these
    controls a deleted vault (or its secrets) is unrecoverable. Tier-0/1
    vaults missing them is a P1 finding.
  SecurityDomain: Azure
  CategoryInputName: Category
  SubcategoryInputName: Subcategory
  ConfigurationIdInputName: ConfigurationId
