    | project SecurityDomain="Hygiene", Category="Lifecycle management", Subcategory="EOL OS, still onboarded + active",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact=strcat("Active production EOL host: ", UnsupportedOSReason),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, UnsupportedOSReason, DaysInactive, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal

- ReportPurpose: |-
    Attack paths from identity / group membership to privileged Azure
    resources (tier-0/1). Walks ExposureGraph affecting-edges from user
    / group nodes to Azure resource nodes. One row per source-target
    pair, prioritised by target criticality.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Attack_Paths_Summary_Identity_Group_Membership_to_Privileged_Resources
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - EdgeLabel
  - SourceNodeName
  - TargetNodeName
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _edges = ExposureGraphEdges
        | where tostring(EdgeLabel) contains 'affecting' or tostring(EdgeLabel) =~ 'has role on' or tostring(EdgeLabel) contains 'member of'
        | project SourceNodeId, TargetNodeId, EdgeLabel;
    let _src = ExposureGraphNodes
        | where NodeLabel in~ ('user','group')
        | project SrcNodeId=NodeId, SourceNodeName=NodeName, SourceNodeLabel=NodeLabel;
    let _tgt = ExposureGraphNodes
        | where NodeLabel in~ ('microsoft.compute/virtualmachines','microsoft.keyvault/vaults','microsoft.storage/storageaccounts','microsoft.sql/servers')
        | extend rawData = todynamic(NodeProperties.rawData)
        | extend TargetTier = toint(coalesce(
            tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
            tostring(rawData.criticalityLevel.criticalityLevel), '3'))
        | project TgtNodeId=NodeId, TargetNodeName=NodeName, TargetNodeLabel=NodeLabel, TargetTier;
    _edges
    | join kind=inner _src on $left.SourceNodeId == $right.SrcNodeId
    | join kind=inner _tgt on $left.TargetNodeId == $right.TgtNodeId
    | extend CriticalityTier = TargetTier
    | extend CriticalityTierLevel = case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1", CriticalityTier == 2, "Medium - tier 2", CriticalityTier == 3, "Low - tier 3", "Unknown - unmapped")
    | extend SecuritySeverity = case(CriticalityTier == 0, "Very High", CriticalityTier == 1, "High", CriticalityTier == 2, "Medium", "Low")
    | extend RiskScoreTotal = (4 - CriticalityTier) * 25
    | project SecurityDomain="CrossEngine", Category="Attack path", Subcategory="Identity / group -> privileged Azure resource",
              ConfigurationName=TargetNodeName, ConfigurationId=TgtNodeId,
