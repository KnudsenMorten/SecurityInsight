Reports:
- ReportPurpose: |-
    End-to-end exposure path: Public IP attached to a VM, the VM has a
    critical CVE older than 30 days, AND the VM is in a tier-0/1
    subscription. Joins SI_Endpoint_Profile_CL (endpoint signals) +
    SI_Azure_Profile_CL (PIP + sub tier) on AzureResourceId.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_InternetExposed_VM_With_CVE_To_Tier0Sub
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - CriticalCveCount30d
  - PipAddress
  - LinkedSubscription
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _te = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    let _ta = toscalar(SI_Azure_Profile_CL    | summarize max(CollectionTime));
    let _vmAzure =
        SI_Azure_Profile_CL
        | where CollectionTime == _ta
        | where ResourceType =~ "microsoft.compute/virtualmachines"
        | project AzureResourceId, AzVmName=Name, AzVmTier=Tier, AzSub=AzureSubscriptionId;
    let _pipAttached =
        SI_Azure_Profile_CL
        | where CollectionTime == _ta
        | where ResourceType =~ "microsoft.network/publicipaddresses"
        | where isnotempty(PipAddress)
        | project PipAddress, PipAttachedResourceId, PipSub=AzureSubscriptionId;
    SI_Endpoint_Profile_CL
    | where CollectionTime == _te
    | where IsInternetFacing == true
    | where CriticalCveCount30d > 0
    | join kind=inner _vmAzure on AzureResourceId
    | join kind=inner (_pipAttached | where isnotempty(PipAttachedResourceId)) on $left.AzureResourceId == $right.PipAttachedResourceId
    | where AzVmTier <= 1 or Tier <= 1
    | extend _t = min_of(Tier, AzVmTier)
    | project SecurityDomain="CrossEngine", Category="Attack path", Subcategory="PIP -> VM(CVE) -> tier-0/1 subscription",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact=strcat("Internet PIP ", PipAddress, " -> VM with ", CriticalCveCount30d, " CVEs in tier-", _t, " sub"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              CriticalCveCount30d, PipAddress, LinkedSubscription=AzSub, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    High-exposure (compromise candidate) endpoint where a privileged user
    has signed in within the last 30 days. Join: endpoint with
    ExposureLevel=High to SigninLogs filtered by the privileged-user list
    from SI_Identity_Profile_CL.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_CompromisedEndpoint_HostsAdminUser
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - ExposureLevel
  - PrivilegedUsers
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _te = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    let _ti = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _exposed =
        SI_Endpoint_Profile_CL
        | where CollectionTime == _te
        | where ExposureLevel =~ 'High'
        | project DeviceName=DisplayName, AzureResourceId, EndpointTier=Tier;
    let _privUsers =
        SI_Identity_Profile_CL
        | where CollectionTime == _ti
        | where IdentityType == "User" and AccountEnabled == true
        | where (array_length(todynamic(EntraRoles_Permanent)) > 0) or (array_length(todynamic(EntraRoles_Eligible)) > 0)
        | project Upn, UserTier=Tier;
    SigninLogs
    | where TimeGenerated > ago(30d)
    | where ResultType == 0
    | summarize PrivilegedUsers = make_set(UserPrincipalName) by DeviceDetail_displayName_s
    | join kind=inner _exposed on $left.DeviceDetail_displayName_s == $right.DeviceName
    | extend PrivilegedUsers = set_intersect(PrivilegedUsers, toscalar(_privUsers | summarize make_set(Upn)))
    | where array_length(PrivilegedUsers) > 0
    | project SecurityDomain="CrossEngine", Category="Lateral movement", Subcategory="Exposed endpoint hosted privileged sign-in (30d)",
              ConfigurationName=DeviceName, ConfigurationId=AzureResourceId,
              Impact=strcat(array_length(PrivilegedUsers), " privileged user(s) signed in on a high-exposure host"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, ExposureLevel="High", PrivilegedUsers, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Service principals that hold ownership / contributor RBAC on an
    azure resource which is publicly exposed (IsPubliclyExposed=true)
    AND the SPN has stale credentials or is itself privileged.
    Identifies "hot" SPNs with maximum blast radius if compromised.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_SPN_OwnsResourcePublicAccess
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - DaysInactive
  - IsHighRiskPermissionGrant
  - LinkedAzureResourceId
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _ti = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _ta = toscalar(SI_Azure_Profile_CL    | summarize max(CollectionTime));
    let _publicResources =
        SI_Azure_Profile_CL
        | where CollectionTime == _ta
        | where IsPubliclyExposed == true
        | project LinkedAzureResourceId=AzureResourceId, ResourceType, ResourceTier=Tier;
    SI_Identity_Profile_CL
    | where CollectionTime == _ti
    | where IdentityType == "ServicePrincipal"
    | where (DaysInactive >= 90) or (IsHighRiskPermissionGrant == true)
    | mv-expand _role = todynamic(AzureRoles_Assignments)
    | extend _scope = tostring(_role.scope)
    | join kind=inner _publicResources on $left._scope == $right.LinkedAzureResourceId
    | project SecurityDomain="CrossEngine", Category="Application risk", Subcategory="SPN with RBAC on publicly-exposed resource",
              ConfigurationName=DisplayName, ConfigurationId=AppId,
              Impact=strcat("SPN owns public resource (", ResourceType, "); inactive ", DaysInactive, "d"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              DaysInactive, IsHighRiskPermissionGrant, LinkedAzureResourceId, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Domain Controllers (SIRules contains ADDomainController) whose
    EffectiveIpAddresses are NOT in the trusted DC subnets identified
    by Cmdb*_DomainController IP-subnet rules. DC misplaced on
    network = network-segmentation policy violation.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_DC_NotOnTrustedSubnet
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - EffectiveIpAddresses
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Endpoint_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where SIRules contains "ADDomainController"
    | extend _hasCmdbDcRule = SIRules contains "CmdbDomainController" or SIRules contains "Cmdb_DomainController"
    | where _hasCmdbDcRule == false   // DC role detected but no CMDB-IP-subnet rule fired
    | project SecurityDomain="CrossEngine", Category="Network segmentation", Subcategory="DC not on trusted DC subnet",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact="DC role detected but device IPs are NOT in any trusted DC subnet (no CmdbDomainController IP rule fired)",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, EffectiveIpAddresses, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Web app -> SQL DB attack path: a public-facing web app sits in the
    same RG as a SQL DB tagged Confidential / Restricted. Compromising
    the web app gives a foothold inside the network boundary that
    hosts the sensitive database.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_WebApp_To_SqlDb_SensitiveData
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - LinkedSqlServer
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _t = toscalar(SI_Azure_Profile_CL | summarize max(CollectionTime));
    let _publicWeb =
        SI_Azure_Profile_CL
        | where CollectionTime == _t
        | where ResourceType in~ ("microsoft.web/sites","microsoft.web/sites/slots")
        | where IsPubliclyExposed == true
        | project AppId=AzureResourceId, AppName=Name, AppRG=ResourceGroup, AppSub=AzureSubscriptionId, AppTier=Tier;
    let _sqlSensitive =
        SI_Azure_Profile_CL
        | where CollectionTime == _t
        | where ResourceType in~ ("microsoft.sql/servers","microsoft.sql/servers/databases")
        | where tolower(coalesce(cmdbDataSensitivity,'')) in ('confidential','restricted') or Tier <= 1
        | project SqlId=AzureResourceId, SqlName=Name, SqlRG=ResourceGroup, SqlSub=AzureSubscriptionId, SqlTier=Tier;
    _publicWeb
    | join kind=inner _sqlSensitive on $left.AppRG == $right.SqlRG and $left.AppSub == $right.SqlSub
    | extend _t = min_of(AppTier, SqlTier)
    | project SecurityDomain="CrossEngine", Category="Attack path", Subcategory="Public web app same-RG as sensitive SQL DB",
              ConfigurationName=AppName, ConfigurationId=AppId,
              Impact=strcat("Public web app -> sensitive SQL DB '", SqlName, "' in same RG"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, LinkedSqlServer=SqlId, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Resources discovered via Exposure Graph but absent from ARG (azure
    AzureResourceId starts with EG NodeId hex, not /subscriptions/...)
    AND classified as sensitive via cmdbDataSensitivity. Indicates
    data residency / discovery drift -- ARG-based scans miss them.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_EgOnly_SensitiveTagged
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - cmdbDataSensitivity
  - NodeLabel
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Azure_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where AzureResourceId !startswith "/subscriptions/"   // EG-only -> hex NodeId
    | where tolower(coalesce(cmdbDataSensitivity,'')) in ('confidential','restricted')
    | project SecurityDomain="CrossEngine", Category="Discovery gap", Subcategory="EG-only resource with sensitive classification",
              ConfigurationName=Name, ConfigurationId=AzureResourceId,
              Impact="ARG-blind sensitive resource (visible in EG only)",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, cmdbDataSensitivity, NodeLabel, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Tier-0/1 assets where CmdbMatchPhase == 'orphan' (no CMDB match).
    A privileged asset that nobody owns is a governance gap. Spans
    endpoint + identity + azure (union all 3 tables).
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Hygiene_HighTier_CmdbOrphan
  SecurityDomain: Hygiene
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - Engine
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _te = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    let _ti = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _ta = toscalar(SI_Azure_Profile_CL    | summarize max(CollectionTime));
    union
      (SI_Endpoint_Profile_CL | where CollectionTime == _te | extend SourceEngine="endpoint" | project DisplayName,Tier,IsCmdbOrphan,SourceEngine,ConfigId=AzureResourceId),
      (SI_Identity_Profile_CL | where CollectionTime == _ti | extend SourceEngine="identity" | project DisplayName,Tier,IsCmdbOrphan,SourceEngine,ConfigId=coalesce(Upn, AppId)),
      (SI_Azure_Profile_CL    | where CollectionTime == _ta | extend SourceEngine="azure"    | project DisplayName=Name,Tier,IsCmdbOrphan,SourceEngine,ConfigId=AzureResourceId)
    | where IsCmdbOrphan == true
    | project SecurityDomain="Hygiene", Category="CMDB coverage", Subcategory="High-tier asset not in CMDB (CmdbMatchPhase=orphan)",
              ConfigurationName=DisplayName, ConfigurationId=ConfigId,
              Impact=strcat("Tier-", Tier, " asset has no CMDB CI"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, Engine=SourceEngine, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Assets where SIRules contains a tier-0 detection but the row Tier > 0.
    Indicates classification pipeline drift -- the rule fired but didn't
    pin the tier. Surfaces engine bugs / rule-set misconfig.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Hygiene_ClassificationDrift_RuleVsTier
  SecurityDomain: Hygiene
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - Tier
  - Tier0Rules
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _te = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    let _ti = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _ta = toscalar(SI_Azure_Profile_CL    | summarize max(CollectionTime));
    union
      (SI_Endpoint_Profile_CL | where CollectionTime == _te | extend SourceEngine="endpoint" | project DisplayName,Tier,SIRules,SourceEngine,ConfigId=AzureResourceId),
      (SI_Identity_Profile_CL | where CollectionTime == _ti | extend SourceEngine="identity" | project DisplayName,Tier,SIRules,SourceEngine,ConfigId=coalesce(Upn, AppId)),
      (SI_Azure_Profile_CL    | where CollectionTime == _ta | extend SourceEngine="azure"    | project DisplayName=Name,Tier,SIRules,SourceEngine,ConfigId=AzureResourceId)
    | extend Tier0Rules = todynamic(SIRules)
    | mv-apply r = Tier0Rules on (where toint(r.Tier) == 0 | summarize hits = count(), names = make_list(tostring(r.RuleId)))
    | where hits > 0
    | project SecurityDomain="Hygiene", Category="Classification drift", Subcategory="Tier-0 rule fired but row Tier > 0",
              ConfigurationName=DisplayName, ConfigurationId=ConfigId,
              Impact=strcat(hits, " tier-0 rule(s) fired but row Tier=", Tier),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, Tier, Tier0Rules=names, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Latest-snapshot row count per engine vs the previous snapshot.
    Drop > 20% indicates a pipeline regression (Discover failure, auth
    issue, schema drift, …) before reports go stale.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Hygiene_PipelineCoverageDrop
  SecurityDomain: Hygiene
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - LatestRows
  - PriorRows
  - DropPct
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _last2 = (Tbl: string) {
        table(Tbl)
        | summarize Rows=count() by CollectionTime
        | top 2 by CollectionTime desc
        | extend rn = row_number()
        | extend Engine = case(Tbl == "SI_Endpoint_Profile_CL", "endpoint",
                                Tbl == "SI_Identity_Profile_CL", "identity",
                                Tbl == "SI_Azure_Profile_CL", "azure", Tbl)
    };
    union (_last2("SI_Endpoint_Profile_CL")), (_last2("SI_Identity_Profile_CL")), (_last2("SI_Azure_Profile_CL"))
    | summarize LatestRows = anyif(Rows, rn == 1), PriorRows = anyif(Rows, rn == 2) by Engine
    | extend DropPct = iff(PriorRows == 0, 0, toint(round(100.0 * (PriorRows - LatestRows) / PriorRows, 0)))
    | where DropPct >= 20
    | project SecurityDomain="Hygiene", Category="Pipeline health", Subcategory=strcat(Engine, " row count dropped ", DropPct, "%"),
              ConfigurationName=Engine, ConfigurationId=Engine,
              Impact=strcat(Engine, " latest=", LatestRows, " prior=", PriorRows, " drop=", DropPct, "%"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, LatestRows, PriorRows, DropPct, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Endpoints flagged UnsupportedOSDetected=true AND still actively
    onboarded (OnboardingStatus=Onboarded). Decommissioning gap --
    EOL OS hosts that should be migrated or retired but are still in
    production.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Hygiene_UnsupportedOS_StillEnabled
  SecurityDomain: Hygiene
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - UnsupportedOSReason
  - DaysInactive
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
