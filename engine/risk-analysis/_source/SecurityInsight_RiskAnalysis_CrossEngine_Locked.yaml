- ReportPurpose: |-
    Privileged users (permanent or eligible Tier 0/1 roles) with
    ExposureGraph 'can authenticate to' edges into devices that are
    Internet-facing. Privileged-credential exposure on a public-facing
    host = high-impact compromise vector. Per-pair row (admin, device).
    Severity fixed at Very High.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_Admin_LogonTo_InternetExposedDevice_Summary
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - UserUpn
  - TargetDeviceName
  - DeviceRiskScore
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _ti = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _privUsers = SI_Identity_Profile_CL
        | where CollectionTime == _ti
        | where IdentityType == "User" and AccountEnabled == true
        | where (array_length(todynamic(EntraRoles_Permanent)) > 0) or (array_length(todynamic(EntraRoles_Eligible)) > 0)
        | where Tier <= 1
        | project UserUpn=Upn, UserDisplayName=DisplayName, UserPrimaryEntityId=PrimaryEntityId, Tier, SecuritySeverity, CriticalityTier, CriticalityTierLevel, RiskScoreTotal;
    let _users = ExposureGraphNodes
        | where NodeLabel == "user"
        | extend rawData = todynamic(NodeProperties.rawData)
        | extend UserUpn = tolower(tostring(rawData.userPrincipalName))
        | project UserNodeId=NodeId, UserUpn;
    let _exposedDevices = ExposureGraphNodes
        | where NodeLabel == "device"
        | extend rawData = todynamic(NodeProperties.rawData)
        | where isnotnull(rawData.exposedToInternet)
        | project DeviceNodeId=NodeId, TargetDeviceName=tostring(rawData.deviceName), DeviceRiskScore=tostring(rawData.riskScore);
    ExposureGraphEdges
    | where EdgeLabel =~ "can authenticate to" or EdgeLabel =~ "canAuthenticateTo"
    | join kind=inner _users on $left.SourceNodeId == $right.UserNodeId
    | join kind=inner _exposedDevices on $left.TargetNodeId == $right.DeviceNodeId
    | join kind=inner _privUsers on $left.UserUpn == $right.UserUpn
    | project SecurityDomain="CrossEngine", Category="Privileged Access", Subcategory="Admin can logon to Internet-exposed device",
