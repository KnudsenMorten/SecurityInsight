              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              UserUpn, TargetDeviceName, MaxCvssScore, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal

- ReportPurpose: |-
    PIM-eligible admins (not yet activated, but capable of activating
    Tier 0/1 roles) authenticating to devices with active exploits
    (hasExploit=true / isInExploitKit=true). Activation chain compromise:
    attacker on the device captures the eligible admin's session,
    elevates via PIM, takes over the tenant.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_EligibleAdmin_LogonTo_ExploitableDevice_Summary
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - UserUpn
  - TargetDeviceName
  - HasExploit
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _ti = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _eligible = SI_Identity_Profile_CL
        | where CollectionTime == _ti
        | where IdentityType == "User" and AccountEnabled == true
        | where array_length(todynamic(EntraRoles_Eligible)) > 0
        | where Tier <= 1
        | project UserUpn=Upn, UserDisplayName=DisplayName, UserPrimaryEntityId=PrimaryEntityId, Tier, SecuritySeverity, CriticalityTier, CriticalityTierLevel, RiskScoreTotal;
    let _users = ExposureGraphNodes
        | where NodeLabel == "user"
        | extend rawData = todynamic(NodeProperties.rawData)
        | extend UserUpn = tolower(tostring(rawData.userPrincipalName))
        | project UserNodeId=NodeId, UserUpn;
    let _exploitable = ExposureGraphNodes
        | where NodeLabel == "device"
        | extend rawData = todynamic(NodeProperties.rawData)
        | where tobool(rawData.highRiskVulnerabilityInsights.hasHighOrCritical) == true
        | extend HasExploit = tobool(coalesce(rawData.hasExploit, rawData.isInExploitKit, false))
        | where HasExploit == true
        | project DeviceNodeId=NodeId, TargetDeviceName=tostring(rawData.deviceName), HasExploit;
    ExposureGraphEdges
    | where EdgeLabel =~ "can authenticate to" or EdgeLabel =~ "canAuthenticateTo"
    | join kind=inner _users on $left.SourceNodeId == $right.UserNodeId
    | join kind=inner _exploitable on $left.TargetNodeId == $right.DeviceNodeId
    | join kind=inner _eligible on $left.UserUpn == $right.UserUpn
    | project SecurityDomain="CrossEngine", Category="Privileged Access", Subcategory="PIM-eligible admin authenticates to exploitable device",
              ConfigurationName=UserDisplayName, ConfigurationId=UserPrimaryEntityId,
              Impact=strcat("PIM-eligible Tier-", Tier, " admin can authenticate to exploitable device ", TargetDeviceName),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              UserUpn, TargetDeviceName, HasExploit, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
