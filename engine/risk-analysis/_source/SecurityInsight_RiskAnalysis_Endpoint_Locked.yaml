- ReportPurpose: |-
    Hosts NOT in 'Onboarded' state but with ExposureLevel >= Medium. The
    tenant has visibility (EG / Entra) but no management. Common in
    shadow IT or M&A inheritances.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Endpoint_UnmanagedExposed
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - OnboardingStatus
  - ExposureLevel
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Endpoint_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where OnboardingStatus !~ 'Onboarded' and isnotempty(OnboardingStatus)
    | where ExposureLevel in~ ("High","Medium")
    | project SecurityDomain="Endpoint", Category="Coverage gap", Subcategory="Exposed but unmanaged endpoint",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact=strcat("Visible in tenant (", coalesce(OnboardingStatus,'?'), ") but not managed; ExposureLevel=", ExposureLevel),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, OnboardingStatus, ExposureLevel, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Endpoints with 3 or more risk factors flagged at profile time
    (RiskFactorCount >= 3). Catches anything that hits multiple individual
    rules even if no single one is "Very High".
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Endpoint_HighRiskFactor_Composite
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - RiskFactorCount
  - Flags
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Endpoint_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where RiskFactorCount >= 3
    | extend Flags = strcat(
        iff(UnsupportedOSDetected==true,"UnsupportedOS ", ""),
        iff(DefenderAvOutOfDate==true,"AvOutOfDate ", ""),
        iff(IsStaleAsset==true, strcat("Stale(",DaysInactive,"d) "), ""),
        iff(IsCmdbOrphan==true,"CmdbOrphan ", ""))
    | project SecurityDomain="Endpoint", Category="Composite risk", Subcategory=strcat(RiskFactorCount, " risk factors"),
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact=Flags,
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, RiskFactorCount, Flags, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal

- ReportPurpose: |-
    Non-compliant TVM secure-configuration controls on endpoints. Joins
    DeviceTvmSecureConfigurationAssessment + KB enrichment to surface one
    row per (device, configurationId). Filters out configs that don't
    apply to Windows Server (scid-2090, scid-22) and only keeps controls
    where IsApplicable=1 and IsCompliant=false. Per-asset variant of the
    v2.1 BucketFilter aggregate.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Device_Recommendations_Summary
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - ConfigurationCategory
  - ConfigurationSubcategory
  - ImpactScore
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _excludeForWinSrv = dynamic(['scid-2090','scid-22']);
    let _ep = SI_Endpoint_Profile_CL
        | where TimeGenerated > ago(8d)
        | summarize arg_max(CollectionTime, *) by PrimaryEntityId
        | project AzureResourceId, DisplayName, MdeDeviceId, OsPlatform, Tier, SecuritySeverity, CriticalityTier, CriticalityTierLevel, RiskScoreTotal;
    let _kb = DeviceTvmSecureConfigurationAssessmentKB
        | project ConfigurationId,
                  KB_ConfigurationName=ConfigurationName,
                  KB_ConfigurationCategory=ConfigurationCategory,
                  KB_ConfigurationSubcategory=ConfigurationSubcategory,
                  KB_Impact=toint(ConfigurationImpact);
    DeviceTvmSecureConfigurationAssessment
    | where TimeGenerated > ago(30d)
    | where IsApplicable == 1 and IsCompliant == 0
    | join kind=leftouter _kb on ConfigurationId
    | join kind=inner _ep on $left.DeviceId == $right.MdeDeviceId
    | where not (OsPlatform contains "WindowsServer" and ConfigurationId in~ (_excludeForWinSrv))
    | summarize arg_max(TimeGenerated, *) by DeviceId, ConfigurationId
    | project SecurityDomain="Endpoint",
              Category=coalesce(KB_ConfigurationCategory, ConfigurationCategory),
              Subcategory=coalesce(KB_ConfigurationSubcategory, ConfigurationSubcategory),
              ConfigurationName=coalesce(KB_ConfigurationName, tostring(ConfigurationId)),
              ConfigurationId=AzureResourceId,
              Impact=strcat("Non-compliant control ", ConfigurationId, " on ", DisplayName),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              ConfigurationCategory=coalesce(KB_ConfigurationCategory, ConfigurationCategory),
              ConfigurationSubcategory=coalesce(KB_ConfigurationSubcategory, ConfigurationSubcategory),
              ImpactScore=toint(coalesce(KB_Impact, toint(ConfigurationImpact))),
              RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal

- ReportPurpose: |-
    Endpoints with overdue CVEs older than 40 days, joined from MDE TVM /
    ExposureGraph CVE findings. Per-asset variant: one row per affected
    device. Excludes assets tagged --Excluded--SI. Severity = CVE
