    uses CriticalCveCount30d flat column from SI_Endpoint_Profile_CL.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Device_Missing_CVEs_Summary
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - CriticalCveCount30d
  - VulnerabilityCount
  - ExposureLevel
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Endpoint_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where coalesce(CriticalCveCount30d, 0) > 0 or coalesce(VulnerabilityCount, 0) > 0
    | project SecurityDomain="Endpoint", Category="Vulnerabilities", Subcategory="CVEs (Missing Updates)",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact=strcat("Device has ", coalesce(CriticalCveCount30d, 0), " critical CVEs >30d, total vulns=", coalesce(VulnerabilityCount, 0)),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              CriticalCveCount30d, VulnerabilityCount, ExposureLevel, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
