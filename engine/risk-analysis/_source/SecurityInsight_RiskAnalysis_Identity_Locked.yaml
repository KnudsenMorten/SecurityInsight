  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - RiskFactorCount
  - Flags
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where RiskFactorCount >= 3
    | extend Flags = strcat(
        iff(IsOrphanSPN==true,"OrphanSPN ", ""),
        iff(HasExpiringCredentials==true, strcat("ExpiringCreds(",CredentialExpiryDays,"d) "), ""),
        iff(HasNoMfa==true,"NoMFA ", ""),
