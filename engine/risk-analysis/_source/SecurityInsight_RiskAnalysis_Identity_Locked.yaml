- ReportPurpose: |-
    Privileged users whose password hasn't changed in 365+ days. Stale
    passwords on tier-0 accounts are a common breach vector.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_PrivilegedUser_StalePassword
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - LastPasswordChangeDateTime
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where IdentityType == "User"
    | where AccountEnabled == true
    | where (array_length(todynamic(EntraRoles_Permanent)) > 0) or (array_length(todynamic(EntraRoles_Eligible)) > 0)
    | extend _lastChange = todatetime(LastPasswordChangeDateTime)
    | extend _ageDays = iff(isnull(_lastChange), 9999, datetime_diff('day', now(), _lastChange))
    | where _ageDays >= 365
    | project SecurityDomain="Identity", Category="Credential hygiene", Subcategory="Privileged user stale password (365d+)",
              ConfigurationName=DisplayName, ConfigurationId=Upn,
              Impact=strcat("Password unchanged ", _ageDays, " days"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              LastPasswordChangeDateTime=_lastChange, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    SPNs holding Mail.Read / Mail.Send / Mail.ReadWrite as APPLICATION
    permission (impersonates ANY user mailbox tenant-wide). Common path
    for phishing-as-a-service compromise.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_SPN_MailboxImpersonation
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - MailScopes
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _t = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _mailScopes = dynamic(["Mail.Read","Mail.ReadWrite","Mail.Send","Mail.ReadBasic.All","MailboxSettings.ReadWrite"]);
    SI_Identity_Profile_CL
    | where CollectionTime == _t
    | where IdentityType == "ServicePrincipal"
    | extend _appPerms = todynamic(EntraAppPermissions_Application)
    | extend MailScopes = set_intersect(_appPerms, _mailScopes)
    | where array_length(MailScopes) > 0
    | project SecurityDomain="Identity", Category="Application risk", Subcategory="SPN with mailbox-impersonation permission",
              ConfigurationName=DisplayName, ConfigurationId=AppId,
              Impact=strcat("SPN granted ", array_length(MailScopes), " mailbox-impersonation scopes"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, MailScopes, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Privileged users with sign-ins from non-trusted locations in the
    last 30 days. Joins SI_Identity_Profile_CL to SigninLogs (must be
    enabled in the tenant). Fall-back if SigninLogs absent: query
    degrades to "no rows" gracefully.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_PrivilegedUser_NonTrustedSignIn
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - UnusualGeoCount
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _t = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _privUsers =
        SI_Identity_Profile_CL
        | where CollectionTime == _t
        | where IdentityType == "User" and AccountEnabled == true
        | where (array_length(todynamic(EntraRoles_Permanent)) > 0) or (array_length(todynamic(EntraRoles_Eligible)) > 0)
        | project Upn, DisplayName, Tier;
    SigninLogs
    | where TimeGenerated > ago(30d)
    | where ResultType == 0
    | where ConditionalAccessStatus !~ 'success' or RiskState in ('atRisk','confirmedCompromised')
    | summarize UnusualGeoCount = dcount(LocationDetails_countryOrRegion_s) by UserPrincipalName
    | where UnusualGeoCount >= 2
    | join kind=inner _privUsers on $left.UserPrincipalName == $right.Upn
    | project SecurityDomain="Identity", Category="Authentication anomaly", Subcategory="Privileged user multi-geo sign-in (30d)",
              ConfigurationName=DisplayName, ConfigurationId=Upn,
              Impact=strcat("Privileged user signed in from ", UnusualGeoCount, " distinct countries / risk events"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, UnusualGeoCount, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
