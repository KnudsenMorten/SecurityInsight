Reports:
- ReportPurpose: |-
    Privileged users (have at least one Entra role assignment, permanent
    OR eligible) with no MFA configured. Privileged accounts without MFA
    are the #1 lateral-movement entry point. Uses HasNoMfa
    flat column (which reads MfaState across multiple sources).
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_PrivilegedUser_NoMFA
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - EntraRoles_Permanent
  - EntraRoles_Eligible
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where IdentityType == "User"
    | where AccountEnabled == true
    | where HasNoMfa == true
    | where (array_length(todynamic(EntraRoles_Permanent)) > 0)
        or (array_length(todynamic(EntraRoles_Eligible)) > 0)
    | project SecurityDomain="Identity", Category="Authentication", Subcategory="Privileged user without MFA",
              ConfigurationName=DisplayName, ConfigurationId=Upn,
              Impact=strcat("Privileged user (Tier ", Tier, ") without MFA"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              EntraRoles_Permanent, EntraRoles_Eligible, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    Service principals with at least one assigned application permission
    OR Entra role that have not signed in for 180+ days. Stale privileged
    SPNs are a high-impact compromise target -- unrotated secrets sit on
    disk in CI runners, abandoned automation, decommissioned scripts.
    Uses DaysInactive + IsHighRiskPermissionGrant flat cols.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_PrivilegedSPN_NoLogin180Days
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - DaysInactive
  - IsHighRiskPermissionGrant
  - LastSignInDateTime
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where IdentityType == "ServicePrincipal"
    | where AccountEnabled == true
    | where DaysInactive >= 180
    | where (array_length(todynamic(EntraAppPermissions_Application)) > 0)
        or (array_length(todynamic(EntraRoles_Permanent)) > 0)
    | project SecurityDomain="Identity", Category="Service Principal hygiene", Subcategory="Stale privileged SPN (180d+)",
              ConfigurationName=DisplayName, ConfigurationId=AppId,
              Impact=case(
                IsHighRiskPermissionGrant == true and DaysInactive >= 365, "Very High",
                IsHighRiskPermissionGrant == true,                         "High",
                DaysInactive >= 365,                                       "High",
                "Medium"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              DaysInactive, IsHighRiskPermissionGrant, LastSignInDateTime, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    SPNs with secrets / certificates expiring in 30 days AND active in the
    last 30 days (otherwise it's a stale-SPN finding, not an expiry one).
    Uses HasExpiringCredentials + CredentialExpiryDays cols.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_SPN_ExpiringCredentials
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - CredentialExpiryDays
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where IdentityType == "ServicePrincipal"
    | where HasExpiringCredentials == true
    | where DaysInactive < 30
    | project SecurityDomain="Identity", Category="Service Principal hygiene", Subcategory="Active SPN credential expiring",
              ConfigurationName=DisplayName, ConfigurationId=AppId,
              Impact=strcat("Credential expires in ", CredentialExpiryDays, " days, breakage imminent"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, CredentialExpiryDays, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: |-
    SPNs with no Owner property -- accountability + compliance gap. When
    the original owner leaves, no one knows who can rotate / decommission.
    Uses IsOrphanSPN flat column.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_SPN_Orphan_NoOwner
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - IsHighRiskPermissionGrant
  - DaysInactive
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where IsOrphanSPN == true
    | project SecurityDomain="Identity", Category="Service Principal hygiene", Subcategory="Orphan SPN (no Owner)",
              ConfigurationName=DisplayName, ConfigurationId=AppId,
              Impact=case(
                IsHighRiskPermissionGrant == true and Tier <= 1, "Very High",
                IsHighRiskPermissionGrant == true,               "High",
                Tier <= 1,                                       "High",
                "Medium"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, IsHighRiskPermissionGrant, DaysInactive, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
