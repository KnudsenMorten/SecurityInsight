        iff(IsHighRiskPermissionGrant==true,"HighRiskPerms ", ""),
        iff(IsCmdbOrphan==true,"CmdbOrphan ", ""))
    | project SecurityDomain="Identity", Category="Composite risk", Subcategory=strcat(RiskFactorCount, " risk factors"),
