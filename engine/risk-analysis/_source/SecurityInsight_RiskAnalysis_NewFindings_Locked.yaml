- ReportPurpose: Linux server endpoints where SSH password auth is enabled (vs key-only). Brute-force attack surface; key-only is the baseline.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Endpoint_LinuxServer_NoSshKeyAuth
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - OsPlatform
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _t = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    // EG signal: lookup deviceLinuxAuth in EG when present (currently rare;
    // query degrades to "no rows" when the signal isn't ingested -- safe).
    let _egSshAuth =
        ExposureGraphNodes
        | where NodeLabel == "device"
        | extend rawData = todynamic(NodeProperties).rawData
        | where tostring(rawData.osPlatform) startswith "Linux"
        | where tobool(rawData.linuxSshPasswordAuthEnabled) == true
        | project AadDeviceId = tostring(rawData.aadDeviceId);
    SI_Endpoint_Profile_CL
    | where CollectionTime == _t
    | where OsPlatform startswith "Linux"
    | join kind=inner _egSshAuth on AadDeviceId
    | extend MoreInfoUrl = strcat("https://security.microsoft.com/machines/", MdeDeviceId)
    | extend Links = dynamic_to_json(pack_array(
        pack("label", "Defender device", "url", MoreInfoUrl),
        pack("label", "SSH hardening guide", "url", "https://learn.microsoft.com/en-us/azure/virtual-machines/linux/mac-create-ssh-keys")))
    | project SecurityDomain="Endpoint", Category="Authentication", Subcategory="Linux server SSH password auth enabled",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact="SSH password auth enabled (key-only is the baseline)",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              OsPlatform, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
