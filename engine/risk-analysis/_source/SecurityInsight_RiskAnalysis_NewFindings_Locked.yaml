- ReportPurpose: Per-engine % of rows where AssetGroup is empty. > 20% means rules / classification arent producing a useful pivot column for grouping in dashboards.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Hygiene_AssetGroup_BlankRatio
  SecurityDomain: Hygiene
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - Engine
  - BlankRatio
  - TotalRows
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _te = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    let _ti = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _ta = toscalar(SI_Azure_Profile_CL    | summarize max(CollectionTime));
    union
      (SI_Endpoint_Profile_CL | where CollectionTime == _te | extend Engine="endpoint" | summarize TotalRows=count(), BlankRows=countif(isempty(AssetGroup)) by Engine),
      (SI_Identity_Profile_CL | where CollectionTime == _ti | extend Engine="identity" | summarize TotalRows=count(), BlankRows=countif(isempty(AssetGroup)) by Engine),
      (SI_Azure_Profile_CL    | where CollectionTime == _ta | extend Engine="azure"    | summarize TotalRows=count(), BlankRows=countif(isempty(Group))      by Engine)
    | extend BlankRatio = toint(round(100.0 * BlankRows / TotalRows, 0))
    | where BlankRatio >= 20
    | extend MoreInfoUrl = "https://github.com/KnudsenMorten/AutomateIT/blob/main/SOLUTIONS/SecurityInsight/engine/risk-analysis/README.md"
    | extend Links = dynamic_to_json(pack_array(pack("label","Risk-Analysis README","url",MoreInfoUrl)))
    | project SecurityDomain="Hygiene", Category="Classification coverage", Subcategory=strcat(Engine, " AssetGroup blank ratio ", BlankRatio, "%"),
              ConfigurationName=Engine, ConfigurationId=Engine,
              Impact=strcat(BlankRows, " of ", TotalRows, " rows have empty AssetGroup"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              Engine, BlankRatio, TotalRows, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: Tier distribution shift between latest snapshot and prior snapshot. Big swings indicate classification drift or fleet churn that operators should review.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Hygiene_RiskFactor_DistributionDrift
  SecurityDomain: Hygiene
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - Engine
  - Tier
  - LatestCount
  - PriorCount
  - DeltaPct
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _last2 = (Tbl: string, Eng: string) {
        table(Tbl)
        | summarize Rows=count() by CollectionTime, Tier
        | summarize Latest = anyif(Rows, CollectionTime == toscalar(table(Tbl) | summarize max(CollectionTime))),
                    Prior  = anyif(Rows, CollectionTime != toscalar(table(Tbl) | summarize max(CollectionTime))) by Tier
        | extend Engine = Eng
    };
    union (_last2("SI_Endpoint_Profile_CL","endpoint")), (_last2("SI_Identity_Profile_CL","identity")), (_last2("SI_Azure_Profile_CL","azure"))
    | extend LatestCount = coalesce(toint(Latest), 0)
    | extend PriorCount  = coalesce(toint(Prior),  0)
    | where PriorCount > 5
    | extend DeltaPct = toint(round(100.0 * abs(LatestCount - PriorCount) / PriorCount, 0))
    | where DeltaPct >= 25
    | extend MoreInfoUrl = "https://github.com/KnudsenMorten/AutomateIT/blob/main/SOLUTIONS/SecurityInsight/engine/risk-analysis/README.md"
    | extend Links = dynamic_to_json(pack_array(pack("label","Risk-Analysis README","url",MoreInfoUrl)))
    | project SecurityDomain="Hygiene", Category="Classification drift", Subcategory=strcat(Engine, " Tier-", Tier, " count moved ", DeltaPct, "%"),
              ConfigurationName=strcat(Engine, " Tier-", Tier), ConfigurationId=strcat(Engine, ":Tier:", Tier),
              Impact=strcat("Tier ", Tier, " count: latest=", LatestCount, " prior=", PriorCount, " delta=", DeltaPct, "%"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              Engine, Tier, LatestCount, PriorCount, DeltaPct, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
