- ReportPurpose: Tier-0/1 hosts with TPM or SecureBoot disabled -- weak boot integrity makes pre-boot attacks viable. Uses azure-engine SecureBootEnabled / VTpmEnabled cross-engine.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Endpoint_TPMOrSecureBootDisabled_Tier0
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - SecureBootEnabled
  - VTpmEnabled
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _te = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    let _ta = toscalar(SI_Azure_Profile_CL    | summarize max(CollectionTime));
    let _vmBoot =
        SI_Azure_Profile_CL
        | where CollectionTime == _ta
        | where ResourceType =~ "microsoft.compute/virtualmachines"
        | project AzureResourceId, SecureBootEnabled, VTpmEnabled;
    SI_Endpoint_Profile_CL
    | where CollectionTime == _te
    | join kind=inner _vmBoot on AzureResourceId
    | where SecureBootEnabled == false or VTpmEnabled == false
    | extend MoreInfoUrl = strcat("https://portal.azure.com/#resource", AzureResourceId, "/security")
    | extend Links = dynamic_to_json(pack_array(
        pack("label", "VM security",  "url", MoreInfoUrl),
        pack("label", "Trusted launch docs", "url", "https://learn.microsoft.com/en-us/azure/virtual-machines/trusted-launch")))
    | project SecurityDomain="Endpoint", Category="Boot integrity", Subcategory="Tier-0/1 VM with SecureBoot or vTPM disabled",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact=strcat("SecureBoot=", SecureBootEnabled, " vTPM=", VTpmEnabled),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              SecureBootEnabled, VTpmEnabled, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: Endpoints whose PublicIp resolves to a country / ASN outside the tenant business geography. Indicates VPN-bypass, traveling staff using residential IPs, or compromised host.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Endpoint_PublicIp_NonBusinessGeo
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - PublicIp
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _t = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    // Customers override $global:SI_TrustedAsnPrefixes via custom config; default
    // example here demos the pattern (RFC 1918 + tenant-published ranges).
    let _trustedPrefixes = dynamic(["10.","192.168.","172.16.","172.17.","172.18.","172.19.","172.2","172.30.","172.31."]);
    SI_Endpoint_Profile_CL
    | where CollectionTime == _t
    | where isnotempty(PublicIp)
    | extend _isTrusted = iff(array_length(_trustedPrefixes) == 0, false,
                               array_length(set_intersect(pack_array(PublicIp), _trustedPrefixes)) > 0)
    | where _isTrusted == false
    | extend MoreInfoUrl = strcat("https://security.microsoft.com/machines/", MdeDeviceId)
    | extend Links = dynamic_to_json(pack_array(
        pack("label", "Defender device",  "url", MoreInfoUrl),
        pack("label", "IP whois",         "url", strcat("https://whois.arin.net/rest/ip/", PublicIp))))
    | project SecurityDomain="Endpoint", Category="Network anomaly", Subcategory="Endpoint reporting from non-trusted public IP",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact=strcat("Endpoint PublicIp=", PublicIp, " not on trusted prefix list"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              PublicIp, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: Hosts whose OffboardedDateTime is in the last 7 days but still appearing in current MDE telemetry. Off-boarding state machine glitch -- common after sensor uninstall failure.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Endpoint_OffboardedRecently_StillReporting
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - OffboardedDateTime
  - DaysInactive
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Endpoint_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where isnotempty(OffboardedDateTime)
    | extend _off = todatetime(OffboardedDateTime)
    | where datetime_diff('day', now(), _off) <= 7
    | where DaysInactive < 7
    | extend MoreInfoUrl = strcat("https://security.microsoft.com/machines/", MdeDeviceId)
    | extend Links = dynamic_to_json(pack_array(pack("label","Defender device","url",MoreInfoUrl)))
    | project SecurityDomain="Endpoint", Category="Lifecycle", Subcategory="Off-boarded host still reporting",
              ConfigurationName=DisplayName, ConfigurationId=AzureResourceId,
              Impact="Marked off-boarded but still active in MDE telemetry",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              OffboardedDateTime=_off, DaysInactive, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: Endpoints whose MDE RiskScore is High/Critical but the MachineGroup name doesnt indicate high-risk scoping. Group membership drift -- the host should be moved into a tighter MachineGroup for stronger policy.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Endpoint_HighRiskScore_NotInHighRiskGroup
  SecurityDomain: Endpoint
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - RiskScore
  - MachineGroup
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Endpoint_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where RiskScore in~ ("High","Critical")
    | where isnotempty(MachineGroup) and MachineGroup !~ 'UnassignedGroup'
    | where MachineGroup !contains "tier0"
        and MachineGroup !contains "tier-0"
