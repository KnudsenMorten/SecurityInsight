              Impact="Storage uses SSE (MS-managed key) -- CMK required for sensitive scope",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              cmdbDataSensitivity, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
