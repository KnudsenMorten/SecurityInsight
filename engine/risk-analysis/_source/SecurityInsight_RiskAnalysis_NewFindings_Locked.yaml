    | project SecurityDomain="Identity", Category="Standing privilege", Subcategory="Permanent (non-PIM) privileged role",
              ConfigurationName=DisplayName, ConfigurationId=coalesce(Upn,AppId),
              Impact=strcat(PermanentRoleCount, " always-on role(s) instead of PIM-eligible"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              PermanentRoleCount, EligibleRoleCount, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
