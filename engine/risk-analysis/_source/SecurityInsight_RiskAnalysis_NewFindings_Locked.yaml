Reports:
- ReportPurpose: Identities created in the last 30 days that already hold high-risk app permissions OR an Entra role. Newly-onboarded shadow admin -- common path for compromised onboarding workflows.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_NewlyCreated_HighPrivilege
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - DaysSinceCreation
  - IsHighRiskPermissionGrant
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where AccountEnabled == true
    | extend _created = todatetime(CreatedDateTime)
    | extend DaysSinceCreation = iff(isnull(_created), 9999, datetime_diff('day', now(), _created))
    | where DaysSinceCreation <= 30
    | where IsHighRiskPermissionGrant == true or array_length(todynamic(EntraRoles_Permanent)) > 0
    | extend MoreInfoUrl = iff(IdentityType == "ServicePrincipal",
        strcat("https://entra.microsoft.com/#view/Microsoft_AAD_RegisteredApps/ApplicationMenuBlade/~/Overview/appId/", AppId),
        strcat("https://entra.microsoft.com/#view/Microsoft_AAD_UsersAndTenants/UserProfileMenuBlade/~/overview/userId/", coalesce(EntityIds, AppId)))
    | extend Links = dynamic_to_json(pack_array(
        pack("label", "Identity portal", "url", MoreInfoUrl),
        pack("label", "Privileged Identity Mgmt", "url", "https://entra.microsoft.com/#view/Microsoft_Azure_PIMCommon/CommonMenuBlade")))
    | project SecurityDomain="Identity", Category="Privilege drift", Subcategory="Newly created identity with high privilege",
              ConfigurationName=DisplayName, ConfigurationId=coalesce(Upn,AppId),
              Impact=strcat("Identity created ", DaysSinceCreation, " days ago already holds privileged access"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              DaysSinceCreation, IsHighRiskPermissionGrant, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: SPNs whose Owner is different from the Application Owner -- common in apps inherited from a departed employee where ownership got cleaned up only on one side.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_SPN_OwnerMismatch
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - SpnOwner
  - AppOwner
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where IdentityType == "ServicePrincipal"
    | where AccountEnabled == true
    | where isnotempty(Owner) and isnotempty(AppOwnerOrganizationId)
    | extend SpnOwner = tostring(Owner)
    | extend AppOwner = tostring(AppOwnerOrganizationId)
    | where tolower(SpnOwner) != tolower(AppOwner)
    | extend MoreInfoUrl = strcat("https://entra.microsoft.com/#view/Microsoft_AAD_RegisteredApps/ApplicationMenuBlade/~/Owners/appId/", AppId)
    | extend Links = dynamic_to_json(pack_array(
        pack("label", "App registration owners", "url", MoreInfoUrl),
        pack("label", "Enterprise app owners",   "url", strcat("https://entra.microsoft.com/#view/Microsoft_AAD_IAM/ManagedAppMenuBlade/~/Owners/objectId/", coalesce(EntityIds,AppId)))))
    | project SecurityDomain="Identity", Category="Service Principal hygiene", Subcategory="SPN owner != Application owner",
              ConfigurationName=DisplayName, ConfigurationId=AppId,
              Impact="SPN ownership not aligned with app registration ownership",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel, SpnOwner, AppOwner, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: Users whose EmployeeLeaveDateTime is in the past but the account is still enabled. HR off-boarding gap; common attack path.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_Departed_AccountStillEnabled
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - EmployeeLeaveDateTime
  - DaysSinceLeave
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where IdentityType == "User"
    | where AccountEnabled == true
    | extend _leave = todatetime(EmployeeLeaveDateTime)
    | where isnotnull(_leave) and _leave < now()
    | extend DaysSinceLeave = datetime_diff('day', now(), _leave)
    | extend MoreInfoUrl = strcat("https://entra.microsoft.com/#view/Microsoft_AAD_UsersAndTenants/UserProfileMenuBlade/~/overview/userId/", coalesce(EntityIds,Upn))
    | extend Links = dynamic_to_json(pack_array(
        pack("label", "User profile", "url", MoreInfoUrl),
        pack("label", "Sign-in logs", "url", strcat("https://entra.microsoft.com/#view/Microsoft_AAD_IAM/SigninLogsMenuBlade/userId/", coalesce(EntityIds,Upn)))))
    | project SecurityDomain="Identity", Category="Off-boarding hygiene", Subcategory="Departed user still enabled",
              ConfigurationName=DisplayName, ConfigurationId=Upn,
              Impact=strcat("User departed ", DaysSinceLeave, " days ago, account still enabled"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              EmployeeLeaveDateTime=_leave, DaysSinceLeave, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: Users / SPNs holding PERMANENT (always-on) privileged role assignments instead of PIM-eligible. Standing privilege violates JIT/JEA.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: Identity_PrivilegedRole_PermanentNotEligible
  SecurityDomain: Identity
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - PermanentRoleCount
  - EligibleRoleCount
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Identity_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where AccountEnabled == true
    | extend PermanentRoleCount = array_length(todynamic(EntraRoles_Permanent))
    | extend EligibleRoleCount  = array_length(todynamic(EntraRoles_Eligible))
    | where PermanentRoleCount > 0
    | extend MoreInfoUrl = "https://entra.microsoft.com/#view/Microsoft_Azure_PIMCommon/CommonMenuBlade/~/quickStart"
    | extend Links = dynamic_to_json(pack_array(
