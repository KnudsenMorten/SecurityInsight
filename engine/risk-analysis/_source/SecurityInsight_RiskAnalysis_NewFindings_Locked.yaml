    SI_Azure_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where ResourceType =~ "microsoft.storage/storageaccounts"
    | where tolower(coalesce(cmdbDataSensitivity,'')) in ('confidential','restricted')
