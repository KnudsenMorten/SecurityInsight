- ReportPurpose: Server endpoints visible in MDE but NOT discoverable in Azure (or vice-versa). Coverage gap surfaces shadow IT, M&A inheritances, and Discover regressions.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_Server_OnlyInOneEngine
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - VisibleIn
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _te = toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime));
    let _ta = toscalar(SI_Azure_Profile_CL    | summarize max(CollectionTime));
    let _epServers =
        SI_Endpoint_Profile_CL
        | where CollectionTime == _te
        | where DeviceType =~ "Server"
        | project Source="endpoint", DisplayName, AzureResourceId, Tier, MdeDeviceId;
    let _azVms =
        SI_Azure_Profile_CL
        | where CollectionTime == _ta
        | where ResourceType =~ "microsoft.compute/virtualmachines"
        | project Source="azure", DisplayName=Name, AzureResourceId, Tier, MdeDeviceId="";
    let _both = _epServers | summarize EpAzureResourceIds = make_set(AzureResourceId) | mv-expand AzureResourceId = EpAzureResourceIds | project AzureResourceId = tostring(AzureResourceId);
    let _bothAz = _azVms | summarize AzAzureResourceIds = make_set(AzureResourceId) | mv-expand AzureResourceId = AzAzureResourceIds | project AzureResourceId = tostring(AzureResourceId);
    union _epServers, _azVms
    | summarize Engines = make_set(Source), Tiers = make_set(Tier), AnyDisplayName = take_any(DisplayName), AnyMde = take_any(MdeDeviceId) by AzureResourceId
    | where array_length(Engines) == 1
    | extend VisibleIn = tostring(Engines[0])
    | extend Tier = toint(Tiers[0])
    | extend MoreInfoUrl = iff(VisibleIn == "endpoint",
        strcat("https://security.microsoft.com/machines/", AnyMde),
        strcat("https://portal.azure.com/#resource", AzureResourceId))
    | extend Links = dynamic_to_json(pack_array(pack("label","Asset detail","url",MoreInfoUrl)))
    | project SecurityDomain="CrossEngine", Category="Coverage gap", Subcategory=strcat("Server visible in '", VisibleIn, "' only"),
              ConfigurationName=AnyDisplayName, ConfigurationId=AzureResourceId,
              Impact=strcat("Server seen by '", VisibleIn, "' but missing from the other engine"),
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              VisibleIn, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: VMs tagged Critical or hosted in tier-0/1 sub WITHOUT diagnostic settings (no LAW shipping). IR blind spot on a high-value asset.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_VmSensitive_NoDiagnostics
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - cmdbCriticality
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    SI_Azure_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where ResourceType =~ "microsoft.compute/virtualmachines"
    | where cmdbCriticality =~ "Critical"
    | extend _props = parse_json(Properties)
    // Diagnostics extension typically named "AzureMonitorWindowsAgent" / "OmsAgentForLinux"
    | extend _exts = tostring(_props.collect.azure.extensions)
    | where isempty(_exts) or (_exts !contains "Monitor" and _exts !contains "Oms")
    | extend MoreInfoUrl = strcat("https://portal.azure.com/#resource", AzureResourceId, "/extensions")
    | extend Links = dynamic_to_json(pack_array(
        pack("label", "VM extensions",       "url", MoreInfoUrl),
        pack("label", "Diagnostic settings", "url", strcat("https://portal.azure.com/#resource", AzureResourceId, "/diagnostics"))))
    | project SecurityDomain="CrossEngine", Category="Audit / IR", Subcategory="Sensitive VM without monitoring agent",
              ConfigurationName=Name, ConfigurationId=AzureResourceId,
              Impact="Critical / tier-0/1 VM has no Azure Monitor / OMS agent extension",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              cmdbCriticality, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
- ReportPurpose: Identities without MFA who hold RBAC on tier-0/1 azure resources. Identity-resource cross-join exposes the highest-blast-radius MFA gaps.
  ConfigurationIdInputName: ConfigurationId
  CategoryInputName: Category
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  ReportName: CrossEngine_Identity_NoMfa_OnTier01_Resource
  SecurityDomain: CrossEngine
  CriticalityTierLevelInputName: CriticalityTierLevel
  SecuritySeverityInputName: SecuritySeverity
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - LinkedAzureResourceId
  - MoreInfoUrl
  - Links
  - RiskScoreTotal
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  ReportQuery:
  - |-
    let _ti = toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime));
    let _ta = toscalar(SI_Azure_Profile_CL    | summarize max(CollectionTime));
    let _tier01Resources =
        SI_Azure_Profile_CL
        | where CollectionTime == _ta
        | project LinkedAzureResourceId=AzureResourceId, ResourceTier=Tier;
    SI_Identity_Profile_CL
    | where CollectionTime == _ti
    | where IdentityType == "User"
    | where AccountEnabled == true
    | where HasNoMfa == true
    | mv-expand _role = todynamic(AzureRoles_Assignments)
    | extend _scope = tostring(_role.scope)
    | join kind=inner _tier01Resources on $left._scope == $right.LinkedAzureResourceId
    | extend MoreInfoUrl = strcat("https://entra.microsoft.com/#view/Microsoft_AAD_UsersAndTenants/UserProfileMenuBlade/~/AssignedRoles/userId/", coalesce(EntityIds,Upn))
    | extend Links = dynamic_to_json(pack_array(
        pack("label", "User profile",      "url", MoreInfoUrl),
        pack("label", "Resource (target)", "url", strcat("https://portal.azure.com/#resource", LinkedAzureResourceId))))
    | project SecurityDomain="CrossEngine", Category="Authentication", Subcategory="Identity without MFA holds RBAC on tier-0/1 resource",
              ConfigurationName=DisplayName, ConfigurationId=Upn,
              Impact="Account without MFA has RBAC on a tier-0/1 azure resource",
              SecuritySeverity, CriticalityTier, CriticalityTierLevel,
              LinkedAzureResourceId, MoreInfoUrl, Links, RiskScoreTotal
    | sort by RiskScoreTotal desc
  SubcategoryInputName: Subcategory
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  SortBy:
  - RiskScoreTotal
