# RiskAnalysis_Queries_Custom.sample.yaml
# -------------------------------------------------------
# REFERENCE FILE -- not loaded by the engine. Copy parts you need into:
#   risk-analysis-detection/RiskAnalysis_Queries_Custom.yaml
#
# Purpose: customer-owned report additions / overrides.
#
# Loading order at engine run-time:
#   1. risk-analysis-detection/RiskAnalysis_Queries_Locked.yaml   (shipped, regenerated by Build-RiskAnalysis.ps1)
#   2. risk-analysis-detection/RiskAnalysis_Queries_Custom.yaml   (your file)
#
# Merge semantics:
#   * Same `ReportName` as a Locked report  -> YOUR report REPLACES the locked one entirely
#   * New `ReportName`                       -> ADDED to the run
#   * Custom ReportTemplates merge on top of locked templates
#
# Tip: the Locked file is regenerated whenever you re-run the consolidator
# (tools/Build-RiskAnalysis.ps1). Don't edit it -- edit _source/*.yaml then
# re-consolidate. This Custom file is YOURS and survives consolidator runs.

Reports:

# ---------------------------------------------------------------------------
# EXAMPLE 1 -- ADD a brand-new report (custom KQL against your own data)
# ---------------------------------------------------------------------------
- ReportName: MyCustom_LegacyDeviceInventory
  ReportPurpose: |-
    Surfaces every endpoint still running an OS we've decided to retire by Q3.
    The list comes from a local lookup table; this report joins it with the
    SI endpoint profile so we know which assets are still active in the field.
  SecurityDomain: Endpoint
  CategoryInputName: Category
  SubcategoryInputName: Subcategory
  ConfigurationIdInputName: ConfigurationId
  SecuritySeverityInputName: SecuritySeverity
  CriticalityTierLevelInputName: CriticalityTierLevel
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  - Medium - tier 2
  - Low - tier 3
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - LegacyOsName
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - RiskFactor_Consequence
  - RiskFactor_Probability
  - RiskFactor_Probability_Detailed
  - RiskFactor_Weight
  SortBy: RiskScoreTotal_Weighted
  ReportQuery: |-
    let RetiringOs = datatable(OsName:string)
        ["Windows Server 2012 R2", "Windows Server 2016", "Ubuntu 18.04"];
    SI_Endpoint_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where OsPlatform in (RetiringOs)
    | extend Category = "End-of-life", Subcategory = "Retiring OS"
    | extend ConfigurationName = Hostname, ConfigurationId = MdeDeviceId
    | extend LegacyOsName = OsPlatform, Impact = 7.5
    | project SecurityDomain="Endpoint", Category, Subcategory,
              ConfigurationName, ConfigurationId, LegacyOsName, Impact

# ---------------------------------------------------------------------------
# EXAMPLE 2 -- OVERRIDE a shipped Locked report
# ---------------------------------------------------------------------------
# Same `ReportName` as the locked one -> your block REPLACES it. Useful when
# you want to (a) narrow scope, (b) tweak SortBy, (c) widen OutputPropertyOrder
# with extra columns from your CMDB, or (d) inject extra `where` clauses.
- ReportName: Azure_PublicIp_OnTier01Subscription
  ReportPurpose: |-
    [CUSTOM] Same intent as the shipped report, but ALSO joins Service Owner
    + BusinessUnit from our CMDB so the operations team can route findings.
  SecurityDomain: Azure
  CategoryInputName: Category
  SubcategoryInputName: Subcategory
  ConfigurationIdInputName: ConfigurationId
  SecuritySeverityInputName: SecuritySeverity
  CriticalityTierLevelInputName: CriticalityTierLevel
  RiskConsequenceScoreOutputName: RiskConsequenceScore
  RiskProbabilityScoreOutputName: RiskProbabilityScore
  RiskScoreOutputName: RiskScoreTotal
  # Narrow to only Tier 0/1 -- legal customer choice (defaults are all 4)
  CriticalityTierLevelScope:
  - Critical - tier 0
  - High - tier 1
  SecuritySeverityScope:
  - Very High
  - High
  - Medium
  - Low
  OutputPropertyOrder:
  - SecurityDomain
  - Category
  - Subcategory
  - ConfigurationName
  - ConfigurationId
  - PipAddress
  - PipAttachedResourceId
  - cmdbServiceOwner          # <- extra column from your CMDB join
  - cmdbBusinessUnit          # <- extra column from your CMDB join
  - Impact
  - SecuritySeverity
  - CriticalityTier
  - CriticalityTierLevel
  - RiskFactor_Consequence
  - RiskFactor_Probability
  - RiskFactor_Probability_Detailed
  - RiskFactor_Weight
  SortBy: RiskScoreTotal_Weighted
  ReportQuery: |-
    SI_Azure_Profile_CL
    | where TimeGenerated > ago(8d)
    | summarize arg_max(CollectionTime, *) by PrimaryEntityId
    | where ResourceType =~ "microsoft.network/publicipaddresses"
    | where isnotempty(PipAddress)
    | extend cmdbServiceOwner   = tostring(column_ifexists("cmdbServiceOwner", ""))
    | extend cmdbBusinessUnit   = tostring(column_ifexists("cmdbBusinessUnit", ""))
    | extend Category = "Network exposure", Subcategory = "Public IP on privileged subscription"
    | extend ConfigurationName = Name, ConfigurationId = AzureResourceId
    | project SecurityDomain="Azure", Category, Subcategory,
              ConfigurationName, ConfigurationId, PipAddress, PipAttachedResourceId,
              cmdbServiceOwner, cmdbBusinessUnit, Impact

ReportTemplates:

# ReportTemplates control the email + Excel output styling for each report.
# Same naming model: same key as a locked template -> override; new key -> add.
# The two locked templates are 'Summary' and 'Detailed'. Most customers don't
# need to override these.
#
# Example: a brand-new template that produces an executive-only roll-up.
# - TemplateName: ExecRollup
#   OutputType: Excel
#   IncludeColumns:
#     - SecurityDomain
#     - Subcategory
#     - RiskScoreTotal_Weighted
#   GroupBy: SecurityDomain
