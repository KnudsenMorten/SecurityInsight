                  ConfigurationId,
                  AssetName,
                  AssetId,
                  AssetType,
                  SecuritySeverity,
                  CriticalityTier,
                  CriticalityTierLevel,
                  DisplayName,
                  AppId,
                  PrimaryEntityId,
                  ObjectType,
                  ServicePrincipalType,
                  Tier,
                  AccountEnabled,
                  LastSignInDays,
                  LastSignInDateTime,
                  CreatedDays,
                  EntraAppPermissions_Application,
                  EntraRoles_Permanent,
                  CredentialExpiryDays,
                  IsOrphanSPN,
                  IsManagedIdentity,
                  IsMultiTenant,
                  PublisherVerified,
                  RiskFactor_Consequence,
                  RiskFactor_Probability,
                  RiskFactor_Probability_Detailed,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality,
                  cmdbDataSensitivity,
                  RiskScore_Weight_Detailed,
                  RiskScore_Weight_Factor
                | order by RiskScore_Weight_Factor desc, CriticalityTier asc

