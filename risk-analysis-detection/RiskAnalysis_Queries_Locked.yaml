        v2.2.340 -- focused set of 7 Summary reports that together cover every CL-bucketing
        shape in one pass: 2 single-let Endpoint Summary (Device_Missing_CVEs,
        Device_Recommendations), 1 single-let Azure Summary (Azure_Recommendations),
        3 multi-let cross-domain Attack_Paths Summary covering Identity Group Membership,
        Device with high-severity vulnerabilities lateral, and Credential-based lateral,
        and 1 cross-domain Identity_Admin_LogonTo_VulnerableDevice. Pair with the
        launcher's `-RunAssetSimulation ComplexSummary -AssetSimulationAmount N` knob
        to validate source/target bucketing on a small tenant in ~5-10 min.
      ReportsIncluded:
