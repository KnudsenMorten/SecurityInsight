        | extend RiskFactor_Probability = 1 + iff(CriticalityTier == 0, 1, 0)
                                           + iff(IsVerified == true, 1, 0)
                                           + iff(IsInKit == true, 1, 0)
        // CL identity-metadata enrichment (cmdb only). Detection logic above is unchanged.
        | extend DeviceKey = UserNodeId | extend PrimaryEntityId = UserNodeId
        //__STALE_DEVICE_FILTER_BEGIN__
        | where 1 == 1
        //__STALE_DEVICE_FILTER_END__
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
