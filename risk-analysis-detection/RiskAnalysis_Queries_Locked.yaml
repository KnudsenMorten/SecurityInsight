    - ReportName: Identity_SPN_OwnsResourcePublicAccess_Summary
      ReportPurpose: >-
        Service principals that hold ownership / contributor RBAC on an azure resource which is publicly exposed (IsPubliclyExposed=true) AND the SPN has stale credentials or is itself privileged. Identifies "hot" SPNs with maximum blast radius if compromised. Summary emits one row per finding type (Category x Subcategory x ConfigurationName), with AssetCount/TotalIssues/ImpactedAssets aggregated -- suitable for dashboards and exec reporting.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
