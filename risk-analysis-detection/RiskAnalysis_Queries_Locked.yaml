        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  AssetName,
                  AssetId,
                  AssetType,
                  SecuritySeverity, CriticalityTier, CriticalityTierLevel,
                  DisplayName, Upn, PrimaryEntityId, Department, Tier,
                  IsPrivileged, HasPermanentPrivilegedRole, IsPrivilegedEligible,
                  MfaIsRegistered, AccountEnabled, LastSignInDays, LastSignInDateTime, CreatedDays,
                  EntraRoles_Permanent, NestedGroups, RiskFactor_Consequence, RiskFactor_Probability,
                  RiskFactor_Probability_Detailed,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality,
                  cmdbDataSensitivity,
                  RiskScore_Weight_Detailed,
                  RiskScore_Weight_Factor
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc

    - ReportName: PublicIP_OpenPorts_Summary
      ReportPurpose: >
        Public IPs attached to Tier 0/1 assets that Shodan reports with one or more open ports. Aggregated per asset. High-severity ports (SSH 22, RDP 3389, MSSQL 1433, MySQL 3306, PostgreSQL 5432, WinRM 5985/5986) tagged separately. Source: SI_VulnerabilityPIP_CL (Shodan scanner).
      SecurityDomain: PublicIP
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        SI_VulnerabilityPIP_CL
        | where TimeGenerated > ago(2d)
        | summarize arg_max(CollectionTime, *) by IpAddress
        | where HasShodanRecord == true and OpenPortCount > 0
        | extend OpenPortsArray = parse_json(OpenPorts)
        | mv-expand Port = OpenPortsArray to typeof(int)
        | extend IsHighRiskPort = iff(Port in (22, 3389, 1433, 3306, 5432, 5985, 5986), 1, 0)
        | extend CriticalityTier = coalesce(toint(AssetTier), 99)
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0",
                 CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",
                 CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        // v2.2.322 -- tier-driven 4-label severity so PublicIP rows bucket
        // into Critical/High/Medium/Low dashboard columns same as every other
        // engine. Pre-v2.2.322 emitted "Very High"/"High"/"Medium-High"/"Medium"
        // which never produced "Critical" (only "Very High" maps there) and
        // never produced "Low" -- so PublicIP always showed Critical=0 + Low=0.
        // Port-risk + tier-0 escalation now flow through RiskFactor_Probability
        // tokens (AdminPort, Tier0Asset) only -- severity label = pure tier.
        | extend SecuritySeverity =
            case(CriticalityTier == 0, "Very High",
                 CriticalityTier == 1, "High",
                 CriticalityTier == 2, "Medium",
                 "Low")
        | extend SecurityDomain    = "PublicIP"
        | extend Category          = "External Exposure"
        | extend Subcategory       = "Open Port"
        | extend ConfigurationName = strcat("Public IP with open port ", tostring(Port))
        | extend ConfigurationId   = strcat("PUBLICIP-OPENPORT-", tostring(Port))
        | extend RiskFactor_Consequence = 3   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RF_P_HighRiskPort = IsHighRiskPort
        | extend RF_P_Tier0        = iff(CriticalityTier == 0, 1, 0)
        | extend RiskFactor_Probability = 1 + RF_P_HighRiskPort + RF_P_Tier0   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["InternetExposed"]),
            iff(RF_P_HighRiskPort == 1, dynamic(["AdminPort"]), dynamic([])),
            iff(RF_P_Tier0        == 1, dynamic(["Tier0Asset"]), dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("InternetExposed=1;AdminPort=", tostring(RF_P_HighRiskPort), ";Tier0Asset=", tostring(RF_P_Tier0))
        | extend cmdbId            = ""
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | summarize
            AssetCount             = dcount(IpAddress),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(AssetName, " (", IpAddress, ")"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity,
             cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity = ""
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

