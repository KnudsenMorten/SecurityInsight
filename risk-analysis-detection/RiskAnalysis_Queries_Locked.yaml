    - ReportName: Identity_PrivilegedUser_SignIn_NonTrustedLocation_Summary
      ReportPurpose: >
        Privileged users (Tier 0/1) who have successfully signed in from a network location that is NOT defined as a trusted named location in Conditional Access. Admin accounts should only authenticate from managed, trusted networks (corporate VPN, PAW networks, known office IPs). Sign-in from an untrusted location on a privileged account is a strong indicator of credential compromise, policy bypass, or an admin using personal devices/networks for privileged tasks. Severity: Very High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL identity-metadata lookup (cmdb-only enrichment).
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        let PrivilegedIdentities =
            SI_Identity_Profile_CL
            | where CollectionTime == toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | extend HasPermanentPrivilegedRole = (coalesce(EntraRolesPermanentVerdict_Tier, 99) <= 1)
            | where ObjectType == "User"
            | where AccountEnabled == true
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
            | extend CriticalityTier = toint(coalesce(Tier, 2))
            | project Upn = tolower(Upn), DisplayName, PrimaryEntityId,
                      CriticalityTier, Tier, MfaIsRegistered, HasPermanentPrivilegedRole;
        
        let NonTrustedSignins =
            union isfuzzy=true SigninLogs, AADNonInteractiveUserSignInLogs
            | where TimeGenerated >= ago(90d)
            | where ResultType == 0
            | extend Upn = tolower(UserPrincipalName)
            | extend NetLoc = todynamic(NetworkLocationDetails)
            | mv-expand NetLoc
            | extend IsTrusted = iff(tostring(NetLoc.networkType) == "trustedNamedLocation", 1, 0)
            | where IsTrusted == 0
            | summarize
                NonTrustedSigninCount = count(),
                LastNonTrustedSignin  = max(TimeGenerated),
                UniqueIPs             = dcount(IPAddress),
                SampleIPs             = strcat_array(make_set(IPAddress, 5), ";"),
                Countries             = strcat_array(make_set(Location, 5), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by Upn;
        
        PrivilegedIdentities
        | join kind=inner NonTrustedSignins on Upn
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity = "High"
        | extend RF_P_Tier0          = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_Frequent       = iff(NonTrustedSigninCount > 5, 1, 0)
        | extend RF_P_MultipleIPs    = iff(UniqueIPs > 3, 1, 0)
        | extend RF_P_NoMFA          = iff(MfaIsRegistered == false, 1, 0)
        | extend RiskFactor_Consequence = 3   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_Frequent + RF_P_MultipleIPs + RF_P_NoMFA   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["NonTrustedLocationSignin"]),
            iff(RF_P_Tier0       == 1, dynamic(["Tier0Identity"]),          dynamic([])),
            iff(RF_P_Frequent    == 1, dynamic(["FrequentNonTrusted5plus"]),dynamic([])),
            iff(RF_P_MultipleIPs == 1, dynamic(["MultipleUniqueIPs"]),      dynamic([])),
            iff(RF_P_NoMFA       == 1, dynamic(["NoMfaIsRegistered"]),        dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("NonTrustedLocationSignin=1;Tier0Identity=", tostring(RF_P_Tier0),
                   ";FrequentNonTrusted5plus=", tostring(RF_P_Frequent),
                   ";MultipleUniqueIPs=", tostring(RF_P_MultipleIPs),
                   ";NoMfaIsRegistered=", tostring(RF_P_NoMFA))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Sign-in Behaviour"
        | extend Subcategory       = "Location Anomalies"
        | extend ConfigurationName = "Privileged user signed in from non-trusted network location"
        | extend ConfigurationId   = "IDENTITY-SIGNIN-001"
        // CL identity-metadata enrichment (cmdb only). Detection logic above unchanged.
        | extend DeviceKey = PrimaryEntityId
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        | summarize
            AssetCount             = dcount(PrimaryEntityId),
            TotalIssues            = sum(NonTrustedSigninCount),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(coalesce(DisplayName, column_ifexists("UserPrincipalName", ""), AssetName, PrimaryEntityId))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            cmdbId = any(cmdbId),
            cmdbName = any(cmdbName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity, cmdbCriticality, cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_PrivilegedUser_SignIn_NonTrustedLocation_Detailed
      ReportPurpose: >
        Per-user detail: privileged accounts with non-trusted location sign-ins. Shows sign-in count, IPs, countries, and last occurrence.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL asset-metadata lookup for the identity (engine-substitution friendly).
        // EG / MDI / SignInLogs / etc. drive ALL detection + scoring; CL adds only cmdb fields.
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        let PrivilegedIdentities =
            SI_Identity_Profile_CL
            | where CollectionTime == toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | extend HasPermanentPrivilegedRole = (coalesce(EntraRolesPermanentVerdict_Tier, 99) <= 1)
            | where ObjectType == "User"
            | where AccountEnabled == true
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
            | extend CriticalityTier = toint(coalesce(Tier, 2))
            | project Upn = tolower(Upn), DisplayName, PrimaryEntityId,
                      CriticalityTier, Tier, MfaIsRegistered, HasPermanentPrivilegedRole;
        
        let NonTrustedSignins =
            union isfuzzy=true SigninLogs, AADNonInteractiveUserSignInLogs
            | where TimeGenerated >= ago(90d)
            | where ResultType == 0
            | extend Upn    = tolower(UserPrincipalName)
            | extend NetLoc = todynamic(NetworkLocationDetails)
            | mv-expand NetLoc
            | extend IsTrusted = iff(tostring(NetLoc.networkType) == "trustedNamedLocation", 1, 0)
            | where IsTrusted == 0
            | summarize
                NonTrustedSigninCount = count(),
                LastNonTrustedSignin  = max(TimeGenerated),
                UniqueIPs             = dcount(IPAddress),
                SampleIPs             = strcat_array(make_set(IPAddress, 5), ";"),
                Countries             = strcat_array(make_set(Location, 10), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by Upn;
        
        PrivilegedIdentities
        | join kind=inner NonTrustedSignins on Upn
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity      = "High"
        | extend SecurityDomain        = "Identity"
        | extend Category              = "Sign-in Behaviour"
        | extend Subcategory           = "Location Anomalies"
        | extend ConfigurationName     = "Privileged user signed in from non-trusted network location"
        | extend ConfigurationId       = "IDENTITY-SIGNIN-001"
        | extend RiskFactor_Consequence = 3   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = 1 + iff(CriticalityTier == 0, 1, 0)
                                           + iff(NonTrustedSigninCount > 5, 1, 0)
                                           + iff(MfaIsRegistered == false, 1, 0)
        // CL identity-metadata enrichment (cmdb only). Detection logic above is unchanged.
        | extend DeviceKey = PrimaryEntityId
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  AssetName,
                  AssetId,
                  AssetType,
                  SecuritySeverity, CriticalityTier, CriticalityTierLevel,
                  DisplayName, Upn, PrimaryEntityId, Tier, MfaIsRegistered, HasPermanentPrivilegedRole,
                  NonTrustedSigninCount, LastNonTrustedSignin, UniqueIPs, SampleIPs, Countries,
                  RiskFactor_Consequence, RiskFactor_Probability,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality,
                  cmdbDataSensitivity,
                  RiskScore_Weight_Detailed,
                  RiskScore_Weight_Factor
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, NonTrustedSigninCount desc

    - ReportName: Identity_ServiceAccount_SignIn_NonTrustedLocation_Summary
      ReportPurpose: >
        Accounts classified as service accounts by MDI (MDI_IsServiceAccount = true) that have successfully authenticated from non-trusted network locations. Service accounts are expected to authenticate exclusively from known, trusted infrastructure (application servers, automation agents). Authentication from an untrusted location strongly suggests the service account credentials have been harvested and are being used by a threat actor. Severity: High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL identity-metadata lookup (cmdb-only enrichment).
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        let ServiceAccounts =
            SI_Identity_Profile_CL
            | where CollectionTime == toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | extend IsPrivileged = (coalesce(EntraRolesPermanentVerdict_Tier, 99) <= 1 or coalesce(EntraRolesEligibleVerdict_Tier, 99) <= 1)
            | where ObjectType == "User"
            | where AccountEnabled == true
            | where tobool(column_ifexists("MDI_IsServiceAccount", false)) == true
            | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
            | extend CriticalityTier = toint(coalesce(Tier, 2))
            | project Upn = tolower(Upn), DisplayName, PrimaryEntityId,
                      CriticalityTier, Tier, IsPrivileged;
        
        let NonTrustedSignins =
            union isfuzzy=true SigninLogs, AADNonInteractiveUserSignInLogs
            | where TimeGenerated >= ago(90d)
            | where ResultType == 0
            | extend Upn = tolower(UserPrincipalName)
            | extend NetLoc = todynamic(NetworkLocationDetails)
            | mv-expand NetLoc
            | extend IsTrusted = iff(tostring(NetLoc.networkType) == "trustedNamedLocation", 1, 0)
            | where IsTrusted == 0
            | summarize
                NonTrustedSigninCount = count(),
                LastNonTrustedSignin  = max(TimeGenerated),
                UniqueIPs             = dcount(IPAddress),
                SampleIPs             = strcat_array(make_set(IPAddress, 5), ";"),
                Countries             = strcat_array(make_set(Location, 10), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by Upn;
        
        ServiceAccounts
        | join kind=inner NonTrustedSignins on Upn
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity    = "High"
        | extend RF_P_Privileged     = iff(IsPrivileged == true, 1, 0)
        | extend RF_P_Tier0          = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_Frequent       = iff(NonTrustedSigninCount > 3, 1, 0)
        | extend RF_P_MultiCountry   = iff(array_length(split(Countries, ";")) > 1, 1, 0)
        | extend RiskFactor_Consequence = 2   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = 1 + RF_P_Privileged + RF_P_Tier0 + RF_P_Frequent + RF_P_MultiCountry   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["NonTrustedLocationSignin"]),
            iff(RF_P_Privileged   == 1, dynamic(["ServiceAccountPrivileged"]),dynamic([])),
            iff(RF_P_Tier0        == 1, dynamic(["Tier0Identity"]),           dynamic([])),
            iff(RF_P_Frequent     == 1, dynamic(["FrequentNonTrusted3plus"]), dynamic([])),
            iff(RF_P_MultiCountry == 1, dynamic(["MultipleCountries"]),       dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("NonTrustedLocationSignin=1;ServiceAccountPrivileged=", tostring(RF_P_Privileged),
                   ";Tier0Identity=", tostring(RF_P_Tier0), ";FrequentNonTrusted3plus=", tostring(RF_P_Frequent),
                   ";MultipleCountries=", tostring(RF_P_MultiCountry))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Sign-in Behaviour"
        | extend Subcategory       = "Location Anomalies"
        | extend ConfigurationName = "Service account authenticated from non-trusted network location"
        | extend ConfigurationId   = "IDENTITY-SIGNIN-002"
        // CL identity-metadata enrichment (cmdb only). Detection logic above unchanged.
        | extend DeviceKey = PrimaryEntityId
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        | summarize
            AssetCount             = dcount(PrimaryEntityId),
            TotalIssues            = sum(NonTrustedSigninCount),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(coalesce(DisplayName, column_ifexists("UserPrincipalName", ""), AssetName, PrimaryEntityId))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            cmdbId = any(cmdbId),
            cmdbName = any(cmdbName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity, cmdbCriticality, cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_BreakGlass_SignIn_Detected_Summary
      ReportPurpose: >
        Any successful sign-in by an account flagged as a break-glass emergency account. Break-glass accounts are only valid for use during genuine catastrophic failures where normal admin access is unavailable. Every sign-in by a break-glass account must be investigated to confirm it was authorised and justified. This is an operational alert that should trigger an immediate review process. Severity: Very High (fixed)  --  all break-glass usage is critical regardless of context.
