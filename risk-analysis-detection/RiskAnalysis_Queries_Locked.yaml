      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL asset-metadata lookup for the identity (engine-substitution friendly).
        // EG / MDI / SignInLogs / etc. drive ALL detection + scoring; CL adds only cmdb fields.
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | extend HasPermanentPrivilegedRole = (coalesce(EntraRolesPermanentVerdict_Tier, 99) <= 1)
            | extend IsPrivilegedEligible = (coalesce(EntraRolesEligibleVerdict_Tier, 99) <= 1)
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        let VulnerableDevices =
            ExposureGraphNodes
            | where NodeLabel == "device"
            | extend rawData          = todynamic(NodeProperties.rawData)
            | extend HasHighCriticalCVE = tobool(rawData.highRiskVulnerabilityInsights.hasHighOrCritical)
            | where HasHighCriticalCVE == true
            | extend DeviceName       = tostring(rawData.deviceName)
            | extend MaxCvssScore     = todouble(rawData.highRiskVulnerabilityInsights.maxCvssScore)
            | extend IsInternetFacing = isnotnull(rawData.exposedToInternet)
            | extend DeviceRiskScore  = tostring(rawData.riskScore)
            | project DeviceNodeId = NodeId, DeviceName, MaxCvssScore, IsInternetFacing, DeviceRiskScore;
        
        ExposureGraphEdges
        | where EdgeLabel =~ "can authenticate to" or EdgeLabel =~ "canAuthenticateTo"
        | join kind=inner (
            ExposureGraphNodes
            | where NodeLabel == "user"
            | extend rawData         = todynamic(NodeProperties.rawData)
            | extend CriticalityTier = toint(coalesce(
                tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                tostring(rawData.criticalityLevel.criticalityLevel), "2"))
            | extend UserUPN         = tolower(tostring(rawData.userPrincipalName))
            | extend UserDisplayName = tostring(rawData.displayName)
            | where isnotempty(tostring(column_ifexists("UserUPN", "")))
            | project UserNodeId = NodeId, UserUPN, UserDisplayName, CriticalityTier
          ) on $left.SourceNodeId == $right.UserNodeId
        | join kind=inner VulnerableDevices on $left.TargetNodeId == $right.DeviceNodeId
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity      = "Medium-High"
        | extend SecurityDomain        = "Identity"
        | extend Category              = "Privileged Access"
        | extend Subcategory           = "Credential Exposure via Device"
        | extend ConfigurationName     = "Privileged user authenticating to device with High/Critical CVEs"
        | extend ConfigurationId       = "IDENTITY-DEVICE-001"
        | extend RiskFactor_Consequence = 3   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = 1 + iff(CriticalityTier == 0, 1, 0)
                                           + iff(IsInternetFacing == true, 1, 0)
                                           + iff(MaxCvssScore >= 9.0, 1, 0)
        // CL identity-metadata enrichment (cmdb only). Detection logic above is unchanged.
        | extend DeviceKey = UserNodeId | extend PrimaryEntityId = UserNodeId
        //__STALE_DEVICE_FILTER_BEGIN__
        | where 1 == 1
        //__STALE_DEVICE_FILTER_END__
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  AssetName,
                  AssetId,
                  AssetType,
                  SecuritySeverity, CriticalityTier, CriticalityTierLevel,
                  UserDisplayName, UserUPN, UserNodeId,
                  DeviceName, MaxCvssScore, IsInternetFacing, DeviceRiskScore,
                  RiskFactor_Consequence, RiskFactor_Probability,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality,
                  cmdbDataSensitivity,
                  RiskScore_Weight_Detailed,
                  RiskScore_Weight_Factor
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, MaxCvssScore desc

    - ReportName: Identity_Admin_LogonTo_InternetExposedDevice_Summary
      ReportPurpose: >
        Privileged users (Tier 0/1) authenticated to internet-facing devices. Privileged sessions should never occur on internet-exposed assets as these devices have a significantly higher chance of being compromised remotely. Even without CVEs, internet-exposed devices face constant attack attempts. An attacker who breaches an internet-exposed device gains access to any privileged credential or token present on that device. Severity: High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL identity-metadata lookup (cmdb-only enrichment).
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        let InternetExposedDevices =
            ExposureGraphNodes
            | where NodeLabel == "device"
            | extend rawData          = todynamic(NodeProperties.rawData)
            | extend IsInternetFacing = isnotnull(rawData.exposedToInternet)
            | where IsInternetFacing == true
            | extend DeviceName       = tostring(rawData.deviceName)
            | extend HasCVEs          = tobool(rawData.highRiskVulnerabilityInsights.hasHighOrCritical)
            | extend DeviceRiskScore  = tostring(rawData.riskScore)
            | project DeviceNodeId = NodeId, DeviceName, HasCVEs, DeviceRiskScore;
        
        ExposureGraphEdges
        | where EdgeLabel =~ "can authenticate to" or EdgeLabel =~ "canAuthenticateTo"
        | join kind=inner (
            ExposureGraphNodes
            | where NodeLabel == "user"
            | extend rawData         = todynamic(NodeProperties.rawData)
            | extend CriticalityTier = toint(coalesce(
                tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                tostring(rawData.criticalityLevel.criticalityLevel), "2"))
            | extend UserUPN         = tolower(tostring(rawData.userPrincipalName))
            | extend UserDisplayName = tostring(rawData.displayName)
            | where isnotempty(tostring(column_ifexists("UserUPN", "")))
            | project UserNodeId = NodeId, UserUPN, UserDisplayName, CriticalityTier
          ) on $left.SourceNodeId == $right.UserNodeId
        | join kind=inner InternetExposedDevices on $left.TargetNodeId == $right.DeviceNodeId
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity    = "High"
        | extend RF_P_Tier0          = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_HasCVEs        = iff(HasCVEs == true, 1, 0)
        | extend RF_P_HighRisk       = iff(DeviceRiskScore in ("High", "Critical"), 1, 0)
        | extend RiskFactor_Consequence = 2   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_HasCVEs + RF_P_HighRisk   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["InternetExposedDevice"]),
            iff(RF_P_Tier0    == 1, dynamic(["Tier0Admin"]),         dynamic([])),
            iff(RF_P_HasCVEs  == 1, dynamic(["DeviceHasHighCVEs"]),  dynamic([])),
            iff(RF_P_HighRisk == 1, dynamic(["DeviceHighRiskScore"]),dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("InternetExposedDevice=1;Tier0Admin=", tostring(RF_P_Tier0),
                   ";DeviceHasHighCVEs=", tostring(RF_P_HasCVEs),
                   ";DeviceHighRiskScore=", tostring(RF_P_HighRisk))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Privileged Access"
        | extend Subcategory       = "Credential Exposure via Device"
        | extend ConfigurationName = "Privileged user authenticating to internet-exposed device"
        | extend ConfigurationId   = "IDENTITY-DEVICE-002"
        // CL identity-metadata enrichment (cmdb only). Detection logic above unchanged.
        | extend DeviceKey = UserNodeId | extend PrimaryEntityId = UserNodeId
        //__STALE_DEVICE_FILTER_BEGIN__
        | where 1 == 1
        //__STALE_DEVICE_FILTER_END__
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        | summarize
            AssetCount             = dcount(UserNodeId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(UserDisplayName, " -> ", DeviceName))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            cmdbId = any(cmdbId),
            cmdbName = any(cmdbName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity, cmdbCriticality, cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

