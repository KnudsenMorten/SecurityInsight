                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        let ServiceAccounts =
            SI_Identity_Profile_CL
            | where CollectionTime == toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | extend IsPrivileged = (coalesce(EntraRolesPermanentVerdict_Tier, 99) <= 1 or coalesce(EntraRolesEligibleVerdict_Tier, 99) <= 1)
            | where ObjectType == "User"
            | where AccountEnabled == true
            | where tobool(column_ifexists("MDI_IsServiceAccount", false)) == true
            | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
            | extend CriticalityTier = toint(coalesce(Tier, 2))
            | project Upn = tolower(Upn), DisplayName, PrimaryEntityId,
                      CriticalityTier, Tier, IsPrivileged;
        
        let InteractiveSignins =
            SigninLogs
            | where TimeGenerated >= ago(90d)
            | where ResultType == 0
            | extend Upn = tolower(UserPrincipalName)
            | extend NetworkLocationDetails = todynamic(NetworkLocationDetails)
            | mv-expand NetworkLocationDetails
            | extend IsTrusted = iff(tostring(NetworkLocationDetails.networkType) == "trustedNamedLocation", 1, 0)
            | summarize
                InteractiveSigninCount = count(),
                LastInteractiveSignin  = max(TimeGenerated),
                NonTrustedCount        = countif(IsTrusted == 0),
                Countries              = strcat_array(make_set(Location, 5), ";"),
                UniqueIPs              = dcount(IPAddress),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by Upn;
        
        ServiceAccounts
        | join kind=inner InteractiveSignins on Upn
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity    = "Medium-High"
        | extend RF_P_Privileged     = iff(IsPrivileged == true, 1, 0)
        | extend RF_P_Tier0          = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_NonTrusted     = iff(NonTrustedCount > 0, 1, 0)
        | extend RF_P_Frequent       = iff(InteractiveSigninCount > 5, 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, 2)
        | extend RiskFactor_Probability = 1 + RF_P_Privileged + RF_P_Tier0 + RF_P_NonTrusted + RF_P_Frequent   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["ServiceAccountInteractiveLogin"]),
            iff(RF_P_Privileged  == 1, dynamic(["ServiceAccountIsPrivileged"]),  dynamic([])),
            iff(RF_P_Tier0       == 1, dynamic(["Tier0ServiceAccount"]),         dynamic([])),
            iff(RF_P_NonTrusted  == 1, dynamic(["FromNonTrustedLocation"]),      dynamic([])),
            iff(RF_P_Frequent    == 1, dynamic(["FrequentInteractive5plus"]),    dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("ServiceAccountInteractiveLogin=1;ServiceAccountIsPrivileged=", tostring(RF_P_Privileged),
                   ";Tier0ServiceAccount=", tostring(RF_P_Tier0), ";FromNonTrustedLocation=", tostring(RF_P_NonTrusted),
                   ";FrequentInteractive5plus=", tostring(RF_P_Frequent))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Identity Lifecycle"
        | extend Subcategory       = "Service Account Misuse"
        | extend ConfigurationName = "Service account has interactive sign-ins - credential shared or harvested"
        | extend ConfigurationId   = "IDENTITY-LIFECYCLE-003"
        // CL identity-metadata enrichment (cmdb only). Detection logic above unchanged.
        | extend DeviceKey = PrimaryEntityId
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        | summarize
            AssetCount             = dcount(PrimaryEntityId),
            TotalIssues            = sum(InteractiveSigninCount),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(coalesce(DisplayName, column_ifexists("UserPrincipalName", ""), AssetName, PrimaryEntityId))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            cmdbId = any(cmdbId),
            cmdbName = any(cmdbName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity, cmdbCriticality, cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_HighMDIInvestigationPriority_Summary
      ReportPurpose: >
        Active accounts with MDI Investigation Priority Percentile in the top 10% (MDI_InvestigationPriorityPct >= 90). MDI calculates this score based on observed anomalous behaviours, lateral movement signals, unusual access patterns, and UEBA risk scoring. A high investigation priority means MDI has observed behaviour that warrants review. When this is combined with a privileged identity, it represents a potentially active threat that requires immediate attention. Severity: High (fixed).
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL identity-metadata lookup (cmdb-only enrichment).
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        SI_Identity_Profile_CL
        | where CollectionTime == toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by PrimaryEntityId
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where toint(column_ifexists("MDI_InvestigationPriorityPct", 0)) >= 90
        | where toint(column_ifexists("MDI_InvestigationPriority", 0)) > 0
        
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(Tier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity = "High"
        
        | extend RF_P_Tier01            = iff(CriticalityTier <= 1, 1, 0)
        | extend RF_P_Top5Pct           = iff(toint(column_ifexists("MDI_InvestigationPriorityPct", 0)) >= 95, 1, 0)
        | extend RF_P_AtRisk            = iff(tostring(column_ifexists("MDI_RiskState", "")) == "atRisk", 1, 0)
        | extend RF_P_HighBlastRadius   = iff(tostring(column_ifexists("MDI_BlastRadius", "")) == "high", 1, 0)
        | extend RiskFactor_Consequence = case(CriticalityTier == 0, 3, CriticalityTier == 1, 2, 1)
        | extend RiskFactor_Probability = 1 + RF_P_Tier01 + RF_P_Top5Pct + RF_P_AtRisk + RF_P_HighBlastRadius   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["HighMDIInvestigationPriority"]),
            iff(RF_P_Tier01          == 1, dynamic(["PrivilegedIdentity"]),     dynamic([])),
            iff(RF_P_Top5Pct         == 1, dynamic(["Top5PercentileMDIScore"]), dynamic([])),
            iff(RF_P_AtRisk          == 1, dynamic(["MDI_AtRisk"]),             dynamic([])),
            iff(RF_P_HighBlastRadius == 1, dynamic(["HighBlastRadius"]),        dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("HighMDIInvestigationPriority=1;PrivilegedIdentity=", tostring(RF_P_Tier01),
                   ";Top5PercentileMDIScore=", tostring(RF_P_Top5Pct), ";MDI_AtRisk=", tostring(RF_P_AtRisk),
                   ";HighBlastRadius=", tostring(RF_P_HighBlastRadius))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Threat Intelligence"
        | extend Subcategory       = "MDI Behavioural Signals"
        | extend ConfigurationName = strcat("High MDI investigation priority (top 10%) - anomalous behaviour observed")
        | extend ConfigurationId   = "IDENTITY-LIFECYCLE-005"
        // CL identity-metadata enrichment (cmdb only). Detection logic above unchanged.
        | extend DeviceKey = PrimaryEntityId
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        | summarize
            AssetCount             = dcount(PrimaryEntityId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(
                strcat(DisplayName, " [Score:", tostring(toint(column_ifexists("MDI_InvestigationPriority", 0))), "]"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            cmdbId = any(cmdbId),
            cmdbName = any(cmdbName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity, cmdbCriticality, cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

