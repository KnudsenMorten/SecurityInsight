    - ReportName: Identity_DisabledAccount_ActivePIMAssignment_Summary
      ReportPurpose: >
        Disabled user accounts that still have PIM eligible role assignments active. When an account is disabled (e.g. employee leaving), all role assignments should be removed as part of the offboarding process. An eligible assignment on a disabled account means the account could be re-enabled and immediately used to activate privileged access  --  a common post-compromise technique. Severity: High (fixed).
