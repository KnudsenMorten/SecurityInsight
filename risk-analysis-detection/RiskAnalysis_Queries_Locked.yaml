      ReportQuery:
      - |-
        SI_VulnerabilityPIP_CL
        | where TimeGenerated > ago(2d)
        | summarize arg_max(CollectionTime, *) by IpAddress
        | where HasShodanRecord == true and VulnCount > 0
        | extend VulnsArray = parse_json(Vulns)
        | mv-expand Cve = VulnsArray to typeof(string)
        | extend CriticalityTier = coalesce(toint(AssetTier), 99)
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0",
                 CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",
                 CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        // v2.2.322 -- tier-driven 4-label severity matching the Open_Port
        // reports + every other engine. Pre-v2.2.322 used iff(Tier0?VH:High)
        // so the lowest possible CVE finding showed as "High" -- dashboard's
        // Critical and Low columns always 0 for PublicIP CVE. Now Tier 3 IPs
        // with CVEs correctly bucket as Low; Tier 0 stays Very High (Critical
        // bucket). Per-row CVE presence still elevates the risk SCORE through
        // RiskFactor_Probability (InternetExposedCVE token), independent of
        // the severity LABEL.
        | extend SecuritySeverity =
            case(CriticalityTier == 0, "Very High",
