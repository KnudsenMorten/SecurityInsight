      ReportPurpose: >-
        Per-row detail view for Identity_BreakGlass_Anomaly_Summary. Break-glass emergency access accounts with anomalous sign-in patterns. Detects two opposite problems: (1) Break-glass account used recently (< 30 days) WITHOUT an incident - possible misuse (2) Break-glass account has never been tested OR last test was > 180 days ago Break-glass accounts should only be used in genuine emergencies and tested periodically. Severity: Very High (fixed) - any break-glass anomaly is a critical governance failure. Detailed emits one row per affected asset (PrimaryEntityId-keyed), suitable for ticket creation, remediation tracking, and per-asset evidence.
