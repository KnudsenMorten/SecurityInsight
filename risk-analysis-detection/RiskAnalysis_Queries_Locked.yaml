                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        SI_Identity_Profile_CL
        | where CollectionTime == toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by PrimaryEntityId
        | extend CreatedDays = datetime_diff('day', now(), todatetime(CreatedDateTime))
        | extend HasPermanentPrivilegedRole = (coalesce(EntraRolesPermanentVerdict_Tier, 99) <= 1)
        | where ObjectType == "User"
        | where AccountEnabled == true
        | where LastSignInDays == -1   // never signed in
        | where CreatedDays > 14       // past provisioning grace period
        
        | extend CSA_AssetTier   = toint(extract(@'"AssetTier"\s*:\s*"tier-(\d)"', 1, tostring(CSA)))
        | extend CriticalityTier = toint(coalesce(Tier, 2))
        | extend CriticalityTierLevel =
            case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1",
                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity = "Medium"
        
        | extend RF_P_Tier0       = iff(CriticalityTier == 0, 1, 0)
        | extend RF_P_VeryOld     = iff(CreatedDays > 90, 1, 0)
        | extend RF_P_Permanent   = iff(HasPermanentPrivilegedRole == true, 1, 0)
        | extend RiskFactor_Consequence = 2   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = 1 + RF_P_Tier0 + RF_P_VeryOld + RF_P_Permanent   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["NeverSignedIn"]),
            iff(RF_P_Tier0     == 1, dynamic(["Tier0Identity"]),          dynamic([])),
            iff(RF_P_VeryOld   == 1, dynamic(["AccountOver90DaysOld"]),   dynamic([])),
            iff(RF_P_Permanent == 1, dynamic(["PermanentRoleAssignment"]),dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("NeverSignedIn=1;Tier0Identity=", tostring(RF_P_Tier0),
                   ";AccountOver90DaysOld=", tostring(RF_P_VeryOld), ";PermanentRoleAssignment=", tostring(RF_P_Permanent))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Admin Account Hygiene"
        | extend Subcategory       = "Unused Accounts"
        | extend ConfigurationName = "Privileged account never signed in after 14-day grace period"
        | extend ConfigurationId   = "IDENTITY-ADMIN-003"
        // CL identity-metadata enrichment (cmdb only). Detection logic above unchanged.
        | extend DeviceKey = PrimaryEntityId
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        | summarize
            AssetCount             = dcount(PrimaryEntityId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(coalesce(DisplayName, column_ifexists("UserPrincipalName", ""), AssetName, PrimaryEntityId))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            cmdbId = any(cmdbId),
            cmdbName = any(cmdbName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity, cmdbCriticality, cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

    - ReportName: Identity_TooManyGlobalAdmins_Summary
      ReportPurpose: >
        Detects when the organisation has more than 5 active Global Administrator accounts. Microsoft recommends 2-5 Global Admins maximum. Each additional Global Admin increases the attack surface proportionally. Organisations with 10+ Global Admins typically have role assignment hygiene problems and lack a formal review process. Severity: High (fixed) - excessive Global Admin count is always a significant risk.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL identity-metadata lookup (cmdb-only enrichment).
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        let GlobalAdmins =
            SI_Identity_Profile_CL
            | where CollectionTime == toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime))
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | where ObjectType == "User"
            | where AccountEnabled == true
            | where EntraRoles_Permanent has "Global Administrator"
            | extend DeviceKey = "tenant"
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__
            | summarize
                GACount        = dcount(PrimaryEntityId),
                ImpactedAssets = strcat_array(array_sort_asc(make_set(DisplayName)), ";");
        
        GlobalAdmins
        | where GACount > 5
        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "Medium"
        | extend RF_P_ExcessiveCount  = iff(GACount > 10, 2, 1)
        | extend RiskFactor_Consequence = 2   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = RF_P_ExcessiveCount
        | extend RiskFactor_Probability_Detailed =
            iff(GACount > 10, "ExcessiveGlobalAdminCount_Critical", "ExcessiveGlobalAdminCount")
        | extend RiskFactor_Probability_DetailedScore = strcat("GlobalAdminCount=", GACount)
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Admin Account Hygiene"
        | extend Subcategory       = "Role Assignment Governance"
        | extend ConfigurationName = "Excessive Global Administrator count - more than 5 active accounts"
        | extend ConfigurationId   = "IDENTITY-ADMIN-004"
        | extend AssetCount        = GACount
        | extend TotalIssues       = GACount
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  SecuritySeverity, CriticalityTier, CriticalityTierLevel,
                  RiskFactor_Consequence, RiskFactor_Probability,
                  RiskFactor_Probability_Detailed, RiskFactor_Probability_DetailedScore,
                  AssetCount, TotalIssues, ImpactedAssets
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__

    - ReportName: Identity_BreakGlass_Anomaly_Summary
      ReportPurpose: >
        Break-glass emergency access accounts with anomalous sign-in patterns. Detects two opposite problems: (1) Break-glass account used recently (< 30 days) WITHOUT an incident - possible misuse (2) Break-glass account has never been tested OR last test was > 180 days ago Break-glass accounts should only be used in genuine emergencies and tested periodically. Severity: Very High (fixed) - any break-glass anomaly is a critical governance failure.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL identity-metadata lookup (cmdb-only enrichment).
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(_si_PrimaryEntityId);

        SI_Identity_Profile_CL
        | where CollectionTime == toscalar(SI_Identity_Profile_CL | summarize max(CollectionTime))
        | summarize arg_max(CollectionTime, *) by PrimaryEntityId
        | extend HasPermanentPrivilegedRole = (coalesce(EntraRolesPermanentVerdict_Tier, 99) <= 1)
        | where ObjectType == "User"
        | where IsBreakGlass == true
        | where LastSignInDays <= 30 or LastSignInDays > 180 or LastSignInDays == -1
        
        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity     = "High"
        
        | extend AnomalyType =
            case(LastSignInDays >= 0 and LastSignInDays <= 30, "RecentUnexpectedUsage",
                 LastSignInDays == -1,                          "NeverTested",
                 "TestingOverdue")
        | extend RF_P_RecentUse    = iff(LastSignInDays >= 0 and LastSignInDays <= 30, 1, 0)
        | extend RF_P_NeverTested  = iff(LastSignInDays == -1, 1, 0)
        | extend RF_P_NoMFA        = iff(MfaIsRegistered == false, 1, 0)
        | extend RF_P_Permanent    = iff(HasPermanentPrivilegedRole == true, 1, 0)
        | extend RiskFactor_Consequence = 3   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = 1 + RF_P_RecentUse + RF_P_NeverTested + RF_P_NoMFA + RF_P_Permanent   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["BreakGlassAnomaly"]),
            iff(RF_P_RecentUse   == 1, dynamic(["RecentUnexpectedUsage"]), dynamic([])),
            iff(RF_P_NeverTested == 1, dynamic(["NeverTested"]),           dynamic([])),
            iff(RF_P_NoMFA       == 1, dynamic(["NoMfaIsRegistered"]),       dynamic([])),
            iff(RF_P_Permanent   == 1, dynamic(["PermanentRole"]),         dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("BreakGlassAnomaly=1;RecentUnexpectedUsage=", tostring(RF_P_RecentUse),
                   ";NeverTested=", tostring(RF_P_NeverTested), ";NoMfaIsRegistered=", tostring(RF_P_NoMFA))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Admin Account Hygiene"
        | extend Subcategory       = "Break-Glass Governance"
        | extend ConfigurationName = strcat("Break-glass account anomaly: ", AnomalyType)
        | extend ConfigurationId   = "IDENTITY-ADMIN-005"
        // CL identity-metadata enrichment (cmdb only). Detection logic above unchanged.
        | extend DeviceKey = PrimaryEntityId
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | join kind=leftouter (_IdentityCmdb) on $left.PrimaryEntityId == $right._si_PrimaryEntityId
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PrimaryEntityId", ""))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("ObjectType", ""), "Identity")
        | extend
            cmdbId            = _si_cmdbId,
            cmdbName            = _si_cmdbName,
            cmdbCriticality     = _si_cmdbCriticality,
            cmdbDataSensitivity = _si_cmdbDataSensitivity
        | summarize
            AssetCount             = dcount(PrimaryEntityId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat(DisplayName, " [", AnomalyType, "]"))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            cmdbId = any(cmdbId),
            cmdbName = any(cmdbName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity, cmdbCriticality, cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc

