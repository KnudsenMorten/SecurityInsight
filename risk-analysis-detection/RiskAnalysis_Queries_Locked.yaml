      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
