                | extend cmdbDataSensitivity  = tostring(column_ifexists('cmdbDataSensitivity', ''))
                | extend CmdbMatchPhase           = tostring(column_ifexists('CmdbMatchPhase', ''))
                | extend CmdbMatchState           = tostring(column_ifexists('CmdbMatchState', ''))   // __SI_CMDB_DEFENSIVE__
        | extend RiskFactorCount = toint(column_ifexists('RiskFactorCount', 0))   // defensive -- column may be absent if engine hasn't aggregated risk-factors yet
        | where RiskFactorCount >= 4
        | extend MoreInfoUrl = iff(IdentityType == "ServicePrincipal",
            strcat("https://entra.microsoft.com/#view/Microsoft_AAD_RegisteredApps/ApplicationMenuBlade/~/Overview/appId/", AppId),
            strcat("https://entra.microsoft.com/#view/Microsoft_AAD_UsersAndTenants/UserProfileMenuBlade/~/overview/userId/", coalesce(EntityIds,Upn)))
        | extend Links = dynamic_to_json(pack_array(pack("label","Identity portal","url",MoreInfoUrl)))
        | extend DeviceKey = coalesce(tostring(column_ifexists("AppId","")), tostring(column_ifexists("Upn","")), tostring(column_ifexists("DisplayName","")))
                //__BUCKET_FILTER_BEGIN__
                | where 1 == 1
                //__BUCKET_FILTER_END__
                | extend Impact                          = coalesce(toreal(column_ifexists("Impact", real(null))), case(tolower(tostring(column_ifexists("Impact", ""))) == "critical", 10.0, tolower(tostring(column_ifexists("Impact", ""))) == "very high", 10.0, tolower(tostring(column_ifexists("Impact", ""))) == "high", 8.0, tolower(tostring(column_ifexists("Impact", ""))) == "medium", 5.0, tolower(tostring(column_ifexists("Impact", ""))) == "moderate", 5.0, tolower(tostring(column_ifexists("Impact", ""))) == "low", 2.0, tolower(tostring(column_ifexists("Impact", ""))) == "informational", 1.0, tolower(tostring(column_ifexists("Impact", ""))) == "info", 1.0, real(null)))
                | extend SecuritySeverity                = case(toreal(Impact) >= 9, "Very High", toreal(Impact) >= 7, "High", toreal(Impact) >= 4, "Medium", toreal(Impact) >= 0.1, "Low", "Low")
                | extend CriticalityTier                 = toint(coalesce(column_ifexists("Tier", 999), 999))
                | extend CriticalityTierLevel            = case(toint(CriticalityTier) == 0, "Critical - tier 0", toint(CriticalityTier) == 1, "High - tier 1", toint(CriticalityTier) == 2, "Medium - tier 2", toint(CriticalityTier) == 3, "Low - tier 3", "Low - tier 3")
                | extend RiskFactor_Consequence          = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
                | extend RiskFactor_Probability          = toint(iff(tobool(column_ifexists("IsExternalIdentity", false)) == true, 1, 0)) + toint(iff(tobool(column_ifexists("IsCmdbOrphan", false)) == true, 1, 0))
                | extend RiskFactor_Probability_Detailed = strcat_array(pack_array(iff(tobool(column_ifexists("IsExternalIdentity", false)) == true, "IsExternalIdentity", ""), iff(tobool(column_ifexists("IsCmdbOrphan", false)) == true, "IsCmdbOrphan", "")), ", ")
                | extend RiskFactor_Weight               = case(tostring(column_ifexists("cmdbCriticality","")) == "Critical", 2.0, tostring(column_ifexists("cmdbCriticality","")) == "High", 1.5, tostring(column_ifexists("cmdbCriticality","")) == "Medium", 1.2, tostring(column_ifexists("cmdbCriticality","")) == "Low", 1.05, 1.0)
                | extend Category = case(
                    isnotempty(tostring(column_ifexists("IdentityType", ""))), tostring(column_ifexists("IdentityType", "")),
                    isnotempty(tostring(column_ifexists("SecurityPrincipalType", ""))), tostring(column_ifexists("SecurityPrincipalType", "")),
                    isnotempty(tostring(column_ifexists("ObjectType", ""))), tostring(column_ifexists("ObjectType", "")),
                    "")
                | extend Subcategory = case(
                    isnotempty(tostring(column_ifexists("ServicePrincipalType", ""))), tostring(column_ifexists("ServicePrincipalType", "")),
                    isnotempty(tostring(column_ifexists("MiAccountType", ""))), tostring(column_ifexists("MiAccountType", "")),
                    isnotempty(tostring(column_ifexists("UserType", ""))), tostring(column_ifexists("UserType", "")),
                    isnotempty(tostring(column_ifexists("EmployeeType", ""))), tostring(column_ifexists("EmployeeType", "")),
                    isnotempty(tostring(column_ifexists("CreationType", ""))), tostring(column_ifexists("CreationType", "")),
                    "")
                // __SI_CANONICAL__
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
                | project SecurityDomain="Identity", Category, Subcategory=strcat(RiskFactorCount, " concurrent risk factors"),
                  ConfigurationName=DisplayName, ConfigurationId=coalesce(Upn,AppId),
                  Impact=strcat("Identity hits ", RiskFactorCount, " risk-factor flags simultaneously"), RiskFactorCount, MoreInfoUrl, Links, SecuritySeverity, CriticalityTier, CriticalityTierLevel, RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed, RiskFactor_Weight

        | sort by RiskFactor_Weight desc


    - ReportName: Identity_Departed_AccountStillEnabled_Summary
      ReportPurpose: >-
        Users whose EmployeeLeaveDateTime is in the past but the account is still enabled. HR off-boarding gap; common attack path. Summary emits one row per finding type (Category x Subcategory x ConfigurationName), with AssetCount/TotalIssues/ImpactedAssets aggregated -- suitable for dashboards and exec reporting.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        SI_Identity_Profile_CL
        | where TimeGenerated > ago(8d)
        | summarize arg_max(CollectionTime, *) by PrimaryEntityId
                | extend cmdbId               = tostring(column_ifexists('cmdbId', ''))
                | extend cmdbName             = tostring(column_ifexists('cmdbName', ''))
                | extend cmdbCriticality      = tostring(column_ifexists('cmdbCriticality', ''))
                | extend cmdbDataSensitivity  = tostring(column_ifexists('cmdbDataSensitivity', ''))
                | extend CmdbMatchPhase           = tostring(column_ifexists('CmdbMatchPhase', ''))
                | extend CmdbMatchState           = tostring(column_ifexists('CmdbMatchState', ''))
        | where IdentityType == "User"
        | where AccountEnabled == true
        | extend _leave = todatetime(EmployeeLeaveDateTime)
        | where isnotnull(_leave) and _leave < now()
        | extend DaysSinceLeave = datetime_diff('day', now(), _leave)
        | extend DeviceKey = coalesce(tostring(column_ifexists("AppId","")), tostring(column_ifexists("Upn","")), tostring(column_ifexists("DisplayName","")))
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
                | extend Impact                          = coalesce(toreal(column_ifexists("Impact", real(null))), case(tolower(tostring(column_ifexists("Impact", ""))) == "critical", 10.0, tolower(tostring(column_ifexists("Impact", ""))) == "very high", 10.0, tolower(tostring(column_ifexists("Impact", ""))) == "high", 8.0, tolower(tostring(column_ifexists("Impact", ""))) == "medium", 5.0, tolower(tostring(column_ifexists("Impact", ""))) == "moderate", 5.0, tolower(tostring(column_ifexists("Impact", ""))) == "low", 2.0, tolower(tostring(column_ifexists("Impact", ""))) == "informational", 1.0, tolower(tostring(column_ifexists("Impact", ""))) == "info", 1.0, real(null)))
                | extend SecuritySeverity                = case(toreal(Impact) >= 9, "Very High", toreal(Impact) >= 7, "High", toreal(Impact) >= 4, "Medium", toreal(Impact) >= 0.1, "Low", "Low")
                | extend CriticalityTier                 = toint(coalesce(column_ifexists("Tier", 999), 999))
                | extend CriticalityTierLevel            = case(toint(CriticalityTier) == 0, "Critical - tier 0", toint(CriticalityTier) == 1, "High - tier 1", toint(CriticalityTier) == 2, "Medium - tier 2", toint(CriticalityTier) == 3, "Low - tier 3", "Low - tier 3")
                | extend RiskFactor_Consequence          = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
                | extend RiskFactor_Probability          = toint(iff(tobool(column_ifexists("IsExternalIdentity", false)) == true, 1, 0)) + toint(iff(tobool(column_ifexists("IsCmdbOrphan", false)) == true, 1, 0))
                | extend RiskFactor_Probability_Detailed = strcat_array(pack_array(iff(tobool(column_ifexists("IsExternalIdentity", false)) == true, "IsExternalIdentity", ""), iff(tobool(column_ifexists("IsCmdbOrphan", false)) == true, "IsCmdbOrphan", "")), ", ")
                | extend RiskFactor_Probability_DetailedScore = strcat("IsExternalIdentity=", tostring(toint(iff(tobool(column_ifexists("IsExternalIdentity", false)) == true, 1, 0))), ";IsCmdbOrphan=", tostring(toint(iff(tobool(column_ifexists("IsCmdbOrphan", false)) == true, 1, 0))))
                | extend Category = case(
                    isnotempty(tostring(column_ifexists("IdentityType", ""))), tostring(column_ifexists("IdentityType", "")),
                    isnotempty(tostring(column_ifexists("SecurityPrincipalType", ""))), tostring(column_ifexists("SecurityPrincipalType", "")),
                    isnotempty(tostring(column_ifexists("ObjectType", ""))), tostring(column_ifexists("ObjectType", "")),
                    "")
                | extend Subcategory = case(
                    isnotempty(tostring(column_ifexists("ServicePrincipalType", ""))), tostring(column_ifexists("ServicePrincipalType", "")),
                    isnotempty(tostring(column_ifexists("MiAccountType", ""))), tostring(column_ifexists("MiAccountType", "")),
                    isnotempty(tostring(column_ifexists("UserType", ""))), tostring(column_ifexists("UserType", "")),
                    isnotempty(tostring(column_ifexists("EmployeeType", ""))), tostring(column_ifexists("EmployeeType", "")),
                    isnotempty(tostring(column_ifexists("CreationType", ""))), tostring(column_ifexists("CreationType", "")),
                    "")
        | extend SecurityDomain    = "Identity"
        | extend ConfigurationName = "Departed user account still enabled"
        | extend ConfigurationId   = "IDENTITY-OFFBOARD-001"
        | extend AssetName = coalesce(tostring(column_ifexists("DisplayName","")), tostring(column_ifexists("Upn","")), PrimaryEntityId)
        | summarize
            AssetCount             = dcount(PrimaryEntityId),
            TotalIssues            = count(),
            ImpactedAssets         = strcat_array(array_sort_asc(make_set(coalesce(DisplayName, column_ifexists("Upn", ""), AssetName, PrimaryEntityId))), ";"),
            RiskFactor_Consequence = max(RiskFactor_Consequence),
            arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            RiskFactor_Probability_DetailedScore = any(RiskFactor_Probability_DetailedScore),
            cmdbId = any(cmdbId),
            cmdbName = any(cmdbName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
             CriticalityTier, CriticalityTierLevel, SecuritySeverity, cmdbCriticality, cmdbDataSensitivity
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc, TotalIssues desc

