            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
          by DisplayName, Upn, PrimaryEntityId
        | extend CriticalityTier      = 0
        | extend CriticalityTierLevel = "Critical - tier 0"
        | extend SecuritySeverity = "Very High"
        | extend RF_P_NonTrusted      = iff(NonTrustedSignins > 0, 1, 0)
        | extend RF_P_MultipleSignins = iff(SigninCount > 1, 1, 0)
        | extend RiskFactor_Consequence = 3   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Probability = 1 + RF_P_NonTrusted + RF_P_MultipleSignins   // engine overrides this from RiskFactor_Probability_Detailed token count (or 0 if empty) -- schema scaffolding only
        | extend RiskFactor_Consequence_Detailed = "LastResortAccessLoss;EmergencyRecoveryCompromise;TenantTakeoverPotential"
        | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
            dynamic(["BreakGlassSignInDetected"]),
            iff(RF_P_NonTrusted      == 1, dynamic(["SignedInFromNonTrustedLocation"]),dynamic([])),
            iff(RF_P_MultipleSignins == 1, dynamic(["MultipleSignins"]),               dynamic([]))), ";")
        | extend RiskFactor_Probability_DetailedScore =
            strcat("BreakGlassSignInDetected=1;SignedInFromNonTrustedLocation=", tostring(RF_P_NonTrusted),
                   ";MultipleSignins=", tostring(RF_P_MultipleSignins))
        | extend SecurityDomain    = "Identity"
        | extend Category          = "Sign-in Behaviour"
        | extend Subcategory       = "Break-Glass Usage"
        | extend ConfigurationName = "Break-glass emergency account sign-in detected - immediate review required"
        | extend ConfigurationId   = "IDENTITY-SIGNIN-008"
        // CL identity-metadata enrichment (cmdb only). Detection logic above unchanged.
        | extend DeviceKey = PrimaryEntityId
        //__BUCKET_FILTER_BEGIN__
