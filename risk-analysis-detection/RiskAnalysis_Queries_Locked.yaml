      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
          // Excluded asset tags -- block-marker substituted by engine from RiskAnalysisGlobalExclusions.custom.json (or per-report .exclude.custom.json). MDE IsExcluded flag is also honored at the filter line below.
          //__EXCLUDED_ASSET_TAGS_BEGIN__
          let _excludedAssetTags = dynamic(["--Excluded--SI"]);
          //__EXCLUDED_ASSET_TAGS_END__
          SI_Endpoint_Profile_CL
          | where CollectionTime == toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime))
          | summarize arg_max(CollectionTime, *) by PrimaryEntityId
          | where tobool(column_ifexists("IsCompromisedRecently", false)) == true
          | extend CriticalityTier = toint(coalesce(Tier, 99))
          | where CriticalityTier <= 1
          | extend CriticalityTierLevel = case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1", "Low - tier 3")
          | extend SecuritySeverity = case(CriticalityTier == 0, "Very High", CriticalityTier == 1, "High", "Medium")
          | extend SecurityDomain    = "Endpoint"
          | extend Category          = "Active Threats"
          | extend Subcategory       = "Compromise Indicators"
          | extend ConfigurationName = "Asset shows recent compromise indicators (Microsoft Exposure Mgmt)"
          | extend ConfigurationId   = "ENDPOINT-ACTIVE-COMPROMISE-001"
          | extend AssetName         = coalesce(column_ifexists("AssetName", ""), column_ifexists("Hostname", ""), column_ifexists("PrimaryEntityId", ""))
          | extend AssetId           = coalesce(column_ifexists("AssetId", ""), column_ifexists("MdeDeviceId", ""), column_ifexists("PrimaryEntityId", ""))
          | extend AssetType         = coalesce(column_ifexists("AssetType", ""), "Endpoint")
          | extend MsCriticalityLevel = tostring(column_ifexists("MsCriticalityLevel", ""))
          | extend MachineRiskState   = tostring(column_ifexists("MachineRiskState", ""))
          | extend cmdbId             = tostring(column_ifexists("cmdbId", ""))
          | extend cmdbName           = tostring(column_ifexists("cmdbName", ""))
          | extend cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", ""))
          | extend cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", ""))
          // Drop assets matching engine-substituted _excludedAssetTags + MDE IsExcluded flag. AssetTags is a flat column on SI_Endpoint_Profile_CL (built in Build-EndpointProfileRow.ps1 from MachineTags+DeviceManualTags+DeviceDynamicTags). IsExcluded stays wrapped in column_ifexists since it's MDE-side and not always present after summarize.
          | where tobool(coalesce(column_ifexists("IsExcluded", false), false)) == false
          | extend _AssetTagsLower = tolower(coalesce(AssetTags, ""))
          | where not(_AssetTagsLower has_any (_excludedAssetTags))
          //__BUCKET_FILTER_BEGIN__
          | where 1 == 1
          //__BUCKET_FILTER_END__
          | summarize
              ImpactedAssetCount     = dcount(PrimaryEntityId),
              TotalIssues            = count(),
              ImpactedAssets         = strcat_array(array_sort_asc(make_set(AssetName)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
            by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
               CriticalityTier, CriticalityTierLevel, SecuritySeverity,
               cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity, MsCriticalityLevel, MachineRiskState
          //__WEIGHTED_FACTORS_BEGIN__
          | extend RiskScore_Weight_Detailed = ""
          | extend RiskScore_Weight_Factor   = 100
          | extend RiskFactor_Weight         = 100
          //__WEIGHTED_FACTORS_END__
          | order by RiskScore_Weight_Factor desc, CriticalityTier asc, TotalIssues desc

    - ReportName: Endpoint_ActiveCompromise_Detected_Detailed
      ReportPurpose: >
        Per-asset detail view of Tier 0/1 endpoints flagged by Microsoft Exposure Mgmt as recently compromised. One row per asset.
      SecurityDomain: Endpoint
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
          // Excluded asset tags -- block-marker substituted by engine from RiskAnalysisGlobalExclusions.custom.json (or per-report .exclude.custom.json). MDE IsExcluded flag is also honored at the filter line below.
          //__EXCLUDED_ASSET_TAGS_BEGIN__
          let _excludedAssetTags = dynamic(["--Excluded--SI"]);
          //__EXCLUDED_ASSET_TAGS_END__
          SI_Endpoint_Profile_CL
          | where CollectionTime == toscalar(SI_Endpoint_Profile_CL | summarize max(CollectionTime))
          | summarize arg_max(CollectionTime, *) by PrimaryEntityId
          | where tobool(column_ifexists("IsCompromisedRecently", false)) == true
          | extend CriticalityTier = toint(coalesce(Tier, 99))
          | where CriticalityTier <= 1
          | extend CriticalityTierLevel = case(CriticalityTier == 0, "Critical - tier 0", CriticalityTier == 1, "High - tier 1", "Low - tier 3")
          | extend SecuritySeverity = case(CriticalityTier == 0, "Very High", CriticalityTier == 1, "High", "Medium")
          | extend SecurityDomain    = "Endpoint"
          | extend Category          = "Active Threats"
          | extend Subcategory       = "Compromise Indicators"
          | extend ConfigurationName = "Asset shows recent compromise indicators (Microsoft Exposure Mgmt)"
          | extend ConfigurationId   = "ENDPOINT-ACTIVE-COMPROMISE-001"
          | extend AssetName         = coalesce(column_ifexists("AssetName", ""), column_ifexists("Hostname", ""), column_ifexists("PrimaryEntityId", ""))
          | extend AssetId           = coalesce(column_ifexists("AssetId", ""), column_ifexists("MdeDeviceId", ""), column_ifexists("PrimaryEntityId", ""))
          | extend AssetType         = coalesce(column_ifexists("AssetType", ""), "Endpoint")
          | extend MsCriticalityLevel       = tostring(column_ifexists("MsCriticalityLevel", ""))
          | extend MachineRiskState         = tostring(column_ifexists("MachineRiskState", ""))
          | extend HasInternetExposureSignal = tobool(column_ifexists("HasInternetExposureSignal", false))
          | extend IsProductionEnvironment   = tobool(column_ifexists("IsProductionEnvironment", false))
          | extend LastSeen                  = tostring(column_ifexists("LastSeen", ""))
          // Drop assets matching engine-substituted _excludedAssetTags + MDE IsExcluded flag. AssetTags is a flat column on SI_Endpoint_Profile_CL (built in Build-EndpointProfileRow.ps1 from MachineTags+DeviceManualTags+DeviceDynamicTags). IsExcluded stays wrapped in column_ifexists since it's MDE-side and not always present after summarize.
          | where tobool(coalesce(column_ifexists("IsExcluded", false), false)) == false
          | extend _AssetTagsLower = tolower(coalesce(AssetTags, ""))
          | where not(_AssetTagsLower has_any (_excludedAssetTags))
          //__BUCKET_FILTER_BEGIN__
          | where 1 == 1
          //__BUCKET_FILTER_END__
          //__WEIGHTED_FACTORS_BEGIN__
          | extend RiskScore_Weight_Detailed = ""
          | extend RiskScore_Weight_Factor   = 100
          | extend RiskFactor_Weight         = 100
          //__WEIGHTED_FACTORS_END__
          | order by RiskScore_Weight_Factor desc, CriticalityTier asc


    - ReportName: Identity_Departed_AccountStillEnabled_Detailed
      ReportPurpose: Users whose EmployeeLeaveDateTime is in the past but the account is still enabled. HR off-boarding gap; common attack path.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy: RiskScoreTotal
      ReportQuery:
      - |-
        SI_Identity_Profile_CL
        | where TimeGenerated > ago(8d)
        | summarize arg_max(CollectionTime, *) by PrimaryEntityId
                | extend cmdbId               = tostring(column_ifexists('cmdbId', ''))
                | extend cmdbName             = tostring(column_ifexists('cmdbName', ''))
                | extend cmdbCriticality      = tostring(column_ifexists('cmdbCriticality', ''))
                | extend cmdbDataSensitivity  = tostring(column_ifexists('cmdbDataSensitivity', ''))
                | extend CmdbMatchPhase           = tostring(column_ifexists('CmdbMatchPhase', ''))
                | extend CmdbMatchState           = tostring(column_ifexists('CmdbMatchState', ''))   // __SI_CMDB_DEFENSIVE__
        | where IdentityType == "User"
        | where AccountEnabled == true
        | extend _leave = todatetime(EmployeeLeaveDateTime)
        | where isnotnull(_leave) and _leave < now()
        | extend DaysSinceLeave = datetime_diff('day', now(), _leave)
        | extend MoreInfoUrl = strcat("https://entra.microsoft.com/#view/Microsoft_AAD_UsersAndTenants/UserProfileMenuBlade/~/overview/userId/", coalesce(EntityIds,Upn))
        | extend Links = dynamic_to_json(pack_array(
            pack("label", "User profile", "url", MoreInfoUrl),
            pack("label", "Sign-in logs", "url", strcat("https://entra.microsoft.com/#view/Microsoft_AAD_IAM/SigninLogsMenuBlade/userId/", coalesce(EntityIds,Upn)))))
        | extend DeviceKey = coalesce(tostring(column_ifexists("AppId","")), tostring(column_ifexists("Upn","")), tostring(column_ifexists("DisplayName","")))
                //__BUCKET_FILTER_BEGIN__
                | where 1 == 1
                //__BUCKET_FILTER_END__
                | extend Impact                          = coalesce(toreal(column_ifexists("Impact", real(null))), case(tolower(tostring(column_ifexists("Impact", ""))) == "critical", 10.0, tolower(tostring(column_ifexists("Impact", ""))) == "very high", 10.0, tolower(tostring(column_ifexists("Impact", ""))) == "high", 8.0, tolower(tostring(column_ifexists("Impact", ""))) == "medium", 5.0, tolower(tostring(column_ifexists("Impact", ""))) == "moderate", 5.0, tolower(tostring(column_ifexists("Impact", ""))) == "low", 2.0, tolower(tostring(column_ifexists("Impact", ""))) == "informational", 1.0, tolower(tostring(column_ifexists("Impact", ""))) == "info", 1.0, real(null)))
                | extend SecuritySeverity                = case(toreal(Impact) >= 9, "Very High", toreal(Impact) >= 7, "High", toreal(Impact) >= 4, "Medium", toreal(Impact) >= 0.1, "Low", "Low")
                | extend CriticalityTier                 = toint(coalesce(column_ifexists("Tier", 999), 999))
                | extend CriticalityTierLevel            = case(toint(CriticalityTier) == 0, "Critical - tier 0", toint(CriticalityTier) == 1, "High - tier 1", toint(CriticalityTier) == 2, "Medium - tier 2", toint(CriticalityTier) == 3, "Low - tier 3", "Low - tier 3")
                | extend RiskFactor_Consequence          = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
                | extend RiskFactor_Probability          = toint(iff(tobool(column_ifexists("IsExternalIdentity", false)) == true, 1, 0)) + toint(iff(tobool(column_ifexists("IsCmdbOrphan", false)) == true, 1, 0))
                | extend RiskFactor_Probability_Detailed = strcat_array(pack_array(iff(tobool(column_ifexists("IsExternalIdentity", false)) == true, "IsExternalIdentity", ""), iff(tobool(column_ifexists("IsCmdbOrphan", false)) == true, "IsCmdbOrphan", "")), ", ")
                | extend RiskFactor_Weight               = case(tostring(column_ifexists("cmdbCriticality","")) == "Critical", 2.0, tostring(column_ifexists("cmdbCriticality","")) == "High", 1.5, tostring(column_ifexists("cmdbCriticality","")) == "Medium", 1.2, tostring(column_ifexists("cmdbCriticality","")) == "Low", 1.05, 1.0)
                | extend Category = case(
                    isnotempty(tostring(column_ifexists("IdentityType", ""))), tostring(column_ifexists("IdentityType", "")),
                    isnotempty(tostring(column_ifexists("SecurityPrincipalType", ""))), tostring(column_ifexists("SecurityPrincipalType", "")),
                    isnotempty(tostring(column_ifexists("ObjectType", ""))), tostring(column_ifexists("ObjectType", "")),
                    "")
                | extend Subcategory = case(
                    isnotempty(tostring(column_ifexists("ServicePrincipalType", ""))), tostring(column_ifexists("ServicePrincipalType", "")),
                    isnotempty(tostring(column_ifexists("MiAccountType", ""))), tostring(column_ifexists("MiAccountType", "")),
                    isnotempty(tostring(column_ifexists("UserType", ""))), tostring(column_ifexists("UserType", "")),
                    isnotempty(tostring(column_ifexists("EmployeeType", ""))), tostring(column_ifexists("EmployeeType", "")),
                    isnotempty(tostring(column_ifexists("CreationType", ""))), tostring(column_ifexists("CreationType", "")),
                    "")
                // __SI_CANONICAL__
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = ""
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
                | project SecurityDomain="Identity", Category, Subcategory,
                  ConfigurationName=DisplayName, ConfigurationId=Upn,
                  Impact=strcat("User departed ", DaysSinceLeave, " days ago, account still enabled"),
                  EmployeeLeaveDateTime=_leave, DaysSinceLeave, MoreInfoUrl, Links, SecuritySeverity, CriticalityTier, CriticalityTierLevel, RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed, RiskFactor_Weight

        | sort by RiskFactor_Weight desc

