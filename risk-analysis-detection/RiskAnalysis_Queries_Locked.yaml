    - ReportName: Endpoint_ActiveCompromise_Detected_Summary
      ReportPurpose: >
        Tier 0/1 endpoints where Microsoft Exposure Mgmt has flagged recent compromise indicators (NodeProperties.rawData.isCompromisedRecently). New v2.2 lens enabled by EG-derived IsCompromisedRecently signal (MS-computed). Aggregated per (Tier x Severity x cmdb*) bucket; lists carry impacted-asset detail.
