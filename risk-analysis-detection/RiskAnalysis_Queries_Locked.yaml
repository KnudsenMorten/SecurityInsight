                  cmdbId,
                  cmdbName,
                  cmdbCriticality,
                  cmdbDataSensitivity,
                  RiskScore_Weight_Detailed,
                  RiskScore_Weight_Factor
        | order by RiskScore_Weight_Factor desc, CriticalityTier asc, RiskFactor_Probability desc

