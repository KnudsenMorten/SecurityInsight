Reports:
    - ReportName: Device_Missing_CVEs_Summary
      ReportPurpose: This report highlights overdue endpoint CVEs older than 40 days, excluding out-of-scope assets, and prioritizes
        them using asset criticality, tag-based tiering, and exploit and exposure risk factors to focus remediation on the most
        critical and likely exploitable vulnerabilities.
      SecurityDomain: Endpoint
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
          // CVE MIN-age filter (only show CVEs older than _cveMinAgeDays). Engine
          // substitutes _cveMinAgeDays from per-report exclude.custom.json
          // (CveMinAgeDays). 0 = no age filter (default; show all).
          // The keep-set explicitly includes isnull(CVELastModified) -- DELIBERATE:
          // don't drop a CVE just because the lastModifiedDate metadata is missing
          // from EG. Those rows might still be live exploit-paths.
          //__CVE_MIN_AGE_DAYS_BEGIN__
          let _cveMinAgeDays = 0;
          //__CVE_MIN_AGE_DAYS_END__
          // Excluded asset tags -- block-marker substituted by engine from RiskAnalysisGlobalExclusions.custom.json (or per-report .exclude.custom.json). MDE IsExcluded flag is also honored at the filter line below.
          //__EXCLUDED_ASSET_TAGS_BEGIN__
          let _excludedAssetTags = dynamic(["--Excluded--SI"]);
          //__EXCLUDED_ASSET_TAGS_END__
          // Report   Device_Missing_CVEs_Summary
          // Purpose  Overdue endpoint CVEs prioritised by criticality + exploit + exposure.
          // Output   One row per (Tier x Severity) bucket; lists carry detail.

          // Step 0  CL profile snapshot. Pulls Tier, UnsupportedOSDetected, IsExcludedByTag,
          // and the 4 flat CMDB columns. SINGLE SOURCE OF TRUTH for cmdb data
          //   * cmdbId    -- set by the asset-profiler rule's `set: cmdbId: N`
          //                  (rule decides "this asset belongs to CMDB id N").
          //   * cmdbName / cmdbCriticality / cmdbDataSensitivity -- looked up from
          //                  the CSV row matched by cmdbId. Stage Reconcile + Build-
          //                  *ProfileRow surface them as FLAT top-level columns
          //                  (in addition to canonical Properties.collect.cmdb.*).
          //                  The detection rule does NOT set these -- the CSV owns them.
          let _ep =
              SI_Endpoint_Profile_CL
              | where TimeGenerated > ago(8d)
              | summarize arg_max(CollectionTime, *) by PrimaryEntityId
              // v2.2.217 (revised) -- second dedup on a stable EpJoinKey: prefer the
              // AAD device GUID, fall back to AssetName for devices without an
              // AadDeviceId in CL (servers, Linux hosts, IoT, hashed identifiers),
              // final fallback to PrimaryEntityId. Without this the leftouter join
              // below (downstream, joined on EpJoinKey) would (a) cartesian-explode
              // on empty-AadDeviceId rows -- the original memory-exceeded bug -- and
              // (b) drop CL enrichment for every server / Linux / IoT device.
              // v2.2.221 -- AadDeviceId access wrapped in column_ifexists. v2.2.217's
              // bare tostring(AadDeviceId) failed semantic resolution on profile
              // tables that don't carry the column (e.g. SI_Azure_Profile_CL --
              // Azure resources have no AAD device id). With the wrapper, those
              // tables fall through to AssetName -> PrimaryEntityId without erroring.
              | extend EpJoinKey = case(
                  isnotempty(tostring(column_ifexists("AadDeviceId",""))), tostring(column_ifexists("AadDeviceId","")),
                  isnotempty(tostring(column_ifexists("AssetName",""))),   tostring(column_ifexists("AssetName","")),
                  tostring(PrimaryEntityId)
              )
              | where isnotempty(EpJoinKey)
              | summarize arg_max(CollectionTime, *) by EpJoinKey
              // v2.2.221 -- AadDeviceId access wrapped in column_ifexists. v2.2.217's
              // bare tostring(AadDeviceId) in project step failed semantic resolution
              // on profile tables that don't carry the column (SI_Azure_Profile_CL).
              | project
                  EpJoinKey,
                  AadDeviceId            = tostring(column_ifexists("AadDeviceId", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", "")),
                  Tier_From_SI_CL        = toint(column_ifexists("Tier", int(null))),
                  UnsupportedOSDetected  = tobool(column_ifexists("UnsupportedOSDetected", false)),
                  IsExcludedByTag        = tobool(column_ifexists("IsExcludedByTag", false)),
                  cmdbId                 = tostring(column_ifexists("cmdbId", "")),
                  cmdbName               = tostring(column_ifexists("cmdbName", "")),
                  cmdbCriticality        = tostring(column_ifexists("cmdbCriticality", "")),
                  cmdbDataSensitivity    = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetTags              = tostring(column_ifexists("AssetTags", ""));

          // Step 0c  Excluded CVEs -- block-marker substituted by engine from the per-report exclude.custom.json.
          //__EXCLUDED_CVES_BEGIN__
          let _excludedCves = dynamic([]);
          //__EXCLUDED_CVES_END__

          let _Assets =
              ExposureGraphNodes
              | where tostring(NodeProperties.rawData.deviceCategory) == "Endpoint"
              | extend EG_IsCustomerFacing = tobool(coalesce(NodeProperties.rawData.isCustomerFacing, NodeProperties.raw.isCustomerFacing))
              | extend EG_IsExcluded       = tobool(coalesce(NodeProperties.rawData.isExcluded,       NodeProperties.raw.isExcluded))
              | where EG_IsExcluded == false
              | extend AadDeviceId = tostring(coalesce(NodeProperties.rawData.aadDeviceId, NodeProperties.raw.aadDeviceId, NodeProperties.aadDeviceId))
              | project
                  AssetNodeId = NodeId,
                  AssetName   = NodeName,
                  AssetLabel  = NodeLabel,
                  AadDeviceId,
                  EG_IsCustomerFacing,
                  EG_IsExcluded;

          // v2.2.212 -- restored v2.2.207's 3-let architecture (materialize() of
          // filtered edges + _RelevantFindingIds + separate _Findings). The
          // v2.2.210 collapse to a single chained join broke things on FVF
          // (AutoBucket preempting at all bucket counts up to 1024). The 3-let
          // shape -- which previously converged at 8 buckets -- is restored.
          // Scalar extraction from NodeProperties.rawData (v2.2.210) is KEPT
          // because it's a per-row win independent of the join shape.
          let _AssetNodeIdSet = _Assets | distinct AssetNodeId;
          let _OurAffectingEdges = materialize(
              ExposureGraphEdges
              | where EdgeLabel has "affecting"
              | where TargetNodeId in (_AssetNodeIdSet)
          );
          let _RelevantFindingIds = _OurAffectingEdges | distinct SourceNodeId;
          let _Findings =
              ExposureGraphNodes
              | where NodeLabel startswith "cve"
              | where Categories has_any ("vulnerability_finding")
              | where NodeId in (_RelevantFindingIds)
              //__CVE_FILTER_BEGIN__
              | where 1 == 1
              //__CVE_FILTER_END__
              | project FindingNodeId            = NodeId,
                        FindingName              = NodeName,
                        FindingLabel             = NodeLabel,
                        FindingCategories        = Categories,
                        FindingSeverity          = tostring(NodeProperties.rawData.severity),
                        FindingCvssScore         = todouble(NodeProperties.rawData.cvssScore),
                        FindingHasExploit        = tobool(NodeProperties.rawData.hasExploit),
                        FindingIsExploitVerified = tobool(NodeProperties.rawData.isExploitVerified),
                        FindingIsInExploitKit    = tobool(NodeProperties.rawData.isInExploitKit),
                        FindingIsZeroDay         = tobool(NodeProperties.rawData.isZeroDay),
                        CVELastModified          = todatetime(NodeProperties.rawData.lastModifiedDate),
                        FindingDescription       = tostring(NodeProperties.rawData.description),
                        FindingReferenceUrl      = tostring(coalesce(NodeProperties.rawData.referenceUrl, NodeProperties.rawData.url));

          // v2.2.215 -- pre-collapse multi-NodeId fanout BEFORE the second join.
          // ExposureGraph assigns the same logical device multiple NodeIds (FVF
          // had a 434-NodeId outlier). Each NodeId has its own affecting-edges
          // to the same CVE, and the v2.2.214 by-clause collapse only fired
          // POST-bucket-filter -- so each bucket still saw the full multi-NodeId
          // fanout (552K+ pre-summarize rows). Pre-collapsing here at the edge
          // level keeps the bucket filter and everything downstream operating on
          // ~115K rows total.
          let _DeviceMap =
              _Assets
              | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, AssetName)
              // v2.2.216 -- EG_IsExcluded dropped from the carry. Already filtered
              // to false in _Assets above; no row downstream has IsExcluded == true,
              // and no extend or filter reads it after the post-bucket summarize was
              // removed in v2.2.216.
              | project AssetNodeId, DeviceKey, AssetName, AssetLabel, AadDeviceId,
                        EG_IsCustomerFacing;

          let _DeviceFindingEdges =
              _OurAffectingEdges
              | join kind=inner (_DeviceMap) on $left.TargetNodeId == $right.AssetNodeId
              | summarize
                  EdgeLabels          = make_set(EdgeLabel),
                  AssetName           = any(AssetName),
                  AssetLabel          = any(AssetLabel),
                  AadDeviceId         = any(AadDeviceId),
                  EG_IsCustomerFacing = any(EG_IsCustomerFacing)
                  by DeviceKey, SourceNodeId;

          let _AssetFindingEdges =
              _DeviceFindingEdges
              | join kind=inner (_Findings) on $left.SourceNodeId == $right.FindingNodeId
              | project DeviceKey, AssetName, AssetLabel, AadDeviceId,
                        EG_IsCustomerFacing, EdgeLabels,
                        FindingName, FindingLabel, FindingCategories,
                        FindingSeverity, FindingCvssScore,
                        FindingHasExploit, FindingIsExploitVerified, FindingIsInExploitKit, FindingIsZeroDay,
                        CVELastModified, FindingDescription, FindingReferenceUrl;

          _AssetFindingEdges
              // v2.2.215 -- DeviceKey is now sourced upstream in _DeviceMap, no need
              // to recompute it here.
              // Drop assets matching engine-substituted _excludedAssetTags + MDE IsExcluded flag. AssetTags is a flat column (built in Build-EndpointProfileRow.ps1 from MachineTags+DeviceManualTags+DeviceDynamicTags); kept inside column_ifexists here because this filter runs over a join shape that may not always carry the column. IsExcluded is MDE-side and not on every join arm.
              | where tobool(coalesce(column_ifexists("IsExcluded", false), false)) == false
              // v2.2.219 -- AssetTags filter MOVED to after the leftouter _ep join
              // (further down). At this point AssetTags doesn't exist on
              // _AssetFindingEdges (it's CL-sourced, only joined in via _ep below)
              // so the previous column_ifexists("AssetTags","") resolved to "" for
              // every row, making `has_any (_excludedAssetTags)` always false and
              // the exclusion filter a silent no-op. Operators with the global
              // RiskAnalysisGlobalExclusions.custom.json populated would still see
              // tagged devices in output -- bug since v2.2.x introduced the _ep
              // join pattern. CVELastModified age filter stays here (CVELastModified
              // is a typed scalar already on _AssetFindingEdges, no join needed).
              | where (_cveMinAgeDays == 0) or (isnull(CVELastModified)) or (CVELastModified < ago(_cveMinAgeDays * 1d))
              //__BUCKET_FILTER_BEGIN__
              | where 1 == 1
              //__BUCKET_FILTER_END__
              // v2.2.217 -- post-bucket summarize removed (parity fix for Summary;
              // v2.2.216 only applied to Detailed because the comment context differed
              // and the replace_all didn't match here). _AssetFindingEdges is already
              // 1 row per (DeviceKey, FindingName) from v2.2.215's edge-level
              // pre-collapse, so the summarize was a 1:1 no-op that (a) silently
              // discarded the EdgeLabels set via take_any if multiplicity ever broke,
              // (b) carried EG_IsExcluded for no consumer (already filtered to false
              // in _Assets), and (c) emitted empty strings for column_ifexists on
              // IDs (MdeDeviceId / EntraAccountObjectId / Azure*) that don't exist
              // pre-_ep-join. Bucket filter still partitions per-row above; downstream
              // extends operate per-row below.
              // Bring in CL fields (Tier + UnsupportedOSDetected + IsExcludedByTag + cmdbCriticality)
              // v2.2.217 -- join on EpJoinKey (DeviceKey on this side; EpJoinKey on
              // _ep side, both = AadDeviceId-or-AssetName-or-PrimaryEntityId). Lets
              // servers / Linux / IoT (no AadDeviceId in EG) still pick up CL
              // enrichment via AssetName matching against the CL profile row.
              | join kind=leftouter _ep on $left.DeviceKey == $right.EpJoinKey
              | project-away AadDeviceId1, EpJoinKey
              // v2.2.219 -- AssetTags exclusion filter, MOVED from pre-bucket-filter
              // to here (post-leftouter). AssetTags is a flat string column on _ep
              // (built in Build-EndpointProfileRow.ps1 from MachineTags +
               // DeviceManualTags + DeviceDynamicTags joined with ";") and is only
               // available after the leftouter join above. Pre-leftouter, the column
               // didn't exist on _AssetFindingEdges so the filter never matched.
               // No column_ifexists wrapper here -- _ep always projects AssetTags
               // (defaults to "" when absent on the underlying CL row), so the
               // column is guaranteed present even for rows that don't match _ep.
              | extend _AssetTagsLower = tolower(coalesce(AssetTags, ""))
              | where array_length(_excludedAssetTags) == 0
                   or not(_AssetTagsLower has_any (_excludedAssetTags))
              // v2.2.208 -- dropped dead coalesce sources. SourceAssets_Path /
              // TargetAssets_Path / ImpactedAssets were copy-pasted from an
              // Attack_Paths report and never exist on this CVE shape.
              // v2.2.216 -- empty-string-safe coalesce. KQL's coalesce() treats
              // "" as a real value, so coalesce(column_ifexists("X",""), ...) returns
              // "" silently when X is empty. Use iff(isnotempty()) for the first
              // candidate, then plain coalesce for the rest (the _From_CL columns
              // are real columns post-leftouter-join; no column_ifexists needed).
              // v2.2.220 -- column_ifexists wrappers restored. v2.2.216 stripped them
              // for empty-string-safety using bare column references, but bare refs
              // FAIL with "Failed to resolve scalar expression" when the column
              // doesn't exist on the upstream shape. The CVE_* reports always
              // project AssetName/AssetType/AssetLabel through _DeviceMap so they
              // worked, but Device_Recommendations_* reports key on DI_DeviceName /
              // DI_AadDeviceId (DeviceInfo-sourced) and don't carry those columns
              // -- they regressed at runtime. case() keeps the empty-string-safe
              // semantics (column_ifexists returning "" doesn't short-circuit
              // coalesce); column_ifexists keeps the column-missing safety.
              | extend AssetName = case(
                  isnotempty(tostring(column_ifexists("AssetName",""))),         tostring(column_ifexists("AssetName","")),
                  isnotempty(tostring(column_ifexists("AssetName_From_CL",""))), tostring(column_ifexists("AssetName_From_CL","")),
                  tostring(column_ifexists("AadDeviceId","")))
              | extend AssetId = case(
                  isnotempty(tostring(column_ifexists("AssetId",""))),           tostring(column_ifexists("AssetId","")),
                  isnotempty(tostring(column_ifexists("AssetId_From_CL",""))),   tostring(column_ifexists("AssetId_From_CL","")),
                  tostring(column_ifexists("AadDeviceId","")))
              | extend AssetType = case(
                  isnotempty(tostring(column_ifexists("AssetType",""))),         tostring(column_ifexists("AssetType","")),
                  isnotempty(tostring(column_ifexists("AssetType_From_CL",""))), tostring(column_ifexists("AssetType_From_CL","")),
                  isnotempty(tostring(column_ifexists("AssetLabel",""))),        tostring(column_ifexists("AssetLabel","")),
                  "Endpoint")
              | where tobool(coalesce(column_ifexists("IsExcludedByTag", false), false)) == false
              // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.endpoint.fields[].
              // Portal-paste default below emits a readable Detailed text + Factor=1.0 so you see real per-row signals without engine substitution.
              //__WEIGHTED_FACTORS_BEGIN__
              | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
              | extend RiskScore_Weight_Factor   = 100   // basis-100, 100 = 1.0x = no lift
              | extend RiskFactor_Weight         = 100
              //__WEIGHTED_FACTORS_END__
              // v2.2.210 -- Properties bag eliminated. All Properties.x.y.z reads
              // below replaced with the scalar columns extracted up-front in
              // _Findings (Finding{Severity,CvssScore,HasExploit,IsExploitVerified,
              // IsInExploitKit,IsZeroDay,Description,ReferenceUrl}). Per-row
              // bag_merge + ~10 dynamic-property lookups -> ~10 typed column reads.
              | extend Impact = FindingCvssScore
              | extend SecuritySeverity = case(
                  tolower(FindingSeverity) == "critical", "Very High",
                  tolower(FindingSeverity) == "high",     "High",
                  tolower(FindingSeverity) == "medium",   "Medium",
                  tolower(FindingSeverity) == "low",      "Low",
                  "Low")
              // v2.2.216 -- dropped `where FindingLabel contains "CVE"`. _Findings
              // already filters NodeLabel startswith "cve" + Categories has_any
              // ("vulnerability_finding"), so every row entering this stage matches.
              | where not (FindingName in (_excludedCves))
              | extend HasExploit        = FindingHasExploit
              | extend IsExploitVerified = FindingIsExploitVerified
              | extend IsInExploitKit    = FindingIsInExploitKit
              | extend IsZeroDay         = FindingIsZeroDay
              | extend CveUrl = iif(isempty(FindingReferenceUrl), strcat("https://nvd.nist.gov/vuln/detail/", FindingName), FindingReferenceUrl)
              | extend RF_P_ExploitSignals  = iff(HasExploit == true or IsExploitVerified == true or IsInExploitKit == true or IsZeroDay == true, 1, 0)
              | extend RF_P_InternetExposed = iff(EG_IsCustomerFacing == true, 1, 0)
              | extend RF_P_LegacyEoS       = iff(UnsupportedOSDetected == true, 1, 0)
              | extend RF_C_RemoteCodeExec  = iff(HasExploit == true or IsExploitVerified == true or IsInExploitKit == true, 1, 0)
              | extend RiskFactor_Probability = RF_P_ExploitSignals + RF_P_InternetExposed + RF_P_LegacyEoS
              | extend RiskFactor_Consequence = RF_C_RemoteCodeExec
              | extend RiskFactor_Consequence_Detailed = strcat_array(array_concat(
                  iff(RF_C_RemoteCodeExec == 1, dynamic(["RemoteCodeExecutionRisk"]), dynamic([]))), ";")
              | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
                  iff(RF_P_ExploitSignals  == 1, dynamic(["ExploitSignals"]),     dynamic([])),
                  iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]),   dynamic([])),
                  iff(RF_P_LegacyEoS       == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))), ";")
              | extend CriticalityTier = Tier_From_SI_CL
              | extend CriticalityTierLevel = case(
                  CriticalityTier == 0, "Critical - tier 0",
                  CriticalityTier == 1, "High - tier 1",
                  CriticalityTier == 2, "Medium - tier 2",
                  CriticalityTier == 3, "Low - tier 3",
                  "Low - tier 3")
              | extend SecurityDomain    = "Endpoint"
              | extend ConfigurationName = "Update vulnerable software"
              | extend ConfigurationId   = "CVE"
              | extend Category          = "Vulnerabilities"
              | extend Subcategory       = "CVEs (Missing Updates)"
              | summarize
                  ImpactedAssetCount        = dcount(DeviceKey),
                  UniqueIssues              = dcount(FindingName),
                  TotalIssuesImpactedAssets = count(),
                  ImpactedAssetsList        = make_set(AssetName),
                  IssueList                 = make_set(FindingName),
                  MoreDetails      = strcat_array(make_set(strcat(FindingName, " => ", CveUrl)), "; "),
                  RiskFactor_Consequence    = max(RiskFactor_Consequence),
                  RiskScore_Weight_Factor   = max(RiskScore_Weight_Factor),
                  RiskFactor_Weight         = max(RiskFactor_Weight),
                  RiskScore_Weight_Detailed = any(RiskScore_Weight_Detailed),
                  Impact                    = max(Impact),
                  arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
                by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                   CriticalityTier, CriticalityTierLevel, SecuritySeverity,
                   cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
              | project
                  SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  Impact, SecuritySeverity,
                  CriticalityTier, CriticalityTierLevel,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality, cmdbDataSensitivity,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed,
                  RiskScore_Weight_Detailed, RiskScore_Weight_Factor, RiskFactor_Weight,
                  ImpactedAssetCount, ImpactedAssetsList, UniqueIssues, TotalIssuesImpactedAssets,
                  IssueList, MoreDetails
              | order by CriticalityTier asc, RiskScore_Weight_Factor desc, ImpactedAssetCount desc, TotalIssuesImpactedAssets desc

    - ReportName: Device_Missing_CVEs_Detailed
      ReportPurpose: Per-row detail of overdue endpoint CVEs, prioritised by asset criticality, exploit signals, and exposure.
        Same CL-correlation pattern as the Summary, but emits one row per (Asset x CVE) with full per-CVE context.
      SecurityDomain: Endpoint
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
          // CVE MIN-age filter (only show CVEs older than _cveMinAgeDays). Engine
          // substitutes _cveMinAgeDays from per-report exclude.custom.json
          // (CveMinAgeDays). 0 = no age filter (default; show all).
          // The keep-set explicitly includes isnull(CVELastModified) -- DELIBERATE:
          // don't drop a CVE just because the lastModifiedDate metadata is missing
          // from EG. Those rows might still be live exploit-paths.
          //__CVE_MIN_AGE_DAYS_BEGIN__
          let _cveMinAgeDays = 0;
          //__CVE_MIN_AGE_DAYS_END__
          // Excluded asset tags -- block-marker substituted by engine from RiskAnalysisGlobalExclusions.custom.json (or per-report .exclude.custom.json). MDE IsExcluded flag is also honored at the filter line below.
          //__EXCLUDED_ASSET_TAGS_BEGIN__
          let _excludedAssetTags = dynamic(["--Excluded--SI"]);
          //__EXCLUDED_ASSET_TAGS_END__
          // Report   Device_Missing_CVEs_Detailed
          // Purpose  Per-row detail of overdue endpoint CVEs prioritised by criticality + exploit + exposure.
          // Output   One row per (Asset x CVE), with full per-CVE context (CVE id, URL, exploit flags, CVSS desc, last-modified date).
          // Mirrors  Device_Missing_CVEs_Summary's CL-correlation pattern; differs only in skipping the final summarize and emitting per-row columns.

          // Step 0  CL profile snapshot. Pulls Tier, UnsupportedOSDetected, IsExcludedByTag,
          // and the 4 flat CMDB columns. SINGLE SOURCE OF TRUTH for cmdb data
          //   * cmdbId    -- set by the asset-profiler rule's `set: cmdbId: N`
          //                  (rule decides "this asset belongs to CMDB id N").
          //   * cmdbName / cmdbCriticality / cmdbDataSensitivity -- looked up from
          //                  the CSV row matched by cmdbId. Stage Reconcile + Build-
          //                  *ProfileRow surface them as FLAT top-level columns
          //                  (in addition to canonical Properties.collect.cmdb.*).
          //                  The detection rule does NOT set these -- the CSV owns them.
          let _ep =
              SI_Endpoint_Profile_CL
              | where TimeGenerated > ago(8d)
              | summarize arg_max(CollectionTime, *) by PrimaryEntityId
              // v2.2.217 (revised) -- second dedup on a stable EpJoinKey: prefer the
              // AAD device GUID, fall back to AssetName for devices without an
              // AadDeviceId in CL (servers, Linux hosts, IoT, hashed identifiers),
              // final fallback to PrimaryEntityId. Without this the leftouter join
              // below (downstream, joined on EpJoinKey) would (a) cartesian-explode
              // on empty-AadDeviceId rows -- the original memory-exceeded bug -- and
              // (b) drop CL enrichment for every server / Linux / IoT device.
              // v2.2.221 -- AadDeviceId access wrapped in column_ifexists. v2.2.217's
              // bare tostring(AadDeviceId) failed semantic resolution on profile
              // tables that don't carry the column (e.g. SI_Azure_Profile_CL --
              // Azure resources have no AAD device id). With the wrapper, those
              // tables fall through to AssetName -> PrimaryEntityId without erroring.
              | extend EpJoinKey = case(
                  isnotempty(tostring(column_ifexists("AadDeviceId",""))), tostring(column_ifexists("AadDeviceId","")),
                  isnotempty(tostring(column_ifexists("AssetName",""))),   tostring(column_ifexists("AssetName","")),
                  tostring(PrimaryEntityId)
              )
              | where isnotempty(EpJoinKey)
              | summarize arg_max(CollectionTime, *) by EpJoinKey
              // v2.2.221 -- AadDeviceId access wrapped in column_ifexists. v2.2.217's
              // bare tostring(AadDeviceId) in project step failed semantic resolution
              // on profile tables that don't carry the column (SI_Azure_Profile_CL).
              | project
                  EpJoinKey,
                  AadDeviceId            = tostring(column_ifexists("AadDeviceId", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", "")),
                  Tier_From_SI_CL        = toint(column_ifexists("Tier", int(null))),
                  UnsupportedOSDetected  = tobool(column_ifexists("UnsupportedOSDetected", false)),
                  IsExcludedByTag        = tobool(column_ifexists("IsExcludedByTag", false)),
                  cmdbId                 = tostring(column_ifexists("cmdbId", "")),
                  cmdbName               = tostring(column_ifexists("cmdbName", "")),
                  cmdbCriticality        = tostring(column_ifexists("cmdbCriticality", "")),
                  cmdbDataSensitivity    = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetTags              = tostring(column_ifexists("AssetTags", ""));

          // Step 0c  Excluded CVEs -- block-marker substituted by engine from the per-report exclude.custom.json.
          //__EXCLUDED_CVES_BEGIN__
          let _excludedCves = dynamic([]);
          //__EXCLUDED_CVES_END__

          let _Assets =
              ExposureGraphNodes
              | where tostring(NodeProperties.rawData.deviceCategory) == "Endpoint"
              | extend EG_IsCustomerFacing = tobool(coalesce(NodeProperties.rawData.isCustomerFacing, NodeProperties.raw.isCustomerFacing))
              | extend EG_IsExcluded       = tobool(coalesce(NodeProperties.rawData.isExcluded,       NodeProperties.raw.isExcluded))
              | where EG_IsExcluded == false
              | extend AadDeviceId = tostring(coalesce(NodeProperties.rawData.aadDeviceId, NodeProperties.raw.aadDeviceId, NodeProperties.aadDeviceId))
              | project
                  AssetNodeId = NodeId,
                  AssetName   = NodeName,
                  AssetLabel  = NodeLabel,
                  AadDeviceId,
                  EG_IsCustomerFacing,
                  EG_IsExcluded;

          // v2.2.212 -- restored v2.2.207's 3-let architecture (materialize() of
          // filtered edges + _RelevantFindingIds + separate _Findings). The
          // v2.2.210 collapse to a single chained join broke things on FVF
          // (AutoBucket preempting at all bucket counts up to 1024). The 3-let
          // shape -- which previously converged at 8 buckets -- is restored.
          // Scalar extraction from NodeProperties.rawData (v2.2.210) is KEPT
          // because it's a per-row win independent of the join shape.
          let _AssetNodeIdSet = _Assets | distinct AssetNodeId;
          let _OurAffectingEdges = materialize(
              ExposureGraphEdges
              | where EdgeLabel has "affecting"
              | where TargetNodeId in (_AssetNodeIdSet)
          );
          let _RelevantFindingIds = _OurAffectingEdges | distinct SourceNodeId;
          let _Findings =
              ExposureGraphNodes
              | where NodeLabel startswith "cve"
              | where Categories has_any ("vulnerability_finding")
              | where NodeId in (_RelevantFindingIds)
              //__CVE_FILTER_BEGIN__
              | where 1 == 1
              //__CVE_FILTER_END__
              | project FindingNodeId            = NodeId,
                        FindingName              = NodeName,
                        FindingLabel             = NodeLabel,
                        FindingCategories        = Categories,
                        FindingSeverity          = tostring(NodeProperties.rawData.severity),
                        FindingCvssScore         = todouble(NodeProperties.rawData.cvssScore),
                        FindingHasExploit        = tobool(NodeProperties.rawData.hasExploit),
                        FindingIsExploitVerified = tobool(NodeProperties.rawData.isExploitVerified),
                        FindingIsInExploitKit    = tobool(NodeProperties.rawData.isInExploitKit),
                        FindingIsZeroDay         = tobool(NodeProperties.rawData.isZeroDay),
                        CVELastModified          = todatetime(NodeProperties.rawData.lastModifiedDate),
                        FindingDescription       = tostring(NodeProperties.rawData.description),
                        FindingReferenceUrl      = tostring(coalesce(NodeProperties.rawData.referenceUrl, NodeProperties.rawData.url));

          // v2.2.215 -- pre-collapse multi-NodeId fanout BEFORE the second join.
          // ExposureGraph assigns the same logical device multiple NodeIds (FVF
          // had a 434-NodeId outlier). Each NodeId has its own affecting-edges
          // to the same CVE, and the v2.2.214 by-clause collapse only fired
          // POST-bucket-filter -- so each bucket still saw the full multi-NodeId
          // fanout (552K+ pre-summarize rows). Pre-collapsing here at the edge
          // level keeps the bucket filter and everything downstream operating on
          // ~115K rows total.
          let _DeviceMap =
              _Assets
              | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, AssetName)
              // v2.2.216 -- EG_IsExcluded dropped from the carry. Already filtered
              // to false in _Assets above; no row downstream has IsExcluded == true,
              // and no extend or filter reads it after the post-bucket summarize was
              // removed in v2.2.216.
              | project AssetNodeId, DeviceKey, AssetName, AssetLabel, AadDeviceId,
                        EG_IsCustomerFacing;

          let _DeviceFindingEdges =
              _OurAffectingEdges
              | join kind=inner (_DeviceMap) on $left.TargetNodeId == $right.AssetNodeId
              | summarize
                  EdgeLabels          = make_set(EdgeLabel),
                  AssetName           = any(AssetName),
                  AssetLabel          = any(AssetLabel),
                  AadDeviceId         = any(AadDeviceId),
                  EG_IsCustomerFacing = any(EG_IsCustomerFacing)
                  by DeviceKey, SourceNodeId;

          let _AssetFindingEdges =
              _DeviceFindingEdges
              | join kind=inner (_Findings) on $left.SourceNodeId == $right.FindingNodeId
              | project DeviceKey, AssetName, AssetLabel, AadDeviceId,
                        EG_IsCustomerFacing, EdgeLabels,
                        FindingName, FindingLabel, FindingCategories,
                        FindingSeverity, FindingCvssScore,
                        FindingHasExploit, FindingIsExploitVerified, FindingIsInExploitKit, FindingIsZeroDay,
                        CVELastModified, FindingDescription, FindingReferenceUrl;

          _AssetFindingEdges
              // v2.2.215 -- DeviceKey is now sourced upstream in _DeviceMap, no need
              // to recompute it here.
              // Drop assets matching engine-substituted _excludedAssetTags + MDE IsExcluded flag. AssetTags is a flat column (built in Build-EndpointProfileRow.ps1 from MachineTags+DeviceManualTags+DeviceDynamicTags); kept inside column_ifexists here because this filter runs over a join shape that may not always carry the column. IsExcluded is MDE-side and not on every join arm.
              | where tobool(coalesce(column_ifexists("IsExcluded", false), false)) == false
              // v2.2.219 -- AssetTags filter MOVED to after the leftouter _ep join
              // (further down). At this point AssetTags doesn't exist on
              // _AssetFindingEdges (it's CL-sourced, only joined in via _ep below)
              // so the previous column_ifexists("AssetTags","") resolved to "" for
              // every row, making `has_any (_excludedAssetTags)` always false and
              // the exclusion filter a silent no-op. Operators with the global
              // RiskAnalysisGlobalExclusions.custom.json populated would still see
              // tagged devices in output -- bug since v2.2.x introduced the _ep
              // join pattern. CVELastModified age filter stays here (CVELastModified
              // is a typed scalar already on _AssetFindingEdges, no join needed).
              | where (_cveMinAgeDays == 0) or (isnull(CVELastModified)) or (CVELastModified < ago(_cveMinAgeDays * 1d))
              //__BUCKET_FILTER_BEGIN__
              | where 1 == 1
              //__BUCKET_FILTER_END__
              // v2.2.216 -- post-bucket summarize removed. _AssetFindingEdges is
              // already 1 row per (DeviceKey, FindingName) from v2.2.215's edge-level
              // pre-collapse, so the summarize was a 1:1 no-op that (a) silently
              // discarded the EdgeLabels set via take_any if multiplicity ever broke,
              // (b) carried EG_IsExcluded for no consumer (already filtered to false
              // in _Assets), and (c) emitted empty strings for column_ifexists on
              // IDs (MdeDeviceId / EntraAccountObjectId / Azure*) that don't exist
              // pre-_ep-join. Bucket filter still partitions per-row above; downstream
              // extends operate per-row below.
              // Bring in CL fields (Tier + UnsupportedOSDetected + IsExcludedByTag + cmdb*)
              // v2.2.217 -- join on EpJoinKey (DeviceKey on this side; EpJoinKey on
              // _ep side, both = AadDeviceId-or-AssetName-or-PrimaryEntityId). Lets
              // servers / Linux / IoT (no AadDeviceId in EG) still pick up CL
              // enrichment via AssetName matching against the CL profile row.
              | join kind=leftouter _ep on $left.DeviceKey == $right.EpJoinKey
              | project-away AadDeviceId1, EpJoinKey
              // v2.2.219 -- AssetTags exclusion filter, MOVED from pre-bucket-filter
              // to here (post-leftouter). AssetTags is a flat string column on _ep
              // (built in Build-EndpointProfileRow.ps1 from MachineTags +
               // DeviceManualTags + DeviceDynamicTags joined with ";") and is only
               // available after the leftouter join above. Pre-leftouter, the column
               // didn't exist on _AssetFindingEdges so the filter never matched.
               // No column_ifexists wrapper here -- _ep always projects AssetTags
               // (defaults to "" when absent on the underlying CL row), so the
               // column is guaranteed present even for rows that don't match _ep.
              | extend _AssetTagsLower = tolower(coalesce(AssetTags, ""))
              | where array_length(_excludedAssetTags) == 0
                   or not(_AssetTagsLower has_any (_excludedAssetTags))
              // v2.2.208 -- dropped dead coalesce sources. SourceAssets_Path /
              // TargetAssets_Path / ImpactedAssets were copy-pasted from an
              // Attack_Paths report and never exist on this CVE shape.
              // v2.2.216 -- empty-string-safe coalesce. KQL's coalesce() treats
              // "" as a real value, so coalesce(column_ifexists("X",""), ...) returns
              // "" silently when X is empty. Use iff(isnotempty()) for the first
              // candidate, then plain coalesce for the rest (the _From_CL columns
              // are real columns post-leftouter-join; no column_ifexists needed).
              // v2.2.220 -- column_ifexists wrappers restored. v2.2.216 stripped them
              // for empty-string-safety using bare column references, but bare refs
              // FAIL with "Failed to resolve scalar expression" when the column
              // doesn't exist on the upstream shape. The CVE_* reports always
              // project AssetName/AssetType/AssetLabel through _DeviceMap so they
              // worked, but Device_Recommendations_* reports key on DI_DeviceName /
              // DI_AadDeviceId (DeviceInfo-sourced) and don't carry those columns
              // -- they regressed at runtime. case() keeps the empty-string-safe
              // semantics (column_ifexists returning "" doesn't short-circuit
              // coalesce); column_ifexists keeps the column-missing safety.
              | extend AssetName = case(
                  isnotempty(tostring(column_ifexists("AssetName",""))),         tostring(column_ifexists("AssetName","")),
                  isnotempty(tostring(column_ifexists("AssetName_From_CL",""))), tostring(column_ifexists("AssetName_From_CL","")),
                  tostring(column_ifexists("AadDeviceId","")))
              | extend AssetId = case(
                  isnotempty(tostring(column_ifexists("AssetId",""))),           tostring(column_ifexists("AssetId","")),
                  isnotempty(tostring(column_ifexists("AssetId_From_CL",""))),   tostring(column_ifexists("AssetId_From_CL","")),
                  tostring(column_ifexists("AadDeviceId","")))
              | extend AssetType = case(
                  isnotempty(tostring(column_ifexists("AssetType",""))),         tostring(column_ifexists("AssetType","")),
                  isnotempty(tostring(column_ifexists("AssetType_From_CL",""))), tostring(column_ifexists("AssetType_From_CL","")),
                  isnotempty(tostring(column_ifexists("AssetLabel",""))),        tostring(column_ifexists("AssetLabel","")),
                  "Endpoint")
              | where tobool(coalesce(column_ifexists("IsExcludedByTag", false), false)) == false
              // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.endpoint.fields[].
              // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
              //__WEIGHTED_FACTORS_BEGIN__
              | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
              | extend RiskScore_Weight_Factor   = 100   // basis-100, 100 = 1.0x = no lift
              | extend RiskFactor_Weight         = 100
              //__WEIGHTED_FACTORS_END__
              // v2.2.210 -- Properties bag eliminated. All Properties.x.y.z reads
              // below replaced with the scalar columns extracted up-front in
              // _Findings (Finding{Severity,CvssScore,HasExploit,IsExploitVerified,
              // IsInExploitKit,IsZeroDay,Description,ReferenceUrl}). Per-row
              // bag_merge + ~10 dynamic-property lookups -> ~10 typed column reads.
              | extend Impact = FindingCvssScore
              | extend SecuritySeverity = case(
                  tolower(FindingSeverity) == "critical", "Very High",
                  tolower(FindingSeverity) == "high",     "High",
                  tolower(FindingSeverity) == "medium",   "Medium",
                  tolower(FindingSeverity) == "low",      "Low",
                  "Low")
              // v2.2.216 -- dropped `where FindingLabel contains "CVE"`. _Findings
              // already filters NodeLabel startswith "cve" + Categories has_any
              // ("vulnerability_finding"), so every row entering this stage matches.
              | where not (FindingName in (_excludedCves))
              | extend HasExploit        = FindingHasExploit
              | extend IsExploitVerified = FindingIsExploitVerified
              | extend IsInExploitKit    = FindingIsInExploitKit
              | extend IsZeroDay         = FindingIsZeroDay
              | extend CveUrl = iif(isempty(FindingReferenceUrl), strcat("https://nvd.nist.gov/vuln/detail/", FindingName), FindingReferenceUrl)
              | extend CVSSDesc = FindingDescription
              | extend RF_P_ExploitSignals  = iff(HasExploit == true or IsExploitVerified == true or IsInExploitKit == true or IsZeroDay == true, 1, 0)
              | extend RF_P_InternetExposed = iff(EG_IsCustomerFacing == true, 1, 0)
              | extend RF_P_LegacyEoS       = iff(UnsupportedOSDetected == true, 1, 0)
              | extend RF_C_RemoteCodeExec  = iff(HasExploit == true or IsExploitVerified == true or IsInExploitKit == true, 1, 0)
              | extend RiskFactor_Probability = RF_P_ExploitSignals + RF_P_InternetExposed + RF_P_LegacyEoS
              | extend RiskFactor_Consequence = RF_C_RemoteCodeExec
              | extend RiskFactor_Consequence_Detailed = strcat_array(array_concat(
                  iff(RF_C_RemoteCodeExec == 1, dynamic(["RemoteCodeExecutionRisk"]), dynamic([]))), ";")
              | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
                  iff(RF_P_ExploitSignals  == 1, dynamic(["ExploitSignals"]),     dynamic([])),
                  iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]),   dynamic([])),
                  iff(RF_P_LegacyEoS       == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))), ";")
              | extend CriticalityTier = Tier_From_SI_CL
              // v2.2.218 -- asset tier filter (Detailed only). Drops endpoint-level
              // CVE rows whose owning device's CL-computed Tier is outside the filter
              // list. Default [0, 1, 2] keeps Critical / High / Medium tiers and
              // drops Tier 3 (Low) workstations / IoT, which are the typical noise
              // floor for per-CVE remediation. Null tier (no CL profile match) is
              // INTENTIONALLY KEPT so operators still see data-quality gaps. To
              // restore the full backlog change dynamic([0,1,2]) to dynamic([]).
              // To make Critical-only use dynamic([0]). To include Tier 3 use
              // dynamic([0,1,2,3]). Operator-edit in YAML for now; per-report
              // exclude.custom.json substitution is a follow-up if needed.
              //__ASSET_TIER_FILTER_BEGIN__
              | extend _AssetTierFilter = dynamic([0, 1, 2])
              | where array_length(_AssetTierFilter) == 0
                   or isnull(CriticalityTier)
                   or toint(CriticalityTier) in (_AssetTierFilter)
              //__ASSET_TIER_FILTER_END__
              | extend CriticalityTierLevel = case(
                  CriticalityTier == 0, "Critical - tier 0",
                  CriticalityTier == 1, "High - tier 1",
                  CriticalityTier == 2, "Medium - tier 2",
                  CriticalityTier == 3, "Low - tier 3",
                  "Low - tier 3")
              | extend SecurityDomain    = "Endpoint"
              | extend ConfigurationName = "Update vulnerable software"
              // ConfigurationId carries the per-row CVE id so (AssetName, ConfigurationId) is unique per row.
              // Engine dedup keys on ConfigurationId via $cnInName -- this is what keeps Detailed rows alive.
              | extend ConfigurationId   = FindingName
              | extend Category          = "Vulnerabilities"
              | extend Subcategory       = "CVEs (Missing Updates)"
              // v2.2.217 -- removed duplicate late `extend AssetName = iif(...)`.
              // The earlier post-leftouter `extend AssetName = iff(isnotempty(AssetName),
              // AssetName, coalesce(AssetName_From_CL, AadDeviceId, ""))` is empty-
              // string-safe and runs before all the risk-factor extends, so by the
              // time we reach this projection AssetName is already resolved. The
              // late iif could only ever fire on rows the earlier iff couldn't fix,
              // and it uses identical sources -- pure dead code.
              | project
                  SecurityDomain, Category, Subcategory,
                  ConfigurationName, ConfigurationId,
                            AssetName,
                            AssetId,
                            AssetType,
                  Impact, SecuritySeverity,
                  CriticalityTier, CriticalityTierLevel,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality, cmdbDataSensitivity,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed,
                  RiskScore_Weight_Detailed, RiskScore_Weight_Factor, RiskFactor_Weight,
                  HasExploit, IsExploitVerified, IsInExploitKit, IsZeroDay,
                  CVELastModified, CVSSDesc
              | order by CriticalityTier asc, RiskScore_Weight_Factor desc, Impact desc, AssetName asc, ConfigurationId asc

    - ReportName: Device_Recommendations_Summary
      ReportPurpose: Non-compliant TVM secure configuration controls on endpoints, prioritised by criticality + exposure + legacy-OS.
        Same CL-correlation pattern as Device_Missing_CVEs_Summary -- Tier / UnsupportedOSDetected / IsExcludedByTag / cmdb* are sourced from
        SI_Endpoint_Profile_CL; Internet-Exposed signal still comes from ExposureGraph (CustomerFacing).
      SecurityDomain: Endpoint
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
          // Excluded asset tags -- block-marker substituted by engine from RiskAnalysisGlobalExclusions.custom.json (or per-report .exclude.custom.json). MDE IsExcluded flag is also honored at the filter line below.
          //__EXCLUDED_ASSET_TAGS_BEGIN__
          let _excludedAssetTags = dynamic(["--Excluded--SI"]);
          //__EXCLUDED_ASSET_TAGS_END__
          // Report   Device_Recommendations_Summary
          // Purpose  Non-compliant TVM secure configuration controls on endpoints, prioritised by criticality + exposure + legacy-OS.
          // Output   One row per (Tier x Severity x ConfigurationId x cmdb*) bucket; lists carry impacted-asset detail.
          // Mirrors  Device_Missing_CVEs_Summary's CL-correlation pattern (Tier / UnsupportedOSDetected / IsExcludedByTag / cmdb* from CL).

          // Step 0  CL profile snapshot. SINGLE SOURCE OF TRUTH for Tier + cmdb data.
          //   * cmdbId    -- set by the asset-profiler rule's `set: cmdbId: N`.
          //   * cmdbName / cmdbCriticality / cmdbDataSensitivity -- looked up from the CSV row matched by cmdbId.
          //   * UnsupportedOSDetected -- emitted by the endpoint profiler in place of the legacy in-query OS heuristics.
          //   * IsExcludedByTag       -- emitted when an asset carries a `--Excluded--SI` tag.
          let _ep =
              SI_Endpoint_Profile_CL
              | where TimeGenerated > ago(8d)
              | summarize arg_max(CollectionTime, *) by PrimaryEntityId
              // v2.2.217 (revised) -- second dedup on a stable EpJoinKey: prefer the
              // AAD device GUID, fall back to AssetName for devices without an
              // AadDeviceId in CL (servers, Linux hosts, IoT, hashed identifiers),
              // final fallback to PrimaryEntityId. Without this the leftouter join
              // below (downstream, joined on EpJoinKey) would (a) cartesian-explode
              // on empty-AadDeviceId rows -- the original memory-exceeded bug -- and
              // (b) drop CL enrichment for every server / Linux / IoT device.
              // v2.2.221 -- AadDeviceId access wrapped in column_ifexists. v2.2.217's
              // bare tostring(AadDeviceId) failed semantic resolution on profile
              // tables that don't carry the column (e.g. SI_Azure_Profile_CL --
              // Azure resources have no AAD device id). With the wrapper, those
              // tables fall through to AssetName -> PrimaryEntityId without erroring.
              | extend EpJoinKey = case(
                  isnotempty(tostring(column_ifexists("AadDeviceId",""))), tostring(column_ifexists("AadDeviceId","")),
                  isnotempty(tostring(column_ifexists("AssetName",""))),   tostring(column_ifexists("AssetName","")),
                  tostring(PrimaryEntityId)
              )
              | where isnotempty(EpJoinKey)
              | summarize arg_max(CollectionTime, *) by EpJoinKey
              // v2.2.221 -- AadDeviceId access wrapped in column_ifexists. v2.2.217's
              // bare tostring(AadDeviceId) in project step failed semantic resolution
              // on profile tables that don't carry the column (SI_Azure_Profile_CL).
              | project
                  EpJoinKey,
                  AadDeviceId            = tostring(column_ifexists("AadDeviceId", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", "")),
                  Tier_From_SI_CL        = toint(column_ifexists("Tier", int(null))),
                  UnsupportedOSDetected  = tobool(column_ifexists("UnsupportedOSDetected", false)),
                  IsExcludedByTag        = tobool(column_ifexists("IsExcludedByTag", false)),
                  cmdbId                 = tostring(column_ifexists("cmdbId", "")),
                  cmdbName               = tostring(column_ifexists("cmdbName", "")),
                  cmdbCriticality        = tostring(column_ifexists("cmdbCriticality", "")),
                  cmdbDataSensitivity    = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetTags              = tostring(column_ifexists("AssetTags", ""));

          // Step 0c  Excluded ConfigurationIds -- block-marker substituted by engine from the per-report exclude.custom.json.
          //__EXCLUDED_CONFIGURATION_IDS_BEGIN__
          let _excludedConfigurationIds = dynamic([]);
          //__EXCLUDED_CONFIGURATION_IDS_END__

          // Step 0e  Optional category/subcategory description lookups. Empty when key is missing.
          let CategoryLookup = datatable(Category:string, CategoryDescription:string)
          [
            "Security controls", "Endpoint protection and attack-surface policies that block common malware and attacker techniques.",
            "Network",           "Network security policies that limit attack surface and lateral movement.",
            "BitLocker",         "Full-disk encryption to prevent data exposure on lost or stolen devices.",
            "OS",                "Operating system baseline hardening and core protections.",
            "Credentials",       "Controls that prevent credential theft and reuse.",
            "Browser",           "Safe browsing and web threat protections.",
            "Application",       "Application control and exploit protection to restrict unauthorized code execution.",
            "Device",            "General endpoint configuration and health requirements.",
            "Audit",             "Monitoring-focused baselines to validate configuration posture."
          ];
          let SubCategoryLookup = datatable(Subcategory:string, SubCategoryDescription:string)
          [
            "EDR",                        "Defender for Endpoint sensor presence and reporting health.",
            "Attack Surface Reduction",   "Blocks common malware execution paths from email, web and Office content.",
            "Firewall",                   "Enforces inbound/outbound traffic policy and host firewall state.",
            "Antivirus",                  "Ensures Microsoft Defender Antivirus is active and properly configured.",
            "BitLocker",                  "Enforces full-disk encryption and key escrow.",
            "Exploit Guard",              "Hardens OS/apps against memory corruption and exploit chains.",
            "Authentication",             "Strengthens sign-in security and protects credential boundaries.",
            "Remote Access",              "Restricts remote shell/administrative entry points.",
            "TLS/Communication",          "Requires secure protocols and prevents crypto downgrade.",
            "Removable Storage",          "Controls external media to reduce malware risk and data exfiltration."
          ];

          let lookback       = 30d;
          let onlyApplicable = true;

          // Step 1  Latest DeviceInfo per device (for AadDeviceId mapping + DeviceName for the impacted-asset list).
          let DeviceInfoLatest =
              DeviceInfo
              | where Timestamp >= ago(lookback)
              | summarize arg_max(Timestamp, *) by DeviceId
              | project
                  DeviceId,
                  DI_DeviceName  = DeviceName,
                  DI_OSPlatform  = tostring(OSPlatform),
                  DI_AadDeviceId = tostring(AadDeviceId);

          // Step 2  EG slice -- only IsCustomerFacing (Internet-Exposed signal) and IsExcluded.
          // Tier and tag-based exclusion now come from the CL profile, not from EG.
          let _EG_Flags =
              ExposureGraphNodes
              | where tostring(NodeProperties.rawData.deviceCategory) == "Endpoint"
              | extend EG_AadDeviceId      = tostring(coalesce(NodeProperties.rawData.aadDeviceId, NodeProperties.raw.aadDeviceId, NodeProperties.aadDeviceId))
              | extend EG_IsCustomerFacing = tobool(coalesce(NodeProperties.rawData.isCustomerFacing, NodeProperties.raw.isCustomerFacing))
              | extend EG_IsExcluded       = tobool(coalesce(NodeProperties.rawData.isExcluded,       NodeProperties.raw.isExcluded))
              | where EG_IsExcluded == false
              | where isnotempty(tostring(column_ifexists("EG_AadDeviceId", "")))
              | summarize arg_max(EG_IsCustomerFacing, *) by EG_AadDeviceId
              | project EG_AadDeviceId, EG_IsCustomerFacing;

          // Step 3  Load TVM secure configuration data and KB enrichment.
          // Controls listed in excludeForWindowsServer are excluded only for Windows Server devices.
          let TVM_Base =
              DeviceTvmSecureConfigurationAssessment
              | where Timestamp >= ago(lookback)
              | where iff(onlyApplicable, IsApplicable == 1, true)
              | where not (ConfigurationId in (_excludedConfigurationIds))
              | join kind=leftouter (
                  DeviceTvmSecureConfigurationAssessmentKB
                  | project
                      ConfigurationId,
                      KB_ConfigurationName        = ConfigurationName,
                      KB_ConfigurationCategory    = ConfigurationCategory,
                      KB_ConfigurationSubcategory = ConfigurationSubcategory,
                      KB_Impact                   = toint(ConfigurationImpact),
                      KB_MitreTactics             = column_ifexists("RelatedMitreTactics", dynamic([])),
                      KB_MitreTechniques          = column_ifexists("RelatedMitreTechniques", dynamic([])),
                      KB_Tags                     = Tags,
                      KB_Benchmarks               = ConfigurationBenchmarks
                ) on ConfigurationId
              | extend ImpactInt = toint(coalesce(KB_Impact, toint(ConfigurationImpact)))
              | extend
                  Category          = coalesce(KB_ConfigurationCategory, ConfigurationCategory),
                  Subcategory       = KB_ConfigurationSubcategory,
                  ConfigurationName = coalesce(KB_ConfigurationName, tostring(ConfigurationId)),
                  IsCompliant       = tobool(IsCompliant),
                  MITRE_Tactics     = strcat_array(KB_MitreTactics, ";"),
                  MITRE_Techniques  = strcat_array(KB_MitreTechniques, ";"),
                  ComplianceTags    = strcat_array(array_concat(coalesce(KB_Tags, dynamic([])), coalesce(KB_Benchmarks, dynamic([]))), ";")
              | extend SecuritySeverity = case(
                  ImpactInt == 10, "Very High",
                  ImpactInt == 9,  "High",
                  ImpactInt == 8,  "Medium-High",
                  ImpactInt >= 5,  "Medium",
                  "Low")
              | summarize arg_max(Timestamp, *) by DeviceId, ConfigurationId
              | where IsCompliant == false
              | lookup CategoryLookup on Category
              | lookup SubCategoryLookup on Subcategory
              | extend
                  CategoryDescription    = coalesce(CategoryDescription, ""),
                  SubCategoryDescription = coalesce(SubCategoryDescription, "");

          // Step 4  Join TVM findings to DeviceInfo (AadDeviceId), then to EG (IsCustomerFacing), then to CL (Tier + cmdb + UnsupportedOSDetected + IsExcludedByTag).
          TVM_Base
              | join kind=leftouter (DeviceInfoLatest)               on DeviceId
              | join kind=leftouter (_EG_Flags)                      on $left.DI_AadDeviceId == $right.EG_AadDeviceId
              | join kind=leftouter (_ep)                            on $left.DI_AadDeviceId == $right.AadDeviceId
              // v2.2.208 -- dropped dead coalesce sources. SourceAssets_Path /
              // TargetAssets_Path / ImpactedAssets were copy-pasted from an
              // Attack_Paths report and never exist on this CVE shape.
              // v2.2.216 -- empty-string-safe coalesce. KQL's coalesce() treats
              // "" as a real value, so coalesce(column_ifexists("X",""), ...) returns
              // "" silently when X is empty. Use iff(isnotempty()) for the first
              // candidate, then plain coalesce for the rest (the _From_CL columns
              // are real columns post-leftouter-join; no column_ifexists needed).
              // v2.2.220 -- column_ifexists wrappers restored. v2.2.216 stripped them
              // for empty-string-safety using bare column references, but bare refs
              // FAIL with "Failed to resolve scalar expression" when the column
              // doesn't exist on the upstream shape. The CVE_* reports always
              // project AssetName/AssetType/AssetLabel through _DeviceMap so they
              // worked, but Device_Recommendations_* reports key on DI_DeviceName /
              // DI_AadDeviceId (DeviceInfo-sourced) and don't carry those columns
              // -- they regressed at runtime. case() keeps the empty-string-safe
              // semantics (column_ifexists returning "" doesn't short-circuit
              // coalesce); column_ifexists keeps the column-missing safety.
              | extend AssetName = case(
                  isnotempty(tostring(column_ifexists("AssetName",""))),         tostring(column_ifexists("AssetName","")),
                  isnotempty(tostring(column_ifexists("AssetName_From_CL",""))), tostring(column_ifexists("AssetName_From_CL","")),
                  tostring(column_ifexists("AadDeviceId","")))
              | extend AssetId = case(
                  isnotempty(tostring(column_ifexists("AssetId",""))),           tostring(column_ifexists("AssetId","")),
                  isnotempty(tostring(column_ifexists("AssetId_From_CL",""))),   tostring(column_ifexists("AssetId_From_CL","")),
                  tostring(column_ifexists("AadDeviceId","")))
              | extend AssetType = case(
                  isnotempty(tostring(column_ifexists("AssetType",""))),         tostring(column_ifexists("AssetType","")),
                  isnotempty(tostring(column_ifexists("AssetType_From_CL",""))), tostring(column_ifexists("AssetType_From_CL","")),
                  isnotempty(tostring(column_ifexists("AssetLabel",""))),        tostring(column_ifexists("AssetLabel","")),
                  "Endpoint")
              | extend DeviceKey = iif(isnotempty(DI_AadDeviceId), DI_AadDeviceId, coalesce(DI_DeviceName, DeviceName))
              // Drop assets matching engine-substituted _excludedAssetTags + MDE IsExcluded flag. AssetTags is a flat column on SI_Endpoint_Profile_CL (built in Build-EndpointProfileRow.ps1 from MachineTags+DeviceManualTags+DeviceDynamicTags) and is brought in via the leftouter join with _ep above. IsExcluded stays wrapped in column_ifexists since it's MDE-side.
              | where tobool(coalesce(column_ifexists("IsExcluded", false), false)) == false
              | extend _AssetTagsLower = tolower(coalesce(AssetTags, ""))
              | where not(_AssetTagsLower has_any (_excludedAssetTags))
              //__BUCKET_FILTER_BEGIN__
              | where 1 == 1
              //__BUCKET_FILTER_END__
              | where tobool(coalesce(column_ifexists("IsExcludedByTag", false), false)) == false
              // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.endpoint.fields[].
              // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
              //__WEIGHTED_FACTORS_BEGIN__
              | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
              | extend RiskScore_Weight_Factor   = 100   // basis-100, 100 = 1.0x = no lift
              | extend RiskFactor_Weight         = 100
              //__WEIGHTED_FACTORS_END__
              | extend CriticalityTier = Tier_From_SI_CL
              | extend CriticalityTierLevel = case(
                  CriticalityTier == 0, "Critical - tier 0",
                  CriticalityTier == 1, "High - tier 1",
                  CriticalityTier == 2, "Medium - tier 2",
                  CriticalityTier == 3, "Low - tier 3",
                  "Low - tier 3")
              | extend SecurityDomain = "Endpoint"
              | extend RF_P_InternetExposed = iff(EG_IsCustomerFacing == true, 1, 0)
              | extend RF_P_LegacyEoS       = iff(UnsupportedOSDetected == true, 1, 0)
              | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
              | extend RiskFactor_Probability = RF_P_InternetExposed + RF_P_LegacyEoS
              | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
                  iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]),   dynamic([])),
                  iff(RF_P_LegacyEoS       == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))), ";")
              | summarize
                  ImpactedAssetCount        = dcount(DeviceKey),
                  UniqueIssues              = dcount(ConfigurationId),
                  TotalIssuesImpactedAssets = count(),
                  ImpactedAssetsList        = make_set(coalesce(DI_DeviceName, DeviceName)),
                  RiskFactor_Consequence    = max(RiskFactor_Consequence),
                  RiskScore_Weight_Factor   = max(RiskScore_Weight_Factor),
                  RiskFactor_Weight         = max(RiskFactor_Weight),
                  RiskScore_Weight_Detailed = any(RiskScore_Weight_Detailed),
                  Impact                    = max(ImpactInt),
                  arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
                by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                   CriticalityTier, CriticalityTierLevel, SecuritySeverity,
                   cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
              | project
                  SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  Impact, SecuritySeverity,
                  CriticalityTier, CriticalityTierLevel,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality, cmdbDataSensitivity,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed,
                  RiskScore_Weight_Detailed, RiskScore_Weight_Factor, RiskFactor_Weight,
                  ImpactedAssetCount, ImpactedAssetsList, UniqueIssues, TotalIssuesImpactedAssets
              | order by CriticalityTier asc, RiskScore_Weight_Factor desc, ImpactedAssetCount desc, TotalIssuesImpactedAssets desc

    - ReportName: Device_Recommendations_Detailed
      ReportPurpose: Per-row detail of non-compliant TVM secure configuration controls on endpoints, prioritised by criticality + exposure + legacy-OS.
        Same CL-correlation pattern as Device_Recommendations_Summary; differs only in skipping the final summarize and emitting one row per (Asset x ConfigurationId) with full per-row context (RecommendedAction, RemediationOptions, Benchmarks, etc.).
      SecurityDomain: Endpoint
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
          // Excluded asset tags -- block-marker substituted by engine from RiskAnalysisGlobalExclusions.custom.json (or per-report .exclude.custom.json). MDE IsExcluded flag is also honored at the filter line below.
          //__EXCLUDED_ASSET_TAGS_BEGIN__
          let _excludedAssetTags = dynamic(["--Excluded--SI"]);
          //__EXCLUDED_ASSET_TAGS_END__
          // Report   Device_Recommendations_Detailed
          // Purpose  Per-row detail of non-compliant TVM secure configuration controls on endpoints, prioritised by criticality + exposure + legacy-OS.
          // Output   One row per (Asset x ConfigurationId), with full per-row context (RecommendedAction, RemediationOptions, Benchmarks, etc.).
          // Mirrors  Device_Recommendations_Summary's CL-correlation pattern (Tier / UnsupportedOSDetected / IsExcludedByTag / cmdb* from CL).

          // Step 0  CL profile snapshot. SINGLE SOURCE OF TRUTH for Tier + cmdb data.
          let _ep =
              SI_Endpoint_Profile_CL
              | where TimeGenerated > ago(8d)
              | summarize arg_max(CollectionTime, *) by PrimaryEntityId
              // v2.2.217 (revised) -- second dedup on a stable EpJoinKey: prefer the
              // AAD device GUID, fall back to AssetName for devices without an
              // AadDeviceId in CL (servers, Linux hosts, IoT, hashed identifiers),
              // final fallback to PrimaryEntityId. Without this the leftouter join
              // below (downstream, joined on EpJoinKey) would (a) cartesian-explode
              // on empty-AadDeviceId rows -- the original memory-exceeded bug -- and
              // (b) drop CL enrichment for every server / Linux / IoT device.
              // v2.2.221 -- AadDeviceId access wrapped in column_ifexists. v2.2.217's
              // bare tostring(AadDeviceId) failed semantic resolution on profile
              // tables that don't carry the column (e.g. SI_Azure_Profile_CL --
              // Azure resources have no AAD device id). With the wrapper, those
              // tables fall through to AssetName -> PrimaryEntityId without erroring.
              | extend EpJoinKey = case(
                  isnotempty(tostring(column_ifexists("AadDeviceId",""))), tostring(column_ifexists("AadDeviceId","")),
                  isnotempty(tostring(column_ifexists("AssetName",""))),   tostring(column_ifexists("AssetName","")),
                  tostring(PrimaryEntityId)
              )
              | where isnotempty(EpJoinKey)
              | summarize arg_max(CollectionTime, *) by EpJoinKey
              // v2.2.221 -- AadDeviceId access wrapped in column_ifexists. v2.2.217's
              // bare tostring(AadDeviceId) in project step failed semantic resolution
              // on profile tables that don't carry the column (SI_Azure_Profile_CL).
              | project
                  EpJoinKey,
                  AadDeviceId            = tostring(column_ifexists("AadDeviceId", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", "")),
                  Tier_From_SI_CL        = toint(column_ifexists("Tier", int(null))),
                  UnsupportedOSDetected  = tobool(column_ifexists("UnsupportedOSDetected", false)),
                  IsExcludedByTag        = tobool(column_ifexists("IsExcludedByTag", false)),
                  cmdbId                 = tostring(column_ifexists("cmdbId", "")),
                  cmdbName               = tostring(column_ifexists("cmdbName", "")),
                  cmdbCriticality        = tostring(column_ifexists("cmdbCriticality", "")),
                  cmdbDataSensitivity    = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetTags              = tostring(column_ifexists("AssetTags", ""));

          // Step 0c  Excluded ConfigurationIds -- block-marker substituted by engine from the per-report exclude.custom.json.
          //__EXCLUDED_CONFIGURATION_IDS_BEGIN__
          let _excludedConfigurationIds = dynamic([]);
          //__EXCLUDED_CONFIGURATION_IDS_END__

          // Step 0e  Optional category/subcategory description lookups. Empty when key is missing.
          let CategoryLookup = datatable(Category:string, CategoryDescription:string)
          [
            "Security controls", "Endpoint protection and attack-surface policies that block common malware and attacker techniques.",
            "Network",           "Network security policies that limit attack surface and lateral movement.",
            "BitLocker",         "Full-disk encryption to prevent data exposure on lost or stolen devices.",
            "OS",                "Operating system baseline hardening and core protections.",
            "Credentials",       "Controls that prevent credential theft and reuse.",
            "Browser",           "Safe browsing and web threat protections.",
            "Application",       "Application control and exploit protection to restrict unauthorized code execution.",
            "Device",            "General endpoint configuration and health requirements.",
            "Audit",             "Monitoring-focused baselines to validate configuration posture."
          ];
          let SubCategoryLookup = datatable(Subcategory:string, SubCategoryDescription:string)
          [
            "EDR",                        "Defender for Endpoint sensor presence and reporting health.",
            "Attack Surface Reduction",   "Blocks common malware execution paths from email, web and Office content.",
            "Firewall",                   "Enforces inbound/outbound traffic policy and host firewall state.",
            "Antivirus",                  "Ensures Microsoft Defender Antivirus is active and properly configured.",
            "BitLocker",                  "Enforces full-disk encryption and key escrow.",
            "Exploit Guard",              "Hardens OS/apps against memory corruption and exploit chains.",
            "Authentication",             "Strengthens sign-in security and protects credential boundaries.",
            "Remote Access",              "Restricts remote shell/administrative entry points.",
            "TLS/Communication",          "Requires secure protocols and prevents crypto downgrade.",
            "Removable Storage",          "Controls external media to reduce malware risk and data exfiltration."
          ];

          let lookback       = 30d;
          let onlyApplicable = true;

          // Step 1  Latest DeviceInfo per device (DeviceName + AadDeviceId mapping + OS for display).
          let DeviceInfoLatest =
              DeviceInfo
              | where Timestamp >= ago(lookback)
              | summarize arg_max(Timestamp, *) by DeviceId
              | project
                  DeviceId,
                  DI_DeviceName  = DeviceName,
                  DI_OSPlatform  = tostring(OSPlatform),
                  DI_AadDeviceId = tostring(AadDeviceId);

          // Step 2  EG slice -- only IsCustomerFacing (Internet-Exposed signal) + AssetLabel + IsExcluded.
          // Tier and tag-based exclusion now come from the CL profile, not from EG.
          let _EG_Flags =
              ExposureGraphNodes
              | where tostring(NodeProperties.rawData.deviceCategory) == "Endpoint"
              | extend EG_AadDeviceId      = tostring(coalesce(NodeProperties.rawData.aadDeviceId, NodeProperties.raw.aadDeviceId, NodeProperties.aadDeviceId))
              | extend EG_IsCustomerFacing = tobool(coalesce(NodeProperties.rawData.isCustomerFacing, NodeProperties.raw.isCustomerFacing))
              | extend EG_IsExcluded       = tobool(coalesce(NodeProperties.rawData.isExcluded,       NodeProperties.raw.isExcluded))
              | extend EG_AssetLabel       = NodeLabel
              | where EG_IsExcluded == false
              | where isnotempty(tostring(column_ifexists("EG_AadDeviceId", "")))
              | summarize arg_max(EG_IsCustomerFacing, *) by EG_AadDeviceId
              | project EG_AadDeviceId, EG_IsCustomerFacing, EG_AssetLabel;

          // Step 3  Load TVM secure configuration data and KB enrichment.
          let TVM_Base =
              DeviceTvmSecureConfigurationAssessment
              | where Timestamp >= ago(lookback)
              | where iff(onlyApplicable, IsApplicable == 1, true)
              | where not (ConfigurationId in (_excludedConfigurationIds))
              | join kind=leftouter (
                  DeviceTvmSecureConfigurationAssessmentKB
                  | project
                      ConfigurationId,
                      KB_ConfigurationName        = ConfigurationName,
                      KB_ConfigurationCategory    = ConfigurationCategory,
                      KB_ConfigurationSubcategory = ConfigurationSubcategory,
                      KB_Impact                   = toint(ConfigurationImpact),
                      KB_RiskDescription          = tostring(RiskDescription),
                      KB_Description              = tostring(ConfigurationDescription),
                      KB_Remediation              = tostring(RemediationOptions),
                      KB_Benchmarks               = ConfigurationBenchmarks,
                      KB_MitreTactics             = column_ifexists("RelatedMitreTactics", dynamic([])),
                      KB_MitreTechniques          = column_ifexists("RelatedMitreTechniques", dynamic([])),
                      KB_Tags                     = Tags
                ) on ConfigurationId
              | extend ImpactInt = toint(coalesce(KB_Impact, toint(ConfigurationImpact)))
              | extend
                  Category          = coalesce(KB_ConfigurationCategory, ConfigurationCategory),
                  Subcategory       = KB_ConfigurationSubcategory,
                  ConfigurationName = coalesce(KB_ConfigurationName, tostring(ConfigurationId)),
                  IsCompliant       = tobool(IsCompliant),
                  IsApplicable      = tobool(IsApplicable),
                  MITRE_Tactics     = strcat_array(KB_MitreTactics, ";"),
                  MITRE_Techniques  = strcat_array(KB_MitreTechniques, ";"),
                  ComplianceTags    = strcat_array(array_concat(coalesce(KB_Tags, dynamic([])), coalesce(KB_Benchmarks, dynamic([]))), ";")
              | extend
                  RecommendedAction = case(
                      ImpactInt >= 9, "Fix immediately - Security Change Queue / Intune / GPO rollout",
                      ImpactInt == 8, "Schedule within quarterly hardening cycle",
                      ImpactInt >= 5 and ImpactInt < 8, "Fix opportunistically (during upgrades / refresh)",
                      "Monitor, document as baseline exceptions"),
                  SecuritySeverity = case(
                      ImpactInt == 10, "Very High",
                      ImpactInt == 9,  "High",
                      ImpactInt == 8,  "Medium-High",
                      ImpactInt >= 5,  "Medium",
                      "Low"),
                  SecuritySeverityDescription = case(
                      ImpactInt == 10, "If this configuration is not applied, attackers gain a major foothold or common attack vector remains wide open.",
                      ImpactInt == 9,  "Strongly recommended to fix ASAP; commonly exploited by real-world malware and ransomware.",
                      ImpactInt == 8,  "Important baseline security hardening; reduces attack surface and lateral movement.",
                      ImpactInt >= 5,  "Security best practice; helps reduce exposure but less frequently exploited.",
                      "Hardening / hygiene controls; helps, but attackers less likely to target.")
              | summarize arg_max(Timestamp, *) by DeviceId, ConfigurationId
              | where IsCompliant == false
              | lookup CategoryLookup on Category
              | lookup SubCategoryLookup on Subcategory
              | extend
                  CategoryDescription    = coalesce(CategoryDescription, ""),
                  SubCategoryDescription = coalesce(SubCategoryDescription, "");

          // Step 4  Join TVM findings to DeviceInfo, EG flags, and CL profile snapshot.
          TVM_Base
              | join kind=leftouter (DeviceInfoLatest) on DeviceId
              | join kind=leftouter (_EG_Flags)        on $left.DI_AadDeviceId == $right.EG_AadDeviceId
              | join kind=leftouter (_ep)              on $left.DI_AadDeviceId == $right.AadDeviceId
              // v2.2.208 -- dropped dead coalesce sources. SourceAssets_Path /
              // TargetAssets_Path / ImpactedAssets were copy-pasted from an
              // Attack_Paths report and never exist on this CVE shape.
              // v2.2.216 -- empty-string-safe coalesce. KQL's coalesce() treats
              // "" as a real value, so coalesce(column_ifexists("X",""), ...) returns
              // "" silently when X is empty. Use iff(isnotempty()) for the first
              // candidate, then plain coalesce for the rest (the _From_CL columns
              // are real columns post-leftouter-join; no column_ifexists needed).
              // v2.2.220 -- column_ifexists wrappers restored. v2.2.216 stripped them
              // for empty-string-safety using bare column references, but bare refs
              // FAIL with "Failed to resolve scalar expression" when the column
              // doesn't exist on the upstream shape. The CVE_* reports always
              // project AssetName/AssetType/AssetLabel through _DeviceMap so they
              // worked, but Device_Recommendations_* reports key on DI_DeviceName /
              // DI_AadDeviceId (DeviceInfo-sourced) and don't carry those columns
              // -- they regressed at runtime. case() keeps the empty-string-safe
              // semantics (column_ifexists returning "" doesn't short-circuit
              // coalesce); column_ifexists keeps the column-missing safety.
              | extend AssetName = case(
                  isnotempty(tostring(column_ifexists("AssetName",""))),         tostring(column_ifexists("AssetName","")),
                  isnotempty(tostring(column_ifexists("AssetName_From_CL",""))), tostring(column_ifexists("AssetName_From_CL","")),
                  tostring(column_ifexists("AadDeviceId","")))
              | extend AssetId = case(
                  isnotempty(tostring(column_ifexists("AssetId",""))),           tostring(column_ifexists("AssetId","")),
                  isnotempty(tostring(column_ifexists("AssetId_From_CL",""))),   tostring(column_ifexists("AssetId_From_CL","")),
                  tostring(column_ifexists("AadDeviceId","")))
              | extend AssetType = case(
                  isnotempty(tostring(column_ifexists("AssetType",""))),         tostring(column_ifexists("AssetType","")),
                  isnotempty(tostring(column_ifexists("AssetType_From_CL",""))), tostring(column_ifexists("AssetType_From_CL","")),
                  isnotempty(tostring(column_ifexists("AssetLabel",""))),        tostring(column_ifexists("AssetLabel","")),
                  "Endpoint")
              | extend AssetName  = coalesce(column_ifexists("DI_DeviceName", ""), column_ifexists("DeviceName", ""), AssetName)
              | extend AssetLabel = EG_AssetLabel
              | extend DeviceKey  = iif(isnotempty(DI_AadDeviceId), DI_AadDeviceId, AssetName)
              // Drop assets matching engine-substituted _excludedAssetTags + MDE IsExcluded flag. AssetTags is a flat column on SI_Endpoint_Profile_CL (built in Build-EndpointProfileRow.ps1 from MachineTags+DeviceManualTags+DeviceDynamicTags) and is brought in via the leftouter join with _ep above. IsExcluded stays wrapped in column_ifexists since it's MDE-side.
              | where tobool(coalesce(column_ifexists("IsExcluded", false), false)) == false
              | extend _AssetTagsLower = tolower(coalesce(AssetTags, ""))
              | where not(_AssetTagsLower has_any (_excludedAssetTags))
              //__BUCKET_FILTER_BEGIN__
              | where 1 == 1
              //__BUCKET_FILTER_END__
              | where tobool(coalesce(column_ifexists("IsExcludedByTag", false), false)) == false
              // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.endpoint.fields[].
              // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
              //__WEIGHTED_FACTORS_BEGIN__
              | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
              | extend RiskScore_Weight_Factor   = 100   // basis-100, 100 = 1.0x = no lift
              | extend RiskFactor_Weight         = 100
              //__WEIGHTED_FACTORS_END__
              | extend CriticalityTier = Tier_From_SI_CL
              | extend CriticalityTierLevel = case(
                  CriticalityTier == 0, "Critical - tier 0",
                  CriticalityTier == 1, "High - tier 1",
                  CriticalityTier == 2, "Medium - tier 2",
                  CriticalityTier == 3, "Low - tier 3",
                  "Low - tier 3")
              | extend SecurityDomain = "Endpoint"
              | extend RF_P_InternetExposed = iff(EG_IsCustomerFacing == true, 1, 0)
              | extend RF_P_LegacyEoS       = iff(UnsupportedOSDetected == true, 1, 0)
              | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
              | extend RiskFactor_Probability = RF_P_InternetExposed + RF_P_LegacyEoS
              | extend RiskFactor_Probability_Detailed = strcat_array(array_concat(
                  iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]),   dynamic([])),
                  iff(RF_P_LegacyEoS       == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))), ";")
              | project
                  SecurityDomain, Category, Subcategory,
                  ConfigurationName, ConfigurationId,
                            AssetName,
                            AssetId,
                            AssetType,
                  Impact = ImpactInt, SecuritySeverity,
                  CriticalityTier, CriticalityTierLevel,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality, cmdbDataSensitivity,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed,
                  RiskScore_Weight_Detailed, RiskScore_Weight_Factor, RiskFactor_Weight,
                  OSPlatform = coalesce(DI_OSPlatform, OSPlatform),
                  IsCompliant, IsApplicable,
                  RecommendedAction,
                  RiskDescription          = KB_RiskDescription,
                  ConfigurationDescription = KB_Description,
                  RemediationOptions       = KB_Remediation,
                  Benchmarks               = KB_Benchmarks,
                  CategoryDescription, SubCategoryDescription,
                  SecuritySeverityDescription
              | order by CriticalityTier asc, RiskScore_Weight_Factor desc, Impact desc, AssetName asc, ConfigurationId asc

    - ReportName: Azure_Recommendations_Summary
      ReportPurpose: Azure ExposureGraph recommendations prioritised by criticality + Internet-Exposed + risk factors.
        Same CL-correlation pattern as Device_Missing_CVEs_Summary -- Tier / IsExcludedByTag / cmdb* are sourced from
        SI_Azure_Profile_CL via the AzureResourceId_Guid join key (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
          // Report   Azure_Recommendations_Summary
          // Purpose  Azure ExposureGraph recommendations prioritised by criticality + Internet-Exposed + edge risk factors.
          // Output   One row per (Tier x Severity x ConfigurationName x cmdb*) bucket; lists carry impacted-asset detail.
          // Mirrors  Device_Missing_CVEs_Summary's CL-correlation pattern. Join key: EG NodeId == SI_Azure_Profile_CL.AzureResourceId_Guid.

          // Step 0  CL profile snapshot. SINGLE SOURCE OF TRUTH for Tier + cmdb data.
          //   * AzureResourceId_Guid -- EG NodeId hex (preferred cross-engine join key to ExposureGraph).
          //   * Tier                 -- engine-computed (MIN of matched SIRules + CMDB criticality).
          //   * cmdbId / cmdbName / cmdbCriticality / cmdbDataSensitivity -- looked up from CSV by cmdbId.
          //   * IsExcludedByTag      -- defaults to false (Azure profile may not emit this column).
          let _ap =
              SI_Azure_Profile_CL
              | where TimeGenerated > ago(8d)
              | summarize arg_max(CollectionTime, *) by PrimaryEntityId
              // v2.2.221 (parity fix) -- second dedup on a stable EpJoinKey: prefer
              // AAD device GUID, fall back to AssetName, finally to PrimaryEntityId.
              // AadDeviceId wrapped in column_ifexists so non-Endpoint profile tables
              // (e.g. SI_Azure_Profile_CL has no AadDeviceId) degrade gracefully
              // instead of failing semantic resolution.
              | extend EpJoinKey = case(
                  isnotempty(tostring(column_ifexists("AadDeviceId",""))), tostring(column_ifexists("AadDeviceId","")),
                  isnotempty(tostring(column_ifexists("AssetName",""))),   tostring(column_ifexists("AssetName","")),
                  tostring(PrimaryEntityId)
              )
              | where isnotempty(EpJoinKey)
              | summarize arg_max(CollectionTime, *) by EpJoinKey
              | project
                  AzureResourceId_Guid   = tostring(column_ifexists("AzureResourceId_Guid", "")),
                  AzureResourceId        = tostring(column_ifexists("AzureResourceId", "")),
                  Tier_From_SI_CL        = toint(column_ifexists("Tier", int(null))),
                  IsExcludedByTag        = tobool(column_ifexists("IsExcludedByTag", false)),
                  cmdbId                 = tostring(column_ifexists("cmdbId", "")),
                  cmdbName               = tostring(column_ifexists("cmdbName", "")),
                  cmdbCriticality        = tostring(column_ifexists("cmdbCriticality", "")),
                  cmdbDataSensitivity    = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
              | where isnotempty(tostring(column_ifexists("AzureResourceId_Guid", "")));

          // Step 0c  Excluded ConfigurationIds -- block-marker substituted by engine from the per-report exclude.custom.json.
          // Items are matched against the recommendation FindingName (e.g. "Storage account public access disabled").
          //__EXCLUDED_CONFIGURATION_IDS_BEGIN__
          let _excludedConfigurationIds = dynamic([]);
          //__EXCLUDED_CONFIGURATION_IDS_END__

          let _Assets =
              ExposureGraphNodes
              | where tostring(NodeProperties.rawData.environmentName) contains "Azure"
              | extend EG_IsCustomerFacing = tobool(coalesce(NodeProperties.rawData.isCustomerFacing, NodeProperties.raw.isCustomerFacing))
              | extend EG_IsExcluded       = tobool(coalesce(NodeProperties.rawData.isExcluded,       NodeProperties.raw.isExcluded))
              | where isnull(EG_IsExcluded) or EG_IsExcluded == false
              | project
                  AssetNodeId = NodeId,
                  AssetName   = NodeName,
                  AssetLabel  = NodeLabel,
                  AssetProps  = NodeProperties,
                  EG_IsCustomerFacing,
                  EG_IsExcluded;

          let _Findings =
              ExposureGraphNodes
              | mv-expand Category = Categories
              | where tostring(Category) contains "finding"
              | where NodeLabel !contains "cve"
              | project FindingNodeId = NodeId, FindingName = NodeName, FindingLabel = NodeLabel,
                        FindingCategories = Categories, FindingProps = NodeProperties;

          let _Edges =
              ExposureGraphEdges
              | where EdgeLabel has "affecting"
              | extend EdgeProps = column_ifexists("EdgeProperties", dynamic({}))
              | project SourceNodeId, TargetNodeId, EdgeLabel, EdgeProps;

          let _AssetFindingEdges_oneway =
              _Edges
              | join kind=inner (_Assets)   on $left.SourceNodeId == $right.AssetNodeId
              | join kind=inner (_Findings) on $left.TargetNodeId == $right.FindingNodeId
              | project AssetNodeId, AssetName, AssetLabel, EG_IsCustomerFacing, EG_IsExcluded,
                        FindingName, FindingLabel, FindingCategories, FindingProps,
                        EdgeLabel, EdgeProps, AssetProps;

          let _AssetFindingEdges_otherway =
              _Edges
              | join kind=inner (_Assets)   on $left.TargetNodeId == $right.AssetNodeId
              | join kind=inner (_Findings) on $left.SourceNodeId == $right.FindingNodeId
              | project AssetNodeId, AssetName, AssetLabel, EG_IsCustomerFacing, EG_IsExcluded,
                        FindingName, FindingLabel, FindingCategories, FindingProps,
                        EdgeLabel, EdgeProps, AssetProps;

          let _AssetFindingEdges = union _AssetFindingEdges_oneway, _AssetFindingEdges_otherway;

          _AssetFindingEdges
              | extend DeviceKey = coalesce(AssetNodeId, AssetName)
              //__BUCKET_FILTER_BEGIN__
              | where 1 == 1
              //__BUCKET_FILTER_END__
              | where not (FindingName in (_excludedConfigurationIds))
              | summarize
                  DeviceKey             = any(DeviceKey),
                  EdgeLabels            = make_set(EdgeLabel),
                  EdgePropsAny          = any(EdgeProps),
                  FindingLabel          = any(FindingLabel),
                  FindingCategories     = any(FindingCategories),
                  FindingProps          = any(FindingProps),
                  EG_IsCustomerFacing   = any(EG_IsCustomerFacing),
                  EG_IsExcluded         = any(EG_IsExcluded),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
                by AssetNodeId, AssetName, AssetLabel, FindingName
              // Bring in CL fields (Tier + IsExcludedByTag + cmdb*) via EG NodeId == AzureResourceId_Guid.
              | join kind=leftouter (_ap) on $left.AssetNodeId == $right.AzureResourceId_Guid
              // v2.2.208 -- dropped dead coalesce sources. SourceAssets_Path /
              // TargetAssets_Path / ImpactedAssets were copy-pasted from an
              // Attack_Paths report and never exist on this CVE shape.
              | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""))
              | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("AzureResourceId_Guid", ""), column_ifexists("AzureResourceId", ""))
              | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("AssetLabel", ""), "Azure")
              | where tobool(coalesce(column_ifexists("IsExcludedByTag", false), false)) == false
              // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
              //__WEIGHTED_FACTORS_BEGIN__
              | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
              | extend RiskScore_Weight_Factor   = 100   // basis-100, 100 = 1.0x = no lift
              | extend RiskFactor_Weight         = 100
              //__WEIGHTED_FACTORS_END__
              | extend Properties =
                  bag_merge(
                      bag_pack("finding", FindingProps),
                      bag_pack("raw", iif(isnull(FindingProps.rawData), dynamic({}), FindingProps.rawData)),
                      bag_pack("edge", EdgePropsAny)
                  )
              | extend Subcategory = tostring(Properties.raw.securityIssue.securityIssue)
              // Risk extraction from EG edge -- RiskFactor_Probability = number of distinct risk factors on the edge.
              | extend RiskFactorsArray = todynamic(Properties.edge.rawData.risk.riskFactors)
              | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)
              | mv-apply rf = RiskFactorsArray on (
                  where isnotempty(trim(" ", tostring(rf)))
                  | summarize RiskFactorSet = make_set(tostring(rf)))
              | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
              // Internet-Exposed adds +1 to RiskFactor_Probability when the asset is customer-facing.
              | extend RF_P_InternetExposed = iff(EG_IsCustomerFacing == true, 1, 0)
              | extend RiskFactor_Probability = array_length(RiskFactorSet) + RF_P_InternetExposed
              | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
              | extend RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(array_concat(
                  RiskFactorSet,
                  iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])))), ";")
              | extend Severity = tostring(Properties.raw.severity)
              | extend SecuritySeverity = case(
                  tolower(Severity) == "critical", "Very High",
                  tolower(Severity) == "high",     "High",
                  tolower(Severity) == "medium",   "Medium",
                  tolower(Severity) == "low",      "Low",
                  "Low")
              | where isnotempty(tostring(column_ifexists("Severity", "")))
              | extend Impact = case(
                  tolower(Severity) == "critical", 10.0,
                  tolower(Severity) == "high",     9.0,
                  tolower(Severity) == "medium",   7.0,
                  tolower(Severity) == "low",      3.0,
                  0.0)
              | extend CriticalityTier = Tier_From_SI_CL
              | extend CriticalityTierLevel = case(
                  CriticalityTier == 0, "Critical - tier 0",
                  CriticalityTier == 1, "High - tier 1",
                  CriticalityTier == 2, "Medium - tier 2",
                  CriticalityTier == 3, "Low - tier 3",
                  "Low - tier 3")
              | extend SecurityDomain    = "Azure"
              | extend Category          = tostring(FindingLabel)
              | extend ConfigurationName = tostring(FindingName)
              | extend ConfigurationId   = "Recommendation"
              | summarize
                  ImpactedAssetCount        = dcount(DeviceKey),
                  UniqueIssues              = dcount(FindingName),
                  TotalIssuesImpactedAssets = count(),
                  ImpactedAssetsList        = make_set(AssetName),
                  RiskFactor_Consequence    = max(RiskFactor_Consequence),
                  RiskScore_Weight_Factor   = max(RiskScore_Weight_Factor),
                  RiskFactor_Weight         = max(RiskFactor_Weight),
                  RiskScore_Weight_Detailed = any(RiskScore_Weight_Detailed),
                  Impact                    = max(Impact),
                  arg_max(RiskFactor_Probability, RiskFactor_Probability_Detailed),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
                by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                   CriticalityTier, CriticalityTierLevel, SecuritySeverity,
                   cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
              | project
                  SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  Impact, SecuritySeverity,
                  CriticalityTier, CriticalityTierLevel,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality, cmdbDataSensitivity,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed,
                  RiskScore_Weight_Detailed, RiskScore_Weight_Factor, RiskFactor_Weight,
                  ImpactedAssetCount, ImpactedAssetsList, UniqueIssues, TotalIssuesImpactedAssets
              | order by CriticalityTier asc, RiskScore_Weight_Factor desc, ImpactedAssetCount desc, TotalIssuesImpactedAssets desc


    - ReportName: Azure_Recommendations_Detailed
      ReportPurpose: Per-row detail of Azure ExposureGraph recommendations, prioritised by criticality + Internet-Exposed + edge risk factors.
        Same CL-correlation pattern as Azure_Recommendations_Summary; differs only in skipping the final summarize and emitting one row per
        (Asset x Recommendation) with full per-row context (AzureResourceId, EG_IsCustomerFacing, RiskFactorSet, etc.).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
          // Report   Azure_Recommendations_Detailed
          // Purpose  Per-row detail of Azure ExposureGraph recommendations, prioritised by criticality + Internet-Exposed + edge risk factors.
          // Output   One row per (Asset x Recommendation), with per-row context (AzureResourceId, EG_IsCustomerFacing, RiskFactorSet, etc.).
          // Mirrors  Azure_Recommendations_Summary's CL-correlation pattern. Join key: EG NodeId == SI_Azure_Profile_CL.AzureResourceId_Guid.

          // Step 0  CL profile snapshot. SINGLE SOURCE OF TRUTH for Tier + cmdb data.
          let _ap =
              SI_Azure_Profile_CL
              | where TimeGenerated > ago(8d)
              | summarize arg_max(CollectionTime, *) by PrimaryEntityId
              // v2.2.221 (parity fix) -- second dedup on a stable EpJoinKey: prefer
              // AAD device GUID, fall back to AssetName, finally to PrimaryEntityId.
              // AadDeviceId wrapped in column_ifexists so non-Endpoint profile tables
              // (e.g. SI_Azure_Profile_CL has no AadDeviceId) degrade gracefully
              // instead of failing semantic resolution.
              | extend EpJoinKey = case(
                  isnotempty(tostring(column_ifexists("AadDeviceId",""))), tostring(column_ifexists("AadDeviceId","")),
                  isnotempty(tostring(column_ifexists("AssetName",""))),   tostring(column_ifexists("AssetName","")),
                  tostring(PrimaryEntityId)
              )
              | where isnotempty(EpJoinKey)
              | summarize arg_max(CollectionTime, *) by EpJoinKey
              | project
                  AzureResourceId_Guid   = tostring(column_ifexists("AzureResourceId_Guid", "")),
                  AzureResourceId        = tostring(column_ifexists("AzureResourceId", "")),
                  Tier_From_SI_CL        = toint(column_ifexists("Tier", int(null))),
                  IsExcludedByTag        = tobool(column_ifexists("IsExcludedByTag", false)),
                  cmdbId                 = tostring(column_ifexists("cmdbId", "")),
                  cmdbName               = tostring(column_ifexists("cmdbName", "")),
                  cmdbCriticality        = tostring(column_ifexists("cmdbCriticality", "")),
                  cmdbDataSensitivity    = tostring(column_ifexists("cmdbDataSensitivity", "")),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
              | where isnotempty(tostring(column_ifexists("AzureResourceId_Guid", "")));

          // Step 0c  Excluded ConfigurationIds -- block-marker substituted by engine from the per-report exclude.custom.json.
          //__EXCLUDED_CONFIGURATION_IDS_BEGIN__
          let _excludedConfigurationIds = dynamic([]);
          //__EXCLUDED_CONFIGURATION_IDS_END__

          let _Assets =
              ExposureGraphNodes
              | where tostring(NodeProperties.rawData.environmentName) contains "Azure"
              | extend EG_IsCustomerFacing = tobool(coalesce(NodeProperties.rawData.isCustomerFacing, NodeProperties.raw.isCustomerFacing))
              | extend EG_IsExcluded       = tobool(coalesce(NodeProperties.rawData.isExcluded,       NodeProperties.raw.isExcluded))
              | where isnull(EG_IsExcluded) or EG_IsExcluded == false
              | project
                  AssetNodeId = NodeId,
                  AssetName   = NodeName,
                  AssetLabel  = NodeLabel,
                  AssetProps  = NodeProperties,
                  EG_IsCustomerFacing,
                  EG_IsExcluded;

          let _Findings =
              ExposureGraphNodes
              | mv-expand Category = Categories
              | where tostring(Category) contains "finding"
              | where NodeLabel !contains "cve"
              | project FindingNodeId = NodeId, FindingName = NodeName, FindingLabel = NodeLabel,
                        FindingCategories = Categories, FindingProps = NodeProperties;

          let _Edges =
              ExposureGraphEdges
              | where EdgeLabel has "affecting"
              | extend EdgeProps = column_ifexists("EdgeProperties", dynamic({}))
              | project SourceNodeId, TargetNodeId, EdgeLabel, EdgeProps;

          let _AssetFindingEdges_oneway =
              _Edges
              | join kind=inner (_Assets)   on $left.SourceNodeId == $right.AssetNodeId
              | join kind=inner (_Findings) on $left.TargetNodeId == $right.FindingNodeId
              | project AssetNodeId, AssetName, AssetLabel, EG_IsCustomerFacing, EG_IsExcluded,
                        FindingName, FindingLabel, FindingCategories, FindingProps,
                        EdgeLabel, EdgeProps, AssetProps;

          let _AssetFindingEdges_otherway =
              _Edges
              | join kind=inner (_Assets)   on $left.TargetNodeId == $right.AssetNodeId
              | join kind=inner (_Findings) on $left.SourceNodeId == $right.FindingNodeId
              | project AssetNodeId, AssetName, AssetLabel, EG_IsCustomerFacing, EG_IsExcluded,
                        FindingName, FindingLabel, FindingCategories, FindingProps,
                        EdgeLabel, EdgeProps, AssetProps;

          let _AssetFindingEdges = union _AssetFindingEdges_oneway, _AssetFindingEdges_otherway;

          _AssetFindingEdges
              | extend DeviceKey = coalesce(AssetNodeId, AssetName)
              //__BUCKET_FILTER_BEGIN__
              | where 1 == 1
              //__BUCKET_FILTER_END__
              | where not (FindingName in (_excludedConfigurationIds))
              | summarize
                  EdgeLabels            = make_set(EdgeLabel),
                  EdgePropsAny          = any(EdgeProps),
                  FindingLabel          = any(FindingLabel),
                  FindingCategories     = any(FindingCategories),
                  FindingProps          = any(FindingProps),
                  EG_IsCustomerFacing   = any(EG_IsCustomerFacing),
                  EG_IsExcluded         = any(EG_IsExcluded),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
                by AssetNodeId, AssetName, AssetLabel, FindingName
              | join kind=leftouter (_ap) on $left.AssetNodeId == $right.AzureResourceId_Guid
              // v2.2.208 -- dropped dead coalesce sources. SourceAssets_Path /
              // TargetAssets_Path / ImpactedAssets were copy-pasted from an
              // Attack_Paths report and never exist on this CVE shape.
              | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""))
              | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("AzureResourceId_Guid", ""), column_ifexists("AzureResourceId", ""))
              | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("AssetLabel", ""), "Azure")
              | where tobool(coalesce(column_ifexists("IsExcludedByTag", false), false)) == false
              //__WEIGHTED_FACTORS_BEGIN__
              | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
              | extend RiskScore_Weight_Factor   = 100   // basis-100, 100 = 1.0x = no lift
              | extend RiskFactor_Weight         = 100
              //__WEIGHTED_FACTORS_END__
              | extend Properties =
                  bag_merge(
                      bag_pack("finding", FindingProps),
                      bag_pack("raw", iif(isnull(FindingProps.rawData), dynamic({}), FindingProps.rawData)),
                      bag_pack("edge", EdgePropsAny)
                  )
              | extend Subcategory = tostring(Properties.raw.securityIssue.securityIssue)
              | extend RiskFactorsArray = todynamic(Properties.edge.rawData.risk.riskFactors)
              | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)
              | mv-apply rf = RiskFactorsArray on (
                  where isnotempty(trim(" ", tostring(rf)))
                  | summarize RiskFactorSet = make_set(tostring(rf)))
              | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
              | extend RF_P_InternetExposed = iff(EG_IsCustomerFacing == true, 1, 0)
              | extend RiskFactor_Probability = array_length(RiskFactorSet) + RF_P_InternetExposed
              | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
              | extend RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(array_concat(
                  RiskFactorSet,
                  iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])))), ";")
              | extend Severity = tostring(Properties.raw.severity)
              | extend SecuritySeverity = case(
                  tolower(Severity) == "critical", "Very High",
                  tolower(Severity) == "high",     "High",
                  tolower(Severity) == "medium",   "Medium",
                  tolower(Severity) == "low",      "Low",
                  "Low")
              | where isnotempty(tostring(column_ifexists("Severity", "")))
              | extend Impact = case(
                  tolower(Severity) == "critical", 10.0,
                  tolower(Severity) == "high",     9.0,
                  tolower(Severity) == "medium",   7.0,
                  tolower(Severity) == "low",      3.0,
                  0.0)
              | extend CriticalityTier = Tier_From_SI_CL
              | extend CriticalityTierLevel = case(
                  CriticalityTier == 0, "Critical - tier 0",
                  CriticalityTier == 1, "High - tier 1",
                  CriticalityTier == 2, "Medium - tier 2",
                  CriticalityTier == 3, "Low - tier 3",
                  "Low - tier 3")
              | extend SecurityDomain    = "Azure"
              | extend Category          = tostring(FindingLabel)
              | extend ConfigurationName = tostring(FindingName)
              // ConfigurationId carries the per-row recommendation id so (AssetName, ConfigurationId) is unique per row.
              // Engine dedup keys on ConfigurationId via $cnInName -- this is what keeps Detailed rows alive.
              | extend ConfigurationId   = tostring(FindingName)
              | project
                  SecurityDomain, Category, Subcategory,
                  ConfigurationName, ConfigurationId,
                            AssetName,
                            AssetId,
                            AssetType,
                  AzureResourceId,
                  Impact, SecuritySeverity,
                  CriticalityTier, CriticalityTierLevel,
                  cmdbId,
                  cmdbName,
                  cmdbCriticality, cmdbDataSensitivity,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed,
                  RiskScore_Weight_Detailed, RiskScore_Weight_Factor, RiskFactor_Weight,
                  EG_IsCustomerFacing
              | order by CriticalityTier asc, RiskScore_Weight_Factor desc, Impact desc, AssetName asc, ConfigurationId asc


    - ReportName: Attack_Paths_Summary_Github_to_Azure_Resources
      ReportPurpose: Credential-driven attack paths from GitHub to Azure targets, prioritized by FINAL TARGET business impact.
        EG provides the path detection + lateral-movement scoring + tier; SI_Azure_Profile_CL contributes target asset metadata only
        (cmdbName, cmdbCriticality, cmdbDataSensitivity) joined on the FINAL TARGET via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // =================================================================================================
        // REPORT  Credential driven attack paths from GitHub to Azure using Exposure Graph
        // =================================================================================================
        //
        // Report purpose
        // Identify credentials stored in GitHub workflows or repositories and trace credential driven
        // attack paths into Azure targets. Paths are prioritized by the business impact of the FINAL TARGET.
        //
        // Interpretation guard and priority rules
        // - Priority is driven by the TARGET criticality tier first
        // - Then by tier escalation where source tier is higher than target tier
        // - Then by Internet exposure where target exposure is weighted higher than source exposure
        // - GitHub sources are treated as Internet exposed and low trust by default
        // - A low tier source can never outrank a tier 0 or tier 1 target
        //
        // Output description
        // Detailed output produces one row per unique credential to target attack path enriched with
        // - Internet exposure flags
        // - Asset tier from tags
        // - Legacy operating system and end of support signals
        // - Risk factor probability including detailed breakdown
        // - Attack path priority score and severity
        // - Human readable attack path strings
        //
        // Collapsed summary output merges duplicates caused by many credentials or sources
        // - Collapse key uses source identity target triple
        // - Summaries include RiskFactor_Probability_Detailed and DetailedScore derived from target
        //
        // Query steps overview
        // Step 0  Define legacy operating system reference lists
        // Step 1  Build Nodes catalog as enrichment backbone
        // Step 2  Normalize node labels to avoid filter issues
        // Step 3  Identify credentials stored in GitHub workflows and repositories
        // Step 4  Hop 1 credential authenticates as an identity
        // Step 5  Hop 2 identity can reach Azure target resources
        // Step 6  Assemble attack paths and de duplicate
        // Step 7  Enrich source target intermediate and credential using Nodes catalog
        // Step 8  Calculate tier escalation lateral movement and priority score
        // Step 9  Build human readable AttackPath and AttackPathDetailed
        // Step 10 Emit detailed output table
        // Step 11 Collapse to unique logical path
        // Step 12 Build main summary
        // Step 13 Build probability detail summary
        // Step 14 Build probability detail score summary
        // Step 15 Emit final collapsed output
        // =================================================================================================

        // Step 0  Define legacy operating systems that should increase probability
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);

        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure resources only).
        // EG drives path detection + lateral-movement + tier; CL contributes ONLY cmdb metadata.
        // Join key  FinalTargetId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Build node catalog used to enrich attack paths
        // - Bucket filtering is applied once at node scope using DeviceKey
        let Nodes =
            ExposureGraphNodes
            | extend CategoriesStr = tolower(tostring(Categories))
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))

            | extend AssetName = NodeNameNorm
            | extend AadDeviceId =
                tostring(coalesce(
                    NodeProperties.rawData.aadDeviceId,
                    NodeProperties.raw.aadDeviceId,
                    NodeProperties.aadDeviceId
                ))

            | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, NodeNameNorm)
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__

            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend CriticalityRuleBased =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].ruleBasedCriticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.ruleBasedCriticalityLevel),
                    tostring(NodeProperties.criticalityLevel.ruleBasedCriticalityLevel)
                ))
            | extend CriticalityRuleNames =
                coalesce(
                    strcat_array(NodeProperties.criticalityLevelProps[0].ruleNames, ", "),
                    strcat_array(NodeProperties.rawData.criticalityLevel.ruleNames, ", "),
                    ""
                )

            | extend IsInternetExposed =
                tobool(coalesce(
                    NodeProperties.rawData.isCustomerFacing,
                    NodeProperties.raw.isCustomerFacing,
                    false
                ))

            | extend IsExcluded =
                tobool(coalesce(
                    NodeProperties.rawData.isExcluded,
                    NodeProperties.raw.isExcluded,
                    false
                ))

            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)

            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))

            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))

            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))
            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            
            // Exclude Devices, which includes tag with '--Excluded--SI'
            | where AssetTags !has "--Excluded--SI"
            
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)

            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )

            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )

            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )

            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))

            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                    tolower(AssetOSPlatform) has "linux"
                    and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                    1, 0
                )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)

            | extend RiskFactorsArray =
                todynamic(coalesce(
                    NodeProperties.rawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)

            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)

            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )

            | mv-apply rf = array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                ) on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize ScoreParts = make_set(strcat(tostring(rf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")

            | project
                NodeId,
                NodeName          = NodeNameNorm,
                NodeLabel,
                Categories        = CategoriesStr,
                NodeProperties,
                CriticalityLevel,
                CriticalityTier,
                CriticalityTierLevel,
                CriticalityRuleBased,
                CriticalityRuleNames,
                IsInternetExposed,
                IsExcluded,
                AssetTags,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactorsArray,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence;

        // Step 2  Normalize labels to avoid typos breaking filters
        let NormalizeLabel = (s:string) { tolower(trim(" ", replace_string(s, " ", ""))) };

        // Step 3  Identify credentials stored in GitHub workflows and repositories
        // Fixes applied
        // - GitHub graph label variations are common, allow a small set of normalized variants
        // - Also support reverse edge direction (credential contains github object) with isfuzzy union
        let GitHubSourceLabelAllow =
            dynamic([
                "githubworkflow",
                "githubrepository",
                "githubactionsworkflow",
                "githubactions",
                "github"
            ]);

        let CredentialLabelAllow =
            dynamic([
                "azure-active-directory-app-secret",
                "user-azure-cli-secret",
                "azure-storage-shared-access-signature",
                "azure-storage-connection-string",
                "azure-database-connection-string",
                "azure-active-directory-user-credentials",
                "service-principal-azure-cli-secret",
                "azure-app-configuration-key"
            ]);

        let GitHubCredentials_Forward =
            ExposureGraphEdges
            | where EdgeLabel in ("contains", "defined in")
            | extend SourceNodeLabelNorm = NormalizeLabel(SourceNodeLabel),
                     TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where SourceNodeLabelNorm in (GitHubSourceLabelAllow)
            | where TargetNodeLabelNorm in (CredentialLabelAllow)
            | project
                SourceGitHubNodeId    = SourceNodeId,
                SourceGitHubNodeName  = SourceNodeName,
                SourceGitHubNodeLabel = SourceNodeLabel,
                CredentialNodeId      = TargetNodeId,
                CredentialNodeName    = TargetNodeName,
                CredentialNodeLabel   = TargetNodeLabel;

        let GitHubCredentials_Reverse =
            ExposureGraphEdges
            | where EdgeLabel in ("contains", "defined in")
            | extend SourceNodeLabelNorm = NormalizeLabel(SourceNodeLabel),
                     TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where TargetNodeLabelNorm in (GitHubSourceLabelAllow)
            | where SourceNodeLabelNorm in (CredentialLabelAllow)
            | project
                SourceGitHubNodeId    = TargetNodeId,
                SourceGitHubNodeName  = TargetNodeName,
                SourceGitHubNodeLabel = TargetNodeLabel,
                CredentialNodeId      = SourceNodeId,
                CredentialNodeName    = SourceNodeName,
                CredentialNodeLabel   = SourceNodeLabel;

        let GitHubCredentials =
            union isfuzzy=true GitHubCredentials_Forward, GitHubCredentials_Reverse
            | summarize
                GitHubSources          = make_set(SourceGitHubNodeName),
                GitHubSourceTypes      = make_set(SourceGitHubNodeLabel),
                GitHubSourceCount      = dcount(SourceGitHubNodeId),
                FirstGitHubSource      = any(SourceGitHubNodeId),
                FirstGitHubSourceName  = any(SourceGitHubNodeName),
                FirstGitHubSourceLabel = any(SourceGitHubNodeLabel),
                CredentialNodeName     = any(CredentialNodeName),
                CredentialNodeLabel    = any(CredentialNodeLabel),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                CredentialNodeId;

        // Step 4  Hop 1 credential authenticates as an identity
        // Fixes applied
        // - Many graphs store the identity as Source and credential as Target, support both directions
        let Hop1_Forward =
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "can authenticate as", "can authenticate to")
            | project
                CredentialNodeId           = SourceNodeId,
                Hop1_EdgeLabel             = EdgeLabel,
                IntermediateIdentityId     = TargetNodeId,
                IntermediateIdentity       = TargetNodeName,
                IntermediateIdentityLabel  = TargetNodeLabel;

        let Hop1_Reverse =
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "can authenticate as", "can authenticate to")
            | project
                CredentialNodeId           = TargetNodeId,
                Hop1_EdgeLabel             = EdgeLabel,
                IntermediateIdentityId     = SourceNodeId,
                IntermediateIdentity       = SourceNodeName,
                IntermediateIdentityLabel  = SourceNodeLabel;

        let Hop1 =
            union isfuzzy=true Hop1_Forward, Hop1_Reverse;

        // Step 5  Hop 2 identity can reach Azure target resources
        let Hop2 =
            ExposureGraphEdges
            | where EdgeLabel in ("can authenticate to", "has permissions to", "has role on")
            | extend TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where TargetNodeLabelNorm in (
                "microsoft.compute/virtualmachines",
                "microsoft.storage/storageaccounts",
                "microsoft.keyvault/vaults",
                "microsoft.sql/servers",
                "microsoft.sql/servers/databases",
                "microsoft.cognitiveservices/accounts",
                "microsoft.cognitiveservices/accounts_openai",
                "subscriptions",
                "resourcegroups",
                "blobcontainer"
            )
            | project
                Hop2_SourceIdentityId = SourceNodeId,
                Hop2_EdgeLabel        = EdgeLabel,
                FinalTargetId         = TargetNodeId,
                FinalTargetName       = TargetNodeName,
                FinalTargetLabel      = TargetNodeLabel;

        // Step 6  Assemble attack paths and de duplicate
        // Fixes applied
        // - Original summarize by CredentialNodeId, FinalTargetId collapsed away IntermediateIdentityId
        //   which breaks PathKey later and can create null or wrong joins
        // - Stable detailed grain should include CredentialNodeId, IntermediateIdentityId, FinalTargetId
        let Detailed =
            GitHubCredentials
            | join kind=inner (Hop1) on CredentialNodeId
            | join kind=inner (Hop2) on $left.IntermediateIdentityId == $right.Hop2_SourceIdentityId
            | where FirstGitHubSource != FinalTargetId
            | summarize
                GitHubSources          = any(GitHubSources),
                GitHubSourceTypes      = any(GitHubSourceTypes),
                GitHubSourceCount      = any(GitHubSourceCount),
                FirstGitHubSource      = any(FirstGitHubSource),
                FirstGitHubSourceName  = any(FirstGitHubSourceName),
                FirstGitHubSourceLabel = any(FirstGitHubSourceLabel),

                CredentialNodeName     = any(CredentialNodeName),
                CredentialNodeLabel    = any(CredentialNodeLabel),

                IntermediateIdentity      = any(IntermediateIdentity),
                IntermediateIdentityLabel = any(IntermediateIdentityLabel),

                Hop1Edge = any(Hop1_EdgeLabel),
                Hop2Edge = any(Hop2_EdgeLabel),

                FinalTargetName  = any(FinalTargetName),
                FinalTargetLabel = any(FinalTargetLabel)
              by
                CredentialNodeId,
                IntermediateIdentityId,
                FinalTargetId;

        // Step 7  Enrich source target intermediate and credential using Nodes catalog
        let DetailedEnriched =
            Detailed
            | join kind=leftouter (
                Nodes
                | project-rename
                    TargetNodeId                = NodeId,
                    TargetNodeName              = NodeName,
                    TargetNodeLabel             = NodeLabel,
                    TargetCriticalityTier       = CriticalityTier,
                    TargetCriticalityTierLevel  = CriticalityTierLevel,
                    TargetIsInternetExposed     = IsInternetExposed,
                    TargetIsExcluded            = IsExcluded,
                    TargetAssetTierByTag        = AssetTierByTag,
                    TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                    TargetRiskProb              = RiskFactor_Probability,
                    TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                    TargetNodeProperties        = NodeProperties
            ) on $left.FinalTargetId == $right.TargetNodeId

            | join kind=leftouter (
                Nodes
                | project-rename
                    IntermediateNodeId                = NodeId,
                    IntermediateNodeName              = NodeName,
                    IntermediateNodeLabel             = NodeLabel,
                    IntermediateCriticalityTier       = CriticalityTier,
                    IntermediateCriticalityTierLevel  = CriticalityTierLevel,
                    IntermediateIsInternetExposed     = IsInternetExposed,
                    IntermediateIsExcluded            = IsExcluded,
                    IntermediateAssetTierByTag        = AssetTierByTag,
                    IntermediateLegacyEndOfSupport    = LegacyEndOfSupport,
                    IntermediateRiskProb              = RiskFactor_Probability,
                    IntermediateRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    IntermediateRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                    IntermediateNodeProperties        = NodeProperties
            ) on $left.IntermediateIdentityId == $right.IntermediateNodeId

            | join kind=leftouter (
                Nodes
                | project-rename
                    CredentialNodeId_join    = NodeId,
                    CredentialNodeName_join  = NodeName,
                    CredentialNodeLabel_join = NodeLabel,
                    CredentialNodeProperties = NodeProperties
            ) on $left.CredentialNodeId == $right.CredentialNodeId_join

            // CL asset-metadata enrichment for the FINAL TARGET (cmdb fields only -- EG owns tier/path).
            | join kind=leftouter (_TargetCmdb) on $left.FinalTargetId == $right.Target_AzureResourceId_Guid
            | extend
                cmdbId            = Target_cmdbId,
                cmdbName            = Target_cmdbName,
                cmdbCriticality     = Target_cmdbCriticality,
                cmdbDataSensitivity = Target_cmdbDataSensitivity

            // GitHub sources are treated as internet exposed and low trust by default
            // Fixes applied
            // - SourceCriticalityTier and SourceCriticalityTierLevel were taken from Nodes join on FirstGitHubSource
            //   but GitHub nodes often are not in Nodes catalog or lack tier, so set safe defaults directly
            | extend SourceIsInternetExposed = true
            | extend SourceCriticalityTier = 3
            | extend SourceCriticalityTierLevel = "Low - tier 3"
            | extend SourceAssetTierByTag = ""
            | extend SourceLegacyEndOfSupport = 0
            | extend SourceRiskProb = 0
            | extend SourceRiskProbDetailed = ""
            | extend SourceRiskProbDetailedScore = ""

            // Step 8  Calculate tier escalation lateral movement and priority score
            | extend TierEscalation =
                case(
                    isnotempty(SourceCriticalityTier) and isnotempty(TargetCriticalityTier) and SourceCriticalityTier > TargetCriticalityTier,
                        SourceCriticalityTier - TargetCriticalityTier,
                    0
                )
            | extend IsLateralMovement = TierEscalation > 0
            | extend LateralMovementType =
                case(
                    TierEscalation >= 3, "Privilege escalation large tier jump",
                    TierEscalation == 2, "Privilege escalation two tiers",
                    TierEscalation == 1, "Privilege escalation one tier",
                    "Direct access same tier"
                )

            | extend TargetTierWeight =
                case(
                    TargetCriticalityTier == 0, 100,
                    TargetCriticalityTier == 1, 60,
                    TargetCriticalityTier == 2, 30,
                    10
                )
            | extend EscalationWeight = TierEscalation * 10
            | extend ExposureWeight   = iff(TargetIsInternetExposed == true, 8, 0) + 3
            | extend SourceTierAmplifier =
                case(
                    SourceCriticalityTier == 0, 8,
                    SourceCriticalityTier == 1, 5,
                    SourceCriticalityTier == 2, 2,
                    0
                )

            | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier

            | extend AttackPathPriority =
                case(
                    AttackPathPriorityScore >= 90,  "Very High",
                    AttackPathPriorityScore >= 60,  "High",
                    AttackPathPriorityScore >= 30,  "Medium-High",
                    AttackPathPriorityScore >= 15,  "Medium",
                    "Low"
                )

            // Step 9  Build human readable AttackPath and AttackPathDetailed
            | extend InternetExposureTarget = iff(TargetIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")
            | extend InternetExposureSource = "Internet-Exposed"

            | extend AttackPath =
                strcat(
                    FirstGitHubSourceLabel, " [", FirstGitHubSourceName, "] -> ",
                    CredentialNodeLabel, " [", CredentialNodeName, "] -> ",
                    IntermediateIdentityLabel, " [", IntermediateIdentity, "] -> ",
                    FinalTargetLabel, " [", FinalTargetName, "]"
                )

            | extend AttackPathDetailed =
                strcat(
                    "SOURCE ", FirstGitHubSourceLabel, " [", FirstGitHubSourceName, "] ",
                    "tier ", tostring(SourceCriticalityTier), " ", SourceCriticalityTierLevel, " | ", InternetExposureSource,
                    iff(GitHubSourceCount > 1, strcat(" | + ", tostring(GitHubSourceCount - 1), " other GitHub source(s)"), ""),
                    " -> CREDENTIAL ", CredentialNodeLabel, " [", CredentialNodeName, "] ",
                    " -> IDENTITY ", IntermediateIdentityLabel, " [", IntermediateIdentity, "] ",
                    " -> TARGET ", FinalTargetLabel, " [", FinalTargetName, "] ",
                    "tier ", tostring(TargetCriticalityTier), " ", TargetCriticalityTierLevel, " | ", InternetExposureTarget,
                    " | escalation ", tostring(TierEscalation),
                    " | ", LateralMovementType
                );

        // Step 10 Emit detailed output table
        let DetailedOutput =
            DetailedEnriched
            | extend SecurityDomain = "Azure"
            | extend Category = "AttackPath_GitHubToAzure"
            | extend Subcategory =
                case(
                    TierEscalation >= 3, strcat("GitHub to Tier ", tostring(TargetCriticalityTier), " - Critical Supply Chain Risk"),
                    TierEscalation >= 2, strcat("GitHub to Tier ", tostring(TargetCriticalityTier), " - High Supply Chain Risk"),
                    TierEscalation >= 1, strcat("GitHub to Tier ", tostring(TargetCriticalityTier), " - Moderate Supply Chain Risk"),
                    "GitHub to Azure - Direct Access"
                )
            | project
                SecurityDomain,
                Category,
                Subcategory,

                AttackPathPriority,
                AttackPathPriorityScore,
                TierEscalation,
                IsLateralMovement,
                LateralMovementType,
                EscalationWeight,
                ExposureWeight,

                FirstGitHubSource,
                FirstGitHubSourceName,
                FirstGitHubSourceLabel,
                TotalGitHubSourcesWithCredential = GitHubSourceCount,
                AllGitHubSources = GitHubSources,
                GitHubSourceTypes,

                CredentialNodeId,
                CredentialNodeName,
                CredentialNodeLabel,

                IntermediateIdentityId,
                IntermediateIdentity,
                IntermediateIdentityType = IntermediateIdentityLabel,

                FinalTargetId,
                FinalTarget = FinalTargetName,
                FinalTargetType = FinalTargetLabel,

                CriticalityTier = TargetCriticalityTier,
                CriticalityTierLevel = TargetCriticalityTierLevel,
                TargetAssetTierByTag,
                TargetIsInternetExposed,
                TargetLegacyEndOfSupport,
                TargetRiskProb,
                TargetRiskProbDetailed,
                TargetRiskProbDetailedScore,

                IntermediateCriticalityTier,
                IntermediateCriticalityTierLevel,
                IntermediateIsInternetExposed,
                IntermediateLegacyEndOfSupport,
                IntermediateRiskProb,
                IntermediateRiskProbDetailed,
                IntermediateRiskProbDetailedScore,

                Hop1Edge,
                Hop2Edge,

                AttackPath,
                AttackPathDetailed,

                IntermediateNodeProperties,
                TargetNodeProperties,
                CredentialNodeProperties;

        // Step 11 Collapse to unique logical path
        // Fixes applied
        // - Collapse key uses source identity target triple but now uses stable IDs
        // - Summary uses credential label set, impacted assets are GitHub sources
        let CollapsedPaths =
            DetailedEnriched
            | extend PathKey = strcat(FirstGitHubSource, "->", IntermediateIdentityId, "->", FinalTargetId)
            | extend SecurityDomain =
                case(
                    FinalTargetLabel in ("device","computer-account","microsoft.compute/virtualmachines"), "Endpoint",
                    "Azure"
                )
            | extend
                Category    = "Attack Paths",
                SubCategory = "LateralMovement",
                ConfigurationName = tostring(LateralMovementType),
                SecuritySeverity  = tostring(AttackPathPriority),
                RiskFactor_Consequence = 0
            | summarize
                AttackPathPriorityScore_Path = max(AttackPathPriorityScore),
                AttackPathPriority_Path      = any(AttackPathPriority),

                TargetCriticalityTier_Path      = any(TargetCriticalityTier),
                TargetCriticalityTierLevel_Path = any(TargetCriticalityTierLevel),
                TargetRiskProb_Path             = max(TargetRiskProb),

                TargetRiskProbDetailed_Path      = any(TargetRiskProbDetailed),
                TargetRiskProbDetailedScore_Path = any(TargetRiskProbDetailedScore),

                // CL cmdb metadata for the FINAL TARGET (any() -- one cmdb row per target).
                cmdbId_Path              = any(cmdbId),
                cmdbName_Path            = any(cmdbName),
                cmdbCriticality_Path     = any(cmdbCriticality),
                cmdbDataSensitivity_Path = any(cmdbDataSensitivity),

                CredentialLabels_Path = make_set(tostring(CredentialNodeLabel)),
                SourceAssets_Path     = make_set(tostring(FirstGitHubSourceName)),
                // TargetAssets_Path is what AssetCount (dcount(FinalTargetId)) actually counts --
                // the Azure resources under attack. ImpactedAssets below uses this so the
                // asset-count and the asset-names match the same entity (targets).
                TargetAssets_Path     = make_set(tostring(FinalTargetName)),
                TotalIssues_Path      = count()
              by
                PathKey,
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                FinalTargetId;

        // Step 12 Build main summary
        // cmdbCriticality + cmdbDataSensitivity in by-clause so cmdb-bucketed rows survive
        // (matches Summary pattern in Device_Missing_CVEs_Summary). SummaryDetail / SummaryDetailScore
        // include them in their by-clauses too so the final left-outer joins line up.
        let SummaryMain =
            CollapsedPaths
            | summarize
                ConfigurationId = strcat_array(array_sort_asc(make_set(strcat_array(CredentialLabels_Path, ";"))), ";"),

                SecuritySeverity = any(AttackPathPriority_Path),
                CriticalityTier = toint(any(TargetCriticalityTier_Path)),
                CriticalityTierLevel = tostring(any(TargetCriticalityTierLevel_Path)),

                RiskFactor_Consequence = 0,
                RiskFactor_Probability = max(TargetRiskProb_Path),

                AssetCount   = dcount(FinalTargetId),
                TotalIssues  = sum(TotalIssues_Path),

                ImpactedAssets = strcat_array(array_sort_asc(make_set(strcat_array(TargetAssets_Path, ";"))), ";")
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 13 Build probability detail summary
        let SummaryDetail =
            CollapsedPaths
            | extend _d = split(tostring(TargetRiskProbDetailed_Path), ";")
            | mv-expand _d to typeof(string)
            | extend _d = trim(" ", _d)
            | where isnotempty(_d)
            | summarize
                RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(make_set(_d)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 14 Build probability detail score summary
        let SummaryDetailScore =
            CollapsedPaths
            | extend _s = split(tostring(TargetRiskProbDetailedScore_Path), ";")
            | mv-expand _s to typeof(string)
            | extend _s = trim(" ", _s)
            | where isnotempty(_s)
            | summarize
                RiskFactor_Probability_DetailedScore = strcat_array(array_sort_asc(make_set(_s)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 15 Emit final collapsed output
        SummaryMain
        | join kind=leftouter SummaryDetail      on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        | join kind=leftouter SummaryDetailScore on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project
            SecurityDomain,
            Category,
            SubCategory,
            ConfigurationName,
            ConfigurationId,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AssetCount,
            TotalIssues,
            ImpactedAssets
        | order by
            RiskScore_Weight_Factor desc,
            RiskFactor_Probability desc,
            CriticalityTier asc,
            TotalIssues desc,
            AssetCount desc


    - ReportName: Attack_Paths_Detailed_Github_to_Azure_Resources
      ReportPurpose: Per-row detail of credential-driven attack paths from GitHub to Azure targets, prioritized by FINAL TARGET business impact.
        EG drives path detection + lateral-movement scoring + tier; SI_Azure_Profile_CL contributes target asset metadata only
        (cmdbName, cmdbCriticality, cmdbDataSensitivity) joined on the FINAL TARGET via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |
        // =================================================================================================
        // REPORT  Credential driven attack paths from GitHub to Azure using Exposure Graph
        // =================================================================================================
        //
        // Report purpose
        // Identify credentials stored in GitHub workflows or repositories and trace credential driven
        // attack paths into Azure targets. Paths are prioritized by the business impact of the FINAL TARGET.
        //
        // Interpretation guard and priority rules
        // - Priority is driven by the TARGET criticality tier first
        // - Then by tier escalation where source tier is higher than target tier
        // - Then by Internet exposure where target exposure is weighted higher than source exposure
        // - GitHub sources are treated as Internet exposed and low trust by default
        // - A low tier source can never outrank a tier 0 or tier 1 target
        //
        // Output description
        // One row per unique credential to target attack path enriched with
        // - Internet exposure flags
        // - Asset tier from tags
        // - Legacy operating system and end of support signals
        // - Risk factor probability including detailed breakdown
        // - Attack path priority score and severity
        // - Human readable attack path strings
        //
        // Query steps overview
        // Step 0  Define legacy operating system reference lists
        // Step 1  Build Nodes catalog as enrichment backbone
        // Step 2  Normalize node labels to avoid filter issues
        // Step 3  Identify credentials stored in GitHub workflows and repositories
        // Step 4  Hop 1 credential authenticates as an identity
        // Step 5  Hop 2 identity can reach Azure target resources
        // Step 6  De duplicate attack paths to a stable grain
        // Step 7  Enrich source and target nodes using Nodes catalog
        // Step 8  Calculate tier escalation lateral movement and priority score
        // Step 9  Build human readable AttackPath and AttackPathDetailed
        // Step 10 Project final report columns and apply ordering
        // =================================================================================================

        // Step 0  Define legacy operating systems that should increase probability (same as CVE report)
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);

        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure resources only).
        // EG drives path detection + lateral-movement + tier; CL contributes ONLY cmdb metadata.
        // Join key  FinalTargetId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Build node catalog used to enrich attack paths (UPDATED to match your standard context)
        let Nodes =
            ExposureGraphNodes
            | extend CategoriesStr = tolower(tostring(Categories))
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))
            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)
            | extend AadDeviceId =
                tostring(coalesce(
                    RawData.aadDeviceId,
                    Raw.aadDeviceId,
                    NodeProperties.aadDeviceId
                ))

            | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, NodeNameNorm)
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__

            // Criticality extraction from multiple possible fields
            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend CriticalityRuleBased =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].ruleBasedCriticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.ruleBasedCriticalityLevel),
                    tostring(NodeProperties.criticalityLevel.ruleBasedCriticalityLevel)
                ))
            | extend CriticalityRuleNames =
                coalesce(
                    strcat_array(NodeProperties.criticalityLevelProps[0].ruleNames, ", "),
                    strcat_array(NodeProperties.rawData.criticalityLevel.ruleNames, ", "),
                    ""
                )

            // Internet exposure flag derived from graph property isCustomerFacing renamed
            | extend IsInternetExposed =
                tobool(coalesce(
                    NodeProperties.rawData.isCustomerFacing,
                    NodeProperties.raw.isCustomerFacing,
                    false
                ))

            // Exclusion flag
            | extend IsExcluded =
                tobool(coalesce(
                    NodeProperties.rawData.isExcluded,
                    NodeProperties.raw.isExcluded,
                    false
                ))

            // Normalize rawData and raw for tag and OS reading
            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)

            // AssetTierByTag preferred bag key AssetTier fallback tag array scan
            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))

            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))

            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))
            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            
            // Exclude Devices, which includes tag with '--Excluded--SI'
            | where AssetTags !has "--Excluded--SI"
            
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)

            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )

            // Tag fallback mapping only used when Defender criticality is missing
            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )

            // Prefer Defender criticality over tag
            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )

            // LegacyEndOfSupport detection same as CVE report
            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))

            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                    tolower(AssetOSPlatform) has "linux"
                    and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                    1, 0
                )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)

            // Risk factors on nodes count distinct plus Internet-Exposed plus LegacyEoS
            | extend RiskFactorsArray =
                todynamic(coalesce(
                    NodeProperties.rawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)

            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)

            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )

            | mv-apply rf = array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                ) on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize ScoreParts = make_set(strcat(tostring(rf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")

            | project
                NodeId,
                NodeName          = NodeNameNorm,
                NodeLabel,
                Categories        = CategoriesStr,
                NodeProperties,
                CriticalityLevel,
                CriticalityTier,
                CriticalityTierLevel,
                CriticalityRuleBased,
                CriticalityRuleNames,
                IsInternetExposed,
                IsExcluded,
                AssetTags,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactorsArray,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence;

        // Step 2  Normalize labels to avoid typos breaking filters
        let NormalizeLabel = (s:string) { tolower(trim(" ", replace_string(s, " ", ""))) };

        // Step 3  Find credentials in GitHub workflows/repositories
        let GitHubCredentials =
            ExposureGraphEdges
            | where EdgeLabel in ("contains", "defined in")
            | extend SourceNodeLabelNorm = NormalizeLabel(SourceNodeLabel),
                     TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where SourceNodeLabelNorm in ("githubworkflow", "githubrepository")
            | where TargetNodeLabelNorm in (
                "azure-active-directory-app-secret",
                "user-azure-cli-secret",
                "azure-storage-shared-access-signature",
                "azure-storage-connection-string",
                "azure-database-connection-string",
                "azure-active-directory-user-credentials",
                "service-principal-azure-cli-secret",
                "azure-app-configuration-key"
            )
            | project
                SourceGitHubNodeId    = SourceNodeId,
                SourceGitHubNodeName  = SourceNodeName,
                SourceGitHubNodeLabel = SourceNodeLabel,
                CredentialNodeId      = TargetNodeId,
                CredentialNodeName    = TargetNodeName,
                CredentialNodeLabel   = TargetNodeLabel
            | summarize
                GitHubSources          = make_set(SourceGitHubNodeName),
                GitHubSourceTypes      = make_set(SourceGitHubNodeLabel),
                GitHubSourceCount      = dcount(SourceGitHubNodeId),
                FirstGitHubSource      = any(SourceGitHubNodeId),
                FirstGitHubSourceName  = any(SourceGitHubNodeName),
                FirstGitHubSourceLabel = any(SourceGitHubNodeLabel),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by CredentialNodeId, CredentialNodeName, CredentialNodeLabel;

        // Step 4  Main attack path query GitHub Credential -> Identity
        GitHubCredentials
        | join kind=inner (
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "can authenticate as", "can authenticate to")
            | project
                Hop1_SourceCredentialId = SourceNodeId,
                Hop1_EdgeLabel          = EdgeLabel,
                IntermediateIdentityId  = TargetNodeId,
                IntermediateIdentity    = TargetNodeName,
                IntermediateIdentityLabel = TargetNodeLabel
        ) on $left.CredentialNodeId == $right.Hop1_SourceCredentialId

        // Step 5  Hop 2 Identity -> Azure Target
        | join kind=inner (
            ExposureGraphEdges
            | where EdgeLabel in ("can authenticate to", "has permissions to", "has role on")
            | extend TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where TargetNodeLabelNorm in (
                "microsoft.compute/virtualmachines",
                "microsoft.storage/storageaccounts",
                "microsoft.keyvault/vaults",
                "microsoft.sql/servers",
                "microsoft.sql/servers/databases",
                "microsoft.cognitiveservices/accounts",
                "microsoft.cognitiveservices/accounts_openai",
                "subscriptions",
                "resourcegroups",
                "blobcontainer"
            )
            | project
                Hop2_SourceIdentityId = SourceNodeId,
                Hop2_EdgeLabel        = EdgeLabel,
                FinalTargetId         = TargetNodeId,
                FinalTargetName       = TargetNodeName,
                FinalTargetLabel      = TargetNodeLabel
        ) on $left.IntermediateIdentityId == $right.Hop2_SourceIdentityId

        // Optional avoid ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã‚Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã‚Â¦ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã¢â‚¬Å“GitHub sourceÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã‚Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â == ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã‚Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã‚Â¦ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã¢â‚¬Å“target assetÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã‚Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â scenarios (usually not needed but safe)
        | where FirstGitHubSource != FinalTargetId

        // Step 6  De-duplicate to stable grain
        | summarize
            GitHubSources          = any(GitHubSources),
            GitHubSourceTypes      = any(GitHubSourceTypes),
            GitHubSourceCount      = any(GitHubSourceCount),
            FirstGitHubSource      = any(FirstGitHubSource),
            FirstGitHubSourceName  = any(FirstGitHubSourceName),
            FirstGitHubSourceLabel = any(FirstGitHubSourceLabel),

            CredentialNodeName     = any(CredentialNodeName),
            CredentialNodeLabel    = any(CredentialNodeLabel),

            IntermediateIdentityId    = any(IntermediateIdentityId),
            IntermediateIdentity      = any(IntermediateIdentity),
            IntermediateIdentityLabel = any(IntermediateIdentityLabel),

            Hop1Edge = any(Hop1_EdgeLabel),
            Hop2Edge = any(Hop2_EdgeLabel),

            FinalTargetName  = any(FinalTargetName),
            FinalTargetLabel = any(FinalTargetLabel)
          by CredentialNodeId, FinalTargetId

        // Step 7  Enrich SOURCE + TARGET using Nodes (context-standard fields)
        | join kind=leftouter (
            Nodes
            | project-rename
                SourceNodeId                = NodeId,
                SourceNodeName              = NodeName,
                SourceNodeLabel             = NodeLabel,
                SourceCriticalityTier       = CriticalityTier,
                SourceCriticalityTierLevel  = CriticalityTierLevel,
                SourceIsInternetExposed     = IsInternetExposed,
                SourceIsExcluded            = IsExcluded,
                SourceAssetTierByTag        = AssetTierByTag,
                SourceLegacyEndOfSupport    = LegacyEndOfSupport,
                SourceRiskProb              = RiskFactor_Probability,
                SourceRiskProbDetailed      = RiskFactor_Probability_Detailed,
                SourceRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                SourceNodeProperties        = NodeProperties
        ) on $left.FirstGitHubSource == $right.SourceNodeId

        | join kind=leftouter (
            Nodes
            | project-rename
                TargetNodeId                = NodeId,
                TargetNodeName              = NodeName,
                TargetNodeLabel             = NodeLabel,
                TargetCriticalityTier       = CriticalityTier,
                TargetCriticalityTierLevel  = CriticalityTierLevel,
                TargetIsInternetExposed     = IsInternetExposed,
                TargetIsExcluded            = IsExcluded,
                TargetAssetTierByTag        = AssetTierByTag,
                TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                TargetRiskProb              = RiskFactor_Probability,
                TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                TargetNodeProperties        = NodeProperties
        ) on $left.FinalTargetId == $right.TargetNodeId

        // CL asset-metadata enrichment for the FINAL TARGET (cmdb fields only -- EG owns tier/path).
        | join kind=leftouter (_TargetCmdb) on $left.FinalTargetId == $right.Target_AzureResourceId_Guid
        | extend
            cmdbId            = Target_cmdbId,
            cmdbName            = Target_cmdbName,
            cmdbCriticality     = Target_cmdbCriticality,
            cmdbDataSensitivity = Target_cmdbDataSensitivity

        // Step 8  Apply your standard prioritization logic (GitHub treated as Internet-exposed / low trust)
        | extend
            // GitHub is internet-facing by default (override if Nodes is missing or false)
            SourceIsInternetExposed = true,
            // GitHub treated as low trust force source tier=3 if Nodes did not map it
            SourceCriticalityTier   = toint(coalesce(SourceCriticalityTier, 3)),
            SourceCriticalityTierLevel = tostring(coalesce(SourceCriticalityTierLevel, "Low - tier 3"))

        // Tier escalation (only if source tier > target tier)
        | extend TierEscalation =
            case(
                isnotempty(SourceCriticalityTier) and isnotempty(TargetCriticalityTier) and SourceCriticalityTier > TargetCriticalityTier,
                    SourceCriticalityTier - TargetCriticalityTier,
                0
            )
        | extend IsLateralMovement = TierEscalation > 0
        | extend LateralMovementType =
            case(
                TierEscalation >= 3, "Privilege escalation large tier jump",
                TierEscalation == 2, "Privilege escalation two tiers",
                TierEscalation == 1, "Privilege escalation one tier",
                "Direct access same tier"
            )

        // Standard AttackPathPriorityScore components
        | extend TargetTierWeight =
            case(
                TargetCriticalityTier == 0, 100,
                TargetCriticalityTier == 1, 60,
                TargetCriticalityTier == 2, 30,
                10
            )
        | extend EscalationWeight = TierEscalation * 10
        | extend ExposureWeight   = iff(TargetIsInternetExposed == true, 8, 0) + iff(SourceIsInternetExposed == true, 3, 0)
        | extend SourceTierAmplifier =
            case(
                SourceCriticalityTier == 0, 8,
                SourceCriticalityTier == 1, 5,
                SourceCriticalityTier == 2, 2,
                0
            )
        | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier

        | extend AttackPathPriority =
            case(
                AttackPathPriorityScore >= 90,  "Very High",
                AttackPathPriorityScore >= 60,  "High",
                AttackPathPriorityScore >= 30,  "Medium-High",
                AttackPathPriorityScore >= 15,  "Medium",
                "Low"
            )

        // Step 9  Human readable paths and Internet-Exposed wording
        | extend InternetExposureTarget = iff(TargetIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")
        | extend InternetExposureSource = iff(SourceIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")

        | extend AttackPath =
            strcat(
                FirstGitHubSourceLabel, " [", FirstGitHubSourceName, "] -> ",
                CredentialNodeLabel, " [", CredentialNodeName, "] -> ",
                IntermediateIdentityLabel, " [", IntermediateIdentity, "] -> ",
                FinalTargetLabel, " [", FinalTargetName, "]"
            )

        | extend AttackPathDetailed =
            strcat(
                "SOURCE ", FirstGitHubSourceLabel, " [", FirstGitHubSourceName, "] ",
                "tier ", tostring(SourceCriticalityTier), " ", SourceCriticalityTierLevel, " | ", InternetExposureSource,
                iff(GitHubSourceCount > 1, strcat(" | + ", tostring(GitHubSourceCount - 1), " other GitHub source(s)"), ""),
                " -> CREDENTIAL ", CredentialNodeLabel, " [", CredentialNodeName, "] ",
                " -> IDENTITY ", IntermediateIdentityLabel, " [", IntermediateIdentity, "] ",
                " -> TARGET ", FinalTargetLabel, " [", FinalTargetName, "] ",
                "tier ", tostring(TargetCriticalityTier), " ", TargetCriticalityTierLevel, " | ", InternetExposureTarget,
                " | escalation ", tostring(TierEscalation),
                " | ", LateralMovementType
            )

        // Final projection (keeps your original taxonomy fields but aligned to the context-standard logic)
        | extend SecurityDomain = "Azure"
        | extend Category = "AttackPath_GitHubToAzure"
        | extend Subcategory =
            case(
                TierEscalation >= 3, strcat("GitHub to Tier ", tostring(TargetCriticalityTier), " - Critical Supply Chain Risk"),
                TierEscalation >= 2, strcat("GitHub to Tier ", tostring(TargetCriticalityTier), " - High Supply Chain Risk"),
                TierEscalation >= 1, strcat("GitHub to Tier ", tostring(TargetCriticalityTier), " - Moderate Supply Chain Risk"),
                "GitHub to Azure - Direct Access"
            )
        // Per-row identity columns expected by engine dedup (AssetName, ConfigurationName/Id).
        // ConfigurationId carries the FINAL TARGET id so (AssetName, ConfigurationId) is unique per row.
        | extend
            AssetName         = FinalTargetName,
            AssetLabel        = FinalTargetLabel,
            ConfigurationName = tostring(LateralMovementType),
            ConfigurationId   = tostring(FinalTargetId),
            SecuritySeverity  = tostring(AttackPathPriority),
            Impact            = todouble(AttackPathPriorityScore),
            CriticalityTier      = TargetCriticalityTier,
            CriticalityTierLevel = TargetCriticalityTierLevel,
            RiskFactor_Consequence = 0,
            RiskFactor_Probability = TargetRiskProb,
            RiskFactor_Probability_Detailed      = TargetRiskProbDetailed,
            RiskFactor_Probability_DetailedScore = TargetRiskProbDetailedScore
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project
            SecurityDomain,
            Category,
            Subcategory,
            ConfigurationName,
            ConfigurationId,
            AssetName,
            Impact,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AttackPath,
            AttackPathDetailed,
            AttackPathPriority,
            AttackPathPriorityScore,
            TierEscalation,
            IsLateralMovement,
            LateralMovementType,
            FirstGitHubSource,
            FirstGitHubSourceName,
            FirstGitHubSourceLabel,
            TotalGitHubSourcesWithCredential = GitHubSourceCount,
            AllGitHubSources = GitHubSources,
            GitHubSourceTypes,
            CredentialNodeId,
            CredentialNodeName,
            CredentialNodeLabel,
            IntermediateIdentityId,
            IntermediateIdentity,
            IntermediateIdentityType = IntermediateIdentityLabel,
            FinalTargetId,
            FinalTarget = FinalTargetName,
            FinalTargetType = FinalTargetLabel,
            TargetAssetTierByTag,
            TargetIsInternetExposed,
            TargetLegacyEndOfSupport,
            SourceAssetTierByTag,
            SourceLegacyEndOfSupport,
            Hop1Edge,
            Hop2Edge,
            SourceNodeProperties,
            TargetNodeProperties
        | order by RiskScore_Weight_Factor desc, AttackPathPriorityScore desc, TierEscalation desc, CriticalityTier asc, AssetName asc, ConfigurationId asc

    - ReportName: Attack_Paths_Summary_Public_IP_to_VM_with_CVE_Exploitation
      ReportPurpose: Internet-exposed vulnerable assets prioritized by FINAL TARGET business impact.
        EG provides the path detection (PublicIP -> ExposedResource <- CVE) + scoring + tier;
        SI_Azure_Profile_CL contributes target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity)
        joined on the FINAL TARGET (ExposedResourceNodeId) via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // =================================================================================================
        // REPORT  Internet exposed assets with vulnerabilities using Exposure Graph
        // =================================================================================================
        //
        // Report purpose
        // Identify Azure and endpoint resources that are connected to Public IP addresses and are affected by CVEs.
        // Each finding represents an internet reachable resource with at least one known vulnerability.
        // Results are prioritized by the business impact of the exposed resource and by CVE severity signals.
        //
        // Interpretation guard and priority rules
        // - Priority is driven by the exposed TARGET resource criticality tier first
        // - Internet exposure is implied by the presence of a Public IP connection
        // - CVE severity increases priority as an additional amplifier
        // - Target criticality tier comes from Defender criticality when present with tag fallback
        // - RiskFactor probability is derived from graph risk factors plus Internet-Exposed plus LegacyEndOfSupport
        //
        // Output description detailed table
        // One row per unique PublicIP -> ExposedResource -> CVE combination enriched with
        // - Target criticality tier and tier label
        // - Target Internet exposure flags and tag derived asset tier
        // - Target legacy OS end of support signal
        // - Target risk probability including detailed breakdown fields
        // - CVE severity text and a numeric CVESeverityScore
        // - Priority score and mapped severity label
        // - Human readable AttackPath and AttackPathDetailed strings
        //
        // Output description collapsed summary
        // One row per report grain grouped by SecurityDomain Category SubCategory ConfigurationName where
        // - Duplicate paths are collapsed so repeated Public IPs or CVEs do not inflate counts
        // - ConfigurationId becomes a semicolon list of distinct CVE names in the group
        // - ImpactedAssets becomes a semicolon list of distinct exposed resources
        // - RiskFactor_Probability_Detailed fields are preserved via split expand and re aggregation
        //
        // Query steps overview
        // Step 0  Define legacy operating system reference lists
        // Step 1  Build Nodes catalog as enrichment backbone
        // Step 2  Normalize node labels to avoid filter issues
        // Step 3  Identify Public IP connections to resources
        // Step 4  Identify CVEs affecting resources
        // Step 5  Join Public IP connections with CVE affected resources and de duplicate to stable grain
        // Step 6  Enrich exposed resource using Nodes and enrich CVE node for severity text
        // Step 7  Compute CVE severity score and target tier weighted priority score
        // Step 8  Create AttackPath and AttackPathDetailed strings and project detailed output table
        // Step 9  Create DetailedForSummary table with only required columns for collapsing
        // Step 10 Collapse to unique logical PathKey to prevent count inflation
        // Step 11 Build SummaryMain counts and key fields
        // Step 12 Re build RiskFactor_Probability_Detailed and DetailedScore via split expand and re aggregation
        // Step 13 Join summary parts and output final collapsed summary ordering
        // =================================================================================================

        // Step 0  Define legacy operating systems that should increase probability (same as CVE report)
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);

        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure resources only).
        // EG drives path detection + scoring + tier; CL contributes ONLY cmdb metadata.
        // Join key  ExposedResourceNodeId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Build node catalog used to enrich attack paths
        let Nodes =
            ExposureGraphNodes
            | extend CategoriesStr = tolower(tostring(Categories))
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))

            | extend AssetName = NodeNameNorm
            | extend AadDeviceId =
                tostring(coalesce(
                    NodeProperties.rawData.aadDeviceId,
                    NodeProperties.raw.aadDeviceId,
                    NodeProperties.aadDeviceId
                ))

            | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, AssetName)
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__

            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend CriticalityRuleBased =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].ruleBasedCriticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.ruleBasedCriticalityLevel),
                    tostring(NodeProperties.criticalityLevel.ruleBasedCriticalityLevel)
                ))
            | extend CriticalityRuleNames =
                coalesce(
                    strcat_array(NodeProperties.criticalityLevelProps[0].ruleNames, ", "),
                    strcat_array(NodeProperties.rawData.criticalityLevel.ruleNames, ", "),
                    ""
                )

            | extend IsInternetExposed =
                tobool(coalesce(
                    NodeProperties.rawData.isCustomerFacing,
                    NodeProperties.raw.isCustomerFacing,
                    false
                ))

            | extend IsExcluded =
                tobool(coalesce(
                    NodeProperties.rawData.isExcluded,
                    NodeProperties.raw.isExcluded,
                    false
                ))

            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)

            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))

            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))

            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))

            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            
            // Exclude Devices, which includes tag with '--Excluded--SI'
            | where AssetTags !has "--Excluded--SI"
            
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)

            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )

            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )

            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )

            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))

            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                    tolower(AssetOSPlatform) has "linux"
                    and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                    1, 0
                )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)

            | extend RiskFactorsArray =
                todynamic(coalesce(
                    NodeProperties.rawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)

            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)

            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )

            | mv-apply rf = array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                ) on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize ScoreParts = make_set(strcat(tostring(rf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")

            // CVESeverity only makes sense for CVE nodes but keeping it for compatibility
            | extend CVESeverity =
                tostring(coalesce(
                    NodeProperties.rawData.severity,
                    NodeProperties.rawData.Severity,
                    NodeProperties.rawData.cvssScore,
                    ""
                ))

            | project
                NodeId,
                NodeName          = NodeNameNorm,
                NodeLabel,
                Categories        = CategoriesStr,
                NodeProperties,
                CriticalityLevel,
                CriticalityTier,
                CriticalityTierLevel,
                CriticalityRuleBased,
                CriticalityRuleNames,
                IsInternetExposed,
                IsExcluded,
                AssetTags,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactorsArray,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence,
                CVESeverity;

        // Step 2  Normalize labels to avoid typos breaking filters
        let NormalizeLabel = (s:string) { tolower(trim(" ", replace_string(s, " ", ""))) };

        // Step 3  Find Public IPs connected to resources
        // Fixes applied
        // - Public IP edges can point in either direction, include both directions (union)
        // - Include NIC pivot without losing VM mapping (keep NIC as an exposed resource too)
        let PublicIPConnections_Forward =
            ExposureGraphEdges
            | where SourceNodeLabel == "microsoft.network/publicipaddresses"
            | where EdgeLabel in ("routes traffic to", "contains", "connected to", "assigned to")
            | project
                PublicIPNodeId           = SourceNodeId,
                PublicIPNodeName         = SourceNodeName,
                ExposedResourceNodeId    = TargetNodeId,
                ExposedResourceNodeName  = TargetNodeName,
                ExposedResourceNodeLabel = TargetNodeLabel;

        let PublicIPConnections_Reverse =
            ExposureGraphEdges
            | where TargetNodeLabel == "microsoft.network/publicipaddresses"
            | where EdgeLabel in ("routes traffic to", "contains", "connected to", "assigned to")
            | project
                PublicIPNodeId           = TargetNodeId,
                PublicIPNodeName         = TargetNodeName,
                ExposedResourceNodeId    = SourceNodeId,
                ExposedResourceNodeName  = SourceNodeName,
                ExposedResourceNodeLabel = SourceNodeLabel;

        let PublicIPConnections =
            union isfuzzy=true PublicIPConnections_Forward, PublicIPConnections_Reverse
            | extend ExposedLabelNorm = NormalizeLabel(ExposedResourceNodeLabel)
            | where ExposedLabelNorm in (
                "microsoft.network/networkinterfaces",
                "microsoft.compute/virtualmachines",
                "device",
                "computer-account"
            )
            | summarize
                PublicIPs         = make_set(PublicIPNodeName),
                PublicIPCount     = dcount(PublicIPNodeId),
                FirstPublicIPId   = any(PublicIPNodeId),
                FirstPublicIPName = any(PublicIPNodeName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by ExposedResourceNodeId, ExposedResourceNodeName, ExposedResourceNodeLabel;

        // Step 4  Find CVEs affecting resources
        // Fixes applied
        // - CVE edges can point either direction depending on graph shape, include both directions
        let CVEsAffectingResources_Forward =
            ExposureGraphEdges
            | where SourceNodeLabel == "Cve"
            | where EdgeLabel == "affecting"
            | project
                CVENodeId                 = SourceNodeId,
                CVENodeName               = SourceNodeName,
                AffectedResourceNodeId    = TargetNodeId,
                AffectedResourceNodeName  = TargetNodeName,
                AffectedResourceNodeLabel = TargetNodeLabel;

        let CVEsAffectingResources_Reverse =
            ExposureGraphEdges
            | where TargetNodeLabel == "Cve"
            | where EdgeLabel == "affecting"
            | project
                CVENodeId                 = TargetNodeId,
                CVENodeName               = TargetNodeName,
                AffectedResourceNodeId    = SourceNodeId,
                AffectedResourceNodeName  = SourceNodeName,
                AffectedResourceNodeLabel = SourceNodeLabel;

        let CVEsAffectingResources =
            union isfuzzy=true CVEsAffectingResources_Forward, CVEsAffectingResources_Reverse
            | extend TargetNodeLabelNorm = NormalizeLabel(AffectedResourceNodeLabel)
            | where TargetNodeLabelNorm in (
                "microsoft.compute/virtualmachines",
                "device",
                "computer-account",
                "microsoft.network/networkinterfaces"
            )
            | summarize
                CVEs         = make_set(CVENodeName),
                CVECount     = dcount(CVENodeId),
                FirstCVEId   = any(CVENodeId),
                FirstCVEName = any(CVENodeName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by AffectedResourceNodeId, AffectedResourceNodeName, AffectedResourceNodeLabel;

        // Step 5  Join Public IP connections with CVE affected resources and de duplicate to stable grain
        // Fixes applied
        // - Original summarize grouped by ExposedResourceNodeId but also by FirstPublicIPId and FirstCVEId
        //   which are aggregated values and can create unstable grains
        // - Stable grain should be (PublicIPNodeId, ExposedResourceNodeId, CVENodeId)
        let Paths =
            PublicIPConnections
            | join kind=inner (CVEsAffectingResources) on $left.ExposedResourceNodeId == $right.AffectedResourceNodeId
            | extend PublicIPNodeId = FirstPublicIPId
            | extend CVENodeId      = FirstCVEId
            | summarize
                PublicIPs               = any(PublicIPs),
                PublicIPCount           = any(PublicIPCount),
                FirstPublicIPName       = any(FirstPublicIPName),

                CVEs                    = any(CVEs),
                CVECount                = any(CVECount),
                FirstCVEName            = any(FirstCVEName),

                ExposedResourceNodeName  = any(ExposedResourceNodeName),
                ExposedResourceNodeLabel = any(ExposedResourceNodeLabel)
              by
                PublicIPNodeId,
                ExposedResourceNodeId,
                CVENodeId;

        // Step 6  Enrich exposed resource using Nodes and enrich CVE node for severity text
        // Step 7  Compute CVE severity score and target tier weighted priority score
        // Step 8  Create AttackPath and AttackPathDetailed strings and project detailed output table
        let Detailed =
            Paths
            | join kind=leftouter (
                Nodes
                | project-rename
                    TargetNodeId                = NodeId,
                    TargetNodeName              = NodeName,
                    TargetNodeLabel             = NodeLabel,
                    TargetCriticalityTier       = CriticalityTier,
                    TargetCriticalityTierLevel  = CriticalityTierLevel,
                    TargetCriticalityRuleBased  = CriticalityRuleBased,
                    TargetCriticalityRuleNames  = CriticalityRuleNames,
                    TargetIsInternetExposed     = IsInternetExposed,
                    TargetIsExcluded            = IsExcluded,
                    TargetAssetTierByTag        = AssetTierByTag,
                    TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                    TargetRiskProb              = RiskFactor_Probability,
                    TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                    TargetNodeProperties        = NodeProperties
            ) on $left.ExposedResourceNodeId == $right.TargetNodeId

            | join kind=leftouter (
                Nodes
                | project-rename
                    PublicIPNodeId_join    = NodeId,
                    PublicIPNodeName_join  = NodeName,
                    PublicIPNodeProperties = NodeProperties
            ) on $left.PublicIPNodeId == $right.PublicIPNodeId_join

            | join kind=leftouter (
                Nodes
                | project-rename
                    CVENodeId_join     = NodeId,
                    CVENodeName_join   = NodeName,
                    CVESeverity_join   = CVESeverity,
                    CVENodeProperties  = NodeProperties
            ) on $left.CVENodeId == $right.CVENodeId_join

            // CL asset-metadata enrichment for the FINAL TARGET (cmdb fields only -- EG owns tier/path).
            | join kind=leftouter (_TargetCmdb) on $left.ExposedResourceNodeId == $right.Target_AzureResourceId_Guid
            | extend
                cmdbId            = Target_cmdbId,
                cmdbName            = Target_cmdbName,
                cmdbCriticality     = Target_cmdbCriticality,
                cmdbDataSensitivity = Target_cmdbDataSensitivity

            | extend CVESev = tostring(coalesce(CVESeverity_join, ""))

            | extend CVESeverityScore =
                case(
                    tolower(CVESev) has "critical", 5,
                    tolower(CVESev) has "high",     4,
                    tolower(CVESev) has "medium",   3,
                    tolower(CVESev) has "low",      2,
                    1
                )

            | extend TargetTierWeight =
                case(
                    TargetCriticalityTier == 0, 100,
                    TargetCriticalityTier == 1, 60,
                    TargetCriticalityTier == 2, 30,
                    10
                )

            // Internet exposure is implied by Public IP connection
            | extend ExposureWeight = 8

            | extend AttackPathPriorityScore = TargetTierWeight + ExposureWeight + (CVESeverityScore * 2)

            | extend AttackPathPriority =
                case(
                    AttackPathPriorityScore >= 90,  "Very High",
                    AttackPathPriorityScore >= 60,  "High",
                    AttackPathPriorityScore >= 30,  "Medium-High",
                    AttackPathPriorityScore >= 15,  "Medium",
                    "Low"
                )

            | extend AttackPath =
                strcat(
                    "PublicIP [", PublicIPNodeName_join, "] -> ",
                    ExposedResourceNodeLabel, " [", ExposedResourceNodeName, "] <- ",
                    "CVE [", FirstCVEName, "]"
                )

            | extend AttackPathDetailed =
                strcat(
                    "PUBLICIP [", PublicIPNodeName_join, "] ",
                    " -> TARGET ", ExposedResourceNodeLabel, " [", ExposedResourceNodeName, "] ",
                    "tier ", tostring(TargetCriticalityTier), " ", tostring(TargetCriticalityTierLevel),
                    " | CVE [", FirstCVEName, "]",
                    " | CVESeverity ", CVESev
                )

            | extend SecurityDomain = "Azure"
            | extend Category = "Attack Paths"
            | extend SubCategory = "InternetExposedVulnerability"
            | extend ConfigurationName = "PublicIPWithCVE"
            | extend ConfigurationId = tostring(FirstCVEName)
            | extend SecuritySeverity = AttackPathPriority
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | project
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                ConfigurationId,

                SecuritySeverity,
                AttackPathPriorityScore,

                ExposedResourceNodeId,
                ExposedResourceNodeName,
                ExposedResourceNodeLabel,

                TargetCriticalityTier,
                TargetCriticalityTierLevel,
                TargetCriticalityRuleBased,
                TargetCriticalityRuleNames,

                TargetAssetTierByTag,
                TargetLegacyEndOfSupport,
                TargetRiskProb,
                TargetRiskProbDetailed,
                TargetRiskProbDetailedScore,

                PublicIPNodeId,
                PublicIPName = PublicIPNodeName_join,

                CVENodeId,
                CVEName = FirstCVEName,
                CVESev,
                CVESeverityScore,

                AttackPath,
                AttackPathDetailed,

                TargetNodeProperties,
                PublicIPNodeProperties,
                CVENodeProperties,

                cmdbId,
                cmdbName,
                cmdbCriticality,
                cmdbDataSensitivity;

        // ===================== COLLAPSED SUMMARY VERSION (FINAL OUTPUT) =====================

        // Step 9  Create DetailedForSummary table with only required columns for collapsing
        let DetailedForSummary =
            Detailed
            | project
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,

                ExposedResourceNodeId,
                ExposedResourceNodeName,

                TargetCriticalityTier,
                TargetCriticalityTierLevel,
                TargetRiskProb,
                TargetRiskProbDetailed,
                TargetRiskProbDetailedScore,

                cmdbId,
                cmdbName,
                cmdbCriticality,
                cmdbDataSensitivity,

                AttackPathPriorityScore,
                SecuritySeverity,

                PublicIPNodeId,
                PublicIPName,
                CVENodeId,
                CVEName;

        // Step 10 Collapse to unique logical PathKey to prevent count inflation
        // Fixes applied
        // - Use the true IDs for uniqueness instead of aggregated First* fields
        let CollapsedPaths =
            DetailedForSummary
            | extend PathKey = strcat(PublicIPNodeId, "->", ExposedResourceNodeId, "->", CVENodeId)
            | summarize
                AttackPathPriorityScore_Path = max(AttackPathPriorityScore),
                SecuritySeverity_Path        = any(SecuritySeverity),

                TargetCriticalityTier_Path      = any(TargetCriticalityTier),
                TargetCriticalityTierLevel_Path = any(TargetCriticalityTierLevel),
                TargetRiskProb_Path             = max(TargetRiskProb),

                TargetRiskProbDetailed_Path      = any(TargetRiskProbDetailed),
                TargetRiskProbDetailedScore_Path = any(TargetRiskProbDetailedScore),

                // CL cmdb metadata for the FINAL TARGET (any() -- one cmdb row per target).
                cmdbId_Path              = any(cmdbId),
                cmdbName_Path            = any(cmdbName),
                cmdbCriticality_Path     = any(cmdbCriticality),
                cmdbDataSensitivity_Path = any(cmdbDataSensitivity),

                CVEs_Path       = make_set(tostring(CVEName)),
                PublicIPs_Path  = make_set(tostring(PublicIPName)),

                SourceAssets_Path = make_set(tostring(ExposedResourceNodeName)),
                TotalIssues_Path  = count()
              by
                PathKey,
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                ExposedResourceNodeId;

        // Step 11 Build SummaryMain counts and key fields
        // cmdbCriticality + cmdbDataSensitivity in by-clause so cmdb-bucketed rows survive.
        let SummaryMain =
            CollapsedPaths
            | summarize
                ConfigurationId = strcat_array(array_sort_asc(make_set(strcat_array(CVEs_Path, ";"))), ";"),

                SecuritySeverity = any(SecuritySeverity_Path),
                CriticalityTier = toint(any(TargetCriticalityTier_Path)),
                CriticalityTierLevel = tostring(any(TargetCriticalityTierLevel_Path)),

                RiskFactor_Consequence = 0,
                RiskFactor_Probability = max(TargetRiskProb_Path),

                AssetCount   = dcount(ExposedResourceNodeId),
                TotalIssues  = sum(TotalIssues_Path),

                ImpactedAssets = strcat_array(array_sort_asc(make_set(strcat_array(SourceAssets_Path, ";"))), ";")
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 12 Re build RiskFactor_Probability_Detailed and DetailedScore via split expand and re aggregation
        let SummaryDetail =
            CollapsedPaths
            | extend _d = split(tostring(TargetRiskProbDetailed_Path), ";")
            | mv-expand _d to typeof(string)
            | extend _d = trim(" ", _d)
            | where isnotempty(_d)
            | summarize
                RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(make_set(_d)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        let SummaryDetailScore =
            CollapsedPaths
            | extend _s = split(tostring(TargetRiskProbDetailedScore_Path), ";")
            | mv-expand _s to typeof(string)
            | extend _s = trim(" ", _s)
            | where isnotempty(_s)
            | summarize
                RiskFactor_Probability_DetailedScore = strcat_array(array_sort_asc(make_set(_s)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 13 Join summary parts and output final collapsed summary ordering
        SummaryMain
        | join kind=leftouter SummaryDetail      on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        | join kind=leftouter SummaryDetailScore on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project
            SecurityDomain,
            Category,
            SubCategory,
            ConfigurationName,
            ConfigurationId,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AssetCount,
            TotalIssues,
            ImpactedAssets
        | order by
            RiskScore_Weight_Factor desc,
            RiskFactor_Probability desc,
            CriticalityTier asc,
            TotalIssues desc,
            AssetCount desc


    - ReportName: Attack_Paths_Detailed_Public_IP_to_VM_with_CVE_Exploitation
      ReportPurpose: Per-row detail of internet-exposed vulnerable assets prioritized by FINAL TARGET business impact.
        EG drives path detection (PublicIP -> ExposedResource <- CVE) + scoring + tier; SI_Azure_Profile_CL contributes
        target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity) joined on the FINAL TARGET
        (ExposedResourceNodeId) via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |
        // REPORT  Internet exposed assets with vulnerabilities using Exposure Graph
        // =================================================================================================
        //
        // Report purpose
        // Identify resources that are reachable from a Public IP and have CVEs affecting them.
        // Results are prioritized by the business impact of the exposed resource.
        // Uses the same enrichment backbone as your credential driven attack path reports.
        //
        // Interpretation guard and priority rules
        // - Priority is driven by the EXPOSED RESOURCE criticality tier first
        // - Internet exposure is explicit because a Public IP is the entry point
        // - Legacy end of support and risk factors increase probability scoring
        // - CVE severity is included as supporting signal not the primary driver
        //
        // Output description
        // One row per exposed resource with at least one Public IP connection and at least one CVE
        // Includes enrichment fields
        // - IsInternetExposed
        // - AssetTierByTag
        // - LegacyEndOfSupport
        // - RiskFactor_Probability and detailed breakdown
        // - AttackPathPriorityScore and severity
        // - Human readable AttackPath strings
        //
        // Query steps overview
        // Step 0  Define legacy operating system reference lists
        // Step 1  Build Nodes catalog as enrichment backbone
        // Step 2  Normalize node labels to avoid filter issues
        // Step 3  Find Public IP connections to resources
        // Step 4  Find CVEs affecting resources
        // Step 5  Join Public IP connections with CVEs and de duplicate
        // Step 6  Enrich exposed resource and CVE using Nodes
        // Step 7  Compute CVE severity score and attack path priority score
        // Step 8  Build AttackPath and AttackPathDetailed
        // Step 9  Project final columns and apply ordering
        // =================================================================================================

        // Step 0  Define legacy operating systems that should increase probability
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);

        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure resources only).
        // EG drives path detection + scoring + tier; CL contributes ONLY cmdb metadata.
        // Join key  ExposedResourceNodeId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Build node catalog used to enrich results (context standard)
        let Nodes =
            ExposureGraphNodes
            | extend CategoriesStr = tolower(tostring(Categories))
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))
            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)
            | extend AadDeviceId =
                tostring(coalesce(
                    RawData.aadDeviceId,
                    Raw.aadDeviceId,
                    NodeProperties.aadDeviceId
                ))

            | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, NodeNameNorm)
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__

            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend CriticalityRuleBased =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].ruleBasedCriticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.ruleBasedCriticalityLevel),
                    tostring(NodeProperties.criticalityLevel.ruleBasedCriticalityLevel)
                ))
            | extend CriticalityRuleNames =
                coalesce(
                    strcat_array(NodeProperties.criticalityLevelProps[0].ruleNames, ", "),
                    strcat_array(NodeProperties.rawData.criticalityLevel.ruleNames, ", "),
                    ""
                )

            | extend IsInternetExposed =
                tobool(coalesce(
                    NodeProperties.rawData.isCustomerFacing,
                    NodeProperties.raw.isCustomerFacing,
                    false
                ))

            | extend IsExcluded =
                tobool(coalesce(
                    NodeProperties.rawData.isExcluded,
                    NodeProperties.raw.isExcluded,
                    false
                ))

            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)

            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))

            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))

            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))
            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            
            // Exclude Devices, which includes tag with '--Excluded--SI'
            | where AssetTags !has "--Excluded--SI"
            
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)

            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )

            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )

            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )

            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))

            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                    tolower(AssetOSPlatform) has "linux"
                    and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                    1, 0
                )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)

            | extend RiskFactorsArray =
                todynamic(coalesce(
                    NodeProperties.rawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)

            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)

            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )

            | mv-apply rf = array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                ) on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize ScoreParts = make_set(strcat(tostring(rf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")

            | extend CVESeverity =
                tostring(coalesce(
                    NodeProperties.rawData.severity,
                    NodeProperties.rawData.Severity,
                    NodeProperties.rawData.cvssScore,
                    ""
                ))

            | extend IsEntryPoint =
                        (CategoriesStr has "ip_address")
                     or (CategoriesStr has "device")
                     or (CategoriesStr has "virtual_machine")
                     or (CategoriesStr has "computer"),
                     IsAzureResource =
                        (CategoriesStr has "environmentazure")
                     or (CategoriesStr has "environmentcloud")

            | project
                NodeId,
                NodeName          = NodeNameNorm,
                NodeLabel,
                Categories        = CategoriesStr,
                NodeProperties,
                CriticalityLevel,
                CriticalityTier,
                CriticalityTierLevel,
                CriticalityRuleBased,
                CriticalityRuleNames,
                IsInternetExposed,
                IsExcluded,
                AssetTags,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactorsArray,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence,
                CVESeverity,
                IsEntryPoint,
                IsAzureResource;

        // Step 2  Helper to avoid label typos or spaces
        let NormalizeLabel = (s:string) { tolower(trim(" ", replace_string(s, " ", ""))) };

        // Step 3  Find Public IPs connected to resources
        let PublicIPConnections =
            ExposureGraphEdges
            | where SourceNodeLabel == "microsoft.network/publicipaddresses"
            | where EdgeLabel in ("routes traffic to", "contains")
            | extend TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where TargetNodeLabelNorm in (
                "microsoft.network/networkinterfaces",
                "microsoft.compute/virtualmachines",
                "device"
            )
            | project
                PublicIPNodeId            = SourceNodeId,
                PublicIPNodeName          = SourceNodeName,
                ExposedResourceNodeId     = TargetNodeId,
                ExposedResourceNodeName   = TargetNodeName,
                ExposedResourceNodeLabel  = TargetNodeLabel
            | summarize
                PublicIPs         = make_set(PublicIPNodeName),
                PublicIPCount     = dcount(PublicIPNodeId),
                FirstPublicIP     = any(PublicIPNodeId),
                FirstPublicIPName = any(PublicIPNodeName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by ExposedResourceNodeId, ExposedResourceNodeName, ExposedResourceNodeLabel;

        // Step 4  Find CVEs affecting resources
        let CVEsAffectingResources =
            ExposureGraphEdges
            | where SourceNodeLabel == "Cve"
            | where EdgeLabel == "affecting"
            | extend TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where TargetNodeLabelNorm in (
                "microsoft.compute/virtualmachines",
                "device",
                "computer-account"
            )
            | project
                CVENodeId                  = SourceNodeId,
                CVENodeName                = SourceNodeName,
                AffectedResourceNodeId     = TargetNodeId,
                AffectedResourceNodeName   = TargetNodeName,
                AffectedResourceNodeLabel  = TargetNodeLabel
            | summarize
                CVEs         = make_set(CVENodeName),
                CVECount     = dcount(CVENodeId),
                FirstCVE     = any(CVENodeId),
                FirstCVEName = any(CVENodeName),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by AffectedResourceNodeId, AffectedResourceNodeName, AffectedResourceNodeLabel;

        // Step 5  Join Public IPs with CVEs and de duplicate
        PublicIPConnections
        | join kind=inner CVEsAffectingResources on $left.ExposedResourceNodeId == $right.AffectedResourceNodeId
        | summarize
            PublicIPs         = any(PublicIPs),
            PublicIPCount     = any(PublicIPCount),
            FirstPublicIPName = any(FirstPublicIPName),

            CVEs              = any(CVEs),
            CVECount          = any(CVECount),
            FirstCVEName      = any(FirstCVEName),
            FirstCVE          = any(FirstCVE)
          by ExposedResourceNodeId, ExposedResourceNodeName, ExposedResourceNodeLabel

        // Step 6  Enrich exposed resource and CVE using Nodes
        | join kind=leftouter (
            Nodes
            | project-rename
                TargetNodeId                = NodeId,
                TargetNodeName              = NodeName,
                TargetNodeLabel             = NodeLabel,
                TargetCriticalityTier       = CriticalityTier,
                TargetCriticalityTierLevel  = CriticalityTierLevel,
                TargetCriticalityRuleBased  = CriticalityRuleBased,
                TargetCriticalityRuleNames  = CriticalityRuleNames,
                TargetIsInternetExposed     = IsInternetExposed,
                TargetIsExcluded            = IsExcluded,
                TargetAssetTierByTag        = AssetTierByTag,
                TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                TargetRiskProb              = RiskFactor_Probability,
                TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                TargetNodeProperties        = NodeProperties
        ) on $left.ExposedResourceNodeId == $right.TargetNodeId

        | join kind=leftouter (
            Nodes
            | project-rename
                CVENodeId_join      = NodeId,
                CVENodeName_join    = NodeName,
                CVESeverity_join    = CVESeverity,
                CVENodeProperties   = NodeProperties
        ) on $left.FirstCVE == $right.CVENodeId_join

        // CL asset-metadata enrichment for the FINAL TARGET (cmdb fields only -- EG owns tier/path).
        | join kind=leftouter (_TargetCmdb) on $left.ExposedResourceNodeId == $right.Target_AzureResourceId_Guid
        | extend
            cmdbId            = Target_cmdbId,
            cmdbName            = Target_cmdbName,
            cmdbCriticality     = Target_cmdbCriticality,
            cmdbDataSensitivity = Target_cmdbDataSensitivity

        // Step 7  Compute CVE severity score and attack path priority score
        | extend CVESev = tostring(coalesce(CVESeverity_join, ""))

        | extend CVESeverityScore =
            case(
                tolower(CVESev) has "critical", 5,
                tolower(CVESev) has "high", 4,
                tolower(CVESev) has "medium", 3,
                tolower(CVESev) has "low", 2,
                1
            )

        | extend
            SourceIsInternetExposed = true,
            SourceCriticalityTier   = 3,
            SourceCriticalityTierLevel = "Low - tier 3"

        | extend TierEscalation =
            case(
                SourceCriticalityTier > TargetCriticalityTier, SourceCriticalityTier - TargetCriticalityTier,
                0
            )

        | extend IsLateralMovement = TierEscalation > 0
        | extend LateralMovementType =
            case(
                TierEscalation >= 3, "Privilege escalation large tier jump",
                TierEscalation == 2, "Privilege escalation two tiers",
                TierEscalation == 1, "Privilege escalation one tier",
                "Direct access same tier"
            )

        | extend TargetTierWeight =
            case(
                TargetCriticalityTier == 0, 100,
                TargetCriticalityTier == 1, 60,
                TargetCriticalityTier == 2, 30,
                10
            )

        | extend EscalationWeight = TierEscalation * 10
        | extend ExposureWeight   = 8
        | extend SourceTierAmplifier = 0
        | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier

        | extend AttackPathPriority =
            case(
                AttackPathPriorityScore >= 90,  "Very High",
                AttackPathPriorityScore >= 60,  "High",
                AttackPathPriorityScore >= 30,  "Medium-High",
                AttackPathPriorityScore >= 15,  "Medium",
                "Low"
            )

        | extend SecuritySeverityScore =
            case(
                TargetCriticalityTier == 0 and CVESeverityScore >= 4, 10,
                TargetCriticalityTier == 0 and CVESeverityScore >= 3, 9,
                TargetCriticalityTier == 1 and CVESeverityScore >= 4, 8,
                TargetCriticalityTier == 1 and CVESeverityScore >= 3, 7,
                TargetCriticalityTier == 2 and CVESeverityScore >= 4, 6,
                CVESeverityScore >= 4, 5,
                CVESeverityScore >= 3, 4,
                3
            )

        | extend SecuritySeverityLevel =
            case(
                SecuritySeverityScore >= 9, "Critical",
                SecuritySeverityScore >= 7, "Very High",
                SecuritySeverityScore >= 5, "High",
                SecuritySeverityScore >= 3, "Medium-High",
                "Medium"
            )

        | extend SecurityDomain = "Azure"
        | extend Category = "AttackPath_PublicIPWithCVE"
        | extend Subcategory =
            case(
                TargetCriticalityTier == 0 and CVESeverityScore >= 4, "Tier 0 - Internet-Exposed with Critical CVE",
                TargetCriticalityTier == 0, "Tier 0 - Internet-Exposed with Vulnerability",
                TargetCriticalityTier == 1 and CVESeverityScore >= 4, "Tier 1 - Internet-Exposed with Critical CVE",
                TargetCriticalityTier == 1, "Tier 1 - Internet-Exposed with Vulnerability",
                CVESeverityScore >= 4, "Internet-Exposed with Critical CVE",
                "Internet-Exposed with Vulnerability"
            )

        // Step 8  Build AttackPath and AttackPathDetailed
        | extend AttackPath =
            strcat(
                "Public IP [", FirstPublicIPName, "] -> ",
                ExposedResourceNodeLabel, " [", ExposedResourceNodeName, "] <- ",
                "CVE [", FirstCVEName, "]"
            )

        | extend AttackPathDetailed =
            strcat(
                "PUBLIC IP [", FirstPublicIPName, "] ",
                iff(PublicIPCount > 1, strcat("| + ", tostring(PublicIPCount - 1), " other IP(s)"), ""),
                " -> EXPOSED ", ExposedResourceNodeLabel, " [", ExposedResourceNodeName, "] ",
                "tier ", tostring(TargetCriticalityTier), " ", TargetCriticalityTierLevel, " | Internet-Exposed",
                " | AssetTierByTag ", tostring(TargetAssetTierByTag),
                " | LegacyEndOfSupport ", tostring(TargetLegacyEndOfSupport),
                " <- CVE [", FirstCVEName, "] ",
                "severity ", CVESev,
                iff(CVECount > 1, strcat("| + ", tostring(CVECount - 1), " other CVE(s)"), "")
            )

        // Per-row identity columns expected by engine dedup (AssetName, ConfigurationName/Id).
        // ConfigurationId carries the FINAL TARGET id so (AssetName, ConfigurationId) is unique per row.
        | extend
            AssetName              = ExposedResourceNodeName,
            AssetLabel             = ExposedResourceNodeLabel,
            ConfigurationName      = tostring(LateralMovementType),
            ConfigurationId        = tostring(ExposedResourceNodeId),
            CriticalityTier        = TargetCriticalityTier,
            CriticalityTierLevel   = TargetCriticalityTierLevel,
            RiskFactor_Consequence = 0,
            RiskFactor_Probability = TargetRiskProb,
            RiskFactor_Probability_Detailed      = TargetRiskProbDetailed,
            RiskFactor_Probability_DetailedScore = TargetRiskProbDetailedScore,
            Impact                 = todouble(AttackPathPriorityScore)
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__

        // Step 9  Project final columns and apply ordering
        | order by RiskScore_Weight_Factor desc, AttackPathPriorityScore desc, CriticalityTier asc, CVESeverityScore desc

        | project
            SecurityDomain,
            Category,
            Subcategory,
            ConfigurationName,
            ConfigurationId,
            AssetName,
            Impact,
            SecuritySeverity = SecuritySeverityLevel,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AttackPath,
            AttackPathDetailed,
            AttackPathPriority,
            AttackPathPriorityScore,
            TierEscalation,
            IsLateralMovement,
            LateralMovementType,
            EscalationWeight,
            ExposureWeight,
            PublicIPAddress = FirstPublicIPName,
            TotalPublicIPs = PublicIPCount,
            AllPublicIPs = PublicIPs,
            CVE = FirstCVEName,
            TotalCVEs = CVECount,
            AllCVEs = CVEs,
            CVESeverity = CVESev,
            ExposedResource = ExposedResourceNodeName,
            ExposedResourceType = ExposedResourceNodeLabel,
            CriticalityRuleBased = TargetCriticalityRuleBased,
            CriticalityRuleNames = TargetCriticalityRuleNames,
            IsInternetExposed = true,
            AssetTierByTag = TargetAssetTierByTag,
            LegacyEndOfSupport = TargetLegacyEndOfSupport,
            SecurityScore = SecuritySeverityScore,
            TargetNodeProperties,
            CVENodeProperties

    - ReportName: Attack_Paths_Summary_Identity_Group_Membership_to_Privileged_Resources
      ReportPurpose: Group-membership privilege paths to Azure resources prioritized by FINAL TARGET business impact.
        EG provides path detection (Identity -> Group -> Target) + scoring + tier;
        SI_Azure_Profile_CL contributes target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity)
        joined on the FINAL TARGET via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // =================================================================================================
        // REPORT  Group membership privilege paths to Azure resources using Exposure Graph
        // =================================================================================================
        //
        // Report purpose
        // Identify identities that are members of groups and where those groups have permissions or roles on
        // privileged Azure targets. Enrich each path with the standard node context and prioritize by the
        // business impact of the final target. Provide both detailed rows and a collapsed summary output.
        //
        // Interpretation guard and priority rules
        // - Priority is driven by the target criticality tier first
        // - Then by tier escalation where source tier is higher than target tier
        // - Then by internet exposure where target exposure is weighted higher than source exposure
        // - The source identity matters as an amplifier but the target drives the priority
        //
        // Query steps overview
        // Step 0  Define legacy operating system reference lists
        // Step 1  Build Nodes catalog as enrichment backbone using standard context fields
        // Step 2  Find identity to group membership edges at stable grain
        // Step 3  Find group permissions or roles on Azure targets
        // Step 4  Assemble Identity -> Group -> Target paths at stable grain
        // Step 5  Enrich source identity and target using Nodes
        // Step 6  Apply prioritization logic and build attack path strings
        // Step 7  Build detailed output table
        // Step 8  Collapse to unique logical path key so identity spam does not multiply counts
        // Step 9  Build summary counts and key fields
        // Step 10 Rebuild probability detail fields via split expand and re aggregation
        // Step 11 Emit final collapsed summary ordering
        // =================================================================================================


        // Step 0  Define legacy operating systems that should increase probability
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);


        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure resources only).
        // EG drives path detection + scoring + tier; CL contributes ONLY cmdb metadata.
        // Join key  FinalTargetId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Build node catalog used to enrich attack paths
        // Fixes applied
        // - AadDeviceId, AssetName, DeviceKey defined in Nodes scope
        // - Bucket filter applied once at node scope using DeviceKey
        let Nodes =
            ExposureGraphNodes
            | extend CategoriesStr = tolower(tostring(Categories))
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))
            | extend AssetName = NodeNameNorm

            | extend AadDeviceId =
                tostring(coalesce(
                    NodeProperties.rawData.aadDeviceId,
                    NodeProperties.raw.aadDeviceId,
                    NodeProperties.aadDeviceId
                ))

            | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, AssetName)

            // Bucket filter support
            // DeviceKey is used for bucket filtering and distinct counting
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__

            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend CriticalityRuleBased =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].ruleBasedCriticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.ruleBasedCriticalityLevel),
                    tostring(NodeProperties.criticalityLevel.ruleBasedCriticalityLevel)
                ))
            | extend CriticalityRuleNames =
                coalesce(
                    strcat_array(NodeProperties.criticalityLevelProps[0].ruleNames, ", "),
                    strcat_array(NodeProperties.rawData.criticalityLevel.ruleNames, ", "),
                    ""
                )

            | extend IsInternetExposed =
                tobool(coalesce(
                    NodeProperties.rawData.isCustomerFacing,
                    NodeProperties.raw.isCustomerFacing,
                    false
                ))

            | extend IsExcluded =
                tobool(coalesce(
                    NodeProperties.rawData.isExcluded,
                    NodeProperties.raw.isExcluded,
                    false
                ))

            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)

            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))

            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))

            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))

            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            
            // Exclude Devices, which includes tag with '--Excluded--SI'
            | where AssetTags !has "--Excluded--SI"
            
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)

            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )

            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )

            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )

            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))

            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                    tolower(AssetOSPlatform) has "linux"
                    and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                    1, 0
                )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)

            | extend RiskFactorsArray =
                todynamic(coalesce(
                    NodeProperties.rawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)

            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)

            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )

            | extend _ScoreFactors =
                array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                )
            | mv-apply sf = _ScoreFactors on (
                where isnotempty(trim(" ", tostring(sf)))
                | summarize ScoreParts = make_set(strcat(tostring(sf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")

            | project
                NodeId,
                NodeName          = NodeNameNorm,
                NodeLabel,
                NodeProperties,
                CriticalityTier,
                CriticalityTierLevel,
                CriticalityRuleBased,
                CriticalityRuleNames,
                IsInternetExposed,
                IsExcluded,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence;


        // Step 2  Find identity to group membership edges at stable grain
        let IdentityGroupMembership =
            ExposureGraphEdges
            | where EdgeLabel == "member of"
            | where SourceNodeLabel in ("user", "serviceprincipal", "managedidentity")
            | where TargetNodeLabel == "group"
            | project
                IdentityNodeId    = SourceNodeId,
                IdentityNodeName  = SourceNodeName,
                IdentityNodeLabel = SourceNodeLabel,
                GroupNodeId       = TargetNodeId,
                GroupNodeName     = TargetNodeName;


        // Step 3  Find group permissions or roles on Azure targets
        let GroupAccessToTargets =
            ExposureGraphEdges
            | where EdgeLabel in ("has role on", "has permissions to")
            | where SourceNodeLabel == "group"
            | where TargetNodeLabel in (
                "subscriptions",
                "resourcegroups",
                "microsoft.keyvault/vaults",
                "microsoft.storage/storageaccounts",
                "microsoft.sql/servers",
                "microsoft.compute/virtualmachines",
                "microsoft.cognitiveservices/accounts"
            )
            | project
                GroupNodeId      = SourceNodeId,
                EdgeLabel        = EdgeLabel,
                FinalTargetId    = TargetNodeId,
                FinalTargetName  = TargetNodeName,
                FinalTargetLabel = TargetNodeLabel;


        // Step 4  Assemble Identity -> Group -> Target paths at stable grain
        let Paths =
            IdentityGroupMembership
            | join kind=inner (GroupAccessToTargets) on GroupNodeId
            | project
                IdentityNodeId,
                IdentityNodeName,
                IdentityNodeLabel,
                GroupNodeId,
                GroupNodeName,
                EdgeLabel,
                FinalTargetId,
                FinalTargetName,
                FinalTargetLabel
            | summarize by
                IdentityNodeId,
                GroupNodeId,
                FinalTargetId,
                IdentityNodeName,
                IdentityNodeLabel,
                GroupNodeName,
                EdgeLabel,
                FinalTargetName,
                FinalTargetLabel;


        // Step 5-7  Build the detailed output table
        let Detailed =
            Paths

            // Enrich identity
            | join kind=leftouter (
                Nodes
                | project-rename
                    SourceNodeId                = NodeId,
                    SourceNodeName              = NodeName,
                    SourceNodeLabel             = NodeLabel,
                    SourceCriticalityTier       = CriticalityTier,
                    SourceCriticalityTierLevel  = CriticalityTierLevel,
                    SourceIsInternetExposed     = IsInternetExposed,
                    SourceIsExcluded            = IsExcluded,
                    SourceAssetTierByTag        = AssetTierByTag,
                    SourceLegacyEndOfSupport    = LegacyEndOfSupport,
                    SourceRiskProb              = RiskFactor_Probability,
                    SourceRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    SourceRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                    SourceNodeProperties        = NodeProperties
            ) on $left.IdentityNodeId == $right.SourceNodeId

            // Enrich target
            | join kind=leftouter (
                Nodes
                | project-rename
                    TargetNodeId                = NodeId,
                    TargetNodeName              = NodeName,
                    TargetNodeLabel             = NodeLabel,
                    TargetCriticalityTier       = CriticalityTier,
                    TargetCriticalityTierLevel  = CriticalityTierLevel,
                    TargetCriticalityRuleBased  = CriticalityRuleBased,
                    TargetCriticalityRuleNames  = CriticalityRuleNames,
                    TargetIsInternetExposed     = IsInternetExposed,
                    TargetIsExcluded            = IsExcluded,
                    TargetAssetTierByTag        = AssetTierByTag,
                    TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                    TargetRiskProb              = RiskFactor_Probability,
                    TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                    TargetNodeProperties        = NodeProperties
            ) on $left.FinalTargetId == $right.TargetNodeId

            // Group context for strings and counts
            | join kind=leftouter (
                IdentityGroupMembership
                | summarize
                    IdentitiesInGroup     = make_set(IdentityNodeName),
                    IdentityTypesInGroup  = make_set(IdentityNodeLabel),
                    IdentityCountInGroup  = dcount(IdentityNodeId),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
                  by GroupNodeId
            ) on GroupNodeId

            // CL asset-metadata enrichment for the FINAL TARGET (cmdb fields only -- EG owns tier/path).
            | join kind=leftouter (_TargetCmdb) on $left.FinalTargetId == $right.Target_AzureResourceId_Guid
            | extend
                cmdbId            = Target_cmdbId,
                cmdbName            = Target_cmdbName,
                cmdbCriticality     = Target_cmdbCriticality,
                cmdbDataSensitivity = Target_cmdbDataSensitivity

            | extend TierEscalation =
                case(
                    isnotempty(SourceCriticalityTier) and isnotempty(TargetCriticalityTier) and SourceCriticalityTier > TargetCriticalityTier,
                        SourceCriticalityTier - TargetCriticalityTier,
                    0
                )
            | extend IsLateralMovement = TierEscalation > 0
            | extend LateralMovementType =
                case(
                    TierEscalation >= 3, "Privilege escalation large tier jump",
                    TierEscalation == 2, "Privilege escalation two tiers",
                    TierEscalation == 1, "Privilege escalation one tier",
                    "Direct access same tier"
                )

            | extend TargetTierWeight =
                case(
                    TargetCriticalityTier == 0, 100,
                    TargetCriticalityTier == 1, 60,
                    TargetCriticalityTier == 2, 30,
                    10
                )
            | extend EscalationWeight = TierEscalation * 10
            | extend ExposureWeight   = iff(TargetIsInternetExposed == true, 8, 0) + iff(SourceIsInternetExposed == true, 3, 0)
            | extend SourceTierAmplifier =
                case(
                    SourceCriticalityTier == 0, 8,
                    SourceCriticalityTier == 1, 5,
                    SourceCriticalityTier == 2, 2,
                    0
                )
            | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier

            | extend AttackPathPriority =
                case(
                    AttackPathPriorityScore >= 90,  "Very High",
                    AttackPathPriorityScore >= 60,  "High",
                    AttackPathPriorityScore >= 30,  "Medium-High",
                    AttackPathPriorityScore >= 15,  "Medium",
                    "Low"
                )

            | extend InternetExposureTarget = iff(TargetIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")
            | extend InternetExposureSource = iff(SourceIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")

            | extend AttackPath =
                strcat(
                    IdentityNodeLabel, " [", IdentityNodeName, "] -> ",
                    "group [", GroupNodeName, "] -> ",
                    TargetNodeLabel, " [", FinalTargetName, "]"
                )

            | extend AttackPathDetailed =
                strcat(
                    "SOURCE ", IdentityNodeLabel, " [", IdentityNodeName, "] ",
                    "tier ", tostring(SourceCriticalityTier), " ", tostring(SourceCriticalityTierLevel), " | ", InternetExposureSource,
                    iff(IdentityCountInGroup > 1, strcat(" | + ", tostring(IdentityCountInGroup - 1), " other identity/ies"), ""),
                    " -> GROUP [", GroupNodeName, "] ",
                    " -> TARGET ", TargetNodeLabel, " [", FinalTargetName, "] ",
                    "tier ", tostring(TargetCriticalityTier), " ", tostring(TargetCriticalityTierLevel), " | ", InternetExposureTarget,
                    " | escalation ", tostring(TierEscalation),
                    " | ", LateralMovementType
                )

            | extend SecurityDomain = "Azure"
            | extend Category = "Attack Paths"
            | extend SubCategory = "GroupMembershipPrivilege"
            | extend ConfigurationName = tostring(LateralMovementType)
            | extend SecuritySeverity  = tostring(AttackPathPriority)
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | project
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,

                SecuritySeverity,
                AttackPathPriorityScore,
                TierEscalation,
                IsLateralMovement,
                LateralMovementType,

                GroupNodeId,
                GroupNodeName,
                EdgeLabel,

                IdentityNodeId,
                IdentityNodeName,
                IdentityNodeLabel,

                TotalIdentitiesInGroup = IdentityCountInGroup,
                AllIdentities = IdentitiesInGroup,

                FinalTargetId,
                FinalTarget = FinalTargetName,
                FinalTargetType = FinalTargetLabel,

                TargetCriticalityTier,
                TargetCriticalityTierLevel,
                TargetAssetTierByTag,
                TargetIsInternetExposed,
                TargetLegacyEndOfSupport,
                TargetRiskProb,
                TargetRiskProbDetailed,
                TargetRiskProbDetailedScore,

                cmdbId,
                cmdbName,
                cmdbCriticality,
                cmdbDataSensitivity,

                AttackPath,
                AttackPathDetailed,

                SourceNodeProperties,
                TargetNodeProperties;


        // ===================== COLLAPSED SUMMARY VERSION FINAL OUTPUT =====================

        // Step 8  Collapse to unique logical path key so identity spam does not multiply counts
        let CollapsedPaths =
            Detailed
            | extend PathKey = strcat(IdentityNodeId, "->", GroupNodeId, "->", FinalTargetId)
            | summarize
                AttackPathPriorityScore_Path = max(AttackPathPriorityScore),
                SecuritySeverity_Path        = any(SecuritySeverity),

                TargetCriticalityTier_Path      = any(TargetCriticalityTier),
                TargetCriticalityTierLevel_Path = any(TargetCriticalityTierLevel),
                TargetRiskProb_Path             = max(TargetRiskProb),

                TargetRiskProbDetailed_Path      = any(TargetRiskProbDetailed),
                TargetRiskProbDetailedScore_Path = any(TargetRiskProbDetailedScore),

                // CL cmdb metadata for the FINAL TARGET (any() -- one cmdb row per target).
                cmdbId_Path              = any(cmdbId),
                cmdbName_Path            = any(cmdbName),
                cmdbCriticality_Path     = any(cmdbCriticality),
                cmdbDataSensitivity_Path = any(cmdbDataSensitivity),

                IdentityTypes_Path     = make_set(tostring(IdentityNodeLabel)),
                SourceIdentities_Path  = make_set(tostring(IdentityNodeName)),
                TargetAssets_Path      = make_set(tostring(FinalTarget)),
                TotalIssues_Path       = count()
              by
                PathKey,
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                FinalTargetId;


        // Step 9  Main summary counts stay correct
        // cmdbCriticality + cmdbDataSensitivity in by-clause so cmdb-bucketed rows survive.
        let SummaryMain =
            CollapsedPaths
            | summarize
                ConfigurationId = strcat_array(array_sort_asc(make_set(strcat_array(IdentityTypes_Path, ";"))), ";"),

                SecuritySeverity = any(SecuritySeverity_Path),
                CriticalityTier = toint(any(TargetCriticalityTier_Path)),
                CriticalityTierLevel = tostring(any(TargetCriticalityTierLevel_Path)),

                RiskFactor_Consequence = 0,
                RiskFactor_Probability = max(TargetRiskProb_Path),

                AssetCount   = dcount(FinalTargetId),
                TotalIssues  = sum(TotalIssues_Path),

                ImpactedAssets = strcat_array(array_sort_asc(make_set(strcat_array(TargetAssets_Path, ";"))), ";")
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;


        // Step 10  Rebuild probability detail strings
        let SummaryDetail =
            CollapsedPaths
            | extend _d = split(tostring(TargetRiskProbDetailed_Path), ";")
            | mv-expand _d to typeof(string)
            | extend _d = trim(" ", _d)
            | where isnotempty(_d)
            | summarize
                RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(make_set(_d)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        let SummaryDetailScore =
            CollapsedPaths
            | extend _s = split(tostring(TargetRiskProbDetailedScore_Path), ";")
            | mv-expand _s to typeof(string)
            | extend _s = trim(" ", _s)
            | where isnotempty(_s)
            | summarize
                RiskFactor_Probability_DetailedScore = strcat_array(array_sort_asc(make_set(_s)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;


        // Step 11  Final output
        SummaryMain
        | join kind=leftouter SummaryDetail      on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        | join kind=leftouter SummaryDetailScore on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project
            SecurityDomain,
            Category,
            SubCategory,
            ConfigurationName,
            ConfigurationId,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AssetCount,
            TotalIssues,
            ImpactedAssets
        | order by
            RiskScore_Weight_Factor desc,
            RiskFactor_Probability desc,
            CriticalityTier asc,
            TotalIssues desc,
            AssetCount desc


    - ReportName: Attack_Paths_Detailed_Identity_Group_Membership_to_Privileged_Resources
      ReportPurpose: Per-row detail of group-membership privilege paths to Azure resources prioritized by FINAL TARGET business impact.
        EG drives path detection (Identity -> Group -> Target) + scoring + tier; SI_Azure_Profile_CL contributes
        target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity) joined on the FINAL TARGET via
        AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |
        // =================================================================================================
        // REPORT  Group membership privilege paths to Azure resources using Exposure Graph
        // =================================================================================================
        //
        // Report purpose
        // Identify identities that are members of groups and where those groups have permissions or roles on
        // privileged Azure targets. Enrich each path with the standard node context and prioritize by the
        // business impact of the FINAL TARGET.
        //
        // Interpretation guard and priority rules
        // - Priority is driven by the TARGET criticality tier first
        // - Then by tier escalation where source tier is higher than target tier
        // - Then by internet exposure where target exposure is weighted higher than source exposure
        // - The source identity matters as an amplifier but the target drives the priority
        //
        // Output description detailed rows
        // One row per unique path
        // Identity -> Group -> Target
        // Enriched with
        // - IsInternetExposed for source and target
        // - AssetTierByTag for source and target
        // - LegacyEndOfSupport for source and target
        // - RiskFactor probability fields including detailed breakdown for source and target
        // - AttackPathPriorityScore components and mapped severity label
        // - Human readable AttackPath and AttackPathDetailed strings
        //
        // Query steps overview
        // Step 0  Define legacy operating system reference lists
        // Step 1  Build Nodes catalog as enrichment backbone using standard context fields
        // Step 2  Find identities in groups and de duplicate to a stable group membership grain
        // Step 3  Find group permissions or roles on Azure targets
        // Step 4  Assemble Identity -> Group -> Target paths and de duplicate
        // Step 5  Enrich source identity and target using Nodes catalog
        // Step 6  Apply standard prioritization logic and build attack path strings
        // Step 7  Project detailed output columns and apply ordering
        // =================================================================================================

        // Step 0  Define legacy operating systems that should increase probability
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);

        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure resources only).
        // EG drives path detection + scoring + tier; CL contributes ONLY cmdb metadata.
        // Join key  FinalTargetId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Build node catalog used to enrich attack paths
        let Nodes =
            ExposureGraphNodes
            | extend CategoriesStr = tolower(tostring(Categories))
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))
            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)
            | extend AadDeviceId =
                tostring(coalesce(
                    RawData.aadDeviceId,
                    Raw.aadDeviceId,
                    NodeProperties.aadDeviceId
                ))

            | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, NodeNameNorm)
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__

            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend CriticalityRuleBased =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].ruleBasedCriticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.ruleBasedCriticalityLevel),
                    tostring(NodeProperties.criticalityLevel.ruleBasedCriticalityLevel)
                ))
            | extend CriticalityRuleNames =
                coalesce(
                    strcat_array(NodeProperties.criticalityLevelProps[0].ruleNames, ", "),
                    strcat_array(NodeProperties.rawData.criticalityLevel.ruleNames, ", "),
                    ""
                )

            | extend IsInternetExposed =
                tobool(coalesce(
                    NodeProperties.rawData.isCustomerFacing,
                    NodeProperties.raw.isCustomerFacing,
                    false
                ))

            | extend IsExcluded =
                tobool(coalesce(
                    NodeProperties.rawData.isExcluded,
                    NodeProperties.raw.isExcluded,
                    false
                ))

            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)

            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))

            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))

            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))

            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")

            // Exclude Devices, which includes tag with '--Excluded--SI'
            | where AssetTags !has "--Excluded--SI"

            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)

            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )

            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )

            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )

            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))

            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                    tolower(AssetOSPlatform) has "linux"
                    and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                    1, 0
                )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)

            | extend RiskFactorsArray =
                todynamic(coalesce(
                    NodeProperties.rawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)

            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)

            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )

            | mv-apply rf = array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                ) on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize ScoreParts = make_set(strcat(tostring(rf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")

            | project
                NodeId,
                NodeName          = NodeNameNorm,
                NodeLabel,
                Categories        = CategoriesStr,
                NodeProperties,
                CriticalityLevel,
                CriticalityTier,
                CriticalityTierLevel,
                CriticalityRuleBased,
                CriticalityRuleNames,
                IsInternetExposed,
                IsExcluded,
                AssetTags,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactorsArray,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence;

        // Step 2  Find identities in groups and de duplicate
        let IdentityGroupMembership =
            ExposureGraphEdges
            | where EdgeLabel == "member of"
            | where SourceNodeLabel in ("user", "serviceprincipal", "managedidentity")
            | where TargetNodeLabel == "group"
            | project
                IdentityNodeId    = SourceNodeId,
                IdentityNodeName  = SourceNodeName,
                IdentityNodeLabel = SourceNodeLabel,
                GroupNodeId       = TargetNodeId,
                GroupNodeName     = TargetNodeName
            | summarize
                Identities        = make_set(IdentityNodeName),
                IdentityTypes     = make_set(IdentityNodeLabel),
                IdentityCount     = dcount(IdentityNodeId),
                FirstIdentityId   = any(IdentityNodeId),
                FirstIdentityName = any(IdentityNodeName),
                FirstIdentityLabel= any(IdentityNodeLabel),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by GroupNodeId, GroupNodeName;

        // Step 3  Find group permissions or roles on Azure targets
        let GroupAccessToTargets =
            ExposureGraphEdges
            | where EdgeLabel in ("has role on", "has permissions to")
            | where SourceNodeLabel == "group"
            | where TargetNodeLabel in (
                "subscriptions",
                "resourcegroups",
                "microsoft.keyvault/vaults",
                "microsoft.storage/storageaccounts",
                "microsoft.sql/servers",
                "microsoft.compute/virtualmachines",
                "microsoft.cognitiveservices/accounts"
            )
            | project
                GroupNodeId      = SourceNodeId,
                EdgeLabel        = EdgeLabel,
                FinalTargetId    = TargetNodeId,
                FinalTargetName  = TargetNodeName,
                FinalTargetLabel = TargetNodeLabel;

        // Step 4  Assemble Identity -> Group -> Target paths and de duplicate
        let Paths =
            IdentityGroupMembership
            | join kind=inner (GroupAccessToTargets) on GroupNodeId
            | summarize
                Identities         = any(Identities),
                IdentityTypes      = any(IdentityTypes),
                IdentityCount      = any(IdentityCount),
                FirstIdentityId    = any(FirstIdentityId),
                FirstIdentityName  = any(FirstIdentityName),
                FirstIdentityLabel = any(FirstIdentityLabel),
                GroupNodeName      = any(GroupNodeName),
                EdgeLabel          = any(EdgeLabel),
                FinalTargetName    = any(FinalTargetName),
                FinalTargetLabel   = any(FinalTargetLabel),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by FinalTargetId, GroupNodeId;

        // Step 5-7  Enrich source and target and apply standard prioritization logic
        Paths
        | join kind=leftouter (
            Nodes
            | project-rename
                SourceNodeId                = NodeId,
                SourceNodeName              = NodeName,
                SourceNodeLabel             = NodeLabel,
                SourceCriticalityTier       = CriticalityTier,
                SourceCriticalityTierLevel  = CriticalityTierLevel,
                SourceIsInternetExposed     = IsInternetExposed,
                SourceIsExcluded            = IsExcluded,
                SourceAssetTierByTag        = AssetTierByTag,
                SourceLegacyEndOfSupport    = LegacyEndOfSupport,
                SourceRiskProb              = RiskFactor_Probability,
                SourceRiskProbDetailed      = RiskFactor_Probability_Detailed,
                SourceRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                SourceNodeProperties        = NodeProperties
        ) on $left.FirstIdentityId == $right.SourceNodeId

        | join kind=leftouter (
            Nodes
            | project-rename
                TargetNodeId                = NodeId,
                TargetNodeName              = NodeName,
                TargetNodeLabel             = NodeLabel,
                TargetCriticalityTier       = CriticalityTier,
                TargetCriticalityTierLevel  = CriticalityTierLevel,
                TargetCriticalityRuleBased  = CriticalityRuleBased,
                TargetCriticalityRuleNames  = CriticalityRuleNames,
                TargetIsInternetExposed     = IsInternetExposed,
                TargetIsExcluded            = IsExcluded,
                TargetAssetTierByTag        = AssetTierByTag,
                TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                TargetRiskProb              = RiskFactor_Probability,
                TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                TargetNodeProperties        = NodeProperties
        ) on $left.FinalTargetId == $right.TargetNodeId

        // CL asset-metadata enrichment for the FINAL TARGET (cmdb fields only -- EG owns tier/path).
        | join kind=leftouter (_TargetCmdb) on $left.FinalTargetId == $right.Target_AzureResourceId_Guid
        | extend
            cmdbId            = Target_cmdbId,
            cmdbName            = Target_cmdbName,
            cmdbCriticality     = Target_cmdbCriticality,
            cmdbDataSensitivity = Target_cmdbDataSensitivity

        // Step 6  Attack path prioritization logic
        | extend TierEscalation =
            case(
                isnotempty(SourceCriticalityTier) and isnotempty(TargetCriticalityTier) and SourceCriticalityTier > TargetCriticalityTier,
                    SourceCriticalityTier - TargetCriticalityTier,
                0
            )
        | extend IsLateralMovement = TierEscalation > 0
        | extend LateralMovementType =
            case(
                TierEscalation >= 3, "Privilege escalation large tier jump",
                TierEscalation == 2, "Privilege escalation two tiers",
                TierEscalation == 1, "Privilege escalation one tier",
                "Direct access same tier"
            )

        | extend TargetTierWeight =
            case(
                TargetCriticalityTier == 0, 100,
                TargetCriticalityTier == 1, 60,
                TargetCriticalityTier == 2, 30,
                10
            )
        | extend EscalationWeight = TierEscalation * 10
        | extend ExposureWeight   = iff(TargetIsInternetExposed == true, 8, 0) + iff(SourceIsInternetExposed == true, 3, 0)
        | extend SourceTierAmplifier =
            case(
                SourceCriticalityTier == 0, 8,
                SourceCriticalityTier == 1, 5,
                SourceCriticalityTier == 2, 2,
                0
            )
        | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier

        | extend AttackPathPriority =
            case(
                AttackPathPriorityScore >= 90,  "Very High",
                AttackPathPriorityScore >= 60,  "High",
                AttackPathPriorityScore >= 30,  "Medium-High",
                AttackPathPriorityScore >= 15,  "Medium",
                "Low"
            )

        // Step 7  Human readable paths
        | extend InternetExposureTarget = iff(TargetIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")
        | extend InternetExposureSource = iff(SourceIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")

        | extend AttackPath =
            strcat(
                FirstIdentityLabel, " [", FirstIdentityName, "] -> ",
                "group [", GroupNodeName, "] -> ",
                TargetNodeLabel, " [", FinalTargetName, "]"
            )

        | extend AttackPathDetailed =
            strcat(
                "SOURCE ", FirstIdentityLabel, " [", FirstIdentityName, "] ",
                "tier ", tostring(SourceCriticalityTier), " ", tostring(SourceCriticalityTierLevel), " | ", InternetExposureSource,
                iff(IdentityCount > 1, strcat(" | + ", tostring(IdentityCount - 1), " other identity/ies"), ""),
                " -> GROUP [", GroupNodeName, "] ",
                " -> TARGET ", TargetNodeLabel, " [", FinalTargetName, "] ",
                "tier ", tostring(TargetCriticalityTier), " ", tostring(TargetCriticalityTierLevel), " | ", InternetExposureTarget,
                " | escalation ", tostring(TierEscalation),
                " | ", LateralMovementType
            )

        | extend SecurityDomain = "Azure"
        | extend Category = "Attack Paths"
        | extend Subcategory = "GroupMembershipPrivilege"
        // Per-row identity columns expected by engine dedup (AssetName, ConfigurationName/Id).
        // ConfigurationId carries the FINAL TARGET id so (AssetName, ConfigurationId) is unique per row.
        | extend
            AssetName              = FinalTargetName,
            AssetLabel             = FinalTargetLabel,
            ConfigurationName      = tostring(LateralMovementType),
            ConfigurationId        = tostring(FinalTargetId),
            SecuritySeverity       = tostring(AttackPathPriority),
            Impact                 = todouble(AttackPathPriorityScore),
            CriticalityTier        = TargetCriticalityTier,
            CriticalityTierLevel   = TargetCriticalityTierLevel,
            RiskFactor_Consequence = 0,
            RiskFactor_Probability = TargetRiskProb,
            RiskFactor_Probability_Detailed      = TargetRiskProbDetailed,
            RiskFactor_Probability_DetailedScore = TargetRiskProbDetailedScore
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project
            SecurityDomain,
            Category,
            Subcategory,
            ConfigurationName,
            ConfigurationId,
            AssetName,
            Impact,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AttackPath,
            AttackPathDetailed,
            AttackPathPriority,
            AttackPathPriorityScore,
            TierEscalation,
            IsLateralMovement,
            LateralMovementType,
            EscalationWeight,
            ExposureWeight,
            GroupNodeId,
            GroupNodeName,
            EdgeLabel,
            FirstIdentityId,
            FirstIdentityName,
            FirstIdentityLabel,
            TotalIdentitiesInGroup = IdentityCount,
            AllIdentities = Identities,
            IdentityTypes,
            FinalTargetId,
            FinalTarget = FinalTargetName,
            FinalTargetType = FinalTargetLabel,
            TargetCriticalityRuleBased,
            TargetCriticalityRuleNames,
            TargetAssetTierByTag,
            TargetIsInternetExposed,
            TargetLegacyEndOfSupport,
            SourceCriticalityTier,
            SourceCriticalityTierLevel,
            SourceAssetTierByTag,
            SourceIsInternetExposed,
            SourceLegacyEndOfSupport,
            SourceRiskProb,
            SourceRiskProbDetailed,
            SourceRiskProbDetailedScore,
            SourceNodeProperties,
            TargetNodeProperties

        | order by RiskScore_Weight_Factor desc, AttackPathPriorityScore desc, TierEscalation desc, CriticalityTier asc, FinalTarget asc

    - ReportName: Attack_Paths_Summary_Data_Sensitivity_to_Exposed_Credentials
      ReportPurpose: Credential-driven attack paths to sensitive data locations prioritized by FINAL TARGET business impact.
        EG provides path detection (ExposedCredential -> Identity -> DataLocation <- DataSensitivityScan) + scoring + tier;
        SI_Azure_Profile_CL contributes target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity)
        joined on the FINAL TARGET data location via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // =================================================================================================
        // REPORT  Exposed credentials enabling access to sensitive data locations using Exposure Graph
        // =================================================================================================
        //
        // Report purpose
        // Identify sensitive data locations and the credential driven attack paths that can reach them.
        // The path shape is
        // ExposedCredential -> Identity -> DataLocation <- DataSensitivityScan
        // Results are enriched using the standard Nodes context and prioritized by the business impact of the
        // final target which is the data location. Output is a collapsed summary suitable for your risk engine.
        //
        // Interpretation guard and priority rules
        // - Priority is driven by the target criticality tier first
        // - Then by tier escalation where source tier is higher than target tier
        // - Then by internet exposure where target exposure is weighted higher than source exposure
        // - The source identity matters as an amplifier but the target drives the priority
        //
        // Output description summary rows
        // One row per ConfigurationName which is LateralMovementType grouped within the report taxonomy
        // and collapsed so many credentials and identities do not multiply the counts.
        // RiskFactor detailed strings are rebuilt from TargetRiskProbDetailed and TargetRiskProbDetailedScore.
        //
        // Query steps overview
        // Step 0  Define legacy operating system reference lists
        // Step 1  Build Nodes catalog as enrichment backbone using standard context fields
        // Step 2  Normalize labels for allowlists
        // Step 3  Identify sensitive data locations from dataSensitivityScan edges
        // Step 4  Identify identity access to data locations
        // Step 5  Identify exposed credentials linked to identities and filter to credential allowlist
        // Step 6  Build detailed enriched table as Detailed
        // Step 7  Collapse to PathKey so credential spam does not multiply counts
        // Step 8  Build SummaryMain with correct counts
        // Step 9  Rebuild RiskFactor_Probability_Detailed via split expand and re aggregation
        // Step 10 Rebuild RiskFactor_Probability_DetailedScore via split expand and re aggregation
        // Step 11 Join summary parts and output final collapsed summary ordering
        // =================================================================================================


        // Step 0  Define legacy operating systems that should increase probability
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);


        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure data-location resources only).
        // EG drives path detection + scoring + tier; CL contributes ONLY cmdb metadata.
        // Join key  DataLocationNodeId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Build node catalog used to enrich attack paths
        // Fixes applied
        // - AadDeviceId, DeviceKey, AssetName defined in Nodes scope
        // - Bucket filter applied once at node scope, not inside mv-apply
        // - RawData and Raw extracted once and then reused
        let Nodes =
            ExposureGraphNodes
            | extend CategoriesStr = tolower(tostring(Categories))
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))
            | extend AssetName     = NodeNameNorm

            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)

            | extend AadDeviceId =
                tostring(coalesce(
                    RawData.aadDeviceId,
                    Raw.aadDeviceId,
                    NodeProperties.aadDeviceId
                ))

            | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, NodeNameNorm)
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__

            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(RawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend CriticalityRuleBased =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].ruleBasedCriticalityLevel),
                    tostring(RawData.criticalityLevel.ruleBasedCriticalityLevel),
                    tostring(NodeProperties.criticalityLevel.ruleBasedCriticalityLevel)
                ))
            | extend CriticalityRuleNames =
                coalesce(
                    strcat_array(NodeProperties.criticalityLevelProps[0].ruleNames, ", "),
                    strcat_array(RawData.criticalityLevel.ruleNames, ", "),
                    ""
                )

            | extend IsInternetExposed =
                tobool(coalesce(
                    RawData.isCustomerFacing,
                    Raw.isCustomerFacing,
                    false
                ))

            | extend IsExcluded =
                tobool(coalesce(
                    RawData.isExcluded,
                    Raw.isExcluded,
                    false
                ))

            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))

            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))

            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))

            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            
            // Exclude Devices, which includes tag with '--Excluded--SI'
            | where AssetTags !has "--Excluded--SI"
            
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)

            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )

            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )

            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )

            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))

            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                    tolower(AssetOSPlatform) has "linux"
                    and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                    1, 0
                )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)

            | extend RiskFactorsArray =
                todynamic(coalesce(
                    RawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)

            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))

            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)

            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )

            | extend _ScoreFactors =
                array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                )
            | mv-apply sf = _ScoreFactors on (
                where isnotempty(trim(" ", tostring(sf)))
                | summarize ScoreParts = make_set(strcat(tostring(sf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")

            | project
                NodeId,
                NodeName          = NodeNameNorm,
                NodeLabel,
                NodeProperties,
                CriticalityTier,
                CriticalityTierLevel,
                CriticalityRuleBased,
                CriticalityRuleNames,
                IsInternetExposed,
                IsExcluded,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence;


        // Step 2  Normalize labels to avoid typos breaking allowlists
        let NormalizeLabel = (s:string) { tolower(trim(" ", replace_string(s, " ", ""))) };


        // Step 3  Data location allowlist normalized
        let DataLocationLabels =
            dynamic([
                "blobcontainer",
                "microsoft.storage/storageaccounts",
                "microsoft.sql/servers/databases",
                "microsoft.sql/servers",
                "microsoft.storage/storageaccounts/blobservices/containers",
                "microsoft.storage/storageaccounts/fileservices/shares"
            ]);


        // Step 4  Credential allowlist normalized
        let CredentialLabels =
            dynamic([
                "azure-storage-shared-access-signature",
                "azure-storage-connection-string",
                "azure-database-connection-string",
                "azure-active-directory-app-secret",
                "service-principal-azure-cli-secret",
                "user-azure-cli-secret",
                "azure-active-directory-user-credentials",
                "entra-usercookie"
            ]);


        // Step 5  Find sensitive data locations
        let SensitiveDataLocations =
            ExposureGraphEdges
            | extend TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where SourceNodeLabel == "dataSensitivityScan"
            | where EdgeLabel in ("defined in", "contains")
            | where TargetNodeLabelNorm in (DataLocationLabels)
            | project
                SensitiveDataNodeId   = SourceNodeId,
                SensitiveDataNodeName = SourceNodeName,
                DataLocationNodeId    = TargetNodeId,
                DataLocationNodeName  = TargetNodeName,
                DataLocationNodeLabel = TargetNodeLabel;


        // Step 6  Identity to data location access edges
        let IdentityAccessToData =
            ExposureGraphEdges
            | extend TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where EdgeLabel in ("has permissions to", "has role on", "can authenticate to", "has access to", "can access")
            | where TargetNodeLabelNorm in (DataLocationLabels)
            | project
                IdentityNodeId     = SourceNodeId,
                DataLocationNodeId = TargetNodeId;


        // Step 7  Credential exposure edges support both directions
        let ExposedCredentialsToIdentity =
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "can authenticate as", "can authenticate to")
            | project
                CredentialNodeId    = SourceNodeId,
                CredentialName      = SourceNodeName,
                CredentialLabel     = SourceNodeLabel,
                IdentityNodeId      = TargetNodeId;

        let IdentityToExposedCredentials =
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "uses credential", "uses credentials", "authenticated by")
            | project
                IdentityNodeId      = SourceNodeId,
                CredentialNodeId    = TargetNodeId,
                CredentialName      = TargetNodeName,
                CredentialLabel     = TargetNodeLabel;

        let ExposedCreds =
            union isfuzzy=true ExposedCredentialsToIdentity, IdentityToExposedCredentials
            | extend CredentialNodeLabelNorm = NormalizeLabel(CredentialLabel)
            | where CredentialNodeLabelNorm in (CredentialLabels);


        // Step 8  Build the detailed output table
        let Detailed =
            IdentityAccessToData
            | join kind=inner SensitiveDataLocations on DataLocationNodeId
            | join kind=inner (
                ExposedCreds
                | project-rename IdentityNodeId_join = IdentityNodeId
            ) on $left.IdentityNodeId == $right.IdentityNodeId_join
            | project
                DataLocationNodeId,
                DataLocationNodeName,
                DataLocationNodeLabel,
                SensitiveDataNodeId,
                SensitiveDataNodeName,
                IdentityNodeId,
                CredentialNodeId,
                CredentialName,
                CredentialLabel
            | summarize
                SensitiveDataItems = make_set(SensitiveDataNodeName),
                SensitiveDataCount = dcount(SensitiveDataNodeId),

                ExposedCredentials     = make_set(CredentialName),
                ExposedCredentialTypes = make_set(CredentialLabel),
                ExposedCredentialCount = dcount(CredentialNodeId)
              by
                DataLocationNodeId,
                DataLocationNodeName,
                DataLocationNodeLabel,
                IdentityNodeId,
                CredentialNodeId,
                CredentialName,
                CredentialLabel

            | join kind=leftouter (
                Nodes
                | project-rename
                    TargetNodeId                = NodeId,
                    TargetCriticalityTier       = CriticalityTier,
                    TargetCriticalityTierLevel  = CriticalityTierLevel,
                    TargetCriticalityRuleBased  = CriticalityRuleBased,
                    TargetCriticalityRuleNames  = CriticalityRuleNames,
                    TargetIsInternetExposed     = IsInternetExposed,
                    TargetAssetTierByTag        = AssetTierByTag,
                    TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                    TargetRiskProb              = RiskFactor_Probability,
                    TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore
            ) on $left.DataLocationNodeId == $right.TargetNodeId

            | join kind=leftouter (
                Nodes
                | project-rename
                    SourceNodeId                = NodeId,
                    SourceCriticalityTier       = CriticalityTier,
                    SourceCriticalityTierLevel  = CriticalityTierLevel,
                    SourceIsInternetExposed     = IsInternetExposed,
                    SourceAssetTierByTag        = AssetTierByTag,
                    SourceLegacyEndOfSupport    = LegacyEndOfSupport,
                    SourceRiskProb              = RiskFactor_Probability,
                    SourceRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    SourceRiskProbDetailedScore = RiskFactor_Probability_DetailedScore
            ) on $left.IdentityNodeId == $right.SourceNodeId

            // CL asset-metadata enrichment for the FINAL TARGET data location (cmdb fields only -- EG owns tier/path).
            | join kind=leftouter (_TargetCmdb) on $left.DataLocationNodeId == $right.Target_AzureResourceId_Guid
            | extend
                cmdbId            = Target_cmdbId,
                cmdbName            = Target_cmdbName,
                cmdbCriticality     = Target_cmdbCriticality,
                cmdbDataSensitivity = Target_cmdbDataSensitivity

            | extend TierEscalation =
                case(
                    isnotempty(SourceCriticalityTier) and isnotempty(TargetCriticalityTier) and SourceCriticalityTier > TargetCriticalityTier,
                        SourceCriticalityTier - TargetCriticalityTier,
                    0
                )
            | extend IsLateralMovement = TierEscalation > 0
            | extend LateralMovementType =
                case(
                    TierEscalation >= 3, "Privilege escalation large tier jump",
                    TierEscalation == 2, "Privilege escalation two tiers",
                    TierEscalation == 1, "Privilege escalation one tier",
                    "Direct access same tier"
                )

            | extend TargetTierWeight =
                case(
                    TargetCriticalityTier == 0, 100,
                    TargetCriticalityTier == 1, 60,
                    TargetCriticalityTier == 2, 30,
                    10
                )
            | extend EscalationWeight = TierEscalation * 10
            | extend ExposureWeight   = iff(TargetIsInternetExposed == true, 8, 0) + iff(SourceIsInternetExposed == true, 3, 0)
            | extend SourceTierAmplifier =
                case(
                    SourceCriticalityTier == 0, 8,
                    SourceCriticalityTier == 1, 5,
                    SourceCriticalityTier == 2, 2,
                    0
                )
            | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier

            | extend AttackPathPriority =
                case(
                    AttackPathPriorityScore >= 90,  "Very High",
                    AttackPathPriorityScore >= 60,  "High",
                    AttackPathPriorityScore >= 30,  "Medium-High",
                    AttackPathPriorityScore >= 15,  "Medium",
                    "Low"
                )

            | extend SecurityDomain = "Azure"
            | extend Category = "Attack Paths"
            | extend SubCategory = "SensitiveDataExposure"
            | extend ConfigurationName = tostring(LateralMovementType)
            | extend SecuritySeverity  = tostring(AttackPathPriority)
            | extend RiskFactor_Consequence = 0;


        // ===================== COLLAPSED SUMMARY VERSION FINAL OUTPUT =====================

        // Step 9  Collapse to unique logical path so credential spam does not multiply counts
        let CollapsedPaths =
            Detailed
            | extend PathKey = strcat(CredentialNodeId, "->", IdentityNodeId, "->", DataLocationNodeId)
            | summarize
                AttackPathPriorityScore_Path = max(AttackPathPriorityScore),
                SecuritySeverity_Path        = any(SecuritySeverity),

                TargetCriticalityTier_Path      = any(TargetCriticalityTier),
                TargetCriticalityTierLevel_Path = any(TargetCriticalityTierLevel),
                TargetRiskProb_Path             = max(TargetRiskProb),

                TargetRiskProbDetailed_Path      = any(TargetRiskProbDetailed),
                TargetRiskProbDetailedScore_Path = any(TargetRiskProbDetailedScore),

                // CL cmdb metadata for the FINAL TARGET (any() -- one cmdb row per target).
                cmdbId_Path              = any(cmdbId),
                cmdbName_Path            = any(cmdbName),
                cmdbCriticality_Path     = any(cmdbCriticality),
                cmdbDataSensitivity_Path = any(cmdbDataSensitivity),

                CredentialTypes_Path = make_set(tostring(CredentialLabel)),
                TargetAssets_Path    = make_set(tostring(DataLocationNodeName)),
                TotalIssues_Path     = count()
              by
                PathKey,
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                DataLocationNodeId;


        // Step 10  Main summary counts stay correct
        // cmdbCriticality + cmdbDataSensitivity in by-clause so cmdb-bucketed rows survive.
        let SummaryMain =
            CollapsedPaths
            | summarize
                ConfigurationId = strcat_array(array_sort_asc(make_set(strcat_array(CredentialTypes_Path, ";"))), ";"),

                SecuritySeverity = any(SecuritySeverity_Path),
                CriticalityTier = toint(any(TargetCriticalityTier_Path)),
                CriticalityTierLevel = tostring(any(TargetCriticalityTierLevel_Path)),

                RiskFactor_Consequence = 0,
                RiskFactor_Probability = max(TargetRiskProb_Path),

                AssetCount   = dcount(DataLocationNodeId),
                TotalIssues  = sum(TotalIssues_Path),

                ImpactedAssets = strcat_array(array_sort_asc(make_set(strcat_array(TargetAssets_Path, ";"))), ";")
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;


        // Step 11  Rebuild probability detail fields via split expand and re aggregation
        let SummaryDetail =
            CollapsedPaths
            | extend _d = split(tostring(TargetRiskProbDetailed_Path), ";")
            | mv-expand _d to typeof(string)
            | extend _d = trim(" ", _d)
            | where isnotempty(_d)
            | summarize
                RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(make_set(_d)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        let SummaryDetailScore =
            CollapsedPaths
            | extend _s = split(tostring(TargetRiskProbDetailedScore_Path), ";")
            | mv-expand _s to typeof(string)
            | extend _s = trim(" ", _s)
            | where isnotempty(_s)
            | summarize
                RiskFactor_Probability_DetailedScore = strcat_array(array_sort_asc(make_set(_s)), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;


        // Step 12  Final output
        SummaryMain
        | join kind=leftouter SummaryDetail      on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        | join kind=leftouter SummaryDetailScore on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project
            SecurityDomain,
            Category,
            SubCategory,
            ConfigurationName,
            ConfigurationId,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AssetCount,
            TotalIssues,
            ImpactedAssets
        | order by
            RiskScore_Weight_Factor desc,
            RiskFactor_Probability desc,
            CriticalityTier asc,
            TotalIssues desc,
            AssetCount desc

    - ReportName: Attack_Paths_Detailed_Data_Sensitivity_to_Exposed_Credentials
      ReportPurpose: Per-row detail of credential-driven attack paths to sensitive data locations prioritized by FINAL TARGET business impact.
        EG drives path detection (ExposedCredential -> Identity -> DataLocation <- DataSensitivityScan) + scoring + tier;
        SI_Azure_Profile_CL contributes target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity)
        joined on the FINAL TARGET data location via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |
        // =================================================================================================
        // REPORT  Exposed credentials enabling access to sensitive data locations using Exposure Graph
        // =================================================================================================
        //
        // Report purpose
        // Identify sensitive data locations and the credential driven attack paths that can reach them.
        // The path shape is
        // ExposedCredential -> Identity -> DataLocation <- DataSensitivityScan
        // Results are enriched using the standard Nodes context and prioritized by the business impact of the
        // FINAL TARGET which is the data location.
        //
        // Interpretation guard and priority rules
        // - Priority is driven by the TARGET criticality tier first
        // - Then by tier escalation where source tier is higher than target tier
        // - Then by internet exposure where target exposure is weighted higher than source exposure
        // - A low tier credential source can never outrank a tier 0 or tier 1 target
        //
        // Output description detailed rows
        // One row per unique ExposedCredential -> Identity -> DataLocation path enriched with
        // - IsInternetExposed for credential source and target location
        // - AssetTierByTag for source and target
        // - LegacyEndOfSupport for source and target
        // - RiskFactor probability fields including detailed breakdown for source and target
        // - AttackPathPriorityScore and severity label
        // - Human readable AttackPath and AttackPathDetailed strings
        //
        // Query steps overview
        // Step 0  Define legacy operating system reference lists
        // Step 1  Build Nodes catalog as enrichment backbone using standard context fields
        // Step 2  Normalize labels for allowlists
        // Step 3  Identify sensitive data locations from dataSensitivityScan edges
        // Step 4  Identify identity access to data locations
        // Step 5  Identify exposed credentials linked to identities and filter to credential allowlist
        // Step 6  Assemble credential driven paths and de duplicate to stable grain
        // Step 7  Enrich credential source identity and target location using Nodes
        // Step 8  Apply standard prioritization logic and build attack path strings
        // Step 9  Project detailed output columns and apply ordering
        // =================================================================================================

        // Step 0  Define legacy operating systems that should increase probability
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);

        // Step 0b  CL asset-metadata lookup for the FINAL TARGET data location (Azure resources only).
        // EG drives path detection + scoring + tier; CL contributes ONLY cmdb metadata.
        // Join key  DataLocationNodeId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Build node catalog used to enrich attack paths
        let Nodes =
            ExposureGraphNodes
            | extend CategoriesStr = tolower(tostring(Categories))
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))
            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)
            | extend AadDeviceId =
                tostring(coalesce(
                    RawData.aadDeviceId,
                    Raw.aadDeviceId,
                    NodeProperties.aadDeviceId
                ))

            | extend DeviceKey = iif(isnotempty(AadDeviceId), AadDeviceId, NodeNameNorm)
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__

            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend CriticalityRuleBased =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].ruleBasedCriticalityLevel),
                    tostring(NodeProperties.rawData.criticalityLevel.ruleBasedCriticalityLevel),
                    tostring(NodeProperties.criticalityLevel.ruleBasedCriticalityLevel)
                ))
            | extend CriticalityRuleNames =
                coalesce(
                    strcat_array(NodeProperties.criticalityLevelProps[0].ruleNames, ", "),
                    strcat_array(NodeProperties.rawData.criticalityLevel.ruleNames, ", "),
                    ""
                )

            | extend IsInternetExposed =
                tobool(coalesce(
                    NodeProperties.rawData.isCustomerFacing,
                    NodeProperties.raw.isCustomerFacing,
                    false
                ))

            | extend IsExcluded =
                tobool(coalesce(
                    NodeProperties.rawData.isExcluded,
                    NodeProperties.raw.isExcluded,
                    false
                ))

            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)

            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))

            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))

            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))

            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            
            // Exclude Devices, which includes tag with '--Excluded--SI'
            | where AssetTags !has "--Excluded--SI"
            
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)

            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )

            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )

            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )

            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))

            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                    tolower(AssetOSPlatform) has "linux"
                    and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                    1, 0
                )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)

            | extend RiskFactorsArray =
                todynamic(coalesce(
                    NodeProperties.rawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)

            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)

            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )

            | mv-apply rf = array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                ) on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize ScoreParts = make_set(strcat(tostring(rf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")

            | project
                NodeId,
                NodeName          = NodeNameNorm,
                NodeLabel,
                NodeProperties,
                CriticalityTier,
                CriticalityTierLevel,
                CriticalityRuleBased,
                CriticalityRuleNames,
                IsInternetExposed,
                IsExcluded,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence;

        // Step 2  Normalize labels to avoid typos breaking allowlists
        let NormalizeLabel = (s:string) { tolower(trim(" ", replace_string(s, " ", ""))) };

        // Step 3  Data location allowlist (normalized)
        let DataLocationLabels =
            dynamic([
                "blobcontainer",
                "microsoft.storage/storageaccounts",
                "microsoft.sql/servers/databases",
                "microsoft.sql/servers",
                "microsoft.storage/storageaccounts/blobservices/containers",
                "microsoft.storage/storageaccounts/fileservices/shares"
            ]);

        // Step 4  Credential allowlist (normalized)
        let CredentialLabels =
            dynamic([
                "azure-storage-shared-access-signature",
                "azure-storage-connection-string",
                "azure-database-connection-string",
                "azure-active-directory-app-secret",
                "service-principal-azure-cli-secret",
                "user-azure-cli-secret",
                "azure-active-directory-user-credentials",
                "entra-usercookie"
            ]);

        // Step 5  Find sensitive data locations
        let SensitiveDataLocations =
            ExposureGraphEdges
            | extend TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where SourceNodeLabel == "dataSensitivityScan"
            | where EdgeLabel in ("defined in", "contains")
            | where TargetNodeLabelNorm in (DataLocationLabels)
            | project
                SensitiveDataNodeId   = SourceNodeId,
                SensitiveDataNodeName = SourceNodeName,
                DataLocationNodeId    = TargetNodeId,
                DataLocationNodeName  = TargetNodeName,
                DataLocationNodeLabel = TargetNodeLabel;

        // Step 6  Identity -> data location access edges
        let IdentityAccessToData =
            ExposureGraphEdges
            | extend TargetNodeLabelNorm = NormalizeLabel(TargetNodeLabel)
            | where EdgeLabel in ("has permissions to", "has role on", "can authenticate to", "has access to", "can access")
            | where TargetNodeLabelNorm in (DataLocationLabels)
            | project
                IdentityNodeId     = SourceNodeId,
                IdentityNodeName   = SourceNodeName,
                IdentityNodeLabel  = SourceNodeLabel,
                DataLocationNodeId = TargetNodeId;

        // Step 7  Credential exposure edges (support both directions)
        let ExposedCredentialsToIdentity =
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "can authenticate as", "can authenticate to")
            | project
                CredentialNodeId    = SourceNodeId,
                CredentialNodeName  = SourceNodeName,
                CredentialNodeLabel = SourceNodeLabel,
                IdentityNodeId      = TargetNodeId;

        let IdentityToExposedCredentials =
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "uses credential", "uses credentials", "authenticated by")
            | project
                IdentityNodeId      = SourceNodeId,
                CredentialNodeId    = TargetNodeId,
                CredentialNodeName  = TargetNodeName,
                CredentialNodeLabel = TargetNodeLabel;

        // Step 8  Union both forms and then filter credential types
        let ExposedCreds =
            union isfuzzy=true ExposedCredentialsToIdentity, IdentityToExposedCredentials
            | extend CredentialNodeLabelNorm = NormalizeLabel(CredentialNodeLabel)
            | where CredentialNodeLabelNorm in (CredentialLabels);

        // Step 9  Assemble detailed paths and enrich source and target using Nodes
        IdentityAccessToData
        | join kind=inner SensitiveDataLocations on DataLocationNodeId
        | join kind=inner ExposedCreds on IdentityNodeId
        | summarize
            SensitiveDataItems        = make_set(SensitiveDataNodeName),
            SensitiveDataCount        = dcount(SensitiveDataNodeId),

            CredentialNodeId          = any(CredentialNodeId),
            CredentialName            = any(CredentialNodeName),
            CredentialLabel           = any(CredentialNodeLabel),

            ExposedCredentials        = make_set(CredentialNodeName),
            ExposedCredentialTypes    = make_set(CredentialNodeLabel),
            ExposedCredentialCount    = dcount(CredentialNodeId),

            IdentityNodeId            = any(IdentityNodeId),
            IdentityName              = any(IdentityNodeName),
            IdentityLabel             = any(IdentityNodeLabel),

            DataLocationNodeName      = any(DataLocationNodeName),
            DataLocationNodeLabel     = any(DataLocationNodeLabel)
          by DataLocationNodeId

        | join kind=leftouter (
            Nodes
            | project-rename
                TargetNodeId                = NodeId,
                TargetNodeName              = NodeName,
                TargetNodeLabel             = NodeLabel,
                TargetCriticalityTier       = CriticalityTier,
                TargetCriticalityTierLevel  = CriticalityTierLevel,
                TargetCriticalityRuleBased  = CriticalityRuleBased,
                TargetCriticalityRuleNames  = CriticalityRuleNames,
                TargetIsInternetExposed     = IsInternetExposed,
                TargetIsExcluded            = IsExcluded,
                TargetAssetTierByTag        = AssetTierByTag,
                TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                TargetRiskProb              = RiskFactor_Probability,
                TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                TargetNodeProperties        = NodeProperties
        ) on $left.DataLocationNodeId == $right.TargetNodeId

        | join kind=leftouter (
            Nodes
            | project-rename
                SourceNodeId                = NodeId,
                SourceNodeName              = NodeName,
                SourceNodeLabel             = NodeLabel,
                SourceCriticalityTier       = CriticalityTier,
                SourceCriticalityTierLevel  = CriticalityTierLevel,
                SourceIsInternetExposed     = IsInternetExposed,
                SourceIsExcluded            = IsExcluded,
                SourceAssetTierByTag        = AssetTierByTag,
                SourceLegacyEndOfSupport    = LegacyEndOfSupport,
                SourceRiskProb              = RiskFactor_Probability,
                SourceRiskProbDetailed      = RiskFactor_Probability_Detailed,
                SourceRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                SourceNodeProperties        = NodeProperties
        ) on $left.IdentityNodeId == $right.SourceNodeId

        | join kind=leftouter (
            Nodes
            | project-rename
                CredentialNodeId_join       = NodeId,
                CredentialNodeName_join     = NodeName,
                CredentialNodeLabel_join    = NodeLabel,
                CredentialIsInternetExposed = IsInternetExposed,
                CredentialAssetTierByTag    = AssetTierByTag,
                CredentialLegacyEndOfSupport= LegacyEndOfSupport,
                CredentialRiskProb          = RiskFactor_Probability,
                CredentialRiskProbDetailed  = RiskFactor_Probability_Detailed,
                CredentialRiskProbDetailedScore = RiskFactor_Probability_DetailedScore,
                CredentialNodeProperties    = NodeProperties
        ) on $left.CredentialNodeId == $right.CredentialNodeId_join

        // CL asset-metadata enrichment for the FINAL TARGET data location (cmdb fields only -- EG owns tier/path).
        | join kind=leftouter (_TargetCmdb) on $left.DataLocationNodeId == $right.Target_AzureResourceId_Guid
        | extend
            cmdbId            = Target_cmdbId,
            cmdbName            = Target_cmdbName,
            cmdbCriticality     = Target_cmdbCriticality,
            cmdbDataSensitivity = Target_cmdbDataSensitivity

        // Step 10  Apply standard prioritization logic based on FINAL TARGET
        | extend TierEscalation =
            case(
                isnotempty(SourceCriticalityTier) and isnotempty(TargetCriticalityTier) and SourceCriticalityTier > TargetCriticalityTier,
                    SourceCriticalityTier - TargetCriticalityTier,
                0
            )
        | extend IsLateralMovement = TierEscalation > 0
        | extend LateralMovementType =
            case(
                TierEscalation >= 3, "Privilege escalation large tier jump",
                TierEscalation == 2, "Privilege escalation two tiers",
                TierEscalation == 1, "Privilege escalation one tier",
                "Direct access same tier"
            )

        | extend TargetTierWeight =
            case(
                TargetCriticalityTier == 0, 100,
                TargetCriticalityTier == 1, 60,
                TargetCriticalityTier == 2, 30,
                10
            )
        | extend EscalationWeight = TierEscalation * 10
        | extend ExposureWeight   = iff(TargetIsInternetExposed == true, 8, 0) + iff(SourceIsInternetExposed == true, 3, 0)
        | extend SourceTierAmplifier =
            case(
                SourceCriticalityTier == 0, 8,
                SourceCriticalityTier == 1, 5,
                SourceCriticalityTier == 2, 2,
                0
            )
        | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier

        | extend AttackPathPriority =
            case(
                AttackPathPriorityScore >= 90,  "Very High",
                AttackPathPriorityScore >= 60,  "High",
                AttackPathPriorityScore >= 30,  "Medium-High",
                AttackPathPriorityScore >= 15,  "Medium",
                "Low"
            )

        | extend InternetExposureTarget = iff(TargetIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")
        | extend InternetExposureSource = iff(SourceIsInternetExposed == true, "Internet-Exposed", "Not Internet-Exposed")

        | extend SecurityDomain = "Azure"
        | extend Category = "Attack Paths"
        | extend Subcategory = "SensitiveDataExposure"

        // Step 11  Human readable paths
        | extend AttackPath =
            strcat(
                CredentialLabel, " [", CredentialName, "] -> ",
                IdentityLabel, " [", IdentityName, "] -> ",
                DataLocationNodeLabel, " [", DataLocationNodeName, "]"
            )

        | extend AttackPathDetailed =
            strcat(
                "CREDENTIAL ", CredentialLabel, " [", CredentialName, "] ",
                iff(ExposedCredentialCount > 1, strcat("| + ", tostring(ExposedCredentialCount - 1), " other credential(s) "), ""),
                "-> IDENTITY ", IdentityLabel, " [", IdentityName, "] ",
                "tier ", tostring(SourceCriticalityTier), " ", tostring(SourceCriticalityTierLevel), " | ", InternetExposureSource,
                " -> TARGET ", DataLocationNodeLabel, " [", DataLocationNodeName, "] ",
                "tier ", tostring(TargetCriticalityTier), " ", tostring(TargetCriticalityTierLevel), " | ", InternetExposureTarget,
                " | escalation ", tostring(TierEscalation),
                " | ", LateralMovementType,
                " | sensitive items ", tostring(SensitiveDataCount)
            )

        // Per-row identity columns expected by engine dedup (AssetName, ConfigurationName/Id).
        // ConfigurationId carries the FINAL TARGET id (DataLocationNodeId) so (AssetName, ConfigurationId) is unique per row.
        | extend
            AssetName              = DataLocationNodeName,
            AssetLabel             = DataLocationNodeLabel,
            ConfigurationName      = tostring(LateralMovementType),
            ConfigurationId        = tostring(DataLocationNodeId),
            SecuritySeverity       = tostring(AttackPathPriority),
            Impact                 = todouble(AttackPathPriorityScore),
            CriticalityTier        = TargetCriticalityTier,
            CriticalityTierLevel   = TargetCriticalityTierLevel,
            RiskFactor_Consequence = 0,
            RiskFactor_Probability = TargetRiskProb,
            RiskFactor_Probability_Detailed      = TargetRiskProbDetailed,
            RiskFactor_Probability_DetailedScore = TargetRiskProbDetailedScore
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__

        // Step 12  Final projection detailed output
        | project
            SecurityDomain,
            Category,
            Subcategory,
            ConfigurationName,
            ConfigurationId,
            AssetName,
            Impact,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AttackPath,
            AttackPathDetailed,
            AttackPathPriority,
            AttackPathPriorityScore,
            TierEscalation,
            IsLateralMovement,
            LateralMovementType,
            EscalationWeight,
            ExposureWeight,
            DataLocationNodeId,
            DataLocationNodeName,
            DataLocationNodeLabel,
            SensitiveDataCount,
            SensitiveDataItems,
            CredentialNodeId,
            CredentialName,
            CredentialLabel,
            ExposedCredentialCount,
            ExposedCredentials,
            ExposedCredentialTypes,
            IdentityNodeId,
            IdentityName,
            IdentityLabel,
            TargetAssetTierByTag,
            TargetIsInternetExposed,
            TargetLegacyEndOfSupport,
            TargetCriticalityRuleBased,
            TargetCriticalityRuleNames,
            SourceCriticalityTier,
            SourceCriticalityTierLevel,
            SourceAssetTierByTag,
            SourceIsInternetExposed,
            SourceLegacyEndOfSupport,
            SourceRiskProb,
            SourceRiskProbDetailed,
            SourceRiskProbDetailedScore,
            CredentialIsInternetExposed,
            CredentialAssetTierByTag,
            CredentialLegacyEndOfSupport,
            CredentialRiskProb,
            CredentialRiskProbDetailed,
            CredentialRiskProbDetailedScore,
            SourceNodeProperties,
            TargetNodeProperties,
            CredentialNodeProperties

        | order by RiskScore_Weight_Factor desc, AttackPathPriorityScore desc, TierEscalation desc, CriticalityTier asc, DataLocationNodeName asc


    - ReportName: Attack_Paths_Summary_Credential_Based_Lateral_Movement
      ReportPurpose: Credential-driven lateral-movement paths to Azure and Endpoint targets prioritized by FINAL TARGET business impact.
        EG provides path detection (SourceAsset -> Credential -> Identity -> AzureTarget) + scoring + tier;
        SI_Azure_Profile_CL contributes target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity)
        joined on the FINAL TARGET via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |
        // =================================================================================================
        // REPORT  Credential driven lateral movement paths to Azure and Endpoint targets using Exposure Graph
        // Bucketing applied to CredentialEdges (first hop) - stable anchor, homogeneous key
        // =================================================================================================

        // Step 0  Legacy OS definitions for probability scoring
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);

        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure resources only).
        // EG drives path detection + scoring + tier; CL contributes ONLY cmdb metadata.
        // Join key  FinalTargetId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Credential edges - bucketed here as the stable entry point
        // EdgeLabel + SourceNodeLabel + TargetNodeLabel filters narrow the set BEFORE bucketing
        // SourceNodeId is the bucket key - always a real asset node, consistent and hashable
        let CredentialEdges =
            ExposureGraphEdges
            | where EdgeLabel in ("contains", "defined in", "runs on", "has credentials of")
            | where SourceNodeLabel in (
                "device",
                "computer-account",
                "microsoft.compute/virtualmachines",
                "microsoft.web/sites_webapp",
                "microsoft.storage/storageaccounts",
                "user",
                "serviceprincipal"
            )
            | where TargetNodeLabel in (
                "azure-active-directory-app-secret",
                "user-azure-cli-secret",
                "azure-storage-shared-access-signature",
                "azure-storage-connection-string",
                "azure-database-connection-string",
                "azure-active-directory-user-credentials",
                "service-principal-azure-cli-secret",
                "entra-usercookie"
            )
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__
            | project
                SourceNodeId, SourceNodeName, SourceNodeLabel,
                TargetNodeId, TargetNodeName, TargetNodeLabel,
                EdgeLabel;

        // Step 2  Hop 1 edges - no bucketing needed, naturally constrained by downstream join to CredentialEdges
        let Hop1Edges =
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "can authenticate as", "can authenticate to")
            | project
                SourceNodeId, SourceNodeName, SourceNodeLabel,
                TargetNodeId, TargetNodeName, TargetNodeLabel,
                EdgeLabel;

        // Step 3  Hop 2 edges - filtered by EdgeLabel + TargetNodeLabel, constrained by downstream join to Hop1
        let Hop2Edges =
            ExposureGraphEdges
            | where EdgeLabel in ("can authenticate to", "runs on", "has permissions to", "has role on")
            | where TargetNodeLabel in (
                "microsoft.compute/virtualmachines",
                "microsoft.compute/virtualmachines/extensions",
                "device",
                "computer-account",
                "microsoft.web/sites_webapp",
                "microsoft.sql/servers",
                "microsoft.sql/servers/databases",
                "microsoft.storage/storageaccounts",
                "microsoft.keyvault/vaults",
                "microsoft.cognitiveservices/accounts",
                "microsoft.cognitiveservices/accounts/deployments",
                "microsoft.cognitiveservices/accounts_openai",
                "microsoft.operationalinsights/workspaces",
                "microsoft.network/virtualnetworks",
                "microsoft.network/virtualnetworks/subnets",
                "microsoft.network/networksecuritygroups",
                "microsoft.web/serverfarms",
                "microsoft.logic/workflows",
                "subscriptions",
                "resourcegroups",
                "BlobContainer"
            )
            | project
                SourceNodeId, SourceNodeName, SourceNodeLabel,
                TargetNodeId, TargetNodeName, TargetNodeLabel,
                EdgeLabel;

        // Step 4  Identify credentials on source assets from bucketed credential edges
        let CredentialsOnAssets =
            CredentialEdges
            | summarize
                SourceAssets          = make_set(SourceNodeName),
                SourceAssetTypes      = make_set(SourceNodeLabel),
                SourceAssetCount      = dcount(SourceNodeId),
                FirstSourceAssetId    = any(SourceNodeId),
                FirstSourceAssetName  = any(SourceNodeName),
                FirstSourceAssetLabel = any(SourceNodeLabel),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                CredentialNodeId  = TargetNodeId,
                CredentialName    = TargetNodeName,
                CredentialLabel   = TargetNodeLabel;

        // Step 5  Hop 1 -- credential authenticates as identity
        let Hop1 =
            Hop1Edges
            | project
                CredentialNodeId          = SourceNodeId,
                Hop1_EdgeLabel            = EdgeLabel,
                IntermediateIdentityId    = TargetNodeId,
                IntermediateIdentity      = TargetNodeName,
                IntermediateIdentityLabel = TargetNodeLabel;

        // Step 6  Hop 2 -- identity reaches target resource
        let Hop2 =
            Hop2Edges
            | project
                Hop2_SourceIdentityId = SourceNodeId,
                Hop2_EdgeLabel        = EdgeLabel,
                FinalTargetId         = TargetNodeId,
                FinalTargetName       = TargetNodeName,
                FinalTargetLabel      = TargetNodeLabel;

        // Step 7  Assemble and stabilize paths
        let Paths =
            CredentialsOnAssets
            | join kind=inner (Hop1) on CredentialNodeId
            | join kind=inner (Hop2) on $left.IntermediateIdentityId == $right.Hop2_SourceIdentityId
            | where FirstSourceAssetId != FinalTargetId
            | summarize
                FirstSourceAssetName      = any(FirstSourceAssetName),
                FirstSourceAssetLabel     = any(FirstSourceAssetLabel),
                CredentialName            = any(CredentialName),
                CredentialLabel           = any(CredentialLabel),
                IntermediateIdentity      = any(IntermediateIdentity),
                IntermediateIdentityLabel = any(IntermediateIdentityLabel),
                Hop1Edge                  = any(Hop1_EdgeLabel),
                Hop2Edge                  = any(Hop2_EdgeLabel),
                FinalTargetName           = any(FinalTargetName),
                FinalTargetLabel          = any(FinalTargetLabel),
                SourceAssets              = any(SourceAssets),
                SourceAssetTypes          = any(SourceAssetTypes),
                SourceAssetCount          = any(SourceAssetCount),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                FirstSourceAssetId,
                CredentialNodeId,
                IntermediateIdentityId,
                FinalTargetId;

        // Step 8  Collect node IDs that need enrichment
        let EnrichIds =
            union
                (Paths | project NodeId = FirstSourceAssetId),
                (Paths | project NodeId = CredentialNodeId),
                (Paths | project NodeId = IntermediateIdentityId),
                (Paths | project NodeId = FinalTargetId)
            | where isnotempty(tostring(column_ifexists("NodeId", "")))
            | summarize by NodeId;

        // Step 9  Enrich only the nodes actually used in paths
        let Nodes =
            ExposureGraphNodes
            | where NodeId in (EnrichIds | project NodeId)
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))
            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)
            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(RawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend IsInternetExposed =
                tobool(coalesce(
                    RawData.isCustomerFacing,
                    Raw.isCustomerFacing,
                    false
                ))
            | extend IsExcluded =
                tobool(coalesce(
                    RawData.isExcluded,
                    Raw.isExcluded,
                    false
                ))
            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))
            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))
            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))
            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            | where AssetTags !has "--Excluded--SI"
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)
            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )
            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )
            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )
            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))
            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                tolower(AssetOSPlatform) has "linux"
                and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                1, 0
            )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)
            | extend RiskFactorsArray =
                todynamic(coalesce(
                    RawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)
            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)
            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )
            | extend _ScoreFactors =
                array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                )
            | mv-apply sf = _ScoreFactors on (
                where isnotempty(trim(" ", tostring(sf)))
                | summarize ScoreParts = make_set(strcat(tostring(sf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")
            | project
                NodeId,
                NodeName              = NodeNameNorm,
                NodeLabel,
                CriticalityTier,
                CriticalityTierLevel,
                IsInternetExposed,
                IsExcluded,
                AssetTags,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence;

        // Step 10  Enrich paths with node metadata
        let Detailed =
            Paths
            | join kind=leftouter (
                Nodes
                | project
                    SourceNodeId                = NodeId,
                    SourceCriticalityTier       = CriticalityTier,
                    SourceCriticalityTierLevel  = CriticalityTierLevel,
                    SourceIsInternetExposed     = IsInternetExposed,
                    SourceIsExcluded            = IsExcluded,
                    SourceAssetTierByTag        = AssetTierByTag,
                    SourceLegacyEndOfSupport    = LegacyEndOfSupport,
                    SourceRiskProb              = RiskFactor_Probability,
                    SourceRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    SourceRiskProbDetailedScore = RiskFactor_Probability_DetailedScore
              ) on $left.FirstSourceAssetId == $right.SourceNodeId
            | join kind=leftouter (
                Nodes
                | project
                    IntermediateNodeId                = NodeId,
                    IntermediateCriticalityTier       = CriticalityTier,
                    IntermediateCriticalityTierLevel  = CriticalityTierLevel,
                    IntermediateIsInternetExposed     = IsInternetExposed,
                    IntermediateLegacyEndOfSupport    = LegacyEndOfSupport,
                    IntermediateRiskProb              = RiskFactor_Probability,
                    IntermediateRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    IntermediateRiskProbDetailedScore = RiskFactor_Probability_DetailedScore
              ) on $left.IntermediateIdentityId == $right.IntermediateNodeId
            | join kind=leftouter (
                Nodes
                | project
                    TargetNodeId                = NodeId,
                    TargetCriticalityTier       = CriticalityTier,
                    TargetCriticalityTierLevel  = CriticalityTierLevel,
                    TargetIsInternetExposed     = IsInternetExposed,
                    TargetIsExcluded            = IsExcluded,
                    TargetAssetTierByTag        = AssetTierByTag,
                    TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                    TargetRiskProb              = RiskFactor_Probability,
                    TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore
              ) on $left.FinalTargetId == $right.TargetNodeId
            // CL asset-metadata enrichment for the FINAL TARGET (cmdb fields only -- EG owns tier/path).
            | join kind=leftouter (_TargetCmdb) on $left.FinalTargetId == $right.Target_AzureResourceId_Guid
            | extend
                cmdbId            = Target_cmdbId,
                cmdbName            = Target_cmdbName,
                cmdbCriticality     = Target_cmdbCriticality,
                cmdbDataSensitivity = Target_cmdbDataSensitivity
            | extend TierEscalation =
                case(
                    isnotempty(SourceCriticalityTier) and isnotempty(TargetCriticalityTier)
                        and SourceCriticalityTier > TargetCriticalityTier,
                        SourceCriticalityTier - TargetCriticalityTier,
                    0
                )
            | extend LateralMovementType =
                case(
                    TierEscalation >= 3, "Privilege escalation large tier jump",
                    TierEscalation == 2, "Privilege escalation two tiers",
                    TierEscalation == 1, "Privilege escalation one tier",
                    "Direct access same tier"
                )
            | extend TargetTierWeight =
                case(
                    TargetCriticalityTier == 0, 100,
                    TargetCriticalityTier == 1, 60,
                    TargetCriticalityTier == 2, 30,
                    10
                )
            | extend EscalationWeight    = TierEscalation * 10
            | extend ExposureWeight      = iff(TargetIsInternetExposed == true, 8, 0)
                                         + iff(SourceIsInternetExposed == true, 3, 0)
            | extend SourceTierAmplifier =
                case(
                    SourceCriticalityTier == 0, 8,
                    SourceCriticalityTier == 1, 5,
                    SourceCriticalityTier == 2, 2,
                    0
                )
            | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier
            | extend AttackPathPriority =
                case(
                    AttackPathPriorityScore >= 90, "Very High",
                    AttackPathPriorityScore >= 60, "High",
                    AttackPathPriorityScore >= 30, "Medium-High",
                    AttackPathPriorityScore >= 15, "Medium",
                    "Low"
                )
            | project
                AttackPathPriority,
                AttackPathPriorityScore,
                TierEscalation,
                LateralMovementType,
                FirstSourceAssetId,
                FirstSourceAssetName,
                FirstSourceAssetLabel,
                IntermediateIdentityId,
                IntermediateIdentity,
                IntermediateIdentityLabel,
                CredentialNodeId,
                CredentialName,
                CredentialLabel,
                FinalTargetId,
                FinalTargetName,
                FinalTargetLabel,
                TargetCriticalityTier,
                TargetCriticalityTierLevel,
                TargetAssetTierByTag,
                TargetIsInternetExposed,
                TargetLegacyEndOfSupport,
                TargetRiskProb              = coalesce(TargetRiskProb, 0),
                TargetRiskProbDetailed      = coalesce(TargetRiskProbDetailed, ""),
                TargetRiskProbDetailedScore = coalesce(TargetRiskProbDetailedScore, ""),
                SourceCriticalityTier,
                SourceCriticalityTierLevel,
                SourceIsInternetExposed,
                SourceLegacyEndOfSupport,
                SourceRiskProb              = coalesce(SourceRiskProb, 0),
                SourceRiskProbDetailed      = coalesce(SourceRiskProbDetailed, ""),
                SourceRiskProbDetailedScore = coalesce(SourceRiskProbDetailedScore, ""),
                SourceAssetCount,
                SourceAssets,
                SourceAssetTypes,
                Hop1Edge,
                Hop2Edge,
                cmdbId,
                cmdbName,
                cmdbCriticality,
                cmdbDataSensitivity;

        // Step 11  Collapse to unique logical path key
        let CollapsedPaths =
            Detailed
            | extend PathKey = strcat(FirstSourceAssetId, "->", IntermediateIdentityId, "->", FinalTargetId)
            | extend SecurityDomain = "Azure"
            | extend
                Category               = "Attack Paths",
                SubCategory            = "LateralMovement",
                ConfigurationName      = tostring(LateralMovementType),
                SecuritySeverity       = tostring(AttackPathPriority),
                RiskFactor_Consequence = 0
            | summarize
                SecuritySeverity_Path            = any(SecuritySeverity),
                TargetCriticalityTier_Path       = any(TargetCriticalityTier),
                TargetCriticalityTierLevel_Path  = any(TargetCriticalityTierLevel),
                TargetRiskProb_Path              = max(TargetRiskProb),
                TargetRiskProbDetailed_Path      = any(TargetRiskProbDetailed),
                TargetRiskProbDetailedScore_Path = any(TargetRiskProbDetailedScore),
                // CL cmdb metadata for the FINAL TARGET (any() -- one cmdb row per target).
                cmdbId_Path              = any(cmdbId),
                cmdbName_Path            = any(cmdbName),
                cmdbCriticality_Path             = any(cmdbCriticality),
                cmdbDataSensitivity_Path         = any(cmdbDataSensitivity),
                CredentialLabels_Path            = make_set(tostring(CredentialLabel)),
                SourceAssets_Path                = make_set(tostring(FirstSourceAssetName)),
                // TargetAssets_Path is what AssetCount (dcount(FinalTargetId)) actually counts --
                // the Azure resources under attack. ImpactedAssets below uses this so the
                // asset-count and the asset-names match the same entity (targets).
                TargetAssets_Path                = make_set(tostring(FinalTargetName)),
                TotalIssues_Path                 = count(),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                PathKey,
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                FinalTargetId;

        // Step 12  Summarize to report grain
        // cmdbCriticality + cmdbDataSensitivity in by-clause so cmdb-bucketed rows survive.
        let SummaryMain =
            CollapsedPaths
            | summarize
                ConfigurationId        = strcat_array(array_sort_asc(make_set(strcat_array(CredentialLabels_Path, ";"))), ";"),
                SecuritySeverity       = any(SecuritySeverity_Path),
                CriticalityTier        = toint(any(TargetCriticalityTier_Path)),
                CriticalityTierLevel   = tostring(any(TargetCriticalityTierLevel_Path)),
                RiskFactor_Consequence = 0,
                RiskFactor_Probability = max(TargetRiskProb_Path),
                AssetCount             = dcount(FinalTargetId),
                TotalIssues            = sum(TotalIssues_Path),
                ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat_array(TargetAssets_Path, ";"))), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 13  Flatten probability detail strings
        let SummaryDetail =
            CollapsedPaths
            | extend _d = split(tostring(TargetRiskProbDetailed_Path), ";")
            | mv-expand _d to typeof(string)
            | extend _d = trim(" ", _d)
            | where isnotempty(_d)
            | summarize RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(make_set(_d)), ";")
              by SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId_Path, cmdbName_Path, cmdbCriticality_Path, cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        let SummaryDetailScore =
            CollapsedPaths
            | extend _s = split(tostring(TargetRiskProbDetailedScore_Path), ";")
            | mv-expand _s to typeof(string)
            | extend _s = trim(" ", _s)
            | where isnotempty(_s)
            | summarize RiskFactor_Probability_DetailedScore = strcat_array(array_sort_asc(make_set(_s)), ";")
              by SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId_Path, cmdbName_Path, cmdbCriticality_Path, cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 14  Final output
        SummaryMain
        | join kind=leftouter SummaryDetail      on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        | join kind=leftouter SummaryDetailScore on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project
            SecurityDomain,
            Category,
            SubCategory,
            ConfigurationName,
            ConfigurationId,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AssetCount,
            TotalIssues,
            ImpactedAssets
        | order by
            RiskScore_Weight_Factor desc,
            RiskFactor_Probability desc,
            CriticalityTier asc,
            TotalIssues desc,
            AssetCount desc

    - ReportName: Attack_Paths_Summary_Device_with_high_severity_vulnerabilities_allows_lateral_movement_Azure
      ReportPurpose: Vulnerable-device-to-Azure-target attack paths prioritized by FINAL TARGET business impact.
        EG provides path detection (VulnerableDevice -> Credential -> Identity -> AzureTarget) + scoring + tier;
        SI_Azure_Profile_CL contributes target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity)
        joined on the FINAL TARGET via AzureResourceId_Guid (= EG NodeId hex).
      # v2.2.305 -- BucketCount removed; let AutoBucket calculate from default
      # (2) and escalate only if needed. Graph-match shape doesn't cartesian-
      # explode like the v2.2.277 4-hop join chain did, so the pre-set 64 is
      # wasteful (~35s overhead per empty bucket).
      SecurityDomain: Endpoint
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // v2.2.306 -- Summary variant of the graph-match shape used by the Detailed
        // sibling. Same make-graph + graph-match traversal; instead of one row per
        // (entry-device, target) path the output aggregates by (Subcategory, cmdb*)
        // bucket. Bucket placeholder is INSIDE VulnerableDevices (before make-graph)
        // so partitioning shrinks the graph SEED, not just the output rows -- scales
        // sub-linearly to 100K+ source devices.
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL         = toint(column_ifexists("Tier", 0)),
                Target_AssetName_From_CL    = tostring(column_ifexists("AssetName", "")),
                Target_AssetId_From_CL      = tostring(column_ifexists("AssetId", "")),
                Target_AssetType_From_CL    = tostring(column_ifexists("AssetType", ""))
            | where Target_AzureResourceId_Guid != "";

        // Source-device profile from SI_Endpoint_Profile_CL (the entry-point device).
        // Joined post-graph-match on AadDeviceId. Drives:
        //  - CriticalityTier (per project rule: ALWAYS from CL.Tier, never EG)
        //  - cmdbCriticality / cmdbDataSensitivity for the WEIGHTED multiplier
        //  - AssetName / AssetId / AssetType -- the row IS about THIS device's risk;
        //    the Azure asset reached is the impacted destination, not the analyzed asset.
        let _SourceCmdb =
            SI_Endpoint_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Source_AadDeviceId         = tostring(column_ifexists("AadDeviceId", "")),
                Source_AssetName           = tostring(column_ifexists("AssetName", "")),
                Source_AssetId             = tostring(column_ifexists("AssetId", "")),
                Source_AssetType           = tostring(column_ifexists("AssetType", "")),
                Source_Tier                = toint(column_ifexists("Tier", 0)),
                Source_cmdbId              = tostring(column_ifexists("cmdbId", "")),
                Source_cmdbName            = tostring(column_ifexists("cmdbName", "")),
                Source_cmdbCriticality     = tostring(column_ifexists("cmdbCriticality", "")),
                Source_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", ""))
            | where Source_AadDeviceId != "";

        let VulnerableDevices = ExposureGraphNodes
        | where set_has_element(Categories, "device")
        | where NodeProperties.rawData.highRiskVulnerabilityInsights.hasHighOrCritical == true
        // Source-side bucket filter -- partitions 1M-device tenants BEFORE make-graph.
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | project NodeId, NodeName, NodeLabel, Categories, NodeProperties;
        let Identities = ExposureGraphNodes
        | where set_has_element(Categories, "identity")
        | project NodeId, NodeName, NodeLabel, Categories;
        let Credentials = ExposureGraphNodes
        | where set_has_element(Categories, "secret")
        | project NodeId, NodeName, NodeLabel, Categories;
        let AzureNodes = ExposureGraphNodes
        | where set_has_element(Categories, "environmentAzure")
        | project NodeId, NodeName, NodeLabel, Categories;
        let RelevantNodes = union VulnerableDevices, Credentials, Identities, AzureNodes;

        // Source-device enrichment: derive multi-signal RiskFactor_Probability from EG.
        // Mirrors the pattern in the v2.2.290 cartesian Summary -- combines
        // EG.riskFactors[] count + isCustomerFacing + legacy-OS into a single int +
        // detailed string. Joined post-graph-match on EntryPointDeviceId == NodeId.
        let _LegacyWindowsOSPlatforms = dynamic(["WindowsServer2008","WindowsServer2008R2","WindowsServer2012","WindowsServer2012R2","Windows7","Windows8","Windows8.1"]);
        let _LegacyMacOSMajorVersions = dynamic([10,11,12]);
        let _LegacyLinuxMatchers = dynamic(["CentOS 7","Ubuntu 18.04","Debian 10","RHEL 7","SLES 12"]);
        let _DeviceEnrichment = VulnerableDevices
        | extend RawData = todynamic(NodeProperties).rawData
        | extend IsInternetExposed = tobool(coalesce(RawData.isCustomerFacing, todynamic(NodeProperties).raw.isCustomerFacing, false))
        | extend AssetOSPlatform     = tostring(coalesce(RawData.osPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
        | extend AssetOSVersion      = tostring(coalesce(RawData.osVersion, RawData.version, RawData.operatingSystemVersion))
        | extend AssetOSDistribution = tostring(coalesce(RawData.osDistribution, RawData.distribution))
        | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))
        | extend IsLegacyWindows = iff(AssetOSPlatform in~ (_LegacyWindowsOSPlatforms), 1, 0)
        | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (_LegacyMacOSMajorVersions), 1, 0)
        | extend IsLegacyLinux   = iff(tolower(AssetOSPlatform) has "linux" and (AssetOSDistribution has_any (_LegacyLinuxMatchers) or AssetOSVersion has_any (_LegacyLinuxMatchers)), 1, 0)
        | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)
        | extend RiskFactorsArray = todynamic(coalesce(RawData.risk.riskFactors, todynamic(NodeProperties).risk.riskFactors, dynamic([])))
        | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)
        | mv-apply rf = RiskFactorsArray on (
            where isnotempty(trim(" ", tostring(rf)))
            | summarize RiskFactorSet = make_set(tostring(rf))
          )
        | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
        | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
        | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
        | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)
        | extend Source_RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
        | extend Source_RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(array_concat(
            RiskFactorSet,
            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
          )), ";")
        | project NodeId, Source_RiskFactor_Probability, Source_RiskFactor_Probability_Detailed;

        let _Paths = ExposureGraphEdges
        | where EdgeLabel in~ (
            "contains",
            "has credentials of", "frequently logged in by",
            "can authenticate as",
            "member of",
            "has role on"
          )
        | make-graph SourceNodeId --> TargetNodeId with RelevantNodes on NodeId
        | graph-match (Device)-[devEdge]->(CredOrIdent)-[bridge*0..3]->(Principal)-[role]->(RoleScope)-[inherit*0..2]->(AzureAsset)
            where set_has_element(Device.Categories, "device")
              and Device.NodeProperties.rawData.highRiskVulnerabilityInsights.hasHighOrCritical == true
              and (set_has_element(CredOrIdent.Categories, "secret") or set_has_element(CredOrIdent.Categories, "identity"))
              and set_has_element(AzureAsset.Categories, "environmentAzure")
              and AzureAsset.NodeLabel in~ ("microsoft.resources/subscriptions", "microsoft.storage/storageaccounts")
              and devEdge.EdgeLabel in~ ("contains", "has credentials of", "frequently logged in by")
              and role.EdgeLabel =~ "has role on"
            project
                EntryPointDeviceId = Device.NodeId,
                EntryPointDevice   = Device.NodeName,
                // Capture the source device's aadDeviceId so we can leftouter-join
                // SI_Endpoint_Profile_CL for the source-device Tier.
                EntryPointAadDeviceId = tostring(Device.NodeProperties.rawData.aadDeviceId),
                // EG stores maxCvssScore as standard 0-10 CVSS (already on the true scale).
                // Thresholds downstream use 9/7/5/3 boundaries.
                MaxCvssScore       = todouble(Device.NodeProperties.rawData.highRiskVulnerabilityInsights.maxCvssScore),
                FirstHopLabel      = CredOrIdent.NodeLabel,
                DeviceEdge         = devEdge.EdgeLabel,
                TargetAzureAssetId = AzureAsset.NodeId,
                TargetAzureAsset   = AzureAsset.NodeName,
                TargetLabel        = AzureAsset.NodeLabel
        | extend TargetType = case(
            TargetLabel == "microsoft.resources/subscriptions", "Subscription",
            TargetLabel == "microsoft.storage/storageaccounts", "Storage account",
            TargetLabel)
        | extend AttackPathName = strcat(
            "Device with high severity vulnerabilities allows lateral movement to Azure ",
            iff(TargetType == "Subscription", "subscription", "storage account"));

        // CMDB + Tier enrichment from CL on FINAL TARGET.
        _Paths
        | join kind=leftouter (_TargetCmdb) on $left.TargetAzureAssetId == $right.Target_AzureResourceId_Guid
        | extend cmdbId = Target_cmdbId, cmdbName = Target_cmdbName, cmdbCriticality = Target_cmdbCriticality, cmdbDataSensitivity = Target_cmdbDataSensitivity, Target_Tier_Aliased = Target_Tier_From_CL
        // EG-derived multi-signal source-device probability (RiskFactorsCount + InternetExposed + LegacyEoS).
        | join kind=leftouter (_DeviceEnrichment) on $left.EntryPointDeviceId == $right.NodeId
        // Source-device profile from SI_Endpoint_Profile_CL. CriticalityTier + cmdb +
        // canonical Asset columns ALL reflect the SOURCE entry-point device -- the
        // analyzed asset for this attack-path family is the vulnerable device, not the
        // Azure target. Azure target is preserved in dedicated columns (TargetAzureAsset,
        // TargetAzureAssetId, TargetType) for the impact narrative.
        | join kind=leftouter (_SourceCmdb) on $left.EntryPointAadDeviceId == $right.Source_AadDeviceId
        | extend CriticalityTier      = coalesce(toint(Source_Tier), 3)
        | extend cmdbId               = Source_cmdbId
        | extend cmdbName             = Source_cmdbName
        | extend cmdbCriticality      = Source_cmdbCriticality
        | extend cmdbDataSensitivity  = Source_cmdbDataSensitivity
        | extend CriticalityTierLevel = case(
            CriticalityTier == 0, "Critical - tier 0",
            CriticalityTier == 1, "High - tier 1",
            CriticalityTier == 2, "Medium - tier 2",
            "Low - tier 3")
        | extend SecurityDomain = "Endpoint"
        | extend Category       = "AttackPath_VulnerableDeviceToAzure"
        | extend Subcategory    = TargetType
        | extend ConfigurationName = AttackPathName
        | extend ConfigurationId   = AttackPathName
        // Aggregate to (Subcategory x cmdb*) buckets -- one row per attack-path category
        // per target-criticality combo, with impacted-asset list rolled up.
        | summarize
            Impact          = max(MaxCvssScore),
            ImpactedAssetCount        = dcount(EntryPointDeviceId),
            UniqueIssues              = dcount(TargetAzureAssetId),
            TotalIssuesImpactedAssets = count(),
            ImpactedAssetsList        = make_set(EntryPointDevice),
            IssueList                 = make_set(TargetAzureAsset),
            EntryVectorTypes          = make_set(FirstHopLabel),
            DeviceEdgeTypes           = make_set(DeviceEdge),
            // EG-derived multi-signal source-device probability aggregation.
            Max_Source_RiskFactor_Probability         = max(toint(Source_RiskFactor_Probability)),
            All_Source_RiskFactor_Probability_Detailed = make_set(Source_RiskFactor_Probability_Detailed)
            by SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
               CriticalityTier, CriticalityTierLevel,
               cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | extend SecuritySeverity = case(
            Impact >= 9.0, "Very High",
            Impact >= 7.0, "High",
            Impact >= 5.0, "Medium-High",
            Impact >= 3.0, "Medium",
            "Low")
        | extend AssetName = strcat_array(ImpactedAssetsList, "; ")
        | extend AssetId   = strcat_array(IssueList, "; ")
        | extend AssetType = Subcategory
        // Consequence = 0 (engine auto-derives tokens). Probability = aggregated source-device
        // EG signal count (max across all paths in this group). No CVSS bonus -- CVSS already
        // contributes via Impact -> SecuritySeverity -> engine's consBase.
        | extend RiskFactor_Consequence          = 0
        | extend RiskFactor_Probability          = coalesce(Max_Source_RiskFactor_Probability, 0)
        | extend RiskFactor_Probability_Detailed = strcat_array(All_Source_RiskFactor_Probability_Detailed, ";")
        // Engine weighted-factor block (cmdbCriticality * cmdbDataSensitivity multiplier).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  AssetName, AssetId, AssetType, Impact, SecuritySeverity,
                  CriticalityTier, CriticalityTierLevel,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed,
                  RiskScore_Weight_Detailed, RiskScore_Weight_Factor, RiskFactor_Weight,
                  cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity,
                  ImpactedAssetCount, UniqueIssues, TotalIssuesImpactedAssets,
                  ImpactedAssetsList, IssueList
        | sort by RiskScore_Weight_Factor desc, RiskFactor_Probability desc, CriticalityTier asc, ImpactedAssetCount desc

    - ReportName: Attack_Paths_Detailed_Device_with_high_severity_vulnerabilities_allows_lateral_movement_Azure
      ReportPurpose: Per-row detail of credential-driven attack paths from vulnerable devices to Azure targets,
        prioritized by FINAL TARGET business impact. EG drives path detection (VulnerableDevice -> Credential -> Identity -> AzureTarget) +
        scoring + tier; SI_Azure_Profile_CL contributes target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity)
        joined on the FINAL TARGET via AzureResourceId_Guid (= EG NodeId hex).
      # v2.2.306 -- bucket placeholder positioned INSIDE the VulnerableDevices
      # let-binding (BEFORE make-graph). Each bucket then starts with 1/N source
      # devices -> make-graph operates on a smaller seed -> graph-match walks a
      # smaller subgraph -> compute scales sub-linearly with bucket count.
      # Critical for scaling to 1M+ devices. AutoBucket calculates from default.
      SecurityDomain: Endpoint
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // v2.2.303 -- graph-match shape (replaces v2.2.295 cartesian).
        // Pure-EG core, then CMDB + Tier enrichment from SI_Azure_Profile_CL.
        // The engine pre-fetches _TargetCmdb via the hybrid LA-direct path
        // and inlines it as a datatable, so this query stays missing-table
        // tolerant on tenants without Sentinel data lake.
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL         = toint(column_ifexists("Tier", 0)),
                Target_AssetName_From_CL    = tostring(column_ifexists("AssetName", "")),
                Target_AssetId_From_CL      = tostring(column_ifexists("AssetId", "")),
                Target_AssetType_From_CL    = tostring(column_ifexists("AssetType", ""))
            // Use `!= ""` (not `isnotempty`) on purpose: the engine's 2-phase
            // post-augment plan regex matches `where isnotempty(<rkey>)` exactly
            // and would strip the let+join+extend, but its single-extend match
            // only captures the FIRST alias column, leaving downstream extends
            // referencing missing columns. Falling back to legacy hybrid pre-
            // fetch + inline keeps all 4 cmdb extends + the Tier coalesce intact.
            | where Target_AzureResourceId_Guid != "";

        let VulnerableDevices = ExposureGraphNodes
        | where set_has_element(Categories, "device")
        | where NodeProperties.rawData.highRiskVulnerabilityInsights.hasHighOrCritical == true
        // Bucket filter at SOURCE -- partitions 1M-device tenants into shards
        // BEFORE make-graph constructs the graph. Engine substitutes
        // `__bucket_key = coalesce(DeviceKey, NodeId, ...)`. NodeId exists natively
        // on ExposureGraphNodes so anchor resolves cleanly.
        //__BUCKET_FILTER_BEGIN__
        | where 1 == 1
        //__BUCKET_FILTER_END__
        | project NodeId, NodeName, NodeLabel, Categories, NodeProperties;
        let Identities = ExposureGraphNodes
        | where set_has_element(Categories, "identity")
        | project NodeId, NodeName, NodeLabel, Categories;
        let Credentials = ExposureGraphNodes
        | where set_has_element(Categories, "secret")
        | project NodeId, NodeName, NodeLabel, Categories;
        let AzureNodes = ExposureGraphNodes
        | where set_has_element(Categories, "environmentAzure")
        | project NodeId, NodeName, NodeLabel, Categories;
        let RelevantNodes = union VulnerableDevices, Credentials, Identities, AzureNodes;

        // Source-device enrichment: derive multi-signal RiskFactor_Probability from EG.
        // Mirrors the pattern in the v2.2.290 cartesian Summary -- combines
        // EG.riskFactors[] count + isCustomerFacing + legacy-OS into a single int +
        // detailed string. Joined post-graph-match on EntryPointDeviceId == NodeId.
        let _LegacyWindowsOSPlatforms = dynamic(["WindowsServer2008","WindowsServer2008R2","WindowsServer2012","WindowsServer2012R2","Windows7","Windows8","Windows8.1"]);
        let _LegacyMacOSMajorVersions = dynamic([10,11,12]);
        let _LegacyLinuxMatchers = dynamic(["CentOS 7","Ubuntu 18.04","Debian 10","RHEL 7","SLES 12"]);
        let _DeviceEnrichment = VulnerableDevices
        | extend RawData = todynamic(NodeProperties).rawData
        | extend IsInternetExposed = tobool(coalesce(RawData.isCustomerFacing, todynamic(NodeProperties).raw.isCustomerFacing, false))
        | extend AssetOSPlatform     = tostring(coalesce(RawData.osPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
        | extend AssetOSVersion      = tostring(coalesce(RawData.osVersion, RawData.version, RawData.operatingSystemVersion))
        | extend AssetOSDistribution = tostring(coalesce(RawData.osDistribution, RawData.distribution))
        | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))
        | extend IsLegacyWindows = iff(AssetOSPlatform in~ (_LegacyWindowsOSPlatforms), 1, 0)
        | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (_LegacyMacOSMajorVersions), 1, 0)
        | extend IsLegacyLinux   = iff(tolower(AssetOSPlatform) has "linux" and (AssetOSDistribution has_any (_LegacyLinuxMatchers) or AssetOSVersion has_any (_LegacyLinuxMatchers)), 1, 0)
        | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)
        | extend RiskFactorsArray = todynamic(coalesce(RawData.risk.riskFactors, todynamic(NodeProperties).risk.riskFactors, dynamic([])))
        | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)
        | mv-apply rf = RiskFactorsArray on (
            where isnotempty(trim(" ", tostring(rf)))
            | summarize RiskFactorSet = make_set(tostring(rf))
          )
        | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
        | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
        | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
        | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)
        | extend Source_RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
        | extend Source_RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(array_concat(
            RiskFactorSet,
            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
          )), ";")
        | project NodeId, Source_RiskFactor_Probability, Source_RiskFactor_Probability_Detailed;

        let _Paths = ExposureGraphEdges
        | where EdgeLabel in~ (
            "contains",
            "has credentials of", "frequently logged in by",
            "can authenticate as",
            "member of",
            "has role on"
          )
        | make-graph SourceNodeId --> TargetNodeId with RelevantNodes on NodeId
        | graph-match (Device)-[devEdge]->(CredOrIdent)-[bridge*0..3]->(Principal)-[role]->(RoleScope)-[inherit*0..2]->(AzureAsset)
            where set_has_element(Device.Categories, "device")
              and Device.NodeProperties.rawData.highRiskVulnerabilityInsights.hasHighOrCritical == true
              and (set_has_element(CredOrIdent.Categories, "secret") or set_has_element(CredOrIdent.Categories, "identity"))
              and set_has_element(AzureAsset.Categories, "environmentAzure")
              and AzureAsset.NodeLabel in~ ("microsoft.resources/subscriptions", "microsoft.storage/storageaccounts")
              and devEdge.EdgeLabel in~ ("contains", "has credentials of", "frequently logged in by")
              and role.EdgeLabel =~ "has role on"
            project
                EntryPointDeviceId = Device.NodeId,
                EntryPointDevice   = Device.NodeName,
                // Capture the source device's aadDeviceId so we can leftouter-join
                // SI_Endpoint_Profile_CL for the source-device Tier.
                EntryPointAadDeviceId = tostring(Device.NodeProperties.rawData.aadDeviceId),
                // EG stores maxCvssScore as standard 0-10 CVSS (already on the true scale).
                // Thresholds downstream use 9/7/5/3 boundaries.
                MaxCvssScore       = todouble(Device.NodeProperties.rawData.highRiskVulnerabilityInsights.maxCvssScore),
                FirstHopNode       = CredOrIdent.NodeName,
                FirstHopLabel      = CredOrIdent.NodeLabel,
                FirstHopCategories = CredOrIdent.Categories,
                DeviceEdge         = devEdge.EdgeLabel,
                ReachedIdentity    = Principal.NodeName,
                RoleScopeName      = RoleScope.NodeName,
                RoleScopeLabel     = RoleScope.NodeLabel,
                TargetAzureAssetId = AzureAsset.NodeId,
                TargetAzureAsset   = AzureAsset.NodeName,
                TargetLabel        = AzureAsset.NodeLabel
        | extend EntryVector = case(
                DeviceEdge =~ "contains" and FirstHopLabel == "entra-userCookie",                       "Entra session cookie",
                DeviceEdge =~ "contains" and FirstHopLabel == "azure-active-directory-app-secret",      "AAD app secret",
                DeviceEdge =~ "contains" and FirstHopLabel == "azure-active-directory-user-credentials", "Cached AAD user credentials",
                DeviceEdge =~ "contains" and FirstHopLabel == "azure-storage-shared-access-signature",  "SAS token",
                DeviceEdge =~ "contains" and FirstHopLabel == "azure-storage-connection-string",        "Storage connection string",
                DeviceEdge =~ "contains" and FirstHopLabel == "azure-database-connection-string",       "DB connection string",
                DeviceEdge =~ "contains" and FirstHopLabel == "azure-app-configuration-key",            "App Configuration key",
                DeviceEdge =~ "contains" and FirstHopLabel == "github-personal-access-token",           "GitHub PAT",
                DeviceEdge =~ "contains" and FirstHopLabel == "openai-api-key",                         "OpenAI API key",
                DeviceEdge =~ "contains" and FirstHopLabel == "user-azure-cli-secret",                  "Cached Azure CLI token",
                DeviceEdge =~ "contains",                                                                strcat("Other secret: ", tostring(FirstHopLabel)),
                DeviceEdge =~ "has credentials of",                                                      "Owner / cached credential",
                DeviceEdge =~ "frequently logged in by",                                                 "Interactive logon",
                tostring(DeviceEdge))
        | summarize
                EntryVectors      = make_set(EntryVector),
                DeviceEdges       = make_set(DeviceEdge),
                CredentialNodes   = make_set(iff(set_has_element(FirstHopCategories, "secret"), FirstHopNode, ""), 10),
                FirstHopLabels    = make_set(FirstHopLabel),
                ReachedIdentities = make_set(ReachedIdentity),
                ViaRoleScope      = take_any(RoleScopeName),
                ViaRoleScopeType  = take_any(RoleScopeLabel),
                MaxCvssScore      = max(MaxCvssScore)
            by EntryPointDeviceId, EntryPointDevice, TargetAzureAssetId, TargetAzureAsset, TargetLabel
        | extend CredentialNodes = set_difference(CredentialNodes, dynamic([""]))
        | extend TargetType = case(
            TargetLabel == "microsoft.resources/subscriptions", "Subscription",
            TargetLabel == "microsoft.storage/storageaccounts", "Storage account",
            TargetLabel)
        | extend AttackPathName = strcat(
            "Device with high severity vulnerabilities allows lateral movement to Azure ",
            iff(TargetType == "Subscription", "subscription", "storage account"));

        // CMDB + Tier enrichment from SI_Azure_Profile_CL on FINAL TARGET (AzureAsset.NodeId == AzureResourceId_Guid).
        // SINGLE multi-assignment extend on purpose: the engine's 2-phase post-augment
        // regex matches `| extend a=b, c=d, ...` as one statement and captures all alias
        // columns. Multiple separate `| extend` lines lose all but the first, breaking
        // the downstream column references on the AH side.
        _Paths
        | join kind=leftouter (_TargetCmdb) on $left.TargetAzureAssetId == $right.Target_AzureResourceId_Guid
        | extend cmdbId = Target_cmdbId, cmdbName = Target_cmdbName, cmdbCriticality = Target_cmdbCriticality, cmdbDataSensitivity = Target_cmdbDataSensitivity, Target_Tier_Aliased = Target_Tier_From_CL
        // EG-derived multi-signal source-device probability (RiskFactorsCount + InternetExposed + LegacyEoS).
        | join kind=leftouter (_DeviceEnrichment) on $left.EntryPointDeviceId == $right.NodeId
        // v2.2.317 -- Detailed body was missing this join (only Summary had it).
        // Without it the downstream `extend AssetName = coalesce(Source_AssetName, ...)`
        // + `extend RiskFactor_Probability = coalesce(toint(Source_RiskFactor_Probability), 0)`
        // failed with "Failed to resolve scalar expression named 'Source_AssetName'"
        // because the Source_* columns the projection references were never brought
        // into scope. Mirrors the Summary join at line 8562.
        | join kind=leftouter (_SourceCmdb) on $left.EntryPointAadDeviceId == $right.Source_AadDeviceId
        // Per project rule: CriticalityTier ALWAYS sources from SI_Azure_Profile_CL.Tier.
        // Use the aliased column (populated either by the engine's post-AH augment OR
        // by the legacy hybrid-pre-fetch inline datatable -- both paths populate it).
        | extend CriticalityTier = coalesce(toint(Target_Tier_Aliased), 3)
        | extend CriticalityTierLevel = case(
            CriticalityTier == 0, "Critical - tier 0",
            CriticalityTier == 1, "High - tier 1",
            CriticalityTier == 2, "Medium - tier 2",
            "Low - tier 3")
        | extend SecurityDomain = "Endpoint"
        | extend Category       = "AttackPath_VulnerableDeviceToAzure"
        | extend Subcategory    = TargetType
        | extend ConfigurationName = AttackPathName
        | extend ConfigurationId   = strcat(EntryPointDevice, "->", TargetAzureAsset)
        | extend AssetName = coalesce(Source_AssetName, EntryPointDevice)
        | extend AssetId   = coalesce(Source_AssetId,   EntryPointAadDeviceId, EntryPointDeviceId)
        | extend AssetType = coalesce(Source_AssetType, "Device")
        | extend Impact = MaxCvssScore
        | extend SecuritySeverity = case(
            MaxCvssScore >= 9.0, "Very High",
            MaxCvssScore >= 7.0, "High",
            MaxCvssScore >= 5.0, "Medium-High",
            MaxCvssScore >= 3.0, "Medium",
            "Low")
        // RiskFactor_Consequence stays 0 -- engine auto-derives tokens (Tier0BlastRadius,
        // BusinessCriticalAsset, RestrictedDataAccess) from CriticalityTier + cmdb fields
        // when the report's RiskFactor_Consequence_Detailed is empty.
        | extend RiskFactor_Consequence          = 0
        // RiskFactor_Probability = COUNT of EG-derived risk signals on the source device,
        // ADDED ON TOP of the engine's probBase (which comes from CriticalityTierLevel
        // via riskscore.index.custom.csv). Do NOT add CVSS here -- CVSS already drives
        // SecuritySeverity -> consBase, so adding it again would double-count.
        | extend RiskFactor_Probability          = coalesce(toint(Source_RiskFactor_Probability), 0)
        | extend RiskFactor_Probability_Detailed = coalesce(tostring(Source_RiskFactor_Probability_Detailed), "")
        // Engine weighted-factor block. Substituted at run time from
        // riskscore_weighted.schema.custom.json -> weightedRiskFactors.endpoint.fields[].
        // Default stub below = no lift (Factor=100). Real schema multiplies cmdbCriticality
        // * cmdbDataSensitivity (basis-100, e.g. Critical*Restricted -> 150*175/100 = 262.5).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project SecurityDomain, Category, Subcategory, ConfigurationName, ConfigurationId,
                  AssetName, AssetId, AssetType, Impact, SecuritySeverity,
                  CriticalityTier, CriticalityTierLevel,
                  RiskFactor_Consequence, RiskFactor_Probability, RiskFactor_Probability_Detailed,
                  RiskScore_Weight_Detailed, RiskScore_Weight_Factor, RiskFactor_Weight,
                  cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity,
                  EntryPointDevice, EntryVectors, ReachedIdentities, TargetAzureAsset,
                  ViaRoleScope, ViaRoleScopeType, MaxCvssScore, CredentialNodes
        | sort by EntryPointDevice asc, TargetAzureAsset asc

    - ReportName: Attack_Paths_Detailed_Credential_Based_Lateral_Movement
      ReportPurpose: Per-row detail of credential-driven lateral-movement paths to Azure and Endpoint targets,
        prioritized by FINAL TARGET business impact. EG drives path detection (SourceAsset -> Credential -> Identity -> AzureTarget) +
        scoring + tier; SI_Azure_Profile_CL contributes target asset metadata only (cmdbName, cmdbCriticality, cmdbDataSensitivity)
        joined on the FINAL TARGET via AzureResourceId_Guid (= EG NodeId hex).
      SecurityDomain: Azure
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - AssetName
      - AssetId
      - AssetType
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // =================================================================================================
        // REPORT  Credential driven lateral movement paths to Azure and Endpoint targets using Exposure Graph
        // Bucketing applied to CredentialEdges (first hop) - stable anchor, homogeneous key
        // =================================================================================================

        // Step 0  Legacy OS definitions for probability scoring
        let LegacyWindowsOSPlatforms = dynamic([
          "WindowsServer2008",
          "WindowsServer2008R2",
          "WindowsServer2012",
          "WindowsServer2012R2",
          "Windows7",
          "Windows8",
          "Windows8.1"
        ]);

        let LegacyMacOSMajorVersions = dynamic([10, 11, 12]);

        let LegacyLinuxMatchers = dynamic([
          "CentOS 7",
          "Ubuntu 18.04",
          "Debian 10",
          "RHEL 7",
          "SLES 12"
        ]);

        // Step 0b  CL asset-metadata lookup for the FINAL TARGET (Azure resources only).
        // EG drives path detection + scoring + tier; CL contributes ONLY cmdb metadata.
        // Join key  FinalTargetId (= EG NodeId) == SI_Azure_Profile_CL.AzureResourceId_Guid (= EG NodeId hex).
        let _TargetCmdb =
            SI_Azure_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                Target_AzureResourceId_Guid = tostring(column_ifexists("AzureResourceId_Guid", "")),
                Target_cmdbName             = tostring(column_ifexists("cmdbName", "")),
                Target_cmdbId               = tostring(column_ifexists("cmdbId", "")),
                Target_cmdbCriticality      = tostring(column_ifexists("cmdbCriticality", "")),
                Target_cmdbDataSensitivity  = tostring(column_ifexists("cmdbDataSensitivity", "")),
                Target_Tier_From_CL          = toint(column_ifexists("Tier", 0)),
                  AssetName_From_CL      = tostring(column_ifexists("AssetName", "")),
                  AssetId_From_CL        = tostring(column_ifexists("AssetId", "")),
                  AssetType_From_CL      = tostring(column_ifexists("AssetType", ""))
            | where isnotempty(tostring(column_ifexists("Target_AzureResourceId_Guid", "")));

        // Step 1  Credential edges - bucketed here as the stable entry point
        // EdgeLabel + SourceNodeLabel + TargetNodeLabel filters narrow the set BEFORE bucketing
        // SourceNodeId is the bucket key - always a real asset node, consistent and hashable
        let CredentialEdges =
            ExposureGraphEdges
            | where EdgeLabel in ("contains", "defined in", "runs on", "has credentials of")
            | where SourceNodeLabel in (
                "device",
                "computer-account",
                "microsoft.compute/virtualmachines",
                "microsoft.web/sites_webapp",
                "microsoft.storage/storageaccounts",
                "user",
                "serviceprincipal"
            )
            | where TargetNodeLabel in (
                "azure-active-directory-app-secret",
                "user-azure-cli-secret",
                "azure-storage-shared-access-signature",
                "azure-storage-connection-string",
                "azure-database-connection-string",
                "azure-active-directory-user-credentials",
                "service-principal-azure-cli-secret",
                "entra-usercookie"
            )
            //__STALE_DEVICE_FILTER_BEGIN__
            | where 1 == 1
            //__STALE_DEVICE_FILTER_END__
            //__BUCKET_FILTER_BEGIN__
            | where 1 == 1
            //__BUCKET_FILTER_END__
            | project
                SourceNodeId, SourceNodeName, SourceNodeLabel,
                TargetNodeId, TargetNodeName, TargetNodeLabel,
                EdgeLabel;

        // Step 2  Hop 1 edges - no bucketing needed, naturally constrained by downstream join to CredentialEdges
        let Hop1Edges =
            ExposureGraphEdges
            | where EdgeLabel in ("has credentials of", "can authenticate as", "can authenticate to")
            | project
                SourceNodeId, SourceNodeName, SourceNodeLabel,
                TargetNodeId, TargetNodeName, TargetNodeLabel,
                EdgeLabel;

        // Step 3  Hop 2 edges - filtered by EdgeLabel + TargetNodeLabel, constrained by downstream join to Hop1
        let Hop2Edges =
            ExposureGraphEdges
            | where EdgeLabel in ("can authenticate to", "runs on", "has permissions to", "has role on")
            | where TargetNodeLabel in (
                "microsoft.compute/virtualmachines",
                "microsoft.compute/virtualmachines/extensions",
                "device",
                "computer-account",
                "microsoft.web/sites_webapp",
                "microsoft.sql/servers",
                "microsoft.sql/servers/databases",
                "microsoft.storage/storageaccounts",
                "microsoft.keyvault/vaults",
                "microsoft.cognitiveservices/accounts",
                "microsoft.cognitiveservices/accounts/deployments",
                "microsoft.cognitiveservices/accounts_openai",
                "microsoft.operationalinsights/workspaces",
                "microsoft.network/virtualnetworks",
                "microsoft.network/virtualnetworks/subnets",
                "microsoft.network/networksecuritygroups",
                "microsoft.web/serverfarms",
                "microsoft.logic/workflows",
                "subscriptions",
                "resourcegroups",
                "BlobContainer"
            )
            | project
                SourceNodeId, SourceNodeName, SourceNodeLabel,
                TargetNodeId, TargetNodeName, TargetNodeLabel,
                EdgeLabel;

        // Step 4  Identify credentials on source assets from bucketed credential edges
        let CredentialsOnAssets =
            CredentialEdges
            | summarize
                SourceAssets          = make_set(SourceNodeName),
                SourceAssetTypes      = make_set(SourceNodeLabel),
                SourceAssetCount      = dcount(SourceNodeId),
                FirstSourceAssetId    = any(SourceNodeId),
                FirstSourceAssetName  = any(SourceNodeName),
                FirstSourceAssetLabel = any(SourceNodeLabel),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                CredentialNodeId  = TargetNodeId,
                CredentialName    = TargetNodeName,
                CredentialLabel   = TargetNodeLabel;

        // Step 5  Hop 1 -- credential authenticates as identity
        let Hop1 =
            Hop1Edges
            | project
                CredentialNodeId          = SourceNodeId,
                Hop1_EdgeLabel            = EdgeLabel,
                IntermediateIdentityId    = TargetNodeId,
                IntermediateIdentity      = TargetNodeName,
                IntermediateIdentityLabel = TargetNodeLabel;

        // Step 6  Hop 2 -- identity reaches target resource
        let Hop2 =
            Hop2Edges
            | project
                Hop2_SourceIdentityId = SourceNodeId,
                Hop2_EdgeLabel        = EdgeLabel,
                FinalTargetId         = TargetNodeId,
                FinalTargetName       = TargetNodeName,
                FinalTargetLabel      = TargetNodeLabel;

        // Step 7  Assemble and stabilize paths
        let Paths =
            CredentialsOnAssets
            | join kind=inner (Hop1) on CredentialNodeId
            | join kind=inner (Hop2) on $left.IntermediateIdentityId == $right.Hop2_SourceIdentityId
            | where FirstSourceAssetId != FinalTargetId
            | summarize
                FirstSourceAssetName      = any(FirstSourceAssetName),
                FirstSourceAssetLabel     = any(FirstSourceAssetLabel),
                CredentialName            = any(CredentialName),
                CredentialLabel           = any(CredentialLabel),
                IntermediateIdentity      = any(IntermediateIdentity),
                IntermediateIdentityLabel = any(IntermediateIdentityLabel),
                Hop1Edge                  = any(Hop1_EdgeLabel),
                Hop2Edge                  = any(Hop2_EdgeLabel),
                FinalTargetName           = any(FinalTargetName),
                FinalTargetLabel          = any(FinalTargetLabel),
                SourceAssets              = any(SourceAssets),
                SourceAssetTypes          = any(SourceAssetTypes),
                SourceAssetCount          = any(SourceAssetCount),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                FirstSourceAssetId,
                CredentialNodeId,
                IntermediateIdentityId,
                FinalTargetId;

        // Step 8  Collect node IDs that need enrichment
        let EnrichIds =
            union
                (Paths | project NodeId = FirstSourceAssetId),
                (Paths | project NodeId = CredentialNodeId),
                (Paths | project NodeId = IntermediateIdentityId),
                (Paths | project NodeId = FinalTargetId)
            | where isnotempty(tostring(column_ifexists("NodeId", "")))
            | summarize by NodeId;

        // Step 9  Enrich only the nodes actually used in paths
        let Nodes =
            ExposureGraphNodes
            | where NodeId in (EnrichIds | project NodeId)
            | extend NodeNameNorm  = coalesce(NodeName, tostring(EntityIds[0].id), tostring(NodeId))
            | extend RawData = todynamic(NodeProperties).rawData
            | extend Raw     = todynamic(todynamic(NodeProperties).raw)
            | extend CriticalityLevel =
                toint(coalesce(
                    tostring(NodeProperties.criticalityLevelProps[0].criticalityLevel),
                    tostring(RawData.criticalityLevel.criticalityLevel),
                    tostring(NodeProperties.criticalityLevel.criticalityLevel)
                ))
            | extend IsInternetExposed =
                tobool(coalesce(
                    RawData.isCustomerFacing,
                    Raw.isCustomerFacing,
                    false
                ))
            | extend IsExcluded =
                tobool(coalesce(
                    RawData.isExcluded,
                    Raw.isExcluded,
                    false
                ))
            | extend tagsBag1 = todynamic(coalesce(RawData.tags, dynamic({})))
            | extend tagsBag2 = todynamic(coalesce(todynamic(NodeProperties).tags, dynamic({})))
            | extend tagsBag3 = todynamic(coalesce(Raw.tags, dynamic({})))
            | extend AssetTierFromBag = tostring(coalesce(
                tagsBag1.AssetTier, tagsBag2.AssetTier, tagsBag3.AssetTier,
                tagsBag1["AssetTier--SI"], tagsBag2["AssetTier--SI"], tagsBag3["AssetTier--SI"]
            ))
            | extend deviceManualTags  = iff(isnull(RawData.deviceManualTags),  dynamic([]), todynamic(RawData.deviceManualTags))
            | extend deviceDynamicTags = iff(isnull(RawData.deviceDynamicTags), dynamic([]), todynamic(RawData.deviceDynamicTags))
            | extend tagsArray1        = iff(isnull(RawData.tags.tags),         dynamic([]), todynamic(RawData.tags.tags))
            | extend _AllTags          = array_concat(array_concat(deviceManualTags, deviceDynamicTags), tagsArray1)
            | extend AssetTags         = strcat_array(_AllTags, ";")
            | where AssetTags !has "--Excluded--SI"
            | extend _TierTagsFromText = extract_all(@"([^;]*--tier[0-3]--SI[^;]*)", AssetTags)
            | extend AssetTierByTag =
                case(
                    isnotempty(AssetTierFromBag), AssetTierFromBag,
                    array_length(_TierTagsFromText) > 0, strcat_array(array_sort_asc(_TierTagsFromText), ";"),
                    ""
                )
            | extend CriticalityTierFromTag =
                case(
                    AssetTierByTag has "--tier0--SI" or tolower(AssetTierByTag) has "tier0" or AssetTierByTag == "0", 0,
                    AssetTierByTag has "--tier1--SI" or tolower(AssetTierByTag) has "tier1" or AssetTierByTag == "1", 1,
                    AssetTierByTag has "--tier2--SI" or tolower(AssetTierByTag) has "tier2" or AssetTierByTag == "2", 2,
                    AssetTierByTag has "--tier3--SI" or tolower(AssetTierByTag) has "tier3" or AssetTierByTag == "3", 3,
                    int(null)
                )
            | extend CriticalityTier = toint(coalesce(CriticalityLevel, CriticalityTierFromTag, 3))
            | extend CriticalityTierLevel =
                case(
                    CriticalityTier == 0, "Critical - tier 0",
                    CriticalityTier == 1, "High - tier 1",
                    CriticalityTier == 2, "Medium - tier 2",
                    "Low - tier 3"
                )
            | extend AssetOSPlatform =
                tostring(coalesce(RawData.osPlatform, RawData.OSPlatform, RawData.platform, RawData.operatingSystem, RawData.os))
            | extend AssetOSVersion =
                tostring(coalesce(RawData.osVersion, RawData.OSVersion, RawData.version, RawData.operatingSystemVersion))
            | extend AssetOSDistribution =
                tostring(coalesce(RawData.osDistribution, RawData.OSDistribution, RawData.distribution))
            | extend MacMajor = toint(extract(@"^(\d+)", 1, AssetOSVersion))
            | extend IsLegacyWindows = iff(AssetOSPlatform in~ (LegacyWindowsOSPlatforms), 1, 0)
            | extend IsLegacyMacOS   = iff(tolower(AssetOSPlatform) has "mac" and MacMajor in~ (LegacyMacOSMajorVersions), 1, 0)
            | extend IsLegacyLinux   = iff(
                tolower(AssetOSPlatform) has "linux"
                and (AssetOSDistribution has_any (LegacyLinuxMatchers) or AssetOSVersion has_any (LegacyLinuxMatchers)),
                1, 0
            )
            | extend LegacyEndOfSupport = iff(IsLegacyWindows == 1 or IsLegacyMacOS == 1 or IsLegacyLinux == 1, 1, 0)
            | extend RiskFactorsArray =
                todynamic(coalesce(
                    RawData.risk.riskFactors,
                    NodeProperties.risk.riskFactors,
                    dynamic([])
                ))
            | extend RiskFactorsArray = iff(isnull(RiskFactorsArray), dynamic([]), RiskFactorsArray)
            | mv-apply rf = RiskFactorsArray on (
                where isnotempty(trim(" ", tostring(rf)))
                | summarize RiskFactorSet = make_set(tostring(rf))
            )
            | extend RiskFactorSet = coalesce(RiskFactorSet, dynamic([]))
            | extend RF_P_RiskFactorsCount = array_length(RiskFactorSet)
            | extend RF_P_InternetExposed  = iff(IsInternetExposed == true, 1, 0)
            | extend RF_P_LegacyEoS        = iff(LegacyEndOfSupport == 1, 1, 0)
            | extend RiskFactor_Probability = RF_P_RiskFactorsCount + RF_P_InternetExposed + RF_P_LegacyEoS
            | extend RiskFactor_Consequence = 0   // engine overrides this from RiskFactor_Consequence_Detailed token count (or 0 if empty) -- schema scaffolding only
            | extend RiskFactor_Probability_Detailed =
                strcat_array(
                    array_sort_asc(
                        array_concat(
                            RiskFactorSet,
                            iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                            iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                        )
                    ),
                    ";"
                )
            | extend _ScoreFactors =
                array_concat(
                    RiskFactorSet,
                    iff(RF_P_InternetExposed == 1, dynamic(["Internet-Exposed"]), dynamic([])),
                    iff(RF_P_LegacyEoS == 1, dynamic(["LegacyEndOfSupport"]), dynamic([]))
                )
            | mv-apply sf = _ScoreFactors on (
                where isnotempty(trim(" ", tostring(sf)))
                | summarize ScoreParts = make_set(strcat(tostring(sf), "=1"))
            )
            | extend RiskFactor_Probability_DetailedScore =
                strcat_array(array_sort_asc(coalesce(ScoreParts, dynamic([]))), ";")
            | project
                NodeId,
                NodeName              = NodeNameNorm,
                NodeLabel,
                CriticalityTier,
                CriticalityTierLevel,
                IsInternetExposed,
                IsExcluded,
                AssetTags,
                AssetTierByTag,
                LegacyEndOfSupport,
                RiskFactor_Probability,
                RiskFactor_Probability_Detailed,
                RiskFactor_Probability_DetailedScore,
                RiskFactor_Consequence;

        // Step 10  Enrich paths with node metadata
        let Detailed =
            Paths
            | join kind=leftouter (
                Nodes
                | project
                    SourceNodeId                = NodeId,
                    SourceCriticalityTier       = CriticalityTier,
                    SourceCriticalityTierLevel  = CriticalityTierLevel,
                    SourceIsInternetExposed     = IsInternetExposed,
                    SourceIsExcluded            = IsExcluded,
                    SourceAssetTierByTag        = AssetTierByTag,
                    SourceLegacyEndOfSupport    = LegacyEndOfSupport,
                    SourceRiskProb              = RiskFactor_Probability,
                    SourceRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    SourceRiskProbDetailedScore = RiskFactor_Probability_DetailedScore
              ) on $left.FirstSourceAssetId == $right.SourceNodeId
            | join kind=leftouter (
                Nodes
                | project
                    IntermediateNodeId                = NodeId,
                    IntermediateCriticalityTier       = CriticalityTier,
                    IntermediateCriticalityTierLevel  = CriticalityTierLevel,
                    IntermediateIsInternetExposed     = IsInternetExposed,
                    IntermediateLegacyEndOfSupport    = LegacyEndOfSupport,
                    IntermediateRiskProb              = RiskFactor_Probability,
                    IntermediateRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    IntermediateRiskProbDetailedScore = RiskFactor_Probability_DetailedScore
              ) on $left.IntermediateIdentityId == $right.IntermediateNodeId
            | join kind=leftouter (
                Nodes
                | project
                    TargetNodeId                = NodeId,
                    TargetCriticalityTier       = CriticalityTier,
                    TargetCriticalityTierLevel  = CriticalityTierLevel,
                    TargetIsInternetExposed     = IsInternetExposed,
                    TargetIsExcluded            = IsExcluded,
                    TargetAssetTierByTag        = AssetTierByTag,
                    TargetLegacyEndOfSupport    = LegacyEndOfSupport,
                    TargetRiskProb              = RiskFactor_Probability,
                    TargetRiskProbDetailed      = RiskFactor_Probability_Detailed,
                    TargetRiskProbDetailedScore = RiskFactor_Probability_DetailedScore
              ) on $left.FinalTargetId == $right.TargetNodeId
            // CL asset-metadata enrichment for the FINAL TARGET (cmdb fields only -- EG owns tier/path).
            | join kind=leftouter (_TargetCmdb) on $left.FinalTargetId == $right.Target_AzureResourceId_Guid
            | extend
                cmdbId            = Target_cmdbId,
                cmdbName            = Target_cmdbName,
                cmdbCriticality     = Target_cmdbCriticality,
                cmdbDataSensitivity = Target_cmdbDataSensitivity
            | extend TierEscalation =
                case(
                    isnotempty(SourceCriticalityTier) and isnotempty(TargetCriticalityTier)
                        and SourceCriticalityTier > TargetCriticalityTier,
                        SourceCriticalityTier - TargetCriticalityTier,
                    0
                )
            | extend LateralMovementType =
                case(
                    TierEscalation >= 3, "Privilege escalation large tier jump",
                    TierEscalation == 2, "Privilege escalation two tiers",
                    TierEscalation == 1, "Privilege escalation one tier",
                    "Direct access same tier"
                )
            | extend TargetTierWeight =
                case(
                    TargetCriticalityTier == 0, 100,
                    TargetCriticalityTier == 1, 60,
                    TargetCriticalityTier == 2, 30,
                    10
                )
            | extend EscalationWeight    = TierEscalation * 10
            | extend ExposureWeight      = iff(TargetIsInternetExposed == true, 8, 0)
                                         + iff(SourceIsInternetExposed == true, 3, 0)
            | extend SourceTierAmplifier =
                case(
                    SourceCriticalityTier == 0, 8,
                    SourceCriticalityTier == 1, 5,
                    SourceCriticalityTier == 2, 2,
                    0
                )
            | extend AttackPathPriorityScore = TargetTierWeight + EscalationWeight + ExposureWeight + SourceTierAmplifier
            | extend AttackPathPriority =
                case(
                    AttackPathPriorityScore >= 90, "Very High",
                    AttackPathPriorityScore >= 60, "High",
                    AttackPathPriorityScore >= 30, "Medium-High",
                    AttackPathPriorityScore >= 15, "Medium",
                    "Low"
                )
            | project
                AttackPathPriority,
                AttackPathPriorityScore,
                TierEscalation,
                LateralMovementType,
                FirstSourceAssetId,
                FirstSourceAssetName,
                FirstSourceAssetLabel,
                IntermediateIdentityId,
                IntermediateIdentity,
                IntermediateIdentityLabel,
                CredentialNodeId,
                CredentialName,
                CredentialLabel,
                FinalTargetId,
                FinalTargetName,
                FinalTargetLabel,
                TargetCriticalityTier,
                TargetCriticalityTierLevel,
                TargetAssetTierByTag,
                TargetIsInternetExposed,
                TargetLegacyEndOfSupport,
                TargetRiskProb              = coalesce(TargetRiskProb, 0),
                TargetRiskProbDetailed      = coalesce(TargetRiskProbDetailed, ""),
                TargetRiskProbDetailedScore = coalesce(TargetRiskProbDetailedScore, ""),
                SourceCriticalityTier,
                SourceCriticalityTierLevel,
                SourceIsInternetExposed,
                SourceLegacyEndOfSupport,
                SourceRiskProb              = coalesce(SourceRiskProb, 0),
                SourceRiskProbDetailed      = coalesce(SourceRiskProbDetailed, ""),
                SourceRiskProbDetailedScore = coalesce(SourceRiskProbDetailedScore, ""),
                SourceAssetCount,
                SourceAssets,
                SourceAssetTypes,
                Hop1Edge,
                Hop2Edge,
                cmdbId,
                cmdbName,
                cmdbCriticality,
                cmdbDataSensitivity;

        // Step 11  Collapse to unique logical path key
        let CollapsedPaths =
            Detailed
            | extend PathKey = strcat(FirstSourceAssetId, "->", IntermediateIdentityId, "->", FinalTargetId)
            | extend SecurityDomain = "Azure"
            | extend
                Category               = "Attack Paths",
                SubCategory            = "LateralMovement",
                ConfigurationName      = tostring(LateralMovementType),
                SecuritySeverity       = tostring(AttackPathPriority),
                RiskFactor_Consequence = 0
            | summarize
                SecuritySeverity_Path            = any(SecuritySeverity),
                TargetCriticalityTier_Path       = any(TargetCriticalityTier),
                TargetCriticalityTierLevel_Path  = any(TargetCriticalityTierLevel),
                TargetRiskProb_Path              = max(TargetRiskProb),
                TargetRiskProbDetailed_Path      = any(TargetRiskProbDetailed),
                TargetRiskProbDetailedScore_Path = any(TargetRiskProbDetailedScore),
                // CL cmdb metadata for the FINAL TARGET (any() -- one cmdb row per target).
                cmdbId_Path              = any(cmdbId),
                cmdbName_Path            = any(cmdbName),
                cmdbCriticality_Path             = any(cmdbCriticality),
                cmdbDataSensitivity_Path         = any(cmdbDataSensitivity),
                CredentialLabels_Path            = make_set(tostring(CredentialLabel)),
                SourceAssets_Path                = make_set(tostring(FirstSourceAssetName)),
                // TargetAssets_Path is what AssetCount (dcount(FinalTargetId)) actually
                // counts -- the Azure resources under attack. ImpactedAssets below uses
                // this so the count and the asset list share the same grain.
                TargetAssets_Path                = make_set(tostring(FinalTargetName)),
                TotalIssues_Path                 = count(),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                PathKey,
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                FinalTargetId;

        // Step 12  Summarize to report grain
        // cmdbCriticality + cmdbDataSensitivity in by-clause so cmdb-bucketed rows survive.
        let SummaryMain =
            CollapsedPaths
            | summarize
                ConfigurationId        = strcat_array(array_sort_asc(make_set(strcat_array(CredentialLabels_Path, ";"))), ";"),
                SecuritySeverity       = any(SecuritySeverity_Path),
                CriticalityTier        = toint(any(TargetCriticalityTier_Path)),
                CriticalityTierLevel   = tostring(any(TargetCriticalityTierLevel_Path)),
                RiskFactor_Consequence = 0,
                RiskFactor_Probability = max(TargetRiskProb_Path),
                AssetCount             = dcount(FinalTargetId),
                TotalIssues            = sum(TotalIssues_Path),
                ImpactedAssets         = strcat_array(array_sort_asc(make_set(strcat_array(TargetAssets_Path, ";"))), ";"),
            MdeDeviceId            = any(tostring(column_ifexists("MdeDeviceId",""))),
            EntraAccountObjectId   = any(tostring(column_ifexists("EntraAccountObjectId",""))),
            AzureResourceId        = any(tostring(column_ifexists("AzureResourceId",""))),
            AssetId                = any(tostring(column_ifexists("AssetId",""))),
            MITRE_Tactics          = any(tostring(column_ifexists("MITRE_Tactics",""))),
            MITRE_Techniques       = any(tostring(column_ifexists("MITRE_Techniques",""))),
            ComplianceTags         = any(tostring(column_ifexists("ComplianceTags","")))
              by
                SecurityDomain,
                Category,
                SubCategory,
                ConfigurationName,
                cmdbId_Path,
                cmdbName_Path,
                cmdbCriticality_Path,
                cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 13  Flatten probability detail strings
        let SummaryDetail =
            CollapsedPaths
            | extend _d = split(tostring(TargetRiskProbDetailed_Path), ";")
            | mv-expand _d to typeof(string)
            | extend _d = trim(" ", _d)
            | where isnotempty(_d)
            | summarize RiskFactor_Probability_Detailed = strcat_array(array_sort_asc(make_set(_d)), ";")
              by SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId_Path, cmdbName_Path, cmdbCriticality_Path, cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        let SummaryDetailScore =
            CollapsedPaths
            | extend _s = split(tostring(TargetRiskProbDetailedScore_Path), ";")
            | mv-expand _s to typeof(string)
            | extend _s = trim(" ", _s)
            | where isnotempty(_s)
            | summarize RiskFactor_Probability_DetailedScore = strcat_array(array_sort_asc(make_set(_s)), ";")
              by SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId_Path, cmdbName_Path, cmdbCriticality_Path, cmdbDataSensitivity_Path
            | project-rename
                cmdbId              = cmdbId_Path,
                cmdbName            = cmdbName_Path,
                cmdbCriticality     = cmdbCriticality_Path,
                cmdbDataSensitivity = cmdbDataSensitivity_Path;

        // Step 14  Final output
        SummaryMain
        | join kind=leftouter SummaryDetail      on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        | join kind=leftouter SummaryDetailScore on SecurityDomain, Category, SubCategory, ConfigurationName, cmdbId, cmdbName, cmdbCriticality, cmdbDataSensitivity
        | project-away SecurityDomain1, Category1, SubCategory1, ConfigurationName1, cmdbId1, cmdbName1, cmdbCriticality1, cmdbDataSensitivity1
        | extend AssetName = coalesce(column_ifexists("AssetName", ""), column_ifexists("AssetName_From_CL", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "), strcat_array(column_ifexists("TargetAssets_Path", dynamic([])), "; "), column_ifexists("ImpactedAssets", ""))
        | extend AssetId   = coalesce(column_ifexists("AssetId", ""),   column_ifexists("AssetId_From_CL", ""),   column_ifexists("PathKey", ""), strcat_array(column_ifexists("SourceAssets_Path", dynamic([])), "; "))
        | extend AssetType = coalesce(column_ifexists("AssetType", ""), column_ifexists("AssetType_From_CL", ""), column_ifexists("FirstGitHubSourceLabel", ""), column_ifexists("ExposedResourceNodeLabel", ""), column_ifexists("CredentialNodeLabel", ""), column_ifexists("IntermediateIdentityLabel", ""), column_ifexists("SourceNodeLabel", ""))
        // Weighted-factor block. Engine substitutes from riskscore_weighted.schema.custom.json -> weightedRiskFactors.azure.fields[].
        // Portal-paste default below emits a readable Detailed text + Factor=100 (basis-100, 100 = 1.0x = no lift).
        //__WEIGHTED_FACTORS_BEGIN__
        | extend RiskScore_Weight_Detailed = iff(isnotempty(cmdbCriticality), strcat("cmdbCriticality=", tostring(cmdbCriticality)), "")
        | extend RiskScore_Weight_Factor   = 100
        | extend RiskFactor_Weight         = 100
        //__WEIGHTED_FACTORS_END__
        | project
            SecurityDomain,
            Category,
            SubCategory,
            ConfigurationName,
            ConfigurationId,
            AssetName,
            AssetId,
            AssetType,
            SecuritySeverity,
            CriticalityTier,
            CriticalityTierLevel,
            cmdbId,
            cmdbName,
            cmdbCriticality,
            cmdbDataSensitivity,
            RiskFactor_Consequence,
            RiskFactor_Probability,
            RiskFactor_Probability_Detailed,
            RiskFactor_Probability_DetailedScore,
            RiskScore_Weight_Detailed,
            RiskScore_Weight_Factor,
            RiskFactor_Weight,
            AssetCount,
            TotalIssues,
            ImpactedAssets
        | order by
            RiskScore_Weight_Factor desc,
            RiskFactor_Probability desc,
            CriticalityTier asc,
            TotalIssues desc,
            AssetCount desc

    - ReportName: Identity_NoMFA_Summary
      ReportPurpose: >
        All enabled users with no MFA registration, across all tiers. Excludes accounts created within the last 7 days. Severity scales with tier.
      SecurityDomain: Identity
      CategoryInputName: Category
      SubcategoryInputName: Subcategory
      ConfigurationIdInputName: ConfigurationId
      SecuritySeverityInputName: SecuritySeverity
      CriticalityTierLevelInputName: CriticalityTierLevel
      RiskConsequenceScoreOutputName: RiskConsequenceScore
      RiskProbabilityScoreOutputName: RiskProbabilityScore
      RiskScoreOutputName: RiskScoreTotal
      CriticalityTierLevelScope:
      - Critical - tier 0
      - High - tier 1
      - Medium - tier 2
      - Low - tier 3
      SecuritySeverityScope:
      - Very High
      - High
      - Medium-High
      - Medium
      - Low
      OutputPropertyOrder:
      - SecurityDomain
      - Category
      - Subcategory
      - ConfigurationName
      - ConfigurationId
      - Impact
      - SecuritySeverity
      - CriticalityTier
      - CriticalityTierLevel
      - RiskFactor_Consequence_Detailed
      - RiskFactor_Consequence
      - RiskFactor_Probability_Detailed
      - RiskFactor_Probability
      - RiskConsequenceScore
      - RiskProbabilityScore
      - RiskScoreTotal
      - RiskScore_Weight_Detailed
      - RiskScore_Weight_Factor
      - RiskScoreTotal_Weighted
      - cmdbId
      - cmdbName
      - cmdbCriticality
      - cmdbDataSensitivity
      - ImpactedAssetCount
      - UniqueIssues
      - TotalIssuesImpactedAssets
      - ImpactedAssetsList
      - IssueList
      - MoreDetails
      - AssetDetectedInReportName
      SortBy:
      - RiskScoreTotal_Weighted
      ReportQuery:
      - |-
        // CL identity-metadata lookup (cmdb-only enrichment).
        let _IdentityCmdb =
            SI_Identity_Profile_CL
            | where TimeGenerated > ago(8d)
            | summarize arg_max(CollectionTime, *) by PrimaryEntityId
            | project
                _si_PrimaryEntityId    = tostring(PrimaryEntityId),
                _si_cmdbName           = tostring(column_ifexists("cmdbName", "")),
                _si_cmdbId             = tostring(column_ifexists("cmdbId", "")),
                _si_cmdbCriticality    = tostring(column_ifexists("cmdbCriticality", "")),
                _si_cmdbDataSensitivity = tostring(column_ifexists("cmdbDataSensitivity", "")),
