                 CriticalityTier == 2, "Medium - tier 2",   CriticalityTier == 3, "Low - tier 3", "Low - tier 3")
        | extend SecuritySeverity = "Medium"
        | extend RF_P_AlreadyExpired = iff(HasExpired == true, 1, 0)
        | extend RF_P_ExpiresVerySoon = iff(ExpiryDays >= 0 and ExpiryDays <= 7, 1, 0)
        | extend RF_P_Privileged     = iff(Tier <= 1, 1, 0)
